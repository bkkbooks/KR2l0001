body:
  text: 唐六典卷十唐張九齡等撰祕書省祕書省監一人少監一人丞一人祕書郎四人校書郎八人正字四人主事一人令史四人書令史九人典書八人楷書手八十人亭長六人掌固八人熟紙匠十人裝潢匠十人筆匠六人著作局著作郎六人著作佐郎四人書令史一人書史二人校書郎二人正字二人楷書手五人掌固四人太史局令二人丞二人令史二人書令史四人楷書手二人亭長四人掌固四人司厯二人保章正一人厯生三十六人裝書厯生五人監候五人天文觀生九十人靈臺郎二人天文生六十人挈壺正二人司辰十九人刻漏典事十六人漏刻博士九人漏刻生三百六十人典鐘二百八十人典鼓一百六十人祕書省監一人從三品周禮春官太史掌建邦之六典又小史掌邦國之志定繫世又外史掌四方之志三皇五帝之書並祕書之任也秦則博士官所職禁人藏書漢氏除挾書之律開獻書之路置寫書之官又令謁者陳農求遺書於天下故文籍往往而出並藏之書府在外則有太常太史博士掌之內則有延閣廣內石渠之藏又御史中丞在殿中掌蘭臺祕書圗籍又未央宫中有麒麟閣天祿閣亦尚書劉向揚雄典校皆在禁中謂之中書猶今言內庫書也後漢則藏之東觀亦禁中也至桓帝延熹二年始置祕書監屬太常掌禁中圗書祕記故曰祕書漢官云祕書監一人秩六百石魏武為魏王置祕書令典尚書奏事即中書之任也兼掌圖籍祕記文帝黃初中分祕書立中書因置監令乃以散騎常侍王象領祕書監撰皇覽魏氏蘭臺亦藏書御史掌焉魏略薛夏云蘭臺為外臺祕書為內閣是也魏初祕書屬少府及王肅為監以為祕書之職即漢東觀之任安可復屬少府自此之後不復屬焉至晉武又以祕書并入中書惠帝永平元年詔祕書典綜經籍考校古今中書自有職務逺相統攝於事不専宜令復别置祕書寺掌中外三閣圗書自是祕書寺始外置焉晉令云品第五絳朝服銅印墨綬進賢兩梁冠佩水蒼玉宋齊同晉氏梁改為省與尚書中書門下集書為五省祕書監增秩中二千石品第三後制十八班祕書監班第十一陳依梁後魏亦以祕書為五省之數監初從第二品中太和末正第三品北齊依魏後周春官府置外史下大夫掌書籍此祕書監之任也隋祕書與尚書門下內史殿中為五省祕書監正第三品煬帝三年降為從第三品其後又改祕書監為祕書令武德初改為監龍朔二年改為蘭臺其監曰蘭臺太史咸亨元年復舊天授初改為麟臺監神龍元年復舊初漢御史中丞掌蘭臺祕書圗籍故歷代置都邑建臺省以祕書與御史為鄰少監二人從四品上隋煬帝三年置祕書少監一人從四品掌二祕書監之職其後又改為少令皇朝因隋為少監龍朔二年改為蘭臺侍郎咸亨元年復舊天授初改為麟臺少監神龍初復舊至太極初又增二員丞一人從五品上漢獻帝建安中魏武為魏王置祕書令及二丞典尚書奏事並中書之任也魏志劉劭建安末自祕書郎轉祕書丞是也魏文黃初中分祕書立中書以祕書左丞劉放為中書監祕書右丞孫資為中書令而祕書置丞一人秩四百石魏志云何禎文帝時上許都賦帝異之公車徴到為祕書郎後月餘禎關事帝問外言本用禎為丞何故為郎案主者罪遂改為丞時祕書丞尚未轉遂以禎為右丞晉武并祕書入中書謂之中書祕書丞惠帝又置祕書丞二人晉令祕書丞品第六銅印墨綬進賢一梁冠絳朝服晉書稱桓石綏為祕書丞啓校四部圗書宋齊並一人品服同晉氏梁增品第五秩六百石銅印黃綬陳依梁後魏祕書丞一人正第五品上北齊因之後周春官府有小外史上士之職蓋此祕書丞之任也隋祕書丞一人正五品祕書監之職掌邦國經籍圗書之事有二局一曰著作二曰太史皆率其屬而修其職凡四部之書必立三本曰正本副本貯本以供進內及賜人凡敕賜人書祕書無本皆别寫給之少監為之二焉丞掌判省事祕書郎四人從六品上魏武置祕書郎秩四百石魏起居注青龍中議祕書丞郎職近日月宜居三臺上亞尚書丞郎魏志云王伯輿鍾㑹何禎鄭默竝起家拜祕書郎中而默在祕書掌中外三閣刪省繁文除其浮穢始制中經時虞松為中書令謂默曰而今而後朱紫别矣晉令祕書郎中品第六進賢一梁冠絳朝服晉起居注云武帝遣祕書圗書分為甲乙景丁四部使祕書郎中四人各掌一焉晉書云左太冲為三都賦自以所見不博求為祕書郎中宋氏除中字宋書稱王敬𢎞子恢之名為祕書郎敬𢎞求為奉朝請與恢之書曰且祕書有限故有競朝請無限故無競吾欲使汝處無競之地文帝喜而許之齊書稱王僧䖍王慈竝早有令譽皆起家拜祕書郎梁秩六百石江左多任貴遊年少而梁代尤甚當時諺言上車不落則著作體中何如則祕書陳著令令僕射子起家為之後魏亦置四人正第七品上後魏書云高謐天安中以功臣子召入禁中專掌祕閣拜祕書郎奏請廣訪羣書大家繕寫北京圖籍稍以審正北齊又增中字正第七品下隋又除中字正七品上煬帝三年加為從五品皇朝為從第六品上龍朔天授神龍並隨省改復校書郎八人正九品上漢成帝命光祿大夫劉向於天祿閣校經傳諸子詩賦步兵校尉任宏校兵書太史令尹咸校數術太醫監李柱國校方術其後揚雄以大夫亦典校於天祿閣斯皆有其任而未至其官至後漢始於東觀置校書郎中續後漢書云馬融安帝時為大將軍鄧隲所召拜校書郎中在東觀十年窮覽典籍上廣成頌又竇章居貧蔬食講讀不輟太僕鄧康重章學行是時學者稱東觀為老氏藏室道家蓬萊山康薦章入東觀為校書郎中漢御史中丞掌殿中蘭臺祕書圖籍因置蘭臺令史典校其書班固傅毅初竝為蘭臺令史王充云通人官蘭臺令史比校書郎中東觀有校書郎置校書郎中典其事時通儒逹學亦多以他官領之自漢魏歷宋齊梁陳博學之士往往以他官典校祕書至後魏祕書省始置校書郎正第九品上北齊置十三人隋初亦置十二人煬帝三年減為十人其後又增為四十人皇朝減為八人正字四人正九品下掌詳定典籍正其文字前代才學之士多以他官兼其任者齊祕書省有正書蓋是正字之任北齊祕書省始置正字四人從第九品上隋因之皇朝為正第九品下主事一人從九品上皇朝置掌印并句檢稽失令史四人書令史九人魏甲辰儀祕書令史品第八晉品第九宋品第八齊祕書令史品勳位第六梁陳品第九後魏祕書令史從第九品下北齊正第九品上隋開皇初始降為流外行置隋祕書令史四人流外二品書令史九人流外三品皇朝因之典書八人齊職儀云宋孝武大明年開府儀同及三公府皇子府皆有典書吏皇朝祕書省始置典書其職同流外入考入流焉楷書手八十人隋煬帝祕書省置楷書員二十人從第九品掌鈔寫御書皇朝所置職同流外也亭長六人掌固八人熟紙匠裝潢匠各十人筆匠六人皇朝所定祕書郎掌四部之圗籍分庫以藏之以甲乙景丁為之部目甲部為經其類有十一曰易以紀隂陽變化經籍志歸藏等六十九部五百五十一卷二曰書以紀帝王遺範古文尚書等三十二部二百三十七卷三曰詩以紀興衰誦嘆韓詩等三十九部四百三十三卷四曰禮以紀文物體制周官等一百三十六部一千六百二十二卷五曰樂以紀聲容律度樂大義等三十二部一百四十三卷六曰春秋以紀行事褒貶春秋經等三傳九十七部九百八十三卷七曰孝經以紀天經地義古今孝經等十八部六十三卷八曰論語以紀先聖微言論語等并三經異義七十二部七百八十一卷九曰圗緯以紀六經䜟候河圖等十三部九十二卷十曰小學以紀字體聲韻說文等三部四十六卷乙部為史其類一十有三一曰正史以紀紀傳表志史記等六十七部三千八十三卷二曰古史以紀編年繫事紀年等四十四部六百六十六卷三曰雜史以紀異體雜記周書等七十部九百一十七卷四曰霸史以紀僞朝國史趙書等二十七部三百三十五卷五曰起居注以紀人君動止穆天子傳等四十一部一千一百八十九卷六曰舊事以紀朝廷政令漢武故事等二十部四百四卷七曰職官以紀班序品秩漢官解誥等二十部三百三十六卷八曰儀注以紀吉凶行事漢舊儀等五十九部二千二十九卷九曰刑法以紀律令格式律令等三十五部七百一十二卷十曰雜傳以紀先賢人物三輔决録等二百一十七部一千二百八十六卷十一曰地理以紀山川郡國山海經等一百三十九部一千四百三十三卷十二曰譜系以紀氏族繼序世本等四十一部三百六十卷十三曰略録以紀史策條目七略等三十部二百一十四卷景部為子其類一十有四一曰儒家以紀仁義教化晏子等三十五部三百三十六卷二曰道家以紀清淨無為鬻子等四十二部三百三十一卷三曰法家以紀刑法典制申子等四部凡六十卷四曰名家以紀循名責實管子等六部七十二卷五曰墨家以紀强本節用墨子等三部七十卷六曰從橫家以紀辨說譎詐鬼谷子等二部七卷七曰雜家以紀兼敘衆說尉繚子等九十七部二千七百二十卷八曰農家以紀播植種藝汜勝之書等五部一十九卷九曰小說家以紀芻辭輿誦燕丹子等二十五部一百二十二卷十曰兵法以紀權謀制變司馬兵法等一百四部四百四十六卷十一曰天文以紀星辰象緯周髀等九十七部六百七十卷十二曰􅔦數以紀推步氣朔四分厯等一百部二百六十三卷十三曰五行以紀卜筮占候風角占等二百七十二部一千二十二卷十四曰醫方以紀藥餌針灸黃帝素問等五十六部四百一十卷丁部為集其類有三一曰楚詞以紀騷人怨刺楚詞等十部二十九卷二曰别集以紀詞賦雜論荀況集等四百三十七部四千三百八十一卷三曰總集以紀類分文章文章流别集等一百七部二千二百一十三卷校書郎正字掌讎校典籍刋正文字字體有五一曰古文廢而不用二曰大篆惟於石經載之三曰小篆謂印璽旐幡碑碣所用四曰八分謂石經碑碣所用五曰𨽻書典籍表奏及公私文疏所用皆辨其紕繆以正四庫之圗史焉著作局著作郎二人從五品上續漢書稱班固傅毅以蘭臺令史陳宗以洛陽令尹敏以長陵令孟輦以司𨽻校尉並著作東觀然皆他官兼著作之名而未正其官至魏明帝太和中置著作郎𨽻中書省晉惠帝元康二年詔曰著作舊屬中書而祕書既别典文籍今改中書著作為祕書著作後又别自名省曰著作省而猶𨽻祕書晉魏著作郎一人俗謂之大著作專掌史注亦或為兼官晉令著作郎品第六進賢一梁冠綘朝服而晉書稱陳夀作益都耆舊傳武帝善之以為著作郎張載作劍閣銘世祖以為能除著作郎孫楚自著作佐郎轉著作郎此皆謂大著作也又荀朂以中書監于竇虞預徐廣以散騎常侍孫綽以給事中伏滔以游擊將軍孫盛以祕書監並兼領著作又陳郡王隱待詔著作單衣介幘朝朔望於著作省亦其任也宋齊並同晉氏宋書云何承天除著作郎撰國史承天巳老諸佐郎並名家年少荀伯子嘲之常呼為奶母焉著作秩六百石品第六陳依梁後魏正第五品上後魏書崔浩學究精微宋欽好學不倦並為著作郎北齊二人從五品後周春官府置著作上士二人即其職也隋祕書省領著作郎曹置著作郎二人從第五品上煬帝三年增為正五品其後又降為從第五品皇朝祕書省領著作局置著作郎二人龍朔二年改為司文郎中咸亨元年復故著作佐郎四人從六品上著作佐郎修國史宋百官春秋云常道鄉公咸熙百官名有著作佐郎三人晉定員八人哀帝興寧二年大司馬桓溫表省四人孝武帝寧康元年復置八人晉令著作佐郎品第六進賢一梁冠綘朝服孝武太元四年詔祕書監自選著作佐郎令並無監使吏部選有監復舊焉宋齊並同晉制著作佐郎始到職必撰名臣傳一人宋氏之初國朝始建未有合撰者此制遂替矣梁秩四百石品第七陳令僕射子起家為之品制同梁後魏正第七品上北齊正第七品下後周春官府署著作中士四人即著作佐郎之任也隋置八人正第七品上煬帝三年著作二人增品從第六皇朝置四人龍朔二年改為司文郎咸亨元年復故開元二十六年減置二人書令史一人自晉以來祕書著作皆有令史史闕其員品校書郎二人正九品上後魏著作省置校書郎史闕其員品北齊著作省置校書郎二人正第九品上隋及皇朝因之開元二十六年減置一人正字二人正九品下隋著作曹置正字二人從九品上皇朝因之著作郎掌修撰碑志祝文祭文與佐郎分判局事太史局令二人從五品下左傳云昔少昊氏以鳥紀官鳯鳥氏歷正也顓頊命南正重司天北正黎司地唐虞之際羲氏和氏紹重黎之後掌天地四時之官並太史之任也周官太史掌建邦之六典正嵗年以序事班告朔下邦國左傳曰天子有日官即太史也漢書百官表太史届太常茂陵書稱司馬談為太史令後漢太史令一人秩六百石掌天時星律祥瑞妖災凡嵗將終奏新年厯而已魏因之晉太史令品第七秩六百石銅印墨綬進賢一梁冠綘朝服江左髙瑩以侍中陳卓以義熙守吳道欣以殿中侍御史兼領太史宋齊梁陳並同晉氏後魏北齊亦然後周春官府置太史中大夫一人掌厯家之法隋祕書省太史曹置太史令二人從七品上煬帝三年改太史曹為太史監進令階為從五品皇朝因之改監為局龍朔二年改為祕書閣局令改為祕閣郎中咸亨元年復舊貞觀元年為渾天監不𨽻麟臺其令監署一人加至正第五品上因加副監及丞主簿府史等員其年又改為渾儀監長安二年復為太史局還𨽻麟臺緣監置官及府史等並廢其監依舊為令置二人景龍二年又改太史局為太史監令名不改不𨽻祕書開元二年又改令為監三年加從第四品下其一員改為少監十四年又改為局復為太史令二員𨽻祕書丞二人從七品下司馬彪續漢志云太史丞一人秩二百石魏晉宋齊皆同漢氏梁氏太史丞三品勳位後魏北齊史失其品第隋太史丞置二人正第九品上煬帝三年減一人皇朝不置丞貞觀元年改為渾儀監始置丞二人從第七品上長安二年又省景龍二年復置令史二人書令史四人太史不𨽻祕書即為府史開元十四年復為令史也太史令掌觀察天文稽定厯數凡日月星辰之變風雲氣色之異率其屬而占候焉其屬有司厯靈臺郎挈壺正凡𤣥象器物天文圗書茍非其任不得與焉觀生不得讀占書所見徴祥災異密封聞奏漏泄有刑每季録所見災祥送門下中書省入起居注嵗終總録封送史館每年預造來嵗厯頒于天下司厯二人從九品上漢官儀太史全員有理厯六人至晉太史令使員有典厯四人宋齊梁陳後魏北齊皆有典厯並史闕其員品至隋改典厯為司厯置二人從九品下取左傳司厯為名皇朝為從九品上保章正一人從八品上周禮春官太史屬有保章氏掌天星以志星辰日月之變動辨其吉凶自秦漢以來無其職至後周春官府置太史其屬有保章上士中士之職即其任也至隋置厯博士一人正九品上皇朝因之長安四年省厯博士置保章正以當之掌教厯生厯生三十六人隋氏置掌習厯皇朝因之同流外八考入流裝書厯生五人皇朝置同厯生司厯掌國之厯法造厯以頒于四方有戊寅厯武德初東那道士傳仁均所造拜太史令麟德厯麟德中太史令李淳風所造神龍厯神龍中太史令南宫說所造大衍厯開元十四年嵩山僧一行承制㫖而考定最為詳密今見行焉凡天下測影之處分至表準其詳可載故參考星度稽驗晷影各有典常南至之影京兆長一丈二尺九寸二分蔚州長一丈五尺八寸九分春分中影洛城長五尺二寸五分京兆長五尺三寸四分太原長六尺蔚州長六尺四寸四分半北至之影京兆表北長一尺四寸二分安南則表南三寸開元十二年於京麗正院定表樣并雷尺寸差太史官馳驛分往測候監候五人從九品下魏晉太史令吏員有望候郎二十人候部吏十五人掌侯天文並監候之任也隋初置監候四人從九品下煬帝三年增監候為十人皇朝因隋置監候五人天文觀生九十人隋氏置掌晝夜在靈臺伺候天文氣色皇朝所置從天文生轉補八考入流也靈臺郎二人正八品下掌習知天文周文王受命而作邑于豐立靈臺所以觀䘲象察氣之妖祥也詩云經始靈臺鄭𤣥曰觀臺而曰靈者言文王化行似神之精明故以名也春秋傳曰公既視朔遂登靈臺以望而書雲物亦其制也其在周官則馮相氏登高臺以掌其事漢則雜候上林清臺後漢又作靈臺掌候日月氣而屬太史太史有二丞其一在靈臺漢官云靈臺員使十三人靈臺待詔四十六人魏太史有靈臺令丞主候望頒厯晉宋齊梁陳太史皆有靈臺丞隋太史置天文博士掌教習天文氣色皇朝因隋置天文博士二人正八品下長安四年省天文博士之職置靈臺郎以當之天文生六十人隋氏置皇朝因之年深者轉補天文觀生靈臺郎掌觀天文之變而占候之凡二十八宿分為十二次寅為析木燕之分自尾十度至斗十一度卯為大火宋之分自氐五度至尾九度辰為夀星鄭之分自軫十二度至氐四度已為鶉尾楚之分自張十五度至軫十一度午為鶉火周之分自栁九度至張十六度未為鶉首秦之分自井十六度至栁八度申為實沈魏之分自畢十二度至井十五度酉為大梁晉之分自胃七度至畢十一度戍為降婁魯之分自奎五度至胃六度亥為娵訾衛之分自危十六度至奎四度子為𤣥枵齊之分自女八度至危十五度丑為星紀吳越之分自斗十二度至女七度所以辨日月之纒次正星辰之分野凡占天文變異日月薄蝕五星陵犯有石氏甘氏巫咸三家中外官占凡瑞星祅星瑞氣祅氣有諸家雜占凡測候晷度則以游儀為其凖挈壷正二人從八品下掌知漏刻周禮有夏官挈壷氏秋官司寤氏春官雞人氏凡三職咸掌其事自漢以後太史掌之皇朝長安四年始置司辰十九人正九品下掌漏刻事隋置司辰二人從第九品下煬帝改為司辰師本屬武侯府大業三年𨽻於太史局皇朝因之貞觀元年除師字漏刻典事十六人皇朝置掌司漏刻之節漏刻博士六人隋置有品秩掌教漏刻生皇朝降為流外也漏刻生三百六十人隋置掌習漏刻之節以時唱漏皇朝因之皆中小男為之轉補為典鐘典鼓典鐘二百八十人皇朝置掌擊漏鐘典鼓一百六十人皇朝置擊漏鼓挈壷正司辰掌知漏刻孔壷為漏浮箭為刻以考中星昏明之候焉箭有四十八晝夜共百刻冬夏之間有長短冬至日南為發去極一百一十五度晝漏四十刻夜漏六十刻夏至日北為斂去極六十七度晝漏六十刻夜漏四十刻春秋二分發斂中去極九十一度晝夜各五十刻秋分已後減晝益夜九日加一刻春分已後減夜益畫九日減一刻二至前後則加減遲用日多二分之間則加減速用日少凡候夜漏以為更㸃之節每夜分為五更每更分為五㸃更以擊鼓為節㸃以擊鐘為節唐六典卷十
