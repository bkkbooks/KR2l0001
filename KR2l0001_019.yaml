body:
  text: 唐六典卷十九唐張九齡等撰司農寺司農寺卿一人少卿二人丞六人主簿二人録事二人府三十八人史七十六人計史三人亭長九人掌固七人上林署令二人丞四人府七人史十四人監事十人典事二十四人掌固五人太倉署令三人丞六人府十人史二十人監事十人典事二十四人掌固八人鉤盾署令二人丞四人府七人史十四人監事十人典事十九人掌固五人導官署令二人丞四人府八人史十六人監事十人典事二十四人掌固五人太原永豐倉監一人丞二人録事一人府三人史六人典事八人掌固六人龍門等諸倉每倉監一人丞二人録事一人府二人史四人典事六人掌固四人司竹監監一人副監一人丞二人録事一人府二人史四人典事三十人掌固四人溫泉湯監監一人丞一人録事一人府一人史二人掌固四人京都苑總監監各一人副監各一人丞各二人主簿各一人録事各二人府各八人史各十六人典事各六人亭長各四人掌固各六人京都苑四面監監各一人副監各一人丞各二人録事各一人府各三人史各六人典事各六人掌固各六人諸屯監監一人丞一人録事一人府一人史二人典事二人掌固四人每屯主一人屯副一人九成宫總監監一人副監一人丞一人主簿一人録事一人府三人史五人司農寺卿一人從三品左傳少昊氏九扈為九農正尚書舜命棄為后稷播時百穀周官冢宰有太府下大夫鄭氏注云若今司農漢書百官表云治粟內史秦官掌穀貨有兩丞景帝更名大農令武帝更名大司農秩中二千石屬官有太倉均輸平凖都內籍田五令丞幹官鐡市兩長丞又郡國諸倉農監都水六十五官長丞皆屬焉又有治粟都尉武帝軍官不常置王莾改大司農曰羲和後更為納言後漢改為大司農魏因之品第三晉置功曹主簿録事等員哀帝省併都水孝武帝復置宋齊因之未有卿名梁天監七年象四時置十二卿司農為春卿班第十一又置勸農謁者亦隸司農陳因之梁後魏大司農第二品上太和二十二年改第三品北齊因之後周依周官有司農上士一人掌三農九穀稼穡之政令隋司農卿一人正三品煬帝降為從三品司農但統上林太倉鈎盾導官四署罷典農華林二署以平準京市隸太府寺掌苑囿薪芻藴炭市易度量皇朝因之龍朔二年改司稼寺正卿咸亨中復舊少卿二人從四品上後魏初置少卿第三品太和二十二年為正第四品上北齊因之後周司農有中士一人隋品同北齊煬帝加置二人降為從四品龍朔咸亨隨寺改復司農卿之職掌邦國倉儲委積之政令總上林太倉鉤盾導官四署與諸豎之官屬舊屬官又有太和王山九成宮農圃等三監開元二十三年省謹其出納而修其職務少卿為之二凡京都百司官吏祿廩皆仰給焉每年支諸司雜物各有定額開元二十三年勑以為費用過多遂飭减光祿寺左右羽林左右萬騎左右三衛間廄使五坊使洛城西門東宫南衙諸厨及總監司農鴻臚等司年支雜物并括少府監庫內舊物四百餘萬凡朝㑹祭祀供御所須及百官常料則率署監所貯之物以供其事凡孟春吉亥皇帝親藉田之禮有事于先農則奉進耒耜兩漢及魏晉並有其禮過江草創未暇至宋始有齊因之猶不齊不祭至梁天監中依國語禮記散齊七日致齊三日于耕所設先農神座薦羞之禮如社稷陳因之後魏闕北齊藉于城東南千畝設御壇于阡陌東正月吉亥使公卿祀先農于壇上祀訖帝降至耕位執耒三推升壇即坐一品五推二品七推三品九推藉田令帥屬以牛耕終千畝以青箱奉穜稑之種司農詣耕所灑之耰訖省功奏事畢帝降之便殿更衣宴饗班賚而還後周無聞隋于啓夏門外置地千畝為壇孟春吉亥祭先農以后稷配牲用太牢皇帝服衮冕備法駕乘耕根車祀三獻訖因耕司農授耒皇帝三推執事以授應耕者各以班五推九推司農率其屬終畝皇朝因之開元二十三年正月上親耕于洛陽東門外諸儒奏議以為古者耦耕以一撥為一推其禮久廢今用牛耕宜以一步為一推及親籍田太常卿告三推禮畢上曰朕憂農人之勤勞欲俯同九推遂九推而止于是公卿以下皆過于古云季冬藏冰祭司寒以黑牡秬黍仲春啓氷亦如之丞六人從六品上秦治粟內史有兩丞漢因之武帝改為大司農亦兩丞及桑𢎞羊為大司農置部丞數十人分部主郡國將以興利後漢司農丞一人比千石部丞二人六百石部丞主帑藏魏因之品第七晉亦品第七進賢一梁冠介幘皂衣銅印黃綬宋齊梁陳司農丞墨綬後魏從五品中太和二十二年為七品下北齊因之隋司農丞五人品從第六大業五年加至從五品皇朝武德中置四人貞觀中加置六人主簿二人從七品上晉太康中置主簿二人宋齊無聞梁置一人七班之中第三陳因之後魏不見北齊司農寺有功曹五官主簿隋司農主簿二人皇朝因之録事二人從九品上丞掌判寺事凡天下租稅及折造轉運于京都皆閲而納之每嵗自都轉米一百萬石以祿百官及供諸司若駕行幸東都則减或罷之凡受租皆于輸場對倉官租綱吏人執籌數函其函大五斛次三斛小一斛其諸州槀秸應輸京都者閲而納之以供祥麟鳳苑之馬凡朝㑹祭祀米物薪芻皆應時而給若應供御進內則據本司移牒而供之其中書門下尚書省御史臺史館集賢院别敕定名使并吏部兵部入宿令史中書門下令史諸楷書手寫書課皆有炭料凡官戶奴婢男女成人先以本色嫓偶若給賜許其妻子相隨若犯籍沒以其所能各配諸司婦人巧者入掖庭主簿掌印省署抄目勾檢稽失凡署木契二十隻應須出納與署合之十隻與太常署合十隻與導官署合皆對刋作雌雄主簿掌雌留署勘然後出給録事掌受事發辰上林署令二人從七品下漢書百官表水衡都尉武帝置掌上林苑屬官有上林令丞尉又有甘泉上林長丞又步兵校尉掌上林苑又少府屬官有上林中土地監上林者漢之苑囿也司馬相如有上林賦後漢上林苑令一人六百石主苑中禽獸頗有人居皆主之捕得其獸送太官丞一人三百石魏晉因之江左闕其官宋武帝復置𨽻尚書殿中曹及少府齊因之梁陳屬司農後魏闕文北齊及隋並屬司農皇朝因之丞四人從八品下漢水衡都尉上林有八丞後漢魏晉並一人江左省宋武帝置齊梁陳並一人後魏闕文北齊上林丞八人隋置二人皇朝置四人監事十人從九品下上林署令掌苑囿園池之事丞為之二凡植果樹蔬菜以供朝㑹祭祀其尚食進御及諸司常料亦有差諸司吏執抄榜詣圃然後給之凡季冬藏氷每嵗藏一千假方三尺厚一尺五寸所管州于山谷鑿而取之先立春三日納之氷井周禮凌人掌氷政嵗十有二月令斬氷三其凌春始治鑑夏頒氷秋刷鄭𤣥云凌氷室也刷清也刷除凌室更納新氷西陸朝覿而出之以進御焉太倉署令三人從七品下石氏星經天倉六星在婁南倉榖所藏南四星天庚積厨粟之所天囷十三星乃倉廩之屬主御糧也史記云武王伐殷散巨橋之粟周禮有廩人下大夫上士秦漢大司農屬官太倉令丞各一人文帝時淳于意為之後漢太倉令一人六百石魏品第七晉宋齊梁陳亦然後魏闕文北齊司農統太倉令丞後周有司倉下大夫隋太令署令二人米廩督二人穀倉督四人鹽倉督二人皇朝署太倉令三人東都則曰含嘉倉丞六人從八品下秦漢魏晉宋齊梁陳北齊皆有丞一人隋太倉丞六人皇朝因之監事十人從九品下太倉署令掌九榖廩藏之事丞為之二凡鑿窖置屋皆銘甎為庾斛之數與其年月日受領粟官吏姓名又立牌如其銘焉輸米粟二㪷課槀一圍三斛橛一枚米二十斛籧篨一領粟四十斛者一蕃麥及雜種亦如之以充倉窖所用仍令輸人營備之凡粟支九年米及雜種三年貯經三年斛聽耗一升五年已上二升凡京官之祿發京倉以給中書門下御史臺尚書省殿中省內侍省九寺三監左右春坊詹事府京兆河南府並第一般上旬給十八衛諸王府率更家令㒒寺京都總監內坊並第二般中旬給諸公王府邑司東宫十率府九成官總監兩京畿府官並第三般下旬給餘司無額凖下旬給公糧者皆承尚書省符丁男日給米二升鹽二勺五撮妻妾老男小則减之若老中小男元官及見驅使兼國子監學生針醫生雖未成丁亦依丁例鉤盾署令二人正八品上漢少府屬官有鉤盾令丞茂陵中書云鉤盾䆠者近署兵器所造昭紀云帝初立年八嵗耕于鉤盾弄田應劭云帝時幼未能親耕帝籍鉤盾䆠者近署故往試為弄田後漢令六百石魏氏闕文晉大鴻臚屬官有鉤盾令宋齊梁陳省其官後魏闕文北齊大司農統鉤盾令丞隋司農統鉤盾署令三人掌薪芻及炭鵝鴨蒲蘭陂池藪澤之物皇朝令二人丞四人丞四人正九品上漢有五丞後漢置一人四百石又有苑丞永安鴻池丞並𨽻鉤盾魏氏因之隋鈎盾十二丞皇朝减置四人監事十人從九品下後漢鉤盾令從官四十人晉鉤盾令置主簿録事各一人鉤盾署令掌供邦國薪芻之事丞為之二凡祭祀朝㑹賔客享宴隨其差降而供給焉凡京官應給炭五品已上日二斤蕃客在館第一等人日三斤已下各有差其和市木橦一十六萬根每嵗納寺如用不足以苑內蒿根柴兼之其京兆岐隴州募丁七千人每年各輸作木橦八十根春秋二時送納若駕在都則于河南府諸縣市之少尹一人與卿相知檢察凡孳生鵝鴨雞彘之屬皆令官奴婢為課養之導官署令二人八品上秦漢少府屬官有導官令丞主擇米以供祭祀及御饌導擇也後漢屬大司農令六百石丞三百石魏晉宋齊皆有令丞梁在七班之下為三品勳位陳因之後魏闕文北齊及隋皆有令丞並屬司農皇朝因之置令二人丞四人正九品上秦漢魏皆有丞晉氏不置宋齊又置梁陳復省隋有五丞皇朝置四人監事十人從九品下晉導官令置主簿録事酒吏豉吏等北齊導官有御細部麴麵部典庫部等倉督隋導官署有御細倉督麴麵等倉督導官署令掌供御導擇米麥之事丞為之二凡九穀之用有為糗糒有為麴蘗有為粉脂皆隨其精粗差其耗損而供給之太原永豐龍門監每倉監一人正七品下漢書酈生云據敖倉之粟又吳有海陵倉大司農屬官有諸倉長丞後漢河南尹屬官有滎陽穀倉長丞魏書有邸閣倉亦其事也東晉有東倉石頭倉宋齊因之梁司農統左中右三部倉丞陳氏亦同後魏闕文北齊司農有梁州及石濟之水次倉隋初漕關東之粟以實京邑衛州黎陽倉榮陽洛口倉洛州河陽倉陕州常平倉潼關渭南亦皆有倉以轉運之各有監官皇朝因之丞二人從八品上諸倉監各掌其倉窖儲積之事丞為之二凡粟出給者每一屋一窖盡賸者附計缺者隨事科徵非理缺損者坐其所由令徵陪之凡出納帳嵗終上于寺焉司竹監監一人正七品下漢官有司竹長丞魏晉河內淇園竹各置司守之官江左省後魏有司竹都尉北齊後周並闕隋有司竹監及丞皇朝因之今在京兆鄠盩厔懷州河內縣副監一人正八品下丞二人從八品上司竹監掌植養園竹之事副監為之二凡宫掖及百司所須簾籠筐篋之屬命工人擇其材幹以供之其笋則以時供尚食嵗終以竹功之多少為之考課丞掌判監事溫泉湯監一人正七品下辛氏三秦記云驪山西有溫湯先以三牲祭乃得洗不祭則爛人肉俗說云秦始皇與神女戲不以禮神女唾之生瘡始皇怖謝乃為出溫泉洗之立愈抱朴子曰水有溫泉之湯池火有蕭丘之寒爓漢魏已來相承云能蕩邪蠲疫今在新豐縣西後周庾信有溫泉碑皇朝置溫泉宫常所臨幸又京兆府藍田縣有石門湯岐州郁縣有鳳凰湯同州有北山湯河南府有陸渾湯汝州有廣成湯天下諸州往往有之然地氣溫潤殖物尤早卉木凌冬不凋蔬果入春先熟比之驪山多所不逮丞一人從八品上溫泉湯監掌湯池宫禁之事丞為之二凡駕幸溫湯其用物不支所司者皆供之若有防堰損壞隨時修築之凡王公已下至于庶人湯泉館室有差别其貴賤而禁其踰越凡近湯之地潤黷所及瓜果之屬先時而育者必為之園畦而課其樹藝成熟則苞匭而進之以薦陵廟主簿一人從九品下九成宫監掌檢校宫苑供進合鍊藥餌之事副監為之二丞掌判監事主簿掌印句檢監事唐六典卷十九
