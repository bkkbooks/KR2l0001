子及章懐懿德節愍惠荘惠文惠宣等七陵各置三十人諸親王墓各置十人諸公主墓各置五人周文帝隋文帝陵各置二十人周隋諸帝陵各置十人皆取側近下户充仍分作四番上下凡内外職事葬者一品給營墓夫一百人以三十人爲差至五品二十人人别役十日凡太山天齊王置守廟三百户亳州𤣥元皇帝廟置二十户其亳州每户營田十畝以充祠祭等用凡京司文武職事官皆有防閣一品九十六人二品七十二人三品三十八人四品三十二人五品二十四人六品給庶僕十二人七品八人八品三人九品二人公主邑士八十人郡主六十人縣主四十人特封縣三十四人京官任两職者從多凡州縣官僚皆有白直二品四十人三品三十二人四品二十四人五品十六人六品十人七品七人七品佐官六人八品五人九品四人凡州縣官及在外監官皆有執衣以爲驅使二品十八人三品十五人四品十二人五品九人六品七品各六人八品九品各三人執衣並以中男充凡諸親王府屬並給士力其品數如白直其防閣庶僕白直士力納課者每年不過二千五百執衣不過一千文凡州縣有公廨白直及雜職其数見州縣中两番上下執衣三番上下邉州無白直執衣者取比州充凡有功之臣賜實封者皆以課户充凖户數州縣與國官邑官執帳共収其租調各凖配租調逺近州縣官司収其腳直然後付國邑官司其丁亦凖此入國邑者収其庸凡食封皆傳於子孫食封人身沒以後所封物隨其男數爲分承嫡者加與一分若子亾者即男承父分寡妻無男承夫分若非承嫡房至𤣥孫即不在分限其封物總入承嫡房一依上法爲分其非承嫡房毎至𤣥孫準前停其應得分房無男有女在室者準當房分得數與半女雖多更不加雖有男其姑姊妹在室者亦三分减男之二若公主食實封則公主薨乃停凡庶人年八十及篤疾給侍丁一人九十給二人百嵗三人皆先儘子孫次取近親次取輕色丁凡親王入朝皆給車牛䭾馬車牛六十乗䭾馬一百匹若大妃同來加車牛十乗馬二十匹别敕追入給馬六十匹内外百官家口應合逓送者皆給人力車牛一品手力三十人車七乗馬十匹驢十五頭二品手力二十四人車五乗馬六匹驢十頭三品手力二十人車四乗馬四匹驢六頭四品五品手力十二人車二乘馬二匹驢四頭六品七品手力八人車一乗馬二匹驢三頭八品九品手力五人車一乘馬一匹驢二頭若别敕給逓者三分加一家口少者不要滿此數無車牛處以馬驢代凡天下朝集使皆令都督刺史及上佐更爲之若邉要州都督刺史及諸州水旱成分則佗官代焉皆以十月二十五日至於京都十一月一日户部引見訖於尚書省與羣官禮見然後集於考堂應考績之事元日陳其貢篚於殿庭凡京都諸縣令每季一朝度支郎中一人從五品漢有度支侍郎即郎中之任也歴魏晋宋齊後魏北齊並有度支郎中梁陳隋爲侍郎煬帝但曰郎自漢魏以來皆度支尚書領度支郎開皇三年改度支尚書爲民部尚書始民部領之皇朝因焉武徳三年加中字龍朔二年改爲司度大夫咸亨元年復故員外郎一人從六品隋開皇六年置焬帝改曰承務郎皇朝爲員外郎龍朔咸亨隨曹改復主事二人從九品上度支郎中員外郎掌支度國用租賦少多之數物産豐約之宜水陸道路之利每嵗計其所出而支其所用開元二十二年敕諸司繁冗及年支色役費用既廣姦偽日滋宜令中書門下與諸司長官量事停减冗官及色役年支雜物等總六十五萬八千一百九十八官吏稍簡而費用省矣凡物之精者與地之近者以供御謂支納司農太府将作少府等物物之固者與地之逺者以供軍謂支納邉軍及謂都督都䕶府皆料其逺近時月衆寡好惡而統其務焉凡陸行之程馬日七十里歩及驢五十里車三十里水行之程舟之重者泝河日三十里江四十里餘水四十五里空舟泝河四十里江五十里餘水六十里沿流之舟則輕重同制河日一百五十里江百里餘水七十里其三峽砥柱之類不拘此限若遇風水淺不得行者即於随近官司申牒上記聽以年功轉運徴歛送納皆凖程而節其遲速凡和市糴皆量其貴賤均天下之貨以利於人凡金銀寳貨綾羅之屬皆折庸調以造焉凡天下舟車水陸載運皆具爲腳直輕重貴賤平易險澀而爲之制河南河北河東闗内等四道諸州運租庸雜物等腳每䭾一百斤一百里一百文山阪處一百二十文車載一千斤九百文黄河及清水河并從幽州運至平州上水十六文下水六文餘水上十五文下五文從澧荆等州至揚州四文其山陵險難驢少處不得過一百五十文平易處不得下八十文其有人負處兩人分一䭾其用小􅊑處并運向播黔等州及渉海各任本州量定凡天下邉軍皆有支度之使以計軍實糧仗之用每嵗所費皆申度支而㑹計之以長行㫖為凖支度使及軍州每年終各具破用見在數申金部度支倉部勘㑹開元二十四年數以每年租耗雜支輕重不類令户部修長行㫖條五卷諸州刺史縣令改替日並令逓相交付者省司毎年但據應支物數進畫頒行附驛逓送其支配處分並依㫖文為定金部皆逓覆而行之金部郎中一人從五品上漢置尚書郎四人其一人主財帛委輸盖金部郎曹之任也歴魏晋宋齊後魏北齊並有金部郎中梁陳隋為侍郎煬帝但曰郎皇朝因之武徳三年加中字龍朔二年改為司珍大夫咸亨元年復故員外郎一人從六品上隋開皇六年置煬帝改曰承務郎皇朝為員外郎龍朔咸亨隨曹改復主事三人從九品上金部郎中員外郎掌庫藏出納之節金寳財貨之用權衡度量之制皆總其文籍而頒其節制凡度以北方秬黍中者一黍之廣爲分十分爲寸十寸爲尺一尺二寸爲大尺十尺爲丈凡量以秬黍中者容一千二百爲龠二龠爲合十合爲升十升爲斗三斗爲大一斗十斗爲斛凡權衡以秬黍中者百黍之重爲銖二十四銖爲兩三兩爲大兩十六兩爲斤凡積秬黍爲度量權衡者調鍾律測晷景合湯藥及冠冕之制則用之内外官司悉用大者凡庫藏出納皆行文傍季終而會之若承命出給則於中書省覆而行之百司應請月俸則符牒到所由皆逓覆而行之舊制京官有防閣庶僕給食雜用等開元二十年敕以為名目雖多料数先定既煩案牘因此生姦自今以後合為一色都以月俸為名其貯米亦合入禄數同申遂有恒式乃置木契與應出物之司相合以次行用隨符牒而合之以眀出納之慎金部置木契一百一十隻二十隻與太府寺合十隻與東都合十隻與九成宫合十隻與行從太府寺合十隻行從金部與京金部合十隻東行從金部與東都合二十隻與東都太府寺合二十隻都金部與京金部合凡有互市皆爲之節制諸官私互市唯得用帛練蕃綵自外並不得交易其官市者兩分練一分蕃綵若蕃人須糴粮食者監司斟酌湏數與州司相知聴百姓将物就互市所交易凡縑帛之類必定其長短廣狹之制端匹屯綟之差焉羅錦綾叚紗縠絁紬之属以四丈為匹布則五丈為端錦則六兩為屯絲則五兩為紵麻則三績爲綟凡賜物十叚則約率而給之絹三匹布三端綿三屯貲布紵布罽布各端春夏以絲代綿若雜綵十叚則絲布二匹從三品三百六十石正四品三百石從四品二百六十石正五品二百石從五品一百六十石正六品一百石下以十石爲差至從七品七十石正八品六十七石下以五石爲差至從九品五十二石外官降一等應降等者正從一等各以五十石為一等二品三品皆以三十石爲一等四品五品皆以二十石為一等六品七品皆以五石為一等八品九品皆以二石五斗爲一等春夏二季則春給之秋冬二季則秋給之有閏者不别給乃置木契一百枚以與出給之司相合以决行用隨符牒内而給之倉部置木契一百隻三十隻與司農寺合十隻與太原倉監合十隻與永豊倉監合二十隻與東都司農寺合二十隻行從倉部與京倉部合十隻與行從司農寺合凡在京諸司官人及諸色人應給倉食者皆給貯米本司據見在供養九品以上給白米流外長上者外别給兩口糧諸牧尉給五口糧牧長四口糧兩口凖丁餘凖中男給諸牧監獸醫上番日給衛士防人以上征行若在鎮及番還幷在外諸監關津番官上番日給土人任者若尉史並給身糧諸官奴婢皆給公糧其官户上番充役者亦如之凡致仕之官五品已上及觧官充侍者各給半禄即遷官者通計前禄以充後數凡都之東租納於都之含嘉倉自含嘉倉轉運以實京之太倉自洛至陜運於陸自陜至京運於水量其逓運節制置使以監充之陸路從洛至陜分别量計十五文付運使於從路分為之逓應湏車牛任使司量運多少召雇情願者充以十月起運盡嵗止凡王公以下每年户别據已受田及借荒等具所種苗頃畝造青苗簿諸州以七月已前申尚書省至徴収時畝别納粟二升以為義倉寛鄉據見營田狹鄉據籍徴若遭損四已上免半七已上全免其商賈戸無田及不足者上上户税五石上中已下逓減一石中中戸一石五斗中下户一石下上七斗下中五斗下下戸及全户逃并夷獠薄税並不在取限半輸者凖下戸之半鄉士無粟聴納雜種充凡義倉之粟唯荒年給糧不得雜用若有不熟之處随湏給貸及種子皆申尚書省奏聞凡常平倉所以均貴賤今太府寺属官有常平署開元二十四年敕常平之法其來自久比者州縣雖存所利非廣京師輻輳浮食者多今於京城内大置常平賤則加價収糴使逺近奔委貴則終年出糶而永無匱乏也唐六典卷三
