body:
  text: 唐六典卷三唐張九齡等撰尚書户部户部尚書一人侍郎二人郎中二人員外郎二人主事四人令史十七人書令史三十四人計史一人亭長六人掌固十人度支郎中一人員外郎一人主事二人令史十六人書令史三十三人計史一人掌固四人金部郎中一人員外郎一人主事三人令史十人書令史二十一人計史一人掌固四人倉部郎中一人員外郎一人主事三人令史十二人書令史二十三人計史一人掌固四人户部尚書一人正三品周之地官卿也漢成帝置尚書五人其三曰民曹主吏人上書事後漢以民曹兼主繕修功作當工官之任魏置左民尚書晋初省之太康中又置惠帝時有右民尚書東晋及宋齊並置左民尚書梁陳並置左户尚書並掌户籍兼知工官之事後魏北齊有度支尚書亦左民右戶之任也後周依周官置地官府大司徒卿隋初曰度支尚書開皇三年改為民部皇朝因之貞觀二十三年改為户部顯慶元年改為度支龍朔二年改為司元太常伯咸亨元年復為户部光宅二年改為地官尚書神龍元年復故侍郎二人正四品下周之地官小司徒中大夫也漢以來尚書侍郎今郎中之任後周依周官隋煬帝置民部侍郎皇朝因之貞觀二十三年改為户部顯慶元年改為度支龍朔二年改為司元少常伯咸亨光宅神龍並隨曹改復户部尚書侍郎之職掌天下户口井田之政令凡徭賦職貢之方經費賙給之算藏貨贏儲之准悉以咨之其屬有四一曰户部二曰度支三曰金部四曰倉部尚書侍郎總其職務而奉行其制命凡中外百司之事由於所屬皆質正焉郎中二人從五品上周官司徒屬官有下大夫蓋郎中之任也漢尚書郎一人主户口墾田魏有左民郎曹西晉兼置右民郎曹東晉及宋齊唯有民部曹梁陳為左户郎後魏為左户曹郎北齊有左民郎曹隋初民部郎曹置侍郎二人煬帝除侍字皇朝為郎中貞觀二十三年改為户郎顯慶為度支龍朔為司元大夫咸改光宅神龍並隨曹復員外郎二人從六品上周官司徒屬官有上士後周依焉蓋今員外之任也隋開皇六年置民部員外郎煬帝改為民曹承務郎皇朝改為民部員外郎貞觀顯慶龍朔咸亨光宅神龍並隨曹改復主事四人從九品上隋煬帝置郎中員外郎掌領天下州縣户口之事凡天下十道任土所出而為貢賦之差其物産經不盡載並注下注舊額貢獻多非土物或本處不産而外處市供或當土所宜緣無額遂止開元二十五年敕令中書門下對朝集使隨便條革以為定凖故備存焉分十道以總之一曰關內道古雍州之境今京兆華同岐邠隴涇寧坊鄜丹延慶監原㑹靈夏豐勝綏銀凡二十有二州焉其原慶靈夏延又管諸蕃落降者為羈縻州東拒河西抵隴坂南據終南之山北邉沙漠河歷銀綏延丹同華六州之界隴坂在隴州之西終南山在京兆之南沙漢在豐勝二州之北其名山有太白九嵕吳山岐山梁山泰華之嶽在焉太白在京兆武功縣九嵕在奉天縣吳山在隴州岐山在岐州梁山在同州韓城縣華嶽在華州其大川有涇渭灞滻涇水出涇州至京兆入渭渭水出渭州歷秦隴岐京兆周華六州入于河灞滻並出京兆入渭厥賦絹綿布麻京兆同華岐四州調綿絹餘州布麻開元二十五年敕關輔既寡蠶桑每年庸調並宜折納粟造米支用其河南河北不通水運州宜折租造絹以替關中厥貢岱赭鹽山角弓龍鬚席蓯蓉野馬皮麝香京兆粲草席地骨白皮酸棗仁華州茯苓茯神細辛同州皺文吉莫皮岐隴涇寧鄜坊丹等州龍鬚席原夏等州白氊夏州角弓鹽州鹽山㑹州駝褐靈州鹿角膠岱赭花蓯蓉鵰翎靈州豐州野馬皮勝寧等州女稽布邠州火筯剪刀蓽豆澡豆丹延慶等州麝香逺夷則控北蕃突厥之朝貢焉二曰河南道古豫兖青徐四州之境今河南府陕汝鄭汴蔡許豫潁陳亳宋曹滑濮鄆濟齊淄徐兖泗沂青萊登密海凡二十有八州焉東盡於海西距函谷南瀕於淮北薄於河海水在青萊登密海泗六州之境函谷在虢州淮水出唐州歷豫穎亳泗四州之南境黃河歷虢陕河南府鄭滑濮濟齊淄青十州之北境名山則有三崤少室砥柱䝉山嶧山嵩岱二嶽在焉三崤在河南永寧縣界少室在登封縣砥柱在陕州河北縣䝉山在沂州費縣嶧山在兖州鄒縣中嶽嵩山在河南告成縣東嶽泰山一名岱山在兖州乾封縣大川有伊洛汝潁沂泗之水淮濟之瀆伊出河南伊陽縣北流入洛洛出商州上洛縣經虢州河南入河汝水在汝州潁水在潁州沂泗二水並出兖州淮水源在唐州桐柏縣濟水源在河南濟源縣厥賦絹絁綿布陳許汝潁州調以絁綿唐州麻布餘州並以絹及綿厥貢紬絁文綾絲葛水蔥藨心席瓷石之器鄭汴許陳亳宋曹濮鄆徐等州絹汝州細絁陕潁徐三州紬絁仙滑二州方紋綾豫州雞鶒綾雙絲綾蓍草碁子仁州綿兖州鏡花綾齊州絲葛淄兖齊等州防風青州仙文綾鄭州麻黃許州藨心席登州水葱席陕州栝簍根柏子仁曹州蛇牀子濟州阿膠泗水賨布沂兖等州紫石英萊登密等州牛黃登州文石器海砂密州布海州楚布萊州石器河南府瓷器逺夷則控海東新羅日本之貢獻焉三曰河東道古冀州之境今太原潞澤晉絳蒲虢汾慈隰石沁儀嵐欣代朔蔚雲虢州或屬河南凡十有九州焉東距恆山西據河南抵首陽太行北邉胸奴恆山在太原之東河水經嵐石隰慈絳蒲六州之西境首陽在蒲州南太行在澤州南其名山則有雷首介山霍山嵉山雷首在蒲州介山在汾州霍山在晋州嵉山在代州一名五臺山其大川有汾晉及丹沁之水汾水出欣州歷太原汾晉絳蒲五州入河晉水出太原晉陽入汾丹水出澤州沁水出沁州歷晉絳澤三州至懷南入河厥賦布禰蒲州調以襧餘州並用麻布厥貢扇龍鬚席墨蠟石英麝香漆人參大原龍骨甘草礐石漆鐵潞州墨人參花蜜兔絲子澤州白石英黔雞禹餘糧晉州蠟燭絳州防風蒲州龍骨竹扇虢州硯瓦地骨白皮汾州石膏慈州蠟隰石二州胡女布晉汾二州龍鬚席儀澤潞等州人參嵐虢欣等州麝香欣州豹尾代州熟青熟緑朔代二州白鵰翎蔚州松子雲州鵰翎四曰河北道古幽冀二州之境今懷衛相洺邢趙恆定易幽莫瀛深冀貝魏博德滄棣媯澶營平安東凡二十有五州焉其幽營安東各管羈縻州東並于海南迫于河西距太行恆山北通渝關薊門海在棣滄幽平營五州之東河水經懷衛相魏博德棣七州之南境太行在懷州北恆山在定州西渝關在平州東薊門在幽州北其名山有林慮白鹿封龍井陘碣石之山恆嶽在焉林慮在相州西白鹿在衛州北封龍在趙州西井陘在恆州西碣石在營州東恆山北嶽在定州恆陽縣其大川有漳淇呼沱之水漳水出潞州歷相洺邢冀滄入海淇水出衛州與青水合歷魏貝德滄四州與漳水合呼沱在定滄二州界亦與漳水合厥賦絹綿及絲相州調兼以絲餘州皆以絹綿厥貢羅綾平紬絲布絲紬鳳翮葦席墨恆州貢春羅孔雀等羅定州兩窠紬綾懷州子漆洺博魏等州平紬邢州瓷器魏州綿紬衛趙莫冀等州綿瀛深冀德棣等州絹相州紗鳯翮席胡粉邢州絲布恆州羅定州紬綾幽州范陽綾貝州白氊滄州葦席栁箱媯營歸順等州麝香檀州安東府人參平州蔓荆子薊州鹿角膠易州墨蔚州墨豹尾安東單于野馬皮逺夷則控契丹奚靺羯室韋之貢獻焉五曰山南道古荆梁二州之境今荆襄鄧商復郢隨唐峽歸均房金䕫萬忠已上十六州為山南道梁洋集通開壁巴蓬渠涪渝合鳯興利閬果已上西道凡三十有三州焉東接荆楚西抵隴蜀南控大江北據商華之山江水自蜀歷渝涪忠萬䕫歸峽荆八州界其名山有嶓冢熊耳巫峽銅梁荆山峴山嶓冢在梁州金牛縣熊耳在商州上洛縣巫峽在䕫州巫山縣銅梁在合州石鏡縣荆山在襄州荆山縣峴山在襄州襄陽縣大川則有巴漢沮淯之水巴水在合州界入江漢水源出梁州金牛縣初名漾水一名沔水歷洋金均襄郢荆復七州至荆州入於江沮水源出房州永清縣至荆州界入江淯水出鄧州南入漢厥賦絹布綿紬梁利隨均荆襄雜有綿絹合州調以綿紬餘州並調以麻布厥貢金漆密蠟蠟燭鋼鐵芒硝麝香布交梭白縠紬紵綾葛綵綸蘭干利州貢金鋼鐵荆州交梭縠子方穀紋綾襄州漆隱起唐路貞鄧利果等州絲布襄均房商等州麝香復郢開等州白紵隨州綾唐州絹峽州芒硝歸州紵麻布金州麩金萬州金忠州蘇薰席梁州支紅花洋州白交梭壁巴蓬通忠渠等州綿紬渠通合等州白藥子通州絳香渠州買子木拜子涪州連頭獠布渝峽隨等州葛合州牡丹皮閬州重暈綾襄州白縠鳯州蠟燭巴州蘭干布房州紵襄州鳥漆碎石文漆器白綸巾興鳯集䕫等州密蠟六曰隴右道古雍梁二州之境今秦渭成武洮岷疊宕河蘭鄯廓已上隴右凉甘肅瓜沙伊西北庭安西已上河西凡二十有一州焉其秦凉鄯洮北庭安西甘岷又管羈縻州東接秦州西逾流沙南連蜀及吐蕃北界朔漠流沙在沙州已北連延數千里其名山有秦嶺隴坻西傾朱圉積石合黎崆峒三危鳥鼠同穴秦嶺在秦州上邽縣隴坻在清水縣西傾在洮州之西南朱圉在秦州伏羌縣積石在河州枹罕縣合黎在甘州張掖縣崆峒在肅州福祿縣三危在沙州燉煌縣鳥鼠同穴在渭州渭源縣其大川則有洮水弱水羌水洮水出西羌中歷岷蘭二州界入河弱水在甘州刪丹縣羌水歷宕武文三州之界河瀆及休屠之澤在焉河水歷廓河鄯蘭等州界休屠澤在凉州界厥賦布麻厥貢麩金礪石碁石蜜蠟蠟燭毛毼麝香白㲲及鳥獸之角羽毛皮革廓宕二州貢麩金宕州散麝香沙州碁子肅州礪石成州武州蠟燭洮州毛毼凉州毼布甘肅瓜凉等州野馬皮西州白氎瓜州吉莫皮伊州隂牙角胡桐律鄯州㹀羊角野馬皮岷秦二州龍鬚席蜂牛尾鵰翎秦州芎藭肅州肉蓯蓉柏脉根瓜州草豉子北庭州速霍角隂牙角阿魏藏根安西緋氈硵砂隂牙角氍甘沙渭河蘭疊等州麝香逺夷則控西域諸戎之貢獻焉七曰淮南道古楊州之境今楊楚和滁濠夀廬舒蘄黃沔安申光凡一十有四州焉東臨海西抵漢南據江北距淮海在楊楚二州東漢在沔州淮水經申光夀濠楚五州北境入海江水經沔黃蘄舒和楊六州南境入海其名山有八公灊大别霍山羅山塗山八公山在夀州夀陽縣大别山在夀州霍山縣霍山一名天柱在舒州懷寧縣自漢以來為南嶽隋文帝開皇七年以南衡山為南嶽廢霍山為名山羅山在申州塗山在濠州鍾離縣其大川有滁肥之水巢湖在焉滁水源出廬州合肥縣巢湖在合肥巢二縣界厥賦絁絹綿布淮南道庸調雜有紵資火麻等布夀州以絁布綿麻安光二州調以絁絹申州綿絹厥貢交梭紵絺孔雀熟絲布青銅鏡揚州貢青銅鏡莞席細紵廬州交梭申光二州貢絺綄葛楚州貢孔雀布和州紵綀滁沔二州麻資布蘄舒二州白紵布黃州紵資布鳥蛇安州青紵布夀廬光等州生石斛夀州葛布廬州貢熟絲布八曰江南道古揚州之南境今潤常蘇湖杭歙睦衢越婺台溫眀括建福泉汀已上東道宣饒撫處洪吉郴袁江鄂嶽潭衡永道邵澧朗辰叙錦施南溪思黔費業巫夷播溱珍凡五十有一州焉黔中又管羈縻州東臨海西抵蜀南極嶺北帶江海水在蘇杭越台溫括泉福八州之東江水經嶽鄂江宣潤常蘇七州之北入海其名山有茅山蔣山天目㑹稽四眀天台括蒼縉雲金華大庾武夷廬山而衡嶽在焉茅山在潤州延陵句容二縣界蔣山一名鍾山在潤州江寧縣天目在杭州於潜縣㑹稽在越州山隂縣四眀在餘姚縣天台在台州始豐縣括蒼縉雲皆在括州金華在婺州大庾在處州南康縣武夷在建州建安縣廬山在江州尋陽縣衡山在衡州湘潭縣其大川有浙江湘贑沅澧之水洞庭彭蠡