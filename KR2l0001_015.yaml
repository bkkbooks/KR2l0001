body:
  text: 唐六典卷十五唐張九齡等撰光禄寺光禄寺卿一人少卿二人丞二人主簿二人録事二人府十一人史二十一人亭長六人掌固六人太官署令二人丞四人府四人史八人監膳十人監膳史十五人供膳二千四百人掌固四人珍羞署令一人丞二人府三人史六人典事八人餳匠五人掌固四人良醖署令二人丞二人府三人史六人監事掌醖二十人掌匠十三人奉觶一百二十人掌固四人掌醢署令一人丞二人府二人史四人主醢十人醤匠二十三人酢匠十二人䜴匠十二人葅醢匠八人掌固四人光祿寺卿一人從三品漢書百官表云郎中令秦官武帝太初元年更名光禄勲掌宫殿門户秩中二千石今雖取其名職務則别後漢兼掌郊祀三献献帝末又改為郎中令魏文帝黄初元年復為光祿勳晋光祿勳有署丞功曹主簿五官等員東晋哀帝興寧二年省并司徒孝武帝寧康元年復置魏晋已来無三署郎光祿勳不復居禁中宫殿門戸猶属焉宋齊因之梁置十二卿除勳字光祿卿為冬卿班第十一陳因梁後魏光祿卿從第一品下太和二十二年重次職令九卿並第三品北齊光禄寺置卿掌諸膳食帳幕器物肴藏隋光祿寺置卿少卿丞主簿録事等員統太官肴藏良醖等署令丞開皇三年廢光祿入司農十二年復置煬帝即位降卿為從三品皇朝因之龍朔二年改為司宰寺正卿咸亨中復舊光宅元年改為司膳寺卿神龍元年復舊少卿二人從四品上後魏太和十五年初置少卿官第三品上至二十二年降為正四品上北齊因之隋初依北齊煬帝即位加置一人降為從四品皇朝置一人貞觀中加置二人龍朔咸亨光宅神龍並隨寺改復光祿卿之職掌邦國酒醴膳羞之事緫太官珍羞良醖掌醢四署之官屬修其儲備謹其出納少卿為之貳凡國有大祭祀則省牲鑊視濯溉若三公攝祭則為之終獻朝㑹燕饗則節其等差量其豐約以供焉丞一人從六品上漢光祿勲丞一人秩比千石魏晉因之銅印黄綬宋齊列卿丞並視朝請梁天監七年改視員外郎陳因之後魏列卿丞從五品中太和二十二年第七品上北齊光祿寺丞一人從六品隋因之加置三人大業五年加為從五品皇朝改為六品主簿二人從七品上漢官儀光禄有主簿晋令亦置主簿宋齊因之梁天監七年位不登十八班者别置七班主簿位三班陳因之後魏闕文北齊光禄寺有功曹五官主簿隋光祿寺主簿一人皇朝因之武徳中正八品上貞觀之後遂改焉録事二人從九品上晉令光祿勳置録事史北齊光祿寺置録事等員隋光祿寺録事三人並流外為之皇朝置二員掌寺事主簿掌印勾檢稽失録事掌受事發辰太官署令二人從七品下周禮有庖人外饔中士盖其任也秦漢少府属官太官湯官令丞太官主膳食湯官主餅餌漢官儀太官令秩二千石桓帝延熹元年使太官令得補二千石置四丞魏氏因之晉光祿勳属官有太官令宋侍中属官有太官令一人齊因之梁門下省領太官陳因之後魏北齊分太官令為尚食中尚食尚食門下省領之中尚食集書省領之太官光祿卿領之尚食中尚食掌知御膳太官掌知百官之饌後周有典庖中士一人隋光祿寺統太官署令丞皇朝置令二人丞四人從八品下周禮庖人外饔有下士秦有太官丞漢太官二丞後漢太官丞一人三百石又有左丞甘丞湯官丞果丞桓帝時太官置四丞又有左右丞魏晉宋齊並有太官丞梁有四人又有市買丞正厨丞後魏北齊有太官丞一人後周内膳有中士四人隋太官署有丞八人皇朝置四人監膳十人從九品下晉太官令有厨史二十四人後周内膳有主食十二人隋太官有監膳十一人武徳中太官監膳八人貞觀中加置十二人開元二十三年减二人監膳史十五人皇朝貞觀中置供膳二千四百人隋太官供膳二千人皇朝武徳中置一千五百人永徽中加置二千四百人太官令掌供膳之事丞為之貳凡祭之日則白卿詣諸厨省牲鑊取眀水於隂鑑取眀火於陽燧火以供㸑水以實尊帥宰人以鑾刀割牲取其毛血實之於豆遂烹牲焉又帥進饌者實簠簋設於饌幕之内凡冬至圜丘之祀昊天上帝籩豆各十二簠簋㽅爼各一配帝亦如之五帝籩豆各去其二大眀夜眀又去其二内官中官籩豆各二簠簋爼各一外官衆星籩豆各一簠簋爼各一孟春祈榖之祀昊天上帝配帝五方帝如冬至之儀孟春雩祀昊天上帝配帝五方帝如祈榖之儀五帝籩豆各八簠簋㽅爼各一五官籩豆各二簠簋爼各一季秋享眀堂如雩祀五郊迎氣正坐配坐籩豆各十二簠簋㽅爼各一五星十二辰二十八宿五官籩豆各二簠簋爼各一蜡祭大眀夜眀籩豆各十簠簋爼各一神農伊耆籩豆各四簠簋爼各一五星已下凡九十八坐籩豆各二簠簋爼各一丘陵以下凡八十五坐籩豆各一簠簋爼各一朝日夕月籩豆各十簠簋㽅爼各一風師雨師靈星司中司命司人司祿籩豆各八簠簋爼各一夏至方丘祭皇地祇籩豆各十二簠簋㽅爼各一配帝亦如之神州籩豆各四簠簋㽅爼各一嶽鎮已下籩豆各二簠簋爼各一邱陵已下籩豆各一簠簋爼各一孟冬祭神州籩豆各十二簠簋㽅爼各一配帝亦如之太社太稷籩豆各十簠簋鈃爼各二配帝亦如之馬祖馬社先牧馬歩籩豆各八簠簋爼各一時享太廟每室籩豆各十八簠二簋二㽅三鈃三爼三七祀及配帝功臣每坐籩豆各二簠簋爼各一舊制籩豆十二開元十四年加籩豆各六二帝社先蠶籩豆各十簠二簋二㽅三鈃三爼三配坐亦如之司寒籩豆八簠簋俎各一五龍祠每坐籩豆各八簠簋㽅鈃爼各一釋奠于孔宣父籩豆各十簠簋各二㽅鈃爼各三配坐亦如之從祀八十六坐籩豆各二簠簋爼各一釋奠于齊太公籩豆各十簠簋各二㽅鈃爼各三配坐亦如之凡籩之實有石鹽魚脯棗栗菱芡白餅黒餅糗餌粉餈豆之實有葅醢􅓞食糝食豚胉簠簋之實有黍稷稻粱㽅實大羹鉶實肉羹凡祭有牲者皆豚右胖體十一前節三肩臂臑後節二肫胳正脊一脡脊一横脊一長脇脇短脇一代脇一背二骨以並脊從前為正傍中為正凡朝㑹燕饗九品已上並供其膳食凡供祭祀致齊之官則依其品秩為之差降若國子監春秋二分釋奠百官之觀禮亦如之左右廂南衙文武職事五品已上及貟外郎供饌百盤餘供中書門下供奉官及監察御史毎日常供具三羊六參之日加一羊焉行奉從官供六羊釋奠觀禮具五羊冬月則加造湯餅及黍􅌜夏月加冷淘粉粥寒食加餳粥正月七日三月三日加煎餅正月十五日晦日加餻糜五月五日加粽䊦七月七日加研餅九月九日加餻十月一日加黍䐈並於常食之外而加焉凡行幸從官應供膳食亦有名數其南北衙從官𢎞文崇文舘史舘集賢殿書院學士及修譔校理官吏並供五品凡宿衛當上及命婦朝參燕㑹者亦如之珍羞署令一人正八品下周禮有籩人奄一人女籩十人奚二十人掌四籩之實則朝事之籩饋食之籩加籩羞籩之實也後漢少府属官有甘丞主饍供果丞主果晉太官令有餳官史二人又有果官二人北齊光禄寺肴藏令後周有肴藏中士一人下士一人隋光禄有肴藏令皇朝因之長安中改為珍羞署神龍初復為肴藏署開元初又改焉領餳匠五人丞二人正九品下後周有肴藏下士一人北齊有肴藏署丞隋肴藏署丞二人武徳中置一人貞觀中加至二人長安神龍開元並隨署改復典事八人隋肴藏署有掌事十人武徳中有典事十四人貞觀中減之餳匠五人皇朝置珍羞令掌供庻羞之事丞為之貳以實籩豆陸産之品曰榛栗脯修水物之類曰魚鹽菱芡辨其名數㑹其出入以供祭祀朝㑹賔客之禮良醖署令二人正八品下周禮有酒正中士下士掌酒之政令以式法授酒材辨五齊三酒之物又有酒人奄十人女酒三十人奚百人掌為五齊三酒以供祭祀賔客後漢少府有湯官丞主酒晉太官有監釀吏四人酒丞一人四百石齊職儀食官局有酒吏一人梁有酒庫丞北齊光禄寺有清漳令丞主造酒冬春万石夏秋半之後周有酒正中士二人下士四人隋有良醖署令二人皇朝武徳中置一人貞觀中加至二人領掌醖酒匠奉觶等丞二人正九品下隋有良醖丞四人皇朝二人監事二人從九品下皇朝置掌醖二十人隋有五十人酒匠三十人皇朝置奉觶一百二十人隋置一百人良醖令之職掌供邦國祭祀五齊三酒之事丞為之貳五齊一曰汎齊二曰醴齊三曰盎齊四曰醍齊五曰沈齊三酒一曰事酒二曰昔酒三曰清酒凡郊祀之日帥其屬以實尊罍太尊為上實以汎齊著尊次之實以醴齊犧尊次之實以盎齊象尊次之實以醍齊壺尊次之實以沈齊山罍為下實以三酒配帝著尊為上實以沈齊犧尊次之實以醍齊象尊次之實以盎齊山罍為下實以清酒五帝日月俱以太尊實以沈齊其内官之象尊實以醴齊中官之壺尊實以沈齊外官之概尊實以清酒衆星之散尊實以昔酒齊加眀水酒加𤣥酒各實扵上尊若享太廟供其鬱鬯之酒以實六彛若應進者則供春暴秋清酴醾桑落等酒今内有郢州春酒本因其州出羙酒初張去奢為刺史進其法今則取郢州人為酒匠以供御及時燕賜掌醢署令一人從八品周禮有醢人奄二人女醢二十人奚四十人掌四豆之實則朝事之豆饋食之豆加豆羞豆之實也又有醢人奄二人女醢二十人奚四十人掌五虀七葅以供祭祀賔客之事齊職儀諸公府有釀倉典軍二人後周有掌醢中士一人下士十二人隋掌醢署令一人皇朝因之領主醢醬匠酢匠豉匠葅醢等匠丞二人從九品下隋置皇朝因之主醢十人隋有掌醢十人武徳中為主醢加至十四人貞觀中減焉掌醢令掌供醯醢之屬而辨其名物丞為之貳一曰鹿醢二曰兎醢三曰羊醢四曰魚醢和其麴蘖視其多少而為之品齊凡祭神祇享宗廟用葅醢以實豆燕賔客㑹百官用醢醬以和羹唐六典卷十五
