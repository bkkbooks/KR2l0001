body:
  text: 唐六典卷七唐張九齡等撰尚書工部工部尚書一人侍郎一人郎中一人員外郎一人主事三人令史十二人書令史二十一人計史一人亭長六人掌固八人屯田郎中一人員外郎一人主事二人令史七人書令史十二人計史一人掌固四人虞部郎中一人員外郎一人主事二人令史四人書令史九人掌固四人水部郎中一人員外郎一人主事二人令史四人書令史九人掌固四人工部尚書一人正三品周之冬官卿也漢五曹尚書其三曰民曹後漢以民曹兼主繕修功作城池園苑之事自晉宋齊梁陳營宗廟則權置起部尚書事畢省之後周依周官置大司空卿一人隋開皇二年始置工部尚書皇朝因之龍朔二年改為司平太常伯咸亨元年復為工部尚書光宅元年改為冬官尚書神龍元年復故侍郎一人正四品下盖周之冬官小司空中大夫也漢已來尚書侍郎今郎中之任也後周依周官隋煬帝置工部侍郎皇朝因之龍朔二年改為司平少常伯咸亨光宅神龍並隨曹改復工部尚書侍郎之職掌天下百工屯田山澤之政令其属有四一曰工部二曰屯田三曰虞部四曰水部尚書侍郎縂其職務而奉行其制命凡中外百司之事由於所屬咸質正焉郎中一人從五品上盖周禮大司空属官下大夫郎中之任也晉宋齊後魏北齊皆有起部郎中梁陳改置起部侍郎後周置冬官小司空下大夫隋初為工部侍郎煬帝除侍字又改工部為起部皇朝因之武徳三年改為工部郎中龍朔二年改為司平大夫咸亨元年復為工部郎中光宅神龍並隨曹改復員外郎一人從六品上後周依周禮置小司空上士盖員外郎任也隋開皇六年置工部員外郎煬帝改為起部承務郎皇朝改為工部員外郎龍朔二年改為司平員外郎咸亨光宅神龍並随曹改復主事三人從九品上郎中員外郎掌經營興造之衆務凡城池之修濬土木之繕葺工匠之程式咸經度之京城左河華右隴坻前終南後九嵏南面三門中曰明徳左曰啟夏右曰安化東面三門中曰春明北曰通化南曰延興西面三門中曰金光北曰開逺南曰延平今京城隋文帝開皇二年六月詔左僕射高熲所置南直終南山子午谷北據渭水東臨滻川西次澧水太子左庶子字文禮創制規模将作大匠劉龍工部尚書賀婁子幹太府少卿高龍又並充撿校至三年三月移入新都焉名曰大興城東西十八里一百一十五歩南北十五里一百七十五歩墻高一丈八尺皇城之南東西十坊南北九坊皇城之東西各一十二坊兩市居四坊之地凡一百一十坊開元十四年又取東面兩坊為興慶宫皇城在京城之中東西五里一百一十五歩南北三里一百四十歩今謂之子城南面三門中曰朱雀左曰安上右曰含光朱雀門正南當明徳門正北當承天門外横街正東直春明門正西直金光門東面二門北曰延喜南曰景風延喜門在承天門外横街東直通化門西面二門北曰安福南曰順義安福門西直開逺門其中左宗廟在安上門内之東右社稷在含光門内之西百僚廨署列乎其間凡省六寺九臺一監四衞十有八六省謂尚書中書門下秘書殿中内侍省九寺謂太常宗正司農太府鴻臚衞尉光祿太僕大理寺一臺謂御史臺四監謂少府将作國子都水監十八衞謂左右衞左右金吾衞左右驍騎左右武衞左右威衞左右領軍衞左右監門衞左右千牛衞左右羽林軍衞今按中書門下凡有三所並在宫城之内國子監在皇城之南左右金吾衞在皇城之東西左右羽林軍在𤣥武門之北東宫官屬凡府一坊三寺三率府十一府謂詹事府三坊謂左右春坊内坊三寺謂家令率更僕寺十率府謂左右衞率府左右清道率府左右司禦率府左右内率府左右監門率府宫城在皇城之北南面三門中曰承天東曰長樂西曰永安承天門隋開皇三年作初曰廣陽門仁夀元年改曰昭陽門武徳元年改曰順天門神龍元年改曰承天門若元正冬至大陳設燕㑹赦過宥罪除舊布新受萬國之朝貢四夷之賓客則御承天門以聼政盖古之外朝也其北曰太極門其内曰太極殿朔望則坐而視朝焉盖古之中朝也隋曰大興門大興殿煬帝改曰䖍福門貞觀八年改曰太極門武徳元年改曰太極殿有東上西上二閣門東西廊左延明右延明二門次北曰朱明門左曰䖍化門右曰肅章門肅章之西曰暉政門虔化之東曰武徳西門其内有武徳殿有延恩殿又北曰兩儀門其内曰兩儀殿常日聼政而視事焉盖古之内朝也隋曰中華殿貞觀五年改為兩儀殿承天門之東曰長樂門北入恭禮門又北入䖍化門則宫内也承天門之西曰廣運門永安門北入安仁門又北入肅章門則宫内也兩儀殿之東曰萬春殿西曰千秋殿兩儀之左曰獻春門右曰宜秋門宜秋之右曰百福門其内曰百福殿百福之西曰承慶門内曰承慶殿獻春之左曰立政門其内曰立政殿立政之東曰大吉門其内曰大吉殿兩儀之北曰甘露門其内曰甘露殿左曰神龍門其内曰神龍殿右曰安仁門其内曰安仁殿又有興仁宣猷崇道惠訓昭徳安禮正禮宣光通福光昭嘉猷華光暉儀夀安綏福等門薰風就日翔鳯咸池􅎔昭望僊鶴羽乗龍等殿凌煙翔鳯等閣大明宫在禁苑之東南西接宫城之東北隅龍朔二年高宗以大内卑濕乃於此置宫南面五門正南曰丹鳯門東曰望僊門次曰延政門西曰建福門次曰興安門南當皇城之啓夏門舊京城入苑之北門開皇三年開餘四門並與宫同置丹鳯門内正殿曰含元殿殿即龍首山之東趾也階上高於平地四十餘尺南去丹鳯門四百餘歩東西廣五百歩今元正冬至於此聼朝也夾殿兩閣左曰翔鸞閣右曰棲鳯閣與殿飛廊相接夾殿東有通乾門西有觀象門閣下即朝堂胏石登聞鼓如承天之制其北曰宣政門門外東廊曰齊徳門西廊曰興禮門内曰宣政殿殿前東廊曰日華門門東門下省省東南北街南直含耀門出昭訓門宣政殿前西廊曰月華門門西中書省省西南北街南直昭慶門出光範門宣政之左曰東上閣右曰西上閣次西曰延英門其内之左曰延英殿右曰含象殿宣政北曰紫宸門其内曰紫宸殿即内朝正殿也殿之南面紫宸門左曰崇明門右曰光順門殿之東曰左銀臺門西曰右銀臺門次北曰九僊門殿之北靣曰𤣥武門左曰銀漢門右曰青霄門其内又有麟徳凝霜承歡長安僊居拾翠碧羽金鸞蓬萊含凉珠境三清含氷水香紫蘭等殿𤣥武明儀大角等觀欎儀結鄰承雲修文等閣也興慶宫在皇城之東南東距外郭城東垣即今上龍潛舊宅也開元初以為離宫至十四年又取永嘉勝業坊之半以置朝自大明宫東夾羅城複道經通化門磴道潜通焉宫之西曰興慶門其内曰興慶殿即正衙殿有龍池殿次南曰金明門門内之北曰大同門其内曰大同殿宫之南曰通陽門北入曰明光門其内曰龍堂通陽之西曰花蕚樓樓西即寧王第故取詩人棠棣之義以名樓焉樓西曰明義門其内曰長慶殿宫之北曰躍龍門其内左曰芳苑門右曰麗苑門南走龍池曰瀛洲門内曰南薫殿瀛洲之左曰僊雲門北曰新射殿又有同光承雲初陽飛軒玉華等門飛僊交泰同光榮光等殿初上居此第其里名協聖諱所居宅之東有舊井忽涌為小池周袤纔數尺常有雲氣或見黄龍出其中至景龍中潛復出水其沼浸廣時即連合為一未半嵗而里中人悉移居遂鴻洞為龍池焉盖符命之先也禁苑在大内宫城之北比臨渭水東拒滻川西盡故都城其周一百二十里禽獸蔬果莫不毓焉若祠禴烝嘗四時之薦蠻夷戎狄九賔之享則蒐狩以為儲供焉東都城左成皋右凾谷前伊闕後邙山南面三門中曰定鼎左曰長夏右曰厚載東面三門中曰建春南曰永通北曰上東北面二門東曰安喜西曰徽安都城隋煬帝大業元年詔左僕射楊素右庶子宇文愷移故都創造也南直洛水之口北倚邙山之塞東出瀍水之東西出澗水之西洛水貫都有河漢之象焉東去故都十八里煬帝既好奢靡愷又多竒巧遂作重樓曲閣連闥洞房綺繡瑰竒窮巧極麗大業末喪亂為王充所據武徳五年平充乃詔焚乾陽殿及建國門廢東都以為洛州縂管府尋以宫城倉庫猶在乃置陜東道大行臺武徳九年復為洛州都督府貞觀六年改為洛陽宫十二年車駕始幸洛陽明慶元年復置為東都龍朔中詔司農少卿田仁注随事修葺後又命司農少卿韋機更加營造永昌中遂改為神都漸加營構宫室百司市里郛郭於是備矣東面十五里二百一十歩南面十五里七十歩西面連苑距上陽宫七里北面距徽安門七里郛郭南廣比狹凡一百三坊三市居其中焉開元十二年廢西市取厚載門之西一坊地及西市入苑西連禁苑苑西四門南曰迎秋次曰遊義次曰籠烟北曰靈溪皇城在都城之西北隅南面三門中曰端門左曰左掖門右曰右掖門東面一門曰賓耀西面二門南曰麗景北曰宣耀東城在皇城之東東曰宣仁門南曰承福門皇城在東城之内百僚廨署如京城之制皇宮在皇城之北東西四里一百八十歩南北二里八十五歩周回十三里二百四十一歩南面三門中曰應天左曰興教右曰光政應天門端門若西京承天之門其内曰乾元門若西京之太極門東廊有左延福門西廊有右延福門興教之内曰㑹昌其北曰章善光政之内曰廣運其北曰明福乾元之左曰萬春右曰千秋其内曰乾元殿則明堂也證聖元年營造上圜下方八囱四闥髙三百尺元正冬至有時而御焉殿之左曰春暉門右曰秋光門北曰燭龍門明福之東曰武成門其内曰武成殿明福之西曰崇賢門其内曰集賢殿武成之北曰延夀殿集賢之北曰僊居殿其東曰億嵗殿又東曰同明殿其内又有觀禮歸義收成光慶等門延祥延夀觀文六合等殿宜春僊居迎祥六合等院也其西北出曰洛城西門其内曰德昌殿北曰儀鸞殿德昌南出曰延慶門又南曰韶暉門西南曰洛城南門其内曰洛城殿又北曰飲羽殿洛城南門之西有麗景夾城自此潛通於上陽焉上陽宮在皇城之西南苑之東垂也南臨洛水西拒穀水東面即皇城右掖門之南上元中營造髙宗晩年常居此宮以聽政焉東面三門南曰提象門即正衙門北曰星躔門提象門内曰觀風門南曰洛日樓北曰七寶閣其内曰觀風殿殿東面其内又有麗春臺耀掌亭九州亭其西則有西上陽宫兩宮夾殿水虹橋以通徃來北曰化成院西南曰甘露殿殿東曰雙曜亭又西曰麟趾殿東曰神和亭西曰洞𤣥堂觀風之西曰本枝院又西曰麗春殿東曰含蓮亭西曰芙蓉亭又西曰宜男亭北曰芬芳門其内曰芬芳殿又有露菊亭互春妃嬪僊杼氷井等院散布其内宮之南面曰僊洛門又西曰通僊門並在院中其内曰甘湯院次北東上曰玉京門門内北曰金闕門南曰泰初門玉京之西曰客省院䕃殿翰林院又西曰上陽宮宮西曰含露門玉京西北出曰僊桃門又西曰夀昌門門北出曰𤣥武門門内之東曰飛龍廐禁苑在皇都之西北拒北邙西至孝水南帶洛水支渠穀洛二水㑹于其間東面十七里南面二十九里西面五十里北面二十里周廻一百二十六里中有合璧冷泉髙山龍鱗翠微宿羽明德望春青城黄女陵波十有一宮芳樹金谷二亭凝碧之池開元二十四年上以為穀洛二水或泛溢疲費人功遂敕河南尹李適之出内庫和顧修三陂以禦之一曰積翠二曰月陂三曰上陽爾後二水無力役之患京都之制備焉凡興建修築材木工匠則下少府將作以供其事少府監匠一萬九千八百五十人将作監匠一萬五千人㪚出諸州皆取材力强壮技能工巧者不得隐巧補拙避重就輕其驅役不盡及别有和顧者徴資市輕貨納於少府将作監其巧手供内者不得納資有闕則先補工巧業作之子弟一入工匠後不得别入諸色其和顧鑄匠有名解鑄者則補正工凡計功程者夏三月與秋七月為長功冬三月與春正月為短功春之二月三月秋之八月九月為中功其役功則依户部式屯田郎中一人從五品上漢尚書郎四人其一人主户口墾田盖兼屯田之任也故汜勝之為侍郎教田三輔是也魏有農部郎曹晉始置屯田郎中東晉及宋齊並左民郎中兼知屯田事後魏北齊並置屯田郎中梁陳隋並為侍郎亦郎中之任也煬帝曰屯田郎後魏北齊祠部尚書領屯田陳左户部尚書領屯田隋則工部尚書領之皇朝因稱郎中龍朔二年改為司田大夫咸亨元年復故員外郎一人從六品上隋開皇六年置煬帝改曰承務郎武徳三年改曰員外郎龍朔咸亨隨曹改復主事二人從九品上屯田郎中員外郎掌天下屯田之政令凡軍州邊防鎮守轉運不給則設屯田以益軍儲其水陸腴瘠播植地宜功庸煩省收率等級咸取決焉諸屯分田役力各有程數凡營稻一頃将單功九百四十八日禾二百八十三日大豆一百九十二日小豆一百九十六日烏麻一百九十一日麻四百八十九日􅔋黍一百八十日麥一百七十七日蕎麥一百六十日藍五百七十日蒜七百二十日葱一千一百五十六日𤓰八百一十八日蔓菁七百一十八日苜蓿二百二十八日凡天下諸田太子左右春坊各五頃太子左右衛率府太史局各四頃宗正寺左右千牛衛太子僕寺左右司禦率府左右清道率府左右監門率府各三頃内坊左右内率府率更寺各三頃其有管署局子府各準官品人數均配皆視其品命而審其分給虞部郎中一人從五品上周禮地官有山虞澤虞盖虞部之職也魏始有虞曹郎中一人晉因之宋齊省梁陳為侍郎後魏北齊並有虞曹郎中後周冬官有虞部下大夫一人隋虞部侍郎煬帝但曰虞部郎梁陳後魏北齊並祠部尚書領之隋工部尚書領之皇朝因焉武徳三年加中字龍朔二年改為司虞大夫咸亨元年復故員外郎一人從六品上後周依周官有山虞澤虞中士盖今虞部員外郎之任也隋開皇六年置煬帝改曰承務郎皇朝復改為虞部員外郎龍朔咸亨随曹改復主事二人從九品上虞部郎中員外郎掌天下虞衡山澤之事而辨其時禁凡採捕畋獵必以其時冬春之交水蠱孕育捕魚之器不施川澤春夏之交陸禽孕育餧獸之藥不入原野夏苗之盛不得蹂藉秋實之登不得焚燎若虎豹豺狼之害則不拘其時聽為檻穽獲則賞之大小有差諸有猛獸處聼為檻穽射窠等得即於官每一賞絹四疋殺豹及狼每一賞絹一疋若在牧監内獲豺亦毎一賞絹一疋子各半疋凡京兆河南二都其近為四郊三百里皆不得弋獵採捕毎年五月正月九月皆禁屠殺採捕凡五嶽及名山能蘊靈産異興雲致雨有利於人者皆禁其樵採時禱祭焉凡殿中太僕所管閑廐馬兩都皆五百里供其芻藳其闗内隴右西使北使南使諸牧監馬牛駝羊皆貯藁及茭草高原藳支七年茭草支四年平地藳支五年茭草支三年下土藁支四年茭草二年其柴炭木橦進内及供百官蕃客竝於農隙納之供内及宫人起十月畢二月供百官蕃客起十一月畢正月水部郎中一人從五品上魏置水部郎中歴晉宋齊後魏北齊並有水部郎中梁陳為侍郎後周冬官府有司水中大夫隋文帝為水部侍郎煬帝但曰水部郎宋齊梁陳後魏北齊並郎官尚書領之隋工部尚書領之皇朝因焉武徳二年加中字龍朔二年改為司川大夫咸亨元年復故員外郎一人從六品上後周冬官府有小司水上士則水部員外郎之任也隋開皇六年置煬帝改為承務郎皇朝復為水部員外郎龍朔咸亨随曹改復主事二人從九品上水部郎中員外郎掌天下川瀆陂池之政令以導逹溝洫堰決河渠凡舟楫溉灌之利咸總而舉之凡天下水泉三億三萬三千五百五十有九其在遐荒絶域殆不可得而知矣其江河自西極逹于東溟中國之大川者也其餘百三十有五水是為中川者也桑欽水經所引天下之水百三十七江河在焉其千二百五十有二水斯為小川者也酈善長注水經引其枝流一千二百五十二若渭洛汾濟漳淇淮漢皆亘逹方域通濟舳艫徙有之無利於生人者矣其餘陂澤魚鼈莞蒲秔稲之利盖有不可得而備云凡水有溉灌者碾磑不得與争其利自季夏及于仲春皆閉斗門有餘乃得聼用之溉灌者又不得浸人廬舍壊人墳隧仲春乃命通溝瀆立隄防孟冬而畢若秋夏霖潦泛溢衝壊者則不待時而修葺凡用水自下始凡天下造舟之梁四河三洛一河則蒲津大陽盟津一名河陽洛則孝義也石柱之梁四洛三㶚一則天津永洛齊中橋灞橋也木柱之梁三皆渭川也便橋中渭橋東渭橋此舉京都之衝要也臣梁十有一皆國工修之其餘皆所管州縣随時營葺河梁橋所須竹索令宣常洪三州役工匠預支造宣洪二州各大索二十條常州小索一千二百條大陽蒲津竹索每年令司竹監給竹令津家水手自造其供橋雜匠料須多少預申所司其匠先配近橋人充浮橋脚舡皆預僃半副自餘調度預僃一副河陽橋舡於潭洪二州造送大陽蒲津橋於嵐石濕勝慈等州材木送橋所造河陽橋置水手二百五十人大陽水手二百人仍各置木匠十人蒲津橋一十五人孝義橋所須竹索取河陽橋退者以充其大津無梁皆給船人量其大小難易以定其差等白馬津船四艘龍門㑹寧合河等闗舡並三艘渡子各皆以當處鎮防人充渭津闗舡二艘渡子取永豐倉防人充渭水鴻渡舡四艘涇水涇合渡韓渡劉控坂渡眭城坂渡覆籬渡船各一艘濟川津平隂津風陵津興徳津船各兩艘洛水渡口船三艘渡子皆取側近殘疾中男解水者充㑹寧船别五人興徳船别四人自餘船别三人蘄州江津渡荆州洪亭松滋渡江州馬頬檀頭渡船各一艘船别六人越州杭州浙江渡洪州城下渡九江渡船各三艘船别四人渡子並須近江白丁便水者充分為五畨年别一替唐六典卷七
