body:
  text: 唐六典卷十一唐張九齡等撰殿中省殿中省監一人少監二人丞二人主事二人令史四人書令史十二人亭長八人掌固八人尚食局奉御二人直長五人書令史二人書史四人食醫八人主食十六人主膳七百人掌固八人尚藥局奉御二人直長四人書令史二人書史四人侍御醫四人主藥十二人藥童三十人司醫四人醫佐八人按摩師四人呪禁師四人合口脂匠二人掌固四人尚衣局奉御二人直長四人書令史三人書史四人主衣十六人掌固四人尚舍局奉御二人直長六人書令史三人書史七人掌固十人幕士八千人尚乘局奉御四人直長十人書令史六人書史十四人奉乘十八人習馭五百人掌閑五千人進馬六人司庫一人司廩二人典事五人獸醫七十人掌固四人尚輦局奉御二人直長四人書令史二人書史四人掌扇六十人掌翰三十人掌輦二人主輦四十二人奉轝十五人掌固六人殿中省監一人從三品魏氏初置殿中監品第七晉宋因之齊有内殿中監八人外殿中監八人梁初位不登七班者别署勲位勲位殿中外監為三品勲位内監為三品勳位陳因之然其官甚微後魏殿中監從五品下北齊門下省属官有殿中監四人掌駕前奉引行事東耕則進耒耜隋改為殿内局監二人品正第六下大業三年分門下省尚食尚藥御府殿内等局分太僕寺車府驊騮等署置殿内省監正四品少監從四品丞從五品各一人掌諸供奉又有奉車都尉十二人掌進御輿馬統尚食尚藥尚舍尚衣尚乘尚輦等六局皇朝因改曰殿中省龍朔二年改為中御府監為中御大監咸亨元年復舊少監二人從四品上隋煬帝置一人從四品皇朝加至二人龍朔咸亨隨省改復丞二人從五品上隋煬帝置一人從五品皇朝加至二人龍朔二年改為中御大夫咸亨元年復故主事二人從九品上隋煬帝置皇朝因之殿中監掌乘輿服御之政令總尚食尚藥尚衣尚乗尚舍尚輦六局之官屬舊属官又有天蔵府開元二十三年省備其禮物而供其職事少監為之貳凡聽朝則率其屬執繖扇以列於左右凡大祭祀則進大珪鎮珪於㙺門之外既事受而蔵之凡行幸則侍奉於仗内若逰燕田閱則驂乘以從焉今内别置閑廐使其務多分殿中及太僕之事至於輿輦車馬則使掌其内監知其外遊燕侍奉皆不與焉若元正冬至大朝㑹則跪而進爵若和合御藥則監視而甞之丞掌判監事兼勾檢稽失省署抄目主事掌印及知受事發辰尚食局奉御二人正五品下周禮有膳夫内饔秦置六尚有尚食之名如淳以為主天子物曰尚漢因之後遂省并其職於太官湯官至北齊門下省統六局尚食局有典御二人丞監各四人又有集書省統三局有中尚食局典御二人監四人品與尚食同後周有内膳上士二人中士四人凡進食必先嘗之至隋開皇初門下省統尚食局有典御二人直長四人食醫四人大業三年分属殿内改典御為奉御員二人正五品上皇朝因之龍朔二年改為奉膳大夫咸亨元年復故直長五人正七品上隋開皇初置直長四人從七品下大業三年加置六人増品為正第七上皇朝因之減置五人食醫八人正九品下周禮有食醫中士二人掌和王之六食六飲六膳百羞百醬八珍之齊隋尚食局有食醫皇朝加至八人後周置主食主膳等皇朝因之主食十六人後周内膳有主食十二人尚食奉御掌供天子之常膳隨四時之禁適五味之宜春肝夏心秋肺冬腎四季之月脾皆時王不可食五味酸醎甘苦辛當進食必先甞凡天下諸州進甘滋珍異皆辨其名數而謹其儲供直長為之貳凡元正冬至大朝㑹饗百官與光祿視其品秩分其等差而供焉其賜王公已下及外方賔客亦如之若諸陵月享則於陵所視膳而獻之諸陵須上食陵别殿中省主膳三十人分畨上下每季差官相監於陵所造食供進食醫掌和齊所宜主食掌率主膳以供其職尚藥局奉御二人正五品下自陳梁後魏已往皆太醫兼其職北齊門下省統尚藥局有典御二人侍御師四人尚藥監四人惣御藥之事又集書省統三局有中尚藥局典御二人丞二人中謁者僕射二人惣知中宮醫藥之事隋門下省統尚藥局典御二人正五品下侍御醫四人正七品上直長四人正七品下醫師四十人大業三年分属殿内改為奉御皇朝因之龍朔二年改為奉醫大夫咸亨元年復舊直長四人正七品上隋置四人正七品下煬帝加品為正七品上皇朝因之侍御醫四人從六品上北齊尚藥局有侍御師四人皇朝因之主藥十二人藥童三十人漢有藥丞主藥後周有主藥六人隋有主藥四人藥童二十四人司醫四人正八品下隋大業中置皇朝因之醫佐八人正九品下隋大業中置皇朝因之按摩師四人隋有按摩師一百二十人皇朝減置咒禁師四人皇朝初置合口脂匠二人皇朝初置尚藥奉御掌合和御藥及診候之事直長為之貳凡藥有上中下之三品上藥為君養命以應天中藥為臣養性以應人下藥為佐療病以應地遞相宣攝而為用凡合藥宜用一君三臣九佐方家之大經也必辨其五味三性七情然後為和劑之節五味謂酸醎甘苦辛酸屬肝鹹屬腎甘屬脾苦屬心辛屬肺三性謂寒温平七情謂有單行者有相須者有相使者有相畏者有相惡者有相反者有相殺者其用又有四焉曰湯丸膏散視其病之深淺所在而服之診脉辨寸關尺之三部以調四時沉浮滑澁之節而知病之所在在胷膈者先食而後服藥在心腹者先服藥而後食凡合和御藥與殿中監視其分劑藥成先嘗而進焉合藥供御門下中書司别長官一人并當上大將軍衛别一人與殿中監尚藥奉御等監視藥成醫佐以上先嘗然後封印寫本方方後其注年月日監藥者徧署名俱奏餌藥之日尚藥奉御先甞次殿中監甞次皇太子甞然後進御侍御醫掌診候調和司醫醫佐掌分療衆疾主藥藥童掌刮削𢷬篩按摩師咒禁師所掌如太醫之職尚衣局奉御二人從五品上周禮有司服中士二人掌王吉㐫衣服辨其名物與其用事戰國有尚衣尚冠之職秦漢少府属官有御府令丞掌供御服後漢有掌冠者典官婢作中衣服及補浣之事魏因之晉属光祿勳東晋省宋大明中改尚方曰左右御府各置令丞一人後廢帝初省御府置中署隸右尚方其後又置至齊髙祖省文帝又置初宋氏用三品勳位明帝改用二品準南䑓御史掌金銀綵帛凡諸造作以供奉及妃主六宫梁陳無御府其職𨽻在尚方後魏有掌服郎從六品上北齊門下省統主衣局都統子統各二人後周有司服上士二人中士二人隋門下省有御府局監二人大業三年分属殿内省其後又改為尚衣局皇朝因之龍朔二年改為奉冕大夫咸亨元年復舊直長四人正七品下隋改御府為尚衣局始置直長領主衣皇朝因之主衣十六人隋置皇朝因之尚衣奉御掌供天子衣服詳其制度辨其名數而供其進御直長為之貳凡天子冕服十有三一曰大裘冕二曰衮冕三曰鷩冕四曰毳冕五曰絺冕六曰𤣥冕七曰通天冠八曰武弁九曰弁服十曰黑介幘十一曰白紗帽十二曰平巾幘十三曰翼善冠大裘冕無旒冕廣八寸長一尺六寸𤣥表纒衰以下廣狹准此金飾玉簮導以組為纓色如其綬裘以黒羔皮為之𤣥領青褾縁朱裳白紗中單皁領靑褾襈裾革帶玉鈎䚢大帶素帶朱裏紕其外上以朱下以綠紐約用組韍韍蔽膝也凡韍皆隨裳色鹿盧玉具劍火珠鏢首白玉雙佩𤣥組雙大綬六綵𤣥黄赤白縹緑繩𤣥質長二丈四尺五寸首廣一尺小雙綬長二尺六寸色同大綬而首半之間施三玉環朱韤赤舄祀天神地祇則服之衮冕垂白珠十有二旒以組為纓色如其綬黈纊充耳玉簮導𤣥衣纁裳十二章八章在衣日月星辰山龍華蟲火宗彞其四章在裳藻粉米黼黻衣褾領為昇龍皆織成為之山龍以下每章一行重以為等每行十二白紗中單黼領青褾襈裾韍革帶大帶劍玉珮綬韈與上同舄加金飾享廟謁廟及廟遣上將征還飲至踐祚加元服納后若元日受朝及臨軒冊拜王公則服之鷩冕服七章三章在衣華蟲火宗彝四章在裳藻粉米黼黻餘同衮冕有事逺主則服之毳冕服五章三章在衣宗彝藻粉米二章在裳黼黻餘同鷩冕祭海嶽則服之絺冕服三章一章在衣粉米二章在裳黼黻餘同毳冕祭社稷帝社則服之𤣥冕服衣無章裳刺黻一章餘同絺冕蜡祭百神朝日夕月則服之通天冠加金博山附蟬十二首施朱翠黒介幘髪纓翠緌玉若犀簮導絳紗袍白紗中單朱領襈白裙襦亦裙衫絳紗蔽膝白假帶方心曲領其革帶劍珮綬與上同白韈黒舄若未加元服則雙童髻空頂黒介幘雙玉導加寳飾諸祭還及冬至受朝元㑹冬㑹則服之武弁金附蟬平巾幘餘同其服講武出征四時蒐狩大射禡類宜賞祖罰社纂嚴則服之弁服弁以鹿皮為之十有二琪琪以白玉珠為之玉簮導絳紗衣素裳革帶白玉雙珮鞶囊小綬白韈烏皮履朔日則服之黒介幘白紗單衣白裙襦革帶素韈烏皮履拜陵則服之白紗帽亦烏紗白裙襦白襪烏皮履視朝聽訟及燕見賔客則服之平巾幘金寶飾導簮冠支皆以玉紫褶亦白褶白袴玉具装真珠寳鈿帶箸鞾乘馬則服之翼善冠其常服及白練裙襦通著之若服袴褶則與平巾幘通著已上並右服有事及見賔客則服之自隋文帝制柘黄袍及巾帶以聽朝至今遂以為常凡天子之大圭曰珽長三尺鎮圭長尺有二寸有事于郊廟社稷則出之于内將享至于中門則奉鎮圭于監而進既事復受而蔵之凡大朝㑹則設御案朝畢而徹焉尚舍局奉御二人從五品周禮有掌舍掌行所解止之處帷幕幄帟之事漢少府属官有守宫令丞掌宫殿陳設魏殿中監掌帳設監䕶之事晋宋已下其職並在殿中監隋煬帝置殿内監改殿内局為尚舍局置奉御二人正五品皇朝因之龍朔二年改為奉宸大夫咸亨元年復舊直長六人正七品下隋煬帝置八人皇朝減二人幕士八千人皇朝置掌供御及殿中雜張設之事尚舍奉御掌殿庭張設供其湯沐而潔其灑掃直長為之貳凡大駕行幸預設三部帳幕有古帳大帳次帳小次帳小帳凡五等古帳八十連髙二丈縱廣二丈五尺前有五梁後有七梁大帳六十連髙一丈五尺縱廣二丈前有四梁次帳四十連髙一丈三尺縱廣一丈五尺前有三梁三帳皆朱蠟骨緋紬綾浮游覆之小次帳三十連髙一丈一尺縱廣一丈二尺小帳二十連髙八尺縱廣九尺凡五等之帳各三是為三部帳皆烏氊為表朱綾為覆下有紫幃方座金銅行床垂以簾其諸帳内外又設六柱四柱三柱為垣墻之制皆青純為表朱帛為裏其外置排城以為蔽捍焉排城連版為之毎版皆畫辟邪猛獸表裏漆之凡供湯沐先視其潔清芳香適其寒温而進焉凡大祭祀有事於郊壇則先設行宫於壇之東南向隨地之宜將祀三日則設大次於外壝東門之外道北南向而設御座若有事於眀堂及太廟則設大次於東門如郊壇之制凡致齋則設幄於正殿西序及室内俱東向張於楹下凡元正冬至大朝㑹則設斧扆於正殿施榻席及熏鑪若朔望受朝則施幄帳於正殿帳裙頂帶方濶一丈四尺尚乘局奉御四人從五品上自秦漢已來其職皆在太僕北齊太僕驊騮署有奉乗十人官十二閑馬隋煬帝取之置尚乗局皇朝因之増置奉御四人一人掌左六閑馬一人掌右六閑馬一人掌粟草飼丁請受配給及勾勘出入破用之事一人掌鞍韉轡勒供馬調度及療馬醫藥料度之事龍朔二年改為奉駕大夫咸亨元年復故開元二十二年減二人先是别置閑廐使因𨽻焉猶属殿中直長十人正七品下隋煬帝置十四人皇朝因之開元二十三年減四人奉乘十八人正九品下後魏有奉乘郎從五品下後周左右廐各有奉乘二十人隋煬帝置尚乗局有奉乘十人皇朝加置二十四人每閑二人開元二十三年減六人習馭五百人後周左右廐各有馭夫一百三十人皇朝加置習馭五百人掌調習六閑之馬掌閑五千人皇朝置常分飼養六閑之馬司庫一人正九品下皇朝初置二人掌六閑庫物開元二十三年減司廩二人正九品下皇朝置之典事五人皇朝置掌六閑粟草獸醫七十人周禮有獸醫下士掌療畜獸之疾病又有巫馬下士二人醫四人掌知馬祖先牧馬步之神養疾馬以藥攻馬疾也北齊内廐局有馬醫二人皇朝置獸醫掌療左右六閑之馬尚乘奉御掌内外閑廐之馬辨其麤良而率其習馭直長為之貳六閑一曰飛黄二曰吉良三曰龍媒四曰騊駼五曰駃騠六曰天苑左右凡十有二閑分為二廐一曰祥麟二曰鳳苑以繫飼馬今仗内有飛龍祥麟鳳苑鵷鑾吉良六羣等六廐奔星内駒等兩閑仗外有左飛右飛左方右方等四閑東南内西北内等兩廐凡御馬必敬而式之非因調習不得捶擊諸閑廐上細馬若欲調習唯得廐内乗騎不得輙出習其進御之制而為出入之禁隴右諸牧監使毎年簡細馬三十疋進其祥麟鳳苑廐所須雜給馬牛别簡麤壯敦馬一百疋與細馬同進仍令牧監使預簡敦馬一十疋别牧馬殿中須馬任取充凡秣馬給料以時為羞春冬日給稾一圍粟一斛塩二合秋夏日給青芻一圍粟減半凡外牧進良馬印以三花飛風之字而為誌焉細馬次馬送尚乗局者於尾側依左右閑印以三花其餘雜馬送尚乗者以風字印印右髆以飛字印印左髆奉乘掌率習馭掌閑駕士及秣飼之法凡馭馬必視其齒歴勞逸而調習之馬四年而兩齒五年而四齒六年而六齒成矣七年而右一齒齨八年而上下兩邉各一齒缺九年而上下盡缺十年而下兩齒齨十一年而下四齒齨十二年盡齨十三年下兩齒平十四年下四齒平十五年下盡平十六年上兩齒齨十七年上四齒齨十八年上盡齨十九年上兩齒平二十年上四齒平司庫掌鞍轡乘具司廩掌藳秸出納獸醫掌療馬病凡馬病灌而行之觀其病之所發療馬病有五勞一曰筋勞二曰骨勞三曰皮勞四曰氣勞五曰血勞久步則生筋勞久立則生骨勞久汗不乾則生皮勞汗未差燥而飼飲之則生氣勞驅馳無節則生血勞有傷寒者有傷熱者有瘍者咸據經方以療焉尚輦局奉御二人從五品上周禮小司徒中大夫二人掌六畜車輦又巾車下大夫二人掌王后之五輅輦車組輓有翣羽盖古謂人牽為輦春秋宋萬以乗車輦其母秦始皇乃去其輪而轝之漢代遂為人君之乗後漢有乘輿六輦魏晉小出則乗之及過江而亡太元中謝安率意而作及破符堅得之形制無差大小如一時人嗟其默識宋武執慕容超獲金鉦輦古之輦輿大率以六尺為度齊武帝造大小二輦彫節甚工下棢轅軛悉金花銀獸梁大輦中方八尺左右開四望金鸞棲軛隋有六輦大禮皆乗之秦漢魏晋並太僕属官車府令掌之東晋省太僕遂隸尚書駕部宋齊梁陳車府乗黄令丞掌之後魏北齊則乗黄車府令兼掌之後周則司車輅主之隋又乘黄車府令兼掌之煬帝置殿内省尚輦局奉御二人正五品皇朝因之為從五品上龍朔二年改為奉輦大夫咸亨元年復舊直長四人正七品下隋煬帝置皇朝因之又置掌扇掌翰等員掌執扇及執紙筆硯雜供奉之事掌輦二人正九品下皇朝初置四人開元二十三年減二人又置主輦奉轝等員掌率主輦以供其事主輦四十二人皇朝置凡七輦輦六人奉轝十五人皇朝置之尚輦奉御掌輿輦繖扇之事分其次序而辨其名數直長為之貳凡大朝㑹則陳於庭大祭祀則陳於廟輦有七一曰大鳳輦二曰大芳輦三曰仙遊輦四曰小輕輦五曰芳亭輦六曰大玉輦七曰小玉輦轝有三一曰五色轝二曰常平轝其用如七輦之儀三曰霽轝則常御焉凡大朝㑹及祭祀則出之於内既事復進而載之凡繖扇大朝㑹則繖二翰一陳之于庭孔雀扇一百五十有六分居左右舊翟尾扇開元初改為繡孔雀以省若常聽朝皆去扇左右各留其三以備常儀崔豹古今注云華盖黄帝所作也與蚩尤戰於涿鹿之野常有五色雲氣金枝玉葉止於帝上有花蘤之象故因作華盖也通俗文曰張帛避雨謂之繖盖古今注曰翟尾扇起於殷代髙宗有雊雉之祥服章多用翟羽周制以為王后夫人之車服輿輦有翣即緝翟羽為扇翣以陣蔽翳風塵也唐六典卷十一
