body:
  text: 唐六典卷十七唐張九齡等撰太僕寺太僕寺卿一人少卿二人丞四人主簿二人録事二人府十七人史三十四人獸醫六百人獸醫博士一人學生一百人亭長四人掌固六人乘黄署令一人丞一人府一人史二人典事八人駕事一百四十人羊車小史八人掌固六人典廐署令二人丞二人府四人史八人主乘六人典事八人執馭一百人駕士八百人掌固六人典牧署令三人丞四人府四人史八人監事八人典事十六人主輅七十四人駕士一百六十人掌固四人車府署令一人丞一人史二人典事四人馭士一百七十五人掌固六人諸上牧監監各一人副監二人丞二人主簿一人録事一人府三人史六人典事八人掌固四人中牧監副監丞府各減一人典事史減二人下牧監典事掌固減二人沙苑監監一人副監一人丞一人主簿一人録事一人府三人史六人典事四人掌固二人太僕寺卿一人從三品周禮有太僕下大夫二人穆王命伯冏為太僕正漢書百官表云太僕秦官掌輿馬秩中二千石有兩丞属官有大廐未央廐家馬三令各五丞一尉又車府路軨騎馬駿馬四令丞又龍馬閑駒橐泉騊駼承華五監長丞又邉郡六牧師苑令各三丞又有中太僕掌皇太后輿馬不常置漢官儀云天子駕出太僕御属車八十一乘後漢有車府未央廐長樂廐令丞魏因之晉太僕銀章青綬五時朝服進賢兩梁冠佩水蒼玉品第四丞一人部丞五人置功曹主簿五官等員統典農典虞都尉典虞丞牧官都尉左右中典牧都尉典牧令諸羊牧丞乘黄驊騮龍馬三廏令過江省其後又置成帝咸和七年省併宗正盖有事則權置無事則省宋因晉不置若如祀則權置太僕執轡事畢省齊亦如之梁天監七年置十二卿太僕與太府少府為夏卿統南牧左右牧龍廐内外廐班第十陳因之後魏太僕卿第二品上又置少卿太和二十二年九卿並第三品北齊太僕寺統驊騮左右龍左右牝駞牛司羊乘黄車府等署後周依周官隋太僕寺統驊騮乗黄龍廐車府典牧牛羊等署煬帝降卿為從三品減驊騮署入殿内省尚乗局改龍廐曰典廐署又有左右駮皁二廐加置主乗司庫司廪官罷牛羊署皇朝因之而省駮皁等諸官龍朔二年改為司馭寺正卿咸亨中復舊光宅元年改為司僕寺神龍元年復故少卿二人從四品上後魏太和十五年九卿各置少卿一人品第三上二十二年降為正四品上北齊因之隋加至二員煬帝降為從四品上皇朝因之龍朔咸亨光宅神龍隨寺改復太僕卿之職掌邦國廐牧車輿之政令緫乗黄典廐典牧車府四署及諸監牧之官屬少卿為之貳凡國有大禮大駕行幸則供其五輅屬車之屬凡監牧所通羊馬籍帳則受而㑹之以上扵尚書駕部以議其官吏之考課凡四仲之月祭馬祖馬歩先牧馬社丞四人從六品上秦漢太僕有兩丞秩千石後漢一人魏晉並因之東晉宋省或置宋齊省梁天監七年置十二卿各有丞列卿丞通視朝請班第三陳因之後魏列卿丞從五品中太和未降為七品上北齊丞一人從六品下隋太僕丞三人品同北齊大業五年加為從五品皇朝復為從七品上武徳中減置二人永徽中加一人開元初又加一人領獸醫博士學生等主簿二人從七品上梁天監七年十二卿各置主簿二人位不登十八班者别置七班主簿班第三陳因之北齊置一人隋置二人皇朝因之武徳中品正第八貞觀中加至從七品上錄事二人從九品上丞掌判寺事凡補獸醫生皆以庻人之子考試其業成者補為獸醫業優長者進為博士主簿掌印勾檢稽失省署抄目錄事掌受事發辰乗黄署令一人從七品下乗黄古神馬名亦曰飛黄背有角日行萬里六韜云乗黄震死淮南子云天下有道飛黄伏皁然車馬職仝後漢有未央廐今長樂廐丞至魏遂改為乗黄廐晉因之宋太常属官有乗黄令一人掌乗輿金根車及安車追鋒諸馬車齊職儀云乗黄獸名也龍翼馬身黄帝乗之而僊因以名廐乗黄令品第七秩四百石銅印墨綬進賢一梁冠絳朝服梁太常属官有乗黄令丞三品勲位陳因之後魏有乗黄令丞北齊掌諸輦輅隋太僕寺統乗黄署令丞皇朝因之領駕士羊車小史等丞一人從八品下魏有乗黄丞晉因之宋齊並有乗黄令無丞梁陳後魏北齊隋並有乗黄丞皇朝因之乗黄令掌天下車輅辨其名數與馴馭之法丞為之貳凡乗輿五輅周禮巾車式掌王五輅有王金象革木之制至秦唯乗金根車漢承秦制以為承輿晉武帝始備五輅為天子法車宋齊梁陳相因不絶後魏五輅各依方色並駕五馬後周設六官置司輅之職皇帝之輅十有二等一曰蒼輅二曰青輅三曰朱輅四曰黄輅五曰白輅六曰𤣥輅七曰玉輅八曰碧輅九曰金輅十曰象輅十一曰革輅十二曰木輅後閲視武庫得魏舊物有乾象輦駕二十四馬又有大樓輦車駕二十牛又有象輦初駕二象後以六駞代之皆魏天興中之所制也宣帝以来皆服御之兼以賜皇后隋開皇元年以魏周輿輦非古之制皆廢毁改造五輅也一曰玉輅祭祀納后則乗之二曰金輅饗射郊征還飲至則乗之三曰象輅行道則乗之四曰革輅廵狩臨兵事則乗之五曰木輅田獵則乗之凡玉輅青質以玉飾諸末駕六蒼龍金輅赤質以金飾諸末駕六赤駮象輅黄質以黄飾諸末駕六黄騮革輅白質鞔之以革駕六白駱木輅黒質漆之駕六黒驪也五輅皆重輿左青龍右白獸金鳳趐畫苣文鳥獸黄屋左纛金鳳一在軾前十二鑾在衡二鈴在軾龍輈前設障塵青盖三層黄裏繡飾上設博山方鏡下圓鏡樹羽輪金根朱班重牙左建旂十有二旒皆畫升龍其長曳地青繡綢杠右載闟㦸長四尺廣三尺黼文旂首金龍頭銜錦結綬及緌帶垂鈴金鑁方釳挿翟尾五焦鏤錫鞶纓十二就闕鞶纓皆從輅質耕根車青質三重盖飾如玉輅安車金飾重輿曲壁八鑾在衡紫油通􅚫紫油纁朱裏朱絲絡網朱鞶纓朱覆髪具絡四望車制同安車金飾八鑾在衡青油通􅚫青油纁朱裏朱絲絡網大駕則太僕卿馭五輅駕士百三十二人並平巾幘青衫大口袴千牛将軍一人陪乗五輅皆有副車按蔡邕獨斷云五輅之外復設五色安車立車各一乗皆駕四馬是為五輅副車故張良擊始皇中副車魏志云天子命太僕駕金根六馬設五時副車江左乃闕至闕始備隋開皇十四年始造五輅及貳皇朝因之又有指南車崔豹古今注云指南車舊説云周公所作也周公理致太平越裳氏重譯来獻使者迷其歸路周公錫以軿車五乗皆為司南之制使越裳氏載之周年而至其國故常為先導示服逺人而正四方也秦漢其制無聞後漢張衡始復創造漢末喪亂其法不存沈約宋書云魏眀帝始令博士馬鈞造之晉亂又亡石虎使鮮飛姚興使令狐生又造宋武平關中得之其制如鼓車設木人扵車上舉手指南車驟囬轉所指微差至齊祖冲之又造之厯梁陳隋無所變改皇朝因之駕四馬正道先啓而行匠一人駕五十四人記里鼓車崔豹古今注云車上為二層皆有木人執槌行一里下一層撃鼓行十里上一層擊鐲亦名大章車所以識道里也白鷺車隋志名鼓吹車上施層樓樓上有翔鷺棲焉鸞旗車晉志云鸞旗車先輅所載也鸞旗者謂析羽旄而編之十二旒列繋幢傍也辟惡車崔豹古今注云秦制也桃弓葦矢所以禳祓不祥太卜令一人在車執弓箭平巾幘緋裲襠大口袴皮軒車晉志以獸皮為軒左金吾衛隊正一人在車執弩服同太卜令自指南車皆駕四馬正道匠一人駕士一十四人耕根車晉志云建赤旗十有二旒天子親耕所乗也一名芝車一名三盖車置耒耜扵軾上駕六馬駕士三十二人安車晉輿服志云座乗謂之安車倚乗謂之立車各一乗名五時車俗謂之五帝車駕四馬駕士二十四人四望車晉志云陽遂四望繐窓皁輪小形車駕牛晉中朝大駕鹵簿曰御四望車駕牛中道皇朝駕四馬也羊車周遷輿服雜事曰羊車一名輦車其上如軺伏兔箱漆畫輪軛小兒衣青布袴褶紫碧褠青耳屩五辨鬂數人引之今代名為羊車小史而漢代或以人牽或以駕果下馬晉志曰武帝乗羊車扵後宫恣意所之宫女挿竹葉楊條候帝之来黄鉞車崔豹古今注云黄鉞三代通用以斷斬今以黄鉞為乗輿之飾武王以黄鉞斬紂故王者以為戒駕二馬左武衛隊正一人在車執之武弁朱衣革帶駕士一十二人豹尾車崔豹古今注云豹尾車周制也所以象君子豹變尾言謙也古車正建之今唯乗輿得建焉漢書曰成帝以幸姬趙飛燕置属車間豹尾中駕二馬右武衛隊正一人在車執之武弁朱衣革帶駕士十二人也屬車一十有二屬車一曰副車一曰貳車一曰佐車漢因秦制大駕屬車八十一乗行則中央左右分之法駕属車三十六乗最後車懸豹尾皆皁盖朱裏蔡邕獨斷曰古者諸侯貳車九乗秦滅九國兼其車服故為八十一乗漢武祠太乙甘泉皆盡用之眀帝上原陵又用之法駕三十六乗小駕一十二乗大業初備八十一乗三年帝嫌其多問閻毗毗曰此起扵秦遂為後式宋孝建時議準旂旒之數設十二乘令憲章往古大駕依秦法駕依漢小駕依宋帝曰大駕宜三十六法駕宜用十二小駕除之可也皇朝因之置十二乗駕牛駕士各八人自指南車駕士皆平巾幘緋衫大口袴唯耕根車青衫羊車服則殊也大駕則用之若法駕則減五副輅白鷺辟惡安車四望車四分屬車之一餘同大駕若小駕又減象輅革輅木輅指南車記里鼓車鸞旗皮軒耕根羊車屬車黄鉞豹尾等車餘同法駕若有大禮則以所御之輅進内既事則受而藏之凡將有事先期四十日尚乗供馬馬如輅色率駕士預調習指南等車亦如之典廐署令二人從七品下周禮有校人圉師趣馬掌天子十有二閑之馬漢太僕属官有大廐未央廐後漢太僕属官有未央廐主乗輿及宫中諸馬其後置左駿廐令别主乗輿御馬魏有驊騮廐令晉太僕統乗黄驊騮龍馬等廐令過江之後或省或置哀帝時省驊騮為門下之職宋齊因之梁太僕統龍廐内外廐陳因之後周有左右廐各上士一人北齊太僕寺統驊騮左右龍等署隋太僕寺統龍廐署皇朝改為典廐署令領執馭駕士等丞二人從八品下隋有龍廐丞皇朝改為典廐丞武徳中四人今減二人主乗六人正九品下隋置皇朝因之典廐令掌繋飼馬牛給養雜畜之事丞為之貳凡象一給二十細馬一中馬二駑馬三駞牛騾各四驢及純犢各六羊二十各給一丁純謂色不雜者若飼黄禾及青草各準運處逺近臨時加給也乳駒乳犢十給一丁凡象日給槀六圍馬駞牛各一圍羊十一共一圍毎圍以三尺為限也蜀馬與騾各八分其圍騾四分其圍乳駒乳犢五共一圍青芻倍之凡象日給稻菽各三斗䀋一升馬粟一斗䀋六勺乳者倍之駞及牛之乳者運者各以斗菽田牛羊之駞䀋三合牛䀋二合羊粟菽各升有四合䀋六勺象馬騾牛駞飼青草日粟豆各減半塩則恒給飼禾及青荳者粟豆全斷若無青可飼粟豆依舊給其象至冬給羊皮及故氊作衣也典牧署令三人正八品上周禮牧師下士四人掌牧馬而頒之秦漢太僕属官有牧師苑令皆在邉郡厯魏晉已下皆牧監之職隋太僕寺統典牧署牛羊署等令丞皇朝因之武徳中二人令加置三人領上輅駕士等丞四人正九品上隋置皇朝因之武徳中三人今加至四人監事八人從九品下典牧令掌諸牧雜畜給納之事丞為之貳凡羣牧所送羊犢皆受之而供扵廪犧尚食之用諸司合供者亦如之車府署令一人正八品下秦置車府令以趙髙為之漢太僕属官有車府令丞後漢主乗輿諸車魏晉因之宋齊梁陳並尚書駕部領後魏闕文北齊太僕寺領車府令丞遂與乗黄令分職隋因之皇朝因隋丞一人正九品下秦漢已東車府署並有丞一人隋車府丞二人皇朝省置一人車府令掌王公已下車輅辨其名數及馴馭之法丞為之貳凡王公已下車輅一曰象輅二曰革輅三曰木輅四曰軺車象輅以象牙飾諸末畫輪八鑾在衡左建旂畫龍一升一降右載闟㦸革輅以革飾諸末左建通帛為旜餘同象輅木輅以漆􅎖之餘同革輅三輅皆朱質朱盖朱旈旜一品九旈二品八旈三品七旈四品六旈其鞶纓就數亦如之軺車曲壁青通􅚫碧裏也凡春秋二時謁陵冊命王公及内外職事四品已上拜官止冬朝㑹婚葬奉使皆視其品秩而給之親王以象輅三品已上以革輅五品已上以木輅京縣令以軺車道大駕及初上給之其婚葬則從京官三品已上給其馭給駕士親王十有八一品十有六二品十有四各駕令以馬駱四輅車一三品十有二四品五品十有闕縣六也凡輅車之馬率馭士預調習之然後入輅及車以牛駕者亦如之上牧監一人從五品下漢舊儀太僕牧師諸苑三十六所分布北邉西邉以郎為苑監官奴婢三萬人分養馬三十萬頭擇取教習給六廐牛羊無數以給犧牲中興省漢陽有牧馬苑令羽林郎監領魏置牧官都尉晉因之宋齊闕文梁太㒒統南牧左右牧等丞陳因之後魏闕文北齊太㒒寺統左右牝駞牛司羊等署令丞後周有典牡典牝上士一人中士一人又有典駞典羊各有中士一人隋太㒒寺統典牧署牛羊署等令丞皇朝因分為牧監副監二人正六品下丞二人正八品上主簿一人正九品下並皇朝置中牧監一人正六品下副監一人從六品下丞一人從八品上主簿一人從九品上下牧監一人從六品下副監一人正七品下丞一人正九品上主簿一人從九品下諸牧監掌羣牧孳課之事凡馬五千匹為上監三千匹已上為中監已下為下監凡馬牛之羣以百二十駞騾驢之羣以七十羊之羣以六百二十羣有牧長牧尉補長以六品已下子白丁雜色人等為之補尉以散官八品已下子為之品子八考白丁十考隨文武簡試與資也凡馬有左右監以别其麤良以數紀為名而著其簿籍細馬之監稱左麤馬之監稱右其雜畜牧皆同下監仍以土地為其監名凡馬各以年名籍之每嵗季夏造至孟秋羣牧使以諸監之籍合為一諸羣牧别立南使北使西使東使以分統之常以仲秋上扵寺凡馬以季春㳺牝月令季春乃合累牛騰馬㳺牝于牧其駒犢在牧三嵗别羣若與本羣同牧不别給牧人馬牧牝馬四㳺五課駞四㳺六課牛驢三㳺四課羊三㳺四課四五者皆言其嵗而㳺牝也羊則當年而課之其課各有率謂牛馬騾之牝百而嵗課駒犢各以六十馬二十嵗則不課三嵗㳺牝而生駒者仍别簿申騾駒半之若馬從外蕃而至者初年課以四十二年五十二年者仝課牝駞百而三年之課七十羔羊之白者七十羖八十凡監牧孳生過分則賞謂馬賸駒一則賞絹一匹駞騾之賸倍扵馬驢牛之賸三白羊之賸七羖羊之賸十皆與馬同其賞物二分入長一分入牧子牧子謂長上專當者其監官及牧尉各通計所管長尉賞之通計謂尉官十五長者賸駒十五匹賞絹一匹監官管尉五者賸駒七十五匹賞絹一匹之類計加亦凖此應賞者凖印後定數先填死耗足外然後計酬之其有死耗者毎嵗亦以率除之謂駞馬百頭以七頭為耗騾以六牛驢羖羊以十白羊以十五從外蕃而新至者馬牛驢羖羊皆除二十二年除十五駒除十四二年除十騾除十二年除九白羊除二十五二年除二十三年皆同耗也若嵗疫以私畜凖同者以疫除準牧側近私畜疫死數同則聴以疫除馬不在疫除之例即馬牛一十一嵗以上不入耗除限若縁非時霜雪死多者録奏凡官畜在牧而亡失者給程以訪過日不獲估而徴之謂給訪限百日不獲凖失處當時估價徴納牧子及長各知其半若戸奴無財者凖銅依加杖例如有闕及身死唯徴見在人分其在廐失者主帥凖牧長飼丁凖牧子其非理死損凖本畜徴納也凡在牧之馬皆印印右膊以小官字右髀以年辰尾側以監名皆依左右廂若形容端正擬送尚乗不用監名二嵗始春則量其力又以飛字印印其左髀膊細馬次馬以龍形印印其項左送尚乗者尾側依左右閑印以三花其餘雜馬送尚乗者以風字印印左膊以飛字印印左髀騾牛驢則官名誌其左膊監名誌其右髀駞羊則官名誌其煩羊仍割耳若經印之後簡入别所者各以新入處監名印其左頰官馬賜人者以賜字印配諸軍及充傳送驛者以出字印並印左右頬也凡每嵗進馬麤良有差使司每嵗簡細馬五十匹敦馬一百疋進之若諸監之細馬生駒以其數申所由司次入寺其四嵗以下麤馬每年簡充諸衛官馬凡馬牛皮脯及筋角之屬皆納于有司每年終監牧使廵按孳課之數以功過相除為之考課焉沙苑監監一人從六品下沙苑在同州副監一人正七品下丞一人正九品上主簿一人從九品下沙苑監掌牧養隴右諸牧牛羊以供其宴㑹祭祀及尚食所用毎嵗與典牧分月以供之丞為之貳凡屠宰國忌廢務日立春前後一日每月一日八日十四日十五日十八日二十三日二十四日二十八日二十九日三十日每嵗正月五月九月皆罷之諸雜畜及牸羊有孕者雖非其日月亦免之若百司應供者則以時皆供之凡羊毛及雜畜皮角皆具數申送所由焉一本云太㒒属官有沙苑監開元二十三年省唐六典卷十七
