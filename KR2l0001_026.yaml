body:
  text: 唐六典卷二十六唐張九齡等撰太子三師三少詹事府左右春坊內官太子三師太子太師一人太子太傅一人太子太保一人太子三少太子少師一人太子少傅一人太子少保一人太子賔客四人太子詹事府詹事一人少詹事一人丞二人主簿一人録事二人令史九人書令史十八人太子司直二人令史一人書令史二人亭長四人掌固六人太子左春坊左庶子二人中允一人司議郎四人録事二人主事二人令史七人書令史十四人太子左諭德一人左贊善大夫五人傳令四人掌儀二人贊者四人亭長四人掌固十三人崇文館學士無員數學生二十人校書二人令史二人典書二人搨書手二人書手十人熟紙匠三人裝潢匠五人筆匠三人司經局洗馬一人文學三人書令史二人書史四人校書四人正字二人典書四人楷書二十五人掌固六人典膳局典膳郎丞各二人書令史二人書史四人主食六人典食二百人掌固四人藥藏局藥藏郎丞各二人書令史一人書史二人侍醫四人典藥九人掌固六人藥僮十八人內直局內直郎丞各一人書令史二人書史四人典服三十人典扇典翰各十五人掌固六人典設局典設郎四人書令史二人書史四人幕士六百人掌固十二人宫門局宫門郎丞各二人書令史二人書史四人門僕一百三十三人掌固四人太子右春坊右庶子一人中舍人二人録事一人主事二人令史九人書令史十八人太子右諭德一人右贊善大夫五人傳令四人太子通事舍人八人典謁二十一人亭長六人掌固十二人太子內坊典內二人丞二人録事二人令史三人書令史五人典直四人導客舍人六人閣帥六人內閽八人內給使無員數內廄二人典事二人駕士三十人亭長二人掌固四人太子內官良娣二人良媛六人承徽十人昭訓十六人奉儀二十四人司閨二人掌正三人女史三人掌書三人女史三人掌筵二人女史三人司則二人掌嚴三人女史三人掌縫三人女史三人掌藏三人女史三人司饌二人女史四人掌食三人女史四人掌醫三人女史二人掌園三人女史二人太子太師一人太傅一人太保一人並從一品下禮記曰三王之教太子入則有保出則有師史記秦孝公使商鞅設法而黥太子師傅則秦有其職也漢氏唯置太傅秩二千石屬官有太子門大夫庶子洗馬舍人至後漢太子太傅秩中二千石掌輔導太子禮如師不領官屬至魏太子太傅為第三品漢魏故事皇太子於二傅執弟子禮皆為書不曰令太傅於太子不稱臣晋初東宫不置詹事事由二傅少傅立草太傅書真以為儲副體尊遂命諸公居之而本司位重或行或領也咸寧中備太傅之職朗陵公何劭為太子太師避景帝諱改為帥安豐侯王戊為太傅武陵侯楊濟為太保其後或置或省懷帝為太弟又備六傅東晋明帝在儲宫置保傅之位而無二師晋令太子太保品第三進賢兩梁冠絳朝服佩水蒼玉銀章青綬宋齊梁並不置後魏北齊置之正第二品號東宫三太後周不置隋氏置之正第三品皇朝因之而加其秩太子出則乘輅備儀太子三師以道德輔教太子者也至於動靜起居言語視聼皆有以師焉太子少師一人少傅一人少保一人並正二品禮記云三王教太子立太傅以飬之太傅在前少傅在後秦漢因之百宫表太傅少傅秩二千石後漢秩中二千石總領東宮官屬魏故事太傅於太子不稱臣少傅稱臣晋咸寧中備六傅之職始置少師少保以臨海侯裴楷為少師以上蔡伯和嶠為少保其後或置或省至晋懷帝為太弟又備六傅之職東晋明帝在儲宫置保傅之位而無師歷宋齊梁陳並不置後魏北齊皆置之號東宫三少隋氏降太師一等皇朝因之太子出入則乘輅備儀以為後從太子三少掌奉皇太子以觀三師之道德而教諭焉凡三師三少官不必備唯其人無其人則闕之太子賔客四人正三品漢書髙祖欲廢太子吕氏用張良計致商山四皓以為賔客又孝武帝為太子立博望苑使通賔客則其義也若有宴賜諸司長官太子賔客則皆預焉太子賔客掌侍從規諫贊相禮儀而先後焉凡皇太子有賔客宴㑹則為之上齒太子詹事府詹事一人正三品漢書百官表詹事秦官掌皇后皇太子家秩二千石應劭云詹省也給也言給事太子漢東宫屬官太子門大夫庶子洗馬舍人屬三傅率更家令丞僕中盾衛率厨廄長丞屬詹事成帝省詹事後漢因之其太子官悉屬少傅而太傅不領官屬魏復置詹事品第三掌東宫內外衆務晋初不置詹事東宫諸署悉𨽻三傅後以保傅位尊不宜親務武帝咸寧初用黃門侍郎楊珧為詹事掌東宫之任珧遷為少傅復省惠帝元康中復置永康中齊王冏輔政復省太安中復置懷帝又省江左復置晋令詹事品第三銀章青綬綘朝服兩梁冠局事擬尚書令位視領護將軍中書令長三率中庶子庶子洗馬舍人其後用大漸重或以令僕射領之宋齊品秩儀服略同於晋梁秩中二千石品第三後定十八班班第十四陳因之後魏太子詹事置左右二人其後唯置一人初第二品下太和末降為第三品北齊品同魏氏總東宫內外衆事無大小皆統之領家令率更僕三寺左右衛二坊後周置太子宫正宫尹隋開皇元年更置詹事二年罷之皇朝復置龍朔二年改為端尹咸亨元年復舊天授中改為宫尹神龍元年復為詹事少詹事一人正四品上皇朝置龍朔二年改為少尹咸亨元年復舊天授中復為少尹神龍元年復舊太子詹事之職統東宫三寺十率府之政令舉其綱紀而修其職務少詹事為之二凡天子六官之典制皆視其事而承受焉丞二人正六品上漢因秦置詹事丞秩六百石東漢省至魏晋皆隨詹事置省永康中省詹事置丞一人文書關六傅晋令詹事丞一人品第七銅印墨綬進賢一梁冠皇朝服局擬尚書左右丞過江多用員外郎及博士為之遷為尚書郎宋齊品服同晋氏梁陳品第八後魏初從五品中太和末第七品上北齊第七品下皇朝加至二人龍朔一年改為端尹丞咸亨元年復故天授中又改為宫尹丞神龍元年復故主簿一人從七品上晋始置主簿史闕其員品歷宋齊梁陳後魏北齊隋詹事府皆有五官功曹主簿亦史闕其員品皇朝置一人龍朔咸亨天授神龍並隨府改復録事二人正九品下丞掌判事凡勑令及尚書省二坊符牒下於東宫諸司者皆發之若東宫諸司之申上者亦如之主簿掌付所受諸司之移判及彈頭之事而勾㑹之凡三寺十率府文符之隱漏程限稽失大事啓文小事下率更以繩之及掌印勾檢稽失録事掌受事發辰太子司直二人正七品上皇朝龍朔三年置桂坊比御史臺置令一人比御史大夫司直二人比侍御史職在彈劾以肅宫寮其後廢桂坊以司直𨽻詹事府司直掌彈劾宫寮糾舉職事凡皇太子朝宫臣則分知東西班凡諸司文武應參官每月皆具在否以判正焉凡諸率府配兵於諸職掌者亦如之皆受而檢察其過犯者隨以彈啓若皇太子監國詹事及左右庶子為三司使則司直一人與司議舍人分日受啓狀詳其可否以申理之若皇太子出則於鹵簿內分以糾察太子左春坊左庶子二人正四品上禮記曰古者周天子有庶子之官職諸侯卿大夫之庶子掌其戒令與其教理别其等正其位國有大事則帥國子而致於太子唯所用之若有甲兵之事則授之車甲合其卒伍置其有司以軍法理之司馬弗征至秦因之置中庶子員漢太子太傅屬官有庶子王莽改曰中尚翼子後漢太子少傅屬官有太子中庶子員五人秩六百石職如侍中庶子無員秩四百右庶子職如三署郎環濟要略曰庶子主宫中并諸吏之適子及支庶版籍魏因之晋太子詹事有中庶子庶子各四人局擬散騎常侍品第五班同三令四率次中書侍郎下絳朝服武冠平巾幘髙功中庶子與髙功中舍人共掌禁令糾正違闕侍從左右儐相威儀盡規獻納奏事文書皆典綜之釋奠中庶子扶左庶子扶右孝文帝元嘉初詔中庶子隨太子入直上宫十四年又詔直東宫梁中庶子庶子各四人庶子功髙者一人為祭職班則負璽前後部護駕與髙功中舍一人共掌其坊之禁令班第十一從四品庶子班第九從五品陳因之後魏有太子左庶子庶子員北齊有門下坊中庶子四人領之有典書坊庶子四人領之中庶子第四品上隋門下坊置左庶子二人領之典書坊置右庶子二人領之至是始改為左右矣左庶子正四品上右庶子四品下皇朝因之龍朔二年改門下坊為左春坊左庶子為太子左中護咸亨元年復故左庶子在東宫職擬侍中太子中允二人正五品下後漢太子宫屬有中允在中庶子下洗馬上此後無聞皇朝貞觀初改太子中舍人為中允位右庶子下而中舍人復置龍朔二年改曰太子左贊善大夫咸亨元年復為太子中允而左贊善大夫仍置太子中允職擬黃門侍郎左庶子之職掌侍從贊相禮儀駮正啓奏監省封題中允為之二凡皇太子從大祀及朝㑹出入則版奏外辦中嚴入則解嚴焉凡令書下於左春坊則與中允司議郎等覆啓以畫諾及覆下以皇太子所畫者留為按更寫令書印署注令諾送詹事府若皇太子監國事在尚書者如令書之法太子司議郎四人正六品上貞觀十八年置龍朔二年改為太子左司議郎咸亨元年復舊職擬給事中録事二人從八品下主事三人從九品下司議郎掌侍從規諫駮正啓奏以佐庶子中允之闕凡皇太子之出入朝謁從享及釋奠於先聖先師講學臨胄撫軍監國之命可傳於史册者並録為記注若官坊之內祥瑞災眚及伶官之改變音律新曲調宫臣之宫長除拜薨卒亦皆記焉每嵗終則送之於史館太子左諭德一人正四品下龍朔三年置職擬左散騎常侍太子左贊善大夫五人正五品下龍朔二年改太子中允為之咸亨元年復置中允而贊善大夫不廢又加置五人職擬諫議大夫左諭德掌諭太子以道德也皇太子朝宫臣則列侍於左階出入則騎從於正道之左其內外庶政有可為規諷者隨事而贊諭焉左贊善掌翊贊太子以規諷也皇太子出入動靜茍非其德義則必陳古以針焉崇文館學士魏文帝招文儒之士始置崇文館王肅以散騎常侍領崇文館祭酒自後無聞貞觀中崇文館有學士直學士員不常置掌教授學生等業校書二人從九品下本置讐校開元七年改為校書崇文館學士掌刋正經籍圖書以教授諸生其課試舉送如𢎞文館校書掌校理四庫書籍正其訛謬司經局洗馬二人從五品下國語云句踐為夫差洗馬漢太子少傅屬官有太子洗馬後漢員十六人秩比六百石職如謁者太子出則當直者一人在前導威儀蓋洗馬之義也魏因之晋太子詹事屬官太子洗馬八人掌皇太子圖籍經書職如謁者局準祕書郎品第七班同舍人次中書舍人下綘朝服進賢一梁冠黑介幘宋祖置八人齊太子洗馬一人梁典經局有太子洗馬八人統典經書舍人典事守舍人員班第六正七品陳因之北齊典書坊有太子洗馬二人從五品上隋門下坊司經局置洗馬四人從五品下至大業中減二人皇朝因之龍朔二年改為太子司經大夫咸亨元年復舊文學三人正六品魏置太子文學魏武為丞相命司馬宣王為文學掾甚為世子所信與吳質朱鑠陳羣號為太子四友自晋之後不置至後主至德三年置太子文學十人復廢皇朝顯慶中始置校書四人正九品下宋孝建中太子洗馬有校書吏四人此後無聞至北齊有太子校書郎從九品上隋司經局置校書六人從九品上皇朝減置四人正字二人從九品下隋司經局置正字二人從九品下煬帝改為正書皇朝復為正字洗馬掌經史子集四庫圖書刋緝之事立正本副本貯本以備供進凡天下之圖書上於東宫者皆受而藏之文學掌分知經籍侍奉文章總緝經籍繕寫裝染之功筆札給用之數皆料度之校書正字掌校理刋正經史子集四庫之書典膳局典膳郎二人正六品上自漢以來並有太子倉官北齊門下坊始别置典膳局有監丞各二人監六品下隋改為七品下皇朝因之龍朔二年改為太子典膳郎丞二人正八品上北齊典膳局有丞二人正八品下隋正九品下皇朝復為八品上典膳郎掌進膳嘗食之事丞為之二每夕局官執爵更直藥藏局藥藏郎二人正六品上北齊門下坊領藥藏郎有監丞各二人正六品下侍藥四人正七品下隋門下坊領藥藏局監丞二人侍藥四人監正七品下皇朝改監為太子藥藏郎丞二人正八品上北齊藥藏局有丞一人正八品下隋正九品下皇朝因之藥藏郎掌和齊醫藥之事丞為之二凡皇太子有疾命侍醫入診候以議方藥應進藥命藥僮搗篩之侍醫和成之將進宫臣監嘗如尚藥局之職內直局內直郎二人從六品下齊職儀太子有內直兵局內直兵史二人五品勳位梁有齊內主璽主衣扶侍等局各置有司以承其事陳因之北齊門下坊領殿內局有內直監二人正六品下隋門下坊領內置局置內直監二人品同北齊皇朝因之職擬尚輦奉御龍朔二年改同太子內直郎丞二人正八品下北齊內直郎局有副監四人從六品下隋內直局有副監二人品同北齊皇朝因改為丞內直郎掌符璽繖扇几案衣服之事丞為之二凡皇太子之服衮冕垂白珠九旒以組為纓色如其一青纊充耳犀簮導𤣥衣纁裳九章每章一行重以為等每行九五章在衣山龍華蟲火宗彛四章在裳藻粉龍黻織成為之白紗中單黻領青褾襈裾革帶金鉤䚢大帶素帶不朱裏亦純以朱緑級約用組韍隨裳色火山二章玉具劒金寶飾玉鏢首瑜玉雙珮朱組雙大綬四綵赤白縹紺䋙純朱質長一丈八尺三百二十首廣九寸小雙綬長二尺六寸色同大綬而首半之間施二玉鐶朱襪赤舄加金飾侍從皇帝祭祀及祀廟加元服納妃則服之俱服逺逰三梁冠加金附蟬九首施珠翠黑介幘髮纓翠緌犀簮導絳紗袍白紗中單皂領褾襈裾白裙𥜗白革帶方同心曲領絳紗蔽膝其革帶劒珮綬與上同白襪黑舄未冠則雙童空頂黑介幘雙玉導加寶飾謁廟還宫元日冬至朔日入朝釋奠則服之其朔望日入朝通服袴褶五日常朝亦准此公服逺逰冠簮導以上並同前絳紗單衣白裙襦革帶金鉤䚢假帶瑜玉隻佩方心紛鞶囊長六尺四寸廣四寸四分色同大綬白襪烏皮履五日常朝元日冬至受朝服之辨服辨以鹿皮為之犀簮導組纓玉􅋒九絳紗衣素裳革帶鞶囊小綬隻佩白襪烏皮履朔日及視事則兼服之平巾幘金飾犀簮導紫褶白袴玉梁珠寶鈿帶著鞾乘馬則服之進德冠九􅋒加金飾其常服及白練裙襦通著之若袴褶則與平巾幘通著典設局典設郎四人從六品下南齊有齊居局齊居庫丞一人梁有齊內局各置有司以承其事陳因之北齊門下坊有齊司局有太子齊帥司閣帥各二人太子齊帥正八品下隋門下坊領齊帥局有齊帥四人正七品下皇朝因之龍朔二年改太子齊帥為太子典設郎典設郎掌湯沐灑掃鋪陳之事凡大祭祀皇太子散齊三日於别殿致齊二日於正殿前一日設幄坐於正殿東序及室內俱西向又張帷於前楹下殿若無室則張帷若大禮應供者亦如之宫門局宫門郎二人從六品下漢太子太傅屬官有太子門大夫後漢置二人秩六百石職比郎將魏因之晋太子門大夫局准公車令班同中舍人主通逺近箋表宫門禁防宋品第六秩六百石從駕在詹事後齊梁陳因之皆置一人北齊門下坊置門大夫主簿各一人門大夫從六品上并統軍官西梁清商二部隋曰宫門局置大夫二人從六品上煬帝復為宫門監皇朝復為宫門大夫龍朔二年改為宫門郎職比城門郎丞二人正八品下皇朝置宫門郎掌內外宫門管鑰之事凡宫殿門夜漏盡擊漏鼓開夜漏上水一刻擊漏鼓閉每嵗終行儺應經所由門並先一刻早開若皇太子不在則閉東宫正門其宫城門使宿衛人應入宫殿者各於左右廂便門出入皇太子還仗乃開凡宫中漏刻晝夜惟唱時不復擊鼓若開閉門及每夜一更盡依法擊鐘鼓太子右春坊右庶子二人正四品下其說已具於左庶子隋門下坊置左庶子二人以領之典書坊以右庶子二人領之右庶子正四品下皇朝因之至龍朔二年始改典書坊為右春坊右庶子為太子右中護咸亨元年復為右庶子在東宫職擬中書令太子中舍人二人正五品上太子中舍人本漢魏太子舍人也晋惠帝在儲宫以舍人四人有文學才美者與中庶子共理文書至咸寧二年齊王冏為太傅遂加名為中舍人位叙同尚書郎其後資漸髙擬黃門侍郎班同門大夫改尚書郎下髙功中舍人與髙功中庶子共掌禁令糾正違闕侍從左右儐相威儀盡規獻納奏事文章皆典給之監合嘗藥大小㑹二宫舉案正直從大小駕一人前部護駕一人後部護駕同中庶子日月檢奏直臣名更直五日典文疏如中書郎宋有四人齊有一人梁有四人髙功一人與中庶子祭酒共掌其坊之禁令班第八正六品陳因之後魏第五品上北齊門下坊有四人品同後魏隋改為太子內舍人四人正五品上煬帝減二人皇朝復為中舍人職擬中書侍郎右庶子之職掌侍從左右獻納啓奏宣傳令言太子左諭德一人正四品下龍朔二年置職擬右散騎常侍太子左贊善大夫五人正五品上龍朔二年改太子中允為右贊善大夫咸亨元年復為中允而贊善大夫不廢又加置五人職比諫議大夫右諭德掌如其左皇太子朝宫臣則列侍於右階之下出入則騎於正道之右右贊善大夫掌如其左凡皇太子朝宫臣則列於右階之下太子通事舍人八人正七品下齊職儀中庶子下有門下通事守舍人四人三品勳録叙武冠朱服又庶子下有內典書通事舍人二人品服同舍人擬中書通事舍人掌宣傳令書內外啓奏梁中庶子有通事舍人又庶子下通事舍人二人視南臺御史並一班從九品陳因之北齊門下坊有通事守舍人四人隋典書坊有通事舍人八人正七品下煬帝改太子通事舍人為宣令舍人皇朝復為通事舍人通事舍人掌導引東宫諸臣辭見之禮及承令勞問之事凡大朝謁及正冬百官與諸方之使者參見東宫亦如之若皇太子行先一日京文武官職事九品已上奉辭及還宫之明日參見亦如之太子內坊典內一人從五品下晋有太子寺人監員又齊職儀太子三卿校各有寺人二人隋文帝始置太子內坊有典內等員皇朝因之丞二人從七品下隋文帝置內坊丞二人皇朝因之典直四人正九品下隋內坊置丞四人皇朝改為典直典內掌東宫閣內之禁令及宫人糧廪賜與之出入丞為之二凡任典直以儀式導客主之儐序任閣帥以門戶任內閽以出入任給使以繖扇任內廄以車輿任典事以牛馬典內統而監主之凡皇太子妃之親內命婦之母并郡主合乘車出入者亦監之凡宫人命婦亡葬之制皆率其屬而供其職太子內官漢書曰太子有妃有良娣有孺子妻妾凡三等歷代因之至宋明帝更為太子置內職二等有寶林良娣齊建元中太子宫置三內職良娣比關內侯寶林比五等侯才人比駙馬都尉隋初始定制皇朝因之司閨從六品掌導引妃及宫人名簿以總掌正掌書掌筵知三司出納掌正從八品掌文書出入録目為記并閨閣管鑰得察推罰女史流外三品掌典文簿而執行焉餘女史視此掌書從八品掌寶及符契經籍宣傳啓奏教學廩賜及紙筆監印掌筵從八品掌帷幄牀褥几案舉繖扇灑掃鋪設及賔客司則從六品掌禮儀參見以總掌嚴掌縫掌藏而領其事掌嚴從八品掌飾衣服巾櫛膏沐服玩仗衛掌縫從八品掌裁縫衣服織績掌藏從八品掌金玉珠寶財貨錦繒縑綵出入司饌從六品掌膳羞進食先嘗以總掌食掌醫掌園而領其事掌食從八品掌膳羞酒醴燈燭柴炭及宫人食料器皿掌醫從八品掌醫藥伎樂掌園從八品掌園苑種植蔬果唐六典卷二十六
