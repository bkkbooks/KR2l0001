body:
  text: 唐六典卷三十唐張九齡等撰三府督䕶州縣官吏京兆河南太原三府官吏大都督府中都督下都督官吏上州中州下州官吏京縣畿縣天下諸縣官吏大都䕶上都䕶府官吏鎮戍嶽瀆闗津官吏京兆河南太原府牧各一人從二品昔舜分九州為十二州始置十二牧大禹鑄鼎貢金九牧周禮八命作牧秦分天下為三十六郡京為内史漢武帝改為京兆尹秩二千石後漢都洛陽為河南尹魏晋因之歴代所都皆為尹江左為丹陽尹北齊為清都尹後周及隋復為京兆尹始秦分天下令御史監郡漢省之丞相遣史分刺諸州武帝初置部刺史十三人掌奉詔條察州事秩六百石類今之十道使也又置司隷校尉部三輔三河𢎞農類今之京畿按察使也成帝更名刺史為牧秩二千石後漢復為刺史後復為牧魏晋已下皆為刺史晋武帝罷司隷校尉置司州牧江左為揚州刺史後魏北齊皆為司州牧後周置雍州牧隋因之大業三年置州置郡京兆河南皆為尹則兼牧之任矣皇朝又置雍州牧洛州初為都督府及置都亦為牧開元初復為京兆河南尹尹一人從三品漢京兆尹有都尉丞皆詔除都尉比二千石典武職丞秩六百石後漢省都尉州又置别駕治中皆刺史自辟除魏晋已下皆因之隋文帝罷郡以州統縣改别駕治中為長史司馬煬帝罷州置郡罷長史司馬置賛治後改為丞又置通守以貳太守京兆河南等為内史皇朝置雍州别駕永徽中改為長史正四品下開元初改長史為尹從三品然親王為牧皆不知事職務緫歸於尹亦漢氏京尹之任也少尹二人從四品下魏晋已下有治中隋文帝改為司馬煬帝改為賛治後改為丞皇朝復曰治中後避高宗諱改曰司馬開元初改為少尹置二員司録參軍事二人正七品上漢魏已來及江左郡有督郵主簿盖録事參軍之任也皆太守自辟除後魏北齊後周隋氏州皆有録事參軍及罷郡以州統縣皆吏部選除煬帝罷州置郡有東西曹掾及主簿皇朝省主簿置録事參軍開元初改為司録參軍録事四人從九品上隋置京兆録事四人皇朝因之府史各三人功曹參軍事二人正七品下漢魏已下司隷校尉及州郡皆有功曹户曹賦曹兵曹等員北齊諸州有功曹倉曹中兵外兵甲曹法曹士曹左户等參軍事隋諸州有功曹户曹兵曹等參軍事法曹士曹行參軍郡有西曹金曹户曹兵曹法曹士曹等及罷郡置州以曹為名者改曰司煬帝罷州置郡改司功司倉司户司兵司法司士等為書佐皇朝因其六司而改書佐為參軍事開元初為功曹參軍府六人史十二人倉曹參軍事二人正七品下北齊諸州有倉曹參軍事隋文帝改為司倉參軍煬帝改為司倉書佐皇朝復為倉曹參軍府八人史十六人户曹參軍事二人正七品下漢魏已來州郡皆有户曹掾或為左右隋有户曹參軍文帝改為司户參軍煬帝為司戸書佐皇朝因為司户參軍開元初為户曹參軍府十一人史二十二人帳史一人景雲初置兵曹參軍事二人正七品下漢魏已下諸州皆有兵曹或為中兵外兵騎兵北齊已下改復並與功曹同府九人史十八人法曹參軍事二人正七品下漢魏已下州郡有賦曹決曹掾或法曹或墨曹自隋已下改復並與上同府九人史十八人士曹參軍事二人正七品下北齊諸州有士曹行叅軍已下改復並與上同府七人史十四人參軍事六人正八品下註見王府參軍文下執刀十五人典獄十八人問事十二人白直二十四人經學博士一人從八品上助教二人魏晋已下郡國並有文學即博士助教之任並皇朝置學生八十人皇朝置醫學博士一人助教一人開元初置醫學生二十人貞觀初置大都督府都督一人從二品魏黄初二年始置都督諸州軍事或領鎮戎緫夷校尉三年上大將軍曹員都督中外諸軍事司馬宣王征蜀加號大都督自此之後歴代皆有至隋改為緫管府皇朝武徳四年又改為都督府貞觀中始改為上中下都督府長史一人從三品秦漢邊郡有長史魏晋已來諸州皆有别駕治中至北齊八命七命六命州刺史各有長史隋九等州亦有長史開皇三年改雍州别駕為長史煬帝罷州置郡又改為别駕唯都督府則置長史永徽中始改别駕為長史大都督府長史仍舊正四品下開元初始増其秩可馬二人從四品下北齊及隋九等州各有司馬開皇三年改雍州賛治為司馬皇朝改郡為州各置治中一人其都督府則置司馬永徽中改治中為司馬録事參軍事二人正七品上録事二人從九品上史四人功曹參軍事一人正七品下府四人史六人倉曹參軍事二人正七品下府四人史八人户曹參軍事二人正七品下府五人史十人帳史一人兵曹參軍事二人正七品下府四人史八人法曹參軍事一人正七品下府四人史八人士曹參軍事一人正七品下府四人史八人參軍事五人正八品下執刀十五人典獄十六人問事十人白直二十二人市令一人從九品上漢代諸郡國皆有市長晋宋已後皆因之隋氏始有市令皇朝初又加市丞户四萬已上者省補市令丞一人佐一人史二人帥三人倉督二人史四人北齊九等州縣各有倉督員隋因之經學博士一人從八品上助教二人學生六十人醫學博士一人從八品下助教一人學生十五人若中下都督府户滿四萬人已上者官員同此唯减司馬一人中都督府都督一人正三品别駕一人正四品下漢司隷校尉有别駕從事校尉一人行部則奉引主録衆事舊解以為别乗傳車故曰别駕諸州刺史亦有之元帝時條州大小為設吏員别駕治中諸部從事秩皆百石後漢改曰别駕從事史三國因之晋代諸州各置别駕治中從事史一人宋齊梁陳後魏周隋因而不改皇朝因之永徽中改别駕為長史垂拱初又置别駕員多以皇家宗枝為之神龍初罷開元初復置始通用庶姓焉長史一人正五品上司馬一人正五品下