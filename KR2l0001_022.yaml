body:
  text: 唐六典卷二十二唐張九齡等撰少府軍器監少府監監一人少監二人丞四人主簿二人録事二人府二十七人史十七人計史三人亭長八人掌固六人中尚署令一人丞四人府九人史十八人監作四人典事四人掌固四人左尚署令一人丞五人府七人史二十人監作六人典事十八人掌固十四人右尚署令一人丞四人府七人史二十人監作六人典事三人掌固十人織染署令一人丞二人府六人史十四人監作六人典事十一人掌固五人掌冶署令一人丞二人府六人史十二人監作二人典事二十三人掌固四人諸冶監每冶監各一人丞各一人録事各一人府各一人史各二人監作四人典事二人掌固四人北都軍器監監一人少監一人丞二人主簿一人録事一人府十人史十八人典事四人亭長二人掌固四人甲坊署令一人丞一人府二人史五人監作二人典事二人弩坊署令一人丞二人府二人史五人監作二人典事二人諸鑄錢監監各一人副監各一人丞各一人監事各一人録事各一人府各三人史各四人典事各五人互市監每市監一人丞各一人録事各一人府各二人史各四人價人各四人掌固八人少府監監一人從三品漢書百官表云少府秦官掌山海池澤之稅以給供養有六丞其屬官有尚書符節太醫太官湯官導官樂府若盧考工室在右居至甘泉居室左右司空東織西織東西匠十二官令丞又陶人都水均官三長丞又上林中十池監又中書謁者黃門鉤盾尚方御府永巷內者宦者七官令丞諸僕射署長中黃門皆屬焉少府者天子之私府所以供奉之職皆在焉王莾改曰共工後漢復為少府其尚書侍中符節皆屬焉餘職多所并省漢官解詀云少府主供養陂池禁錢服御口實掖庭中宮魏因之晉置功曹主簿五官等貟少府銀章青綬五時朝服進賢兩梁冠絳朝服佩水蒼玉品第三統材官校尉中左右三尚方中黃左右藏左校甄官平凖奚官等今左校坊鄴中黃左右藏油官等丞及過江唯置一尚方又省御府至哀帝時桓溫表省少府以并于丹陽尹孝武復置宋少府領左右尚方御府東冶南冶平凖等令丞齊又加以領左右尚煆署梁以少府為夏卿統材官將軍左右中尚方甄官平水南塘邸稅庫東西冶中黃細作炭庫紙官染署等令丞班第十一品從第四陳因之後魏少府宗正太僕廷尉司農鴻臚為六次卿第二品上太和末改少府為太府北齊不置少府其左中右三尚方司染諸冶及細作甄官等署並𨽻太府寺至隋煬帝大業五年始分太府為少府監置監一人從三品少監一人從四品丞三人統左尚中尚右尚內尚司織司染鎧甲弓弩掌冶等署其後又改監為令少監為少令併司織司染為織染署廢鎧甲弓弩二署皇朝因為監龍朔二年改為內府監咸亨元年復為少府監光宅元年改為尚方監神龍元年復舊開元又分甲鎧弓弩别置軍器監十二年省軍器監其作工歸少府尋又于北都置軍器監少監二人從四品下隋煬帝置少監一人從第四品皇朝因置二人龍朔咸亨光宅神龍並隨監改復少府監之職掌百工伎巧之政令總中尚左尚右尚織染掌冶五署之官屬庀其工徒謹其繕作少監為之二凡天子之服御百官之儀制展采備物率其屬以供焉丞四人從六品下漢置丞六人比千石後漢置一人以明法補魏晉因之宋齊梁陳皆一人梁班第四後魏少府丞二人從五品中隋煬帝分太府寺置少府監置丞二人皇朝加至六人龍朔咸亨光宅神龍並隨監改復開元二十三年省置四人主簿二人從七品下晉令少府置主薄二人宋齊因之梁主簿七班之中第三隋煬帝置主簿一人皇朝加至四人龍朔咸亨光宅神龍並隨監改復開元二十三年減二人録事二人從九品上丞掌判監事凡五屬所備之物須金石齒革羽毛竹木而成者則上尚書省尚書省下所由司以供給焉凡五署之所入於庫物各以名數并其州土所生以籍之季終則上於所由其副留於監有出給者則隨注所供而印署之凡教諸雜作計其功之衆寡與其難易而均平之功多而難者限四年三年成其次二年最少四十日作為等差而均其勞逸焉凡教諸雜作工業金銀銅鐡鑄寫鑿鏤錯鐋所謂工夫者限四年成以外限二年成平慢者恨二年成諸雜作有一年半者有一年者有九月者有三月者有五十日者有四十日者主簿掌勾檢稽失凡財物之出納工人之繕造簿帳之除附各有程期不如期者舉而按之録事掌受事發辰中尚署令一人從六品上漢少府屬官有尚方令丞後漢尚方令一人六百石掌上手工作御刀劍諸好器物及寶玉作器和帝時蔡倫為尚方令作祕劍皆有龍泉太阿之目及諸器械靡不牢固其後分為中左右三尚方魏氏因之晉過江左唯置一尚方哀帝以𨽻丹陽尹孝武帝復舊晉代掌造軍器宋髙祖踐阼以相府部配臺謂之左尚方而本署謂之右尚方令丞各一人武帝改右尚方曰御府又置中署𨽻右尚方齊置左右尚方令丞各一人梁置左中右尚方三令丞其令並從九品其後廢中尚方唯存左右而已陳因之北齊太府寺管左中右三尚方隋開皇中有內左右三尚方署猶屬太府寺內尚方令二人正八品下掌諸織作煬帝分屬少府皇朝因置二人省方字但曰中尚左尚右尚開元十八年省一人升為從六品上丞四人從八品下漢魏已來皆隨署省置後漢丞一人四百石魏晉宋齊皆隨署改易梁位在七班之下為三品勳位隋置丞四人正九品下皇朝因之開元中升其品監作四人從九品下中尚署令掌供郊祀之圭璧凡冬至祀昊天上帝以蒼璧孟春祈榖孟夏雩祀季秋明堂祀並以四圭有邸夏至祭皇地祗以黃琮祀日月以圭邸祀東方青帝以青圭南方赤帝以赤璋西方白帝以騶虞北方黑帝以玄璜中央黃帝以黃琮祭神州及嶽鎮海瀆太社太稷皆以兩圭有邸及嵗時乘輿器玩中宮服飾雕文錯綵珍麗之制皆供焉丞為之二每年二月二日進鏤牙尺及木畫紫檀尺寒食進毬兼雜綵雞子五月五日進百索綬帶夏至進雷車七月七日進七孔金鈿針十五日進盂蘭盆臘日進口脂衣香囊每月進筆及搗衣杵琴瑟琵琶絃金銀紙須則進之不恆其數也其所用金木齒革羽毛之屬任所出州土以時而供送焉其紫檀櫚木檀香象牙翡翠毛黃嬰毛青蟲真珠紫礦水銀出廣州及安南赤麖皮琴瑟赤圭琥珀白玉碧玉金剛鑽盆灌鍮石胡桐律大鵬砂出波斯及涼州麝香出蘭州銅鉢銅出代州赤生銅出銅源監也左尚署令一人正七品下後漢末分尚方為三中左右魏晉因之晉過江唯尚方而已宋齊梁陳有左右尚方晉宋已來並四百石梁班從九品北齊太府寺左中右尚方隋開皇中三尚方並屬太府寺左尚令三人掌造車輦繖扇矟眊弓箭弩戟器仗刀鏃膠漆竹木骨角畫素刻鏤蠟燭等皇朝置一人開元十八年為正七品下丞五人從八品下前後漢魏晉宋齊梁陳皆隨署置省梁選部左尚方丞為三品勳位隋左尚方丞八人正九品下皇朝置五人開元十八年為從八品下監作六人從九品下左尚署令掌供天子之五輅五副七輦三輿十有二車大小方圓華蓋一百五十有六諸翟尾扇及大小繖翰辨其名數而頒其制度丞為之二凡皇太后皇后內命婦之重翟厭翟翟車安車四望金根等車皇太子之金輅軺車四望車王公已下象輅革輅木輅軺車公主王妃外命婦一品猒翟車二品三品犢車其制各有差其用金帛膠漆材竹之屬所出方土以時支送漆出金州竹出司竹監松出嵐勝州文柏出隴州梓楸出京兆府紫檀出廣州黃楊出荆州右尚署令一人正七品下後漢分尚方為三中左右魏晉因之晉過江唯尚方而已宋齊梁陳有左右尚方北齊亦有三尚方隋左右尚方屬太府寺令三人正八品下煬帝始改隸少府焉皇朝因置令二人掌造甲胄貝裝刀斧鉞及皮毛雜作膠墨紙筆薦席等事開元十八年省一人升為正七品下丞四人從八品下漢魏已來與左尚方同隋右尚方丞六人皇朝置四人開元十八年為從八品下監作六人從九品下左尚署令掌供天子十有二間馬之鞍轡每嵗京兆河南制革理材爍金以為之送之於署令工人增飾而進焉及五品三部之帳備其材革而修其制度丞為之二凡刀劍斧鉞甲胄紙筆茵席履舄之物靡不畢供其用綾絹金鐵毛革等所出方土以時支送白馬尾白犛牛尾出隴右諸州翟尾孔雀尾白鷺鮮出安南江東貂皮出諸軍州織染署令一人正八品上周官九職嬪婦化理絲帛考工記理絲麻而成之謂之婦功漢少府屬官有東織西織成帝河平元年省東織更名西織曰織室後漢有織室丞一人此後無聞北齊中尚方領涇州雍州絲局成定州紬綾局丞後周有司織下大夫一人掌凡機材之工隋煬帝置司織署令丞後與司染署併為織染署周禮天官有染人掌染絲帛凡染春暴練夏纁玄冬官有設色之工五謂畫繪鍾筐㡆也韋昭辨釋名云平凖令主染有常平之法故準而酌之兩漢並𨽻司農晉平凖令有監染吏六人初𨽻司農後屬少府宋順帝名準始改曰染署令齊復為平準令梁陳為平水令北齊太府寺有司染署長秋寺有染局丞後周有染工上士一人又有司色下大夫一人隋初有司染署𨽻太府寺煬帝分屬少府大業五年合司織司染為織染署令二人皇朝置一人丞二人正九品上漢魏已來並具于本署隋並司織司染為一署丞四人皇朝因之置二人監作六人從九品下織染署令掌供天子皇太子及羣臣之冠冕辨其制度而供其職務丞為之二天子之冠二一曰通天冠二曰翼善冠冕六一曰大裘冕二曰衮冕三曰鷩冕四曰毳冕五曰絺冕六曰玄冕辨二一曰武辨二曰皮辨幘二一曰黑介幘二曰平巾幘帽一曰白紗帽太子之冠三一曰三梁冠二曰逺逰冠三曰進德冠冕二一曰衮冕二曰玄冕辨一曰皮辨幘一曰平巾幘臣下之冠五一曰逺逰冠二曰進賢冠三曰獬豸冠四曰髙山冠五曰却非冠冕五一曰衮冕二曰鷩冕三曰毳冕四曰絺冕五曰玄冕辨二一曰爵辨二曰武辨幘三一曰介幘二曰平巾幘三曰平巾緑幘凡織絍之作有十一曰布二曰絹三曰􅹙四曰紗五曰綾六曰羅七曰錦八曰綺九曰十曰褐組綬之作有五一曰組二曰綬三曰絛四曰繩五曰纓紬線之作有四一曰絀二曰線三曰絃四曰綱練染之作有六一曰青二曰絳三曰黃四曰白五曰皂六曰紫凡染大抵以草木而成有以花葉有以莖實有以根皮出有方土採以時月皆率其屬而修其職焉掌冶署令一人正八品上周禮冬官攻金之工六謂築冶鳧栗段桃也秦及漢諸郡國出鐡者置鐡官長丞晉衛尉屬官有冶令丞各一人掌工徒鼓鑄過江省衛尉而冶令始𨽻少府宋有東冶令丞西冶令丞齊因之梁有東冶令西冶令從九品下選東冶重西冶輕然梁朝之西冶蓋宋齊南冶也陳因之後魏無聞北齊太府寺有司冶令丞後周有冶工中士一人又有鐵工中士一人隋太府寺統掌冶署令二人掌金銀銅鐵器之屬一管諸冶煬帝改屬少府令從八品上皇朝因之省一人丞二人正九品上秦漢已來具上注隋太府寺統掌冶丞四人煬帝改屬少府皇朝因之省二人監作二人從九品下掌冶署令掌鎔鑄銅鐡器物之事丞為之二凡天下諸州出銅鐡之所聽人私採官收其稅若白蠟則官為市之其西邊北邊諸州禁人無置鐡冶及採鉚若器用所須則其名數移于所由官供之私者私市之凡諸冶所造器物皆上於少府監然後給之其興農冶監所造者唯供隴右諸牧監及諸牧使諸冶監監各一人正七品下秦漢內使及諸郡有鐡者則置鐡官長丞晉令諸冶官庫各置督監一人宋書云江南諸郡縣有鐡者或置冶令或丞皆吳時置也齊梁有梅根諸冶令北齊諸冶皆有局丞隋諸冶皆署監監有上中下三等皇朝因之掌鑄兵農之器以給軍旅屯田居人焉丞一人從八品上監作四人從九品下諸冶監掌鎔鑄銅鐡之事以供少府監丞為之二北都軍器監監一人正四品上開元初令少府監置十六年移向北都少監一人正五品上丞二人正七品主簿一人正八品上録事一人正九品下軍器監掌繕造甲弩之屬辨其名物審其制度以時納于武庫少監為之二焉丞掌判監事凡材革出納之數工徒衆寡之役皆督課焉主簿掌印及勾檢稽失録事掌受事發辰甲坊署令一人正八品下周禮考工記曰函人為甲犀甲七屬兕甲六屬合甲五屬凡為甲必先為容然後制革權其上與其下而重若一隋少府有甲鎧署皇朝改焉丞一人正九品下監作二人從九品下弩坊署令一人正八品下周禮司弓矢掌四弩凡弩狹瘦利攻守廣大利車戰野戰考工記弓人取六材必以其時幹也者以為逺角也者以為疾筋也者以為深膠也者以為和絲也者以為固漆也者以為受霜露也凡取幹之道有七柘為上檍次之檿桑次之橘次之木瓜次之荆次之竹為下隋有弓弩署皇朝改焉丞一人正九品下監作二人從九品下甲坊令弩坊令各掌其所修之物督其繕造辨其粗良丞為之二凡財物之出納庫藏之儲備必謹而守之諸鑄錢監監各一人周禮泉府上士四人掌市之征布又司市以商賈阜貨而行布以泉府同貨而斂賖國凶荒札喪則市無征而作布鄭玄云市不稅為民之用也金銅無凶年因物貴大鑄泉以饒民布及泉謂錢也漢書食貨志曰太公為周立九府圜法錢圜函方輕重以銖故貨寶於金利於刀流於泉布於布束於帛周景王鑄大錢文曰寶貨內外皆有周郭秦兼天下銅錢文曰半兩重如其文漢興以秦錢重難用令人鑄榆莢錢文帝以錢益輕更鑄四銖錢文為半兩除盜鑄錢令使民放鑄及武帝初鑄三銖錢重如其文禁人盜鑄有司言三銖錢輕更請郡國鑄五銖錢文曰五銖周郭其質又以人多姦鑄令京師鑄官赤仄一當五其後赤仄錢又廢於是悉除郡國無鑄錢專令上林三官鑄錢自武帝元符年三官初鑄五銖錢至平帝元始中成錢二百八十億萬餘王莾變漢制始造大錢徑寸二分重十二銖文曰大錢五十後又多所改作及公孫述於蜀鑄錢人不便之故謡曰黃牛白腹五銖當復後漢光武除王莾所造復五銖錢靈帝鑄四出錢魏初專以粟帛為貨明帝復立五銖錢至西晉不改吳孫權鑄大錢一當五百文又鑄一當千錢蜀先主鑄一直百錢東晉沈充鑄小錢謂之沈郎錢宋文帝又鑄四銖錢體完厚孝武帝四銖形小薄少帝鑄二銖謂之菜子錢又有綖環錢貫之以縷入水不沉南齊亦用四銖梁武帝乃鑄二種錢內有周郭文曰五銖重如其文又除內郭謂之女錢百姓私用古錢有直百五銖女錢太平百錢定平一百五銖稚錢五銖對文等號輕重不一普通中議罷銅錢鑄鐡錢陳初有梁末兩柱及鵝眼錢時雜用之文帝改鑄五銖宣帝又鑄大貨六銖後魏太和十九年鑄錢文曰太和五銖永安二年改鑄文曰永安五銖東魏齊文襄以錢文五銖名須稱實一文重五銖計百錢重一斤四兩二十銖北齊文宣帝鑄常平五銖重如文周武帝鑄布泉錢以一當五與五銖並行建德中復鑄五行大布一當十宣帝又鑄永通萬國以一當千隋髙祖以天下錢貨不等更鑄新錢背面內外皆有周郭文曰五銖重如其文每一千重四斤一兩自漢至隋雖時或輕重皆用五銖皇朝武德中悉除五銖更鑄開通元寶錢乾封初又鑄乾封泉寶錢尋廢開元中以錢濫惡江淮間尤甚有勑禁斷令御史往江淮間收斂納官鎔之其求稍廣州縣恐其錢數不充隨以好錢繼之自是百姓財幣耗損御史坐是左遷舊法每一千重六斤四兩近所鑄者多重七斤錢文本歐陽詢所書錢官漢氏初屬少府後屬水衡後漢屬司農魏晉已下或屬少府或屬司農皇朝少府置十爐諸州亦皆屬焉及少府罷鑄錢諸州遂别今絳州三十爐楊宣鄂蔚各十爐益鄂郴各五爐洋州三爐定州一爐諸鑄錢監以所在州府都督刺史判之副監一人上佐判之丞一人判司判之監事一人參軍及縣尉知之録事府史土人為之諸互市監監各一人從六品下漢魏已降緣邊郡國皆有互市與夷狄交易致其物産也並郡縣主之而不别置官吏至隋諸緣邊州置交市監視從第八品副監視正第九品皇朝因置之各𨽻所管州府監加至從六品下改副監為丞品第八下光宅中改為通市監後又復舊為互市監丞一人正八品下隋置交市副監皇朝改為互市監丞諸互市監各掌諸蕃交易之事丞為之二凡互市所得馬駝驢牛等各别其色具齒嵗膚第以言于所𨽻州府州府為申聞太僕差官吏相與受領印記上馬送京師餘量其衆寡並遣使送之任其在路放牧焉每馬十匹牛十頭駝騾驢六頭羊七十口各給一牧人若非理喪失其部使及遞人改酬其直其營州管內蕃馬出貨選其少壯者官為市之唐六典卷二十二
