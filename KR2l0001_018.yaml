body:
  text: 唐六典卷十八唐張九齡等撰大理寺鴻臚寺大理寺卿一人少卿二人正二人丞六人主簿二人録事二人府二十八人史五十六人獄丞四人獄史六人亭長四人掌固十八人問事一百人司直六人史十二人評事十二人史二十四人鴻臚寺卿一人少卿二人丞二人主簿一人録事二人府五人史十人亭長四人掌固六人典客署令一人丞二人掌客十五人典客十三人府四人史八人賔僕十八人掌固二人司儀署令一人丞一人司儀六人府二人史四人掌設十八人齊郎三十三人掌固四人幕士六十人大理寺卿一人從三品尚書云帝曰咎繇汝作士五刑有服孔安國注曰士理官也周官為司冦韓詩外傳云晋文公使李離為理理謂察理刑獄也史記天官書斗魁四星貴人之牢曰大理漢書百官表云廷尉秦官掌刑辟有正左右監景帝更名大理秩中二千石武帝復為廷尉宣帝置左右廷尉平哀帝復為大理王莾改曰作士後漢復為廷尉魏初為大理後復為廷尉置律博士晋置丞主簿明法掾厯宋齊皆為廷尉梁為秋卿班第十三陳因之後魏置少卿司直北齊及隋為大理寺隋置評事皇朝因之龍朔二年改為詳刑寺正卿咸亨元年復為大理光宅元年改為司刑寺神龍元年復故兩漢卿秩中二千石魏晋宋齊梁陳俱第三品後魏第二品上太和以後降為第三品隋正第三品皇朝降為從三品少卿二人從四品上後魏置為第三品上太和以後降為第四品上北齊第四品隋因之皇朝置二人降為從四品上大理卿之職掌邦國折獄詳刑之事以五聽察其情一曰氣聽二曰色聽三曰視聽四曰聲聽五曰詞聽以三慮盡其理一曰眀慎以讞疑獄二曰哀矜以雪寃獄三曰公平以鞫庶獄少卿為之二凡諸司百官所送犯徒刑已上九品已上犯除免官當庶人犯流死已上者詳而質之以上刑部仍于中書門下詳覆其杖刑已下則决之若禁囚有推决未盡留繫未結者五日一慮若淹延久繫不被推詰或其狀可知而推證未盡或訟一人數事及被訟人有數事重事實而輕事未决者咸慮而决之凡中外官吏有犯經斷奏訖而猶稱寃者則審詳其狀開元八年敕內外官犯贓賄及私坐成殿公坐官當已上有合許雪及减罪者並令大理審詳犯狀申刑部詳覆知實寃濫乃録送中書門下其有逺年斷雪近請除痕亦凖此其餘具刑部格凡吏曹補署法官則與刑部尚書侍郎議其人可否然後注擬大理正二人從五品下秦置廷尉正一人漢因之與監及平謂之廷尉三官秩千石魏氏第六品晋置二人宋齊梁陳並一人品同魏氏後魏第六品上北齊及隋並正第六品煬帝增置六人皇朝置二人龍朔二年改為詳刑大夫咸亨元年改為大理正光宅元年改為司刑正神龍初復舊丞六人從六品上晉武帝咸寧中曹志上書請廷尉置丞自此始也宋齊梁各置一人第七品陳第八品後魏第七品大業三年改丞為勾檢皇朝置六人增品從六品上主簿二人從七品上魏晋宋齊梁陳大理皆有主簿晋至陳俱二人正七品上皇朝因而降之録事二人從九品上獄丞四人從九品下晋令有獄左右丞各一人宋齊因之史闕其品秩梁陳置獄丞二人第七品後魏北齊亦二人正九品下隋置獄掾八人厯代並以卑微士為之皇朝置四人以流外入仕者為之司直六人從六品上後魏永安三年御史中尉髙穆奏置司直十人視五品𨽻廷尉位在正監上不置曹士唯覆理御史劾事北齊及隋因之並置十人從第五品下皇朝置六人降為從第六品上評事十二人從八品下漢書云宣帝地節三年置廷尉平秩六百石員四人其務在平刑獄故曰廷平至後漢光武省右平唯置左平魏晋以來不復云左但云廷尉平宋齊各一人第六品陳第七品後魏北齊及隋各置一人正第六品下官為評事皇朝因之置十二人從八品下大理正掌參議刑獄詳正科條之事凡六丞斷罪有不當者則以法正之凡內外官及爵五品已上犯罪至棄市者並監决若車駕巡幸在京則都一人留守以總卿二之職在都則京亦如之丞掌分判寺事凡有犯皆據其本狀以正刑名六丞判尚書六曹所統百司及諸州之務其刑部丞掌押獄每一丞斷事五丞同押若有異見則得各言其不同之致也徒已上各呼囚與其家屬告以罪名問其狀欵不伏則聽其自理無理者便以元狀斷定上刑部刑部覆有異同者下于寺更詳其情理以申或改斷焉主簿掌印省署抄目勾檢稽失凡官吏之負犯并雪寃者則據所由文牒而立簿焉凡贖銅者一斤為一負公坐而贖銅者二斤為一負各十負為一殿其有犯人未附而㑹恩免者本犯至免官以上及犯贓賄闕卿一人正第三品統典客司儀崇𤣥等三署開皇三年省并太常十二年復舊煬帝降卿為從三品皇朝依焉龍朔二年改為同文正卿咸亨元年復曰鴻臚光宅元年改為司賔寺卿神龍元年復舊舊屬官有崇𤣥署開元二十五年敕改𨽻宗正寺少卿二人從四品下後魏太和十五年九卿各署少卿一人第三品上三十二年降為正四品上北齊因之後周有小賔部下大夫一人隋依北齊煬帝加置少卿二人降為從四品皇朝武德中置一人貞觀中加置二人龍朔咸亨光宅神龍並隨寺改復鴻臚卿之職掌賔客及凶儀之事領典客司儀二署以率其官屬而供其職務少卿為之二凡四方夷狄君長朝見者辨其等位以賔待之凡二王之後及夷狄君長之子襲官爵者皆辨其嫡庶詳其可否以上尚書若諸蕃大酋渠有封建禮命則受册而往其國凡天下寺觀三綱及京都大德皆取其道德髙妙為衆所推者補充上尚書祠部凡皇帝皇太子為五服之親及大臣發哀臨弔則贊相焉凡詔葬大臣一品則卿護其喪事二品則少卿三品丞一人往皆命司儀以示禮制也丞二人從六品上秦有典客丞漢因之武帝改曰大鴻臚丞比千石魏晋皆因之東晋省梁鴻臚丞班第三陳因之後魏列卿丞從五品中太和二十二年降為第七品北齊為第七品下後周賔部有上士一人隋鴻臚丞二人正七品上大業五年加為從三品皇朝為從第六品上主簿一人從七品上漢官儀鹵簿篇鴻臚駕四馬主簿晋令大鴻臚置主簿録事史梁天監七年十二卿各置主簿位不登十八班者别為七班主簿班第三陳因之後魏闕文北齊有功曹五官主簿隋鴻臚寺主簿一人皇朝因之武德中正八品貞觀中減置一人從七品上録事二人從九品上丞掌判寺事主簿掌印勾檢稽失録事掌受事發辰典客署令一人從七品周禮有掌客上士二人漢鴻臚屬官有行人武帝改為大行令魏改曰客館令晋改曰典客宋永初中分置南北客館令丞齊有客館令梁有典客館令丞在七班之下為三品勳位陳因之後魏典客監從五品太和十五年置主客令北齊鴻臚寺統典客署後周有東南西北四掌客各上士一人隋鴻臚卿統典客署令丞煬帝改曰典蕃署又於國門外置四方館以待四方使客各掌其方國及互市之事皇朝以四方館隸中書改典蕃曰典客署丞二人從八品下周禮掌客有下士四人漢大行令有丞北齊有典客丞隋有典客丞二人皇朝因之掌客十五人正九品上隋置皇朝因之有典客賔㒒等員典客令掌二王後介公􅈶公之版籍及東夷西戎南蠻北狄歸化在蕃者之名數丞為之二凡朝貢宴享送迎預焉皆辨其等位而供其職事凡酋渠首領朝見者則館而以禮供之三品已上凖第三等四品五品凖第四等六品已下凖第五等其無官品者大酋渠首領凖第四等小酋渠首領凖第五等所乘私畜抽換客舍放牧仍量給芻粟若諸蕃獻藥物滋味之屬入境州縣與蕃使苞匭封印付客及使具其名數牒寺寺司勘訖牒少府監及市各一官領識物人定價量事奏送仍牒中書具客所將獻物應須引見宴勞别聽進止若疾病所司遣醫人給以湯藥若身亡使主副及第三等已上官奏聞其喪事所須所司量給欲還蕃者則給輿遞至境首領第四等已下不奏聞但差車牛送至墓所諸蕃使主副五品已上給帳氈席六品已下給幕及食料丞一人判厨事季終則㑹之若還蕃其賜各有差給于朝堂典客佐其受領教其拜謝之節焉司儀署令一人八品下周禮有司儀上士中士漢大鴻臚有治禮郎後魏太和十五年置司儀官北齊鴻臚寺統司儀令丞後周司儀上士一人中士二人隋鴻臚卿統司儀署令丞皇朝因之領司儀齊郎掌設幕士等丞一人正九品下北齊有司儀丞一人隋有二人皇朝減一人司儀令掌凶禮之儀式及供喪葬之具丞為之二若皇帝皇太后皇后皇太子為五服之親舉哀本服周年者三朝哭而止大功者其日朝臨哭而止小功已下及皇帝為內命婦二品已上者百官執事及散官一品喪皇太后皇后為內命婦三品已上喪皇太子為三師三少及宫臣三品已上並一舉哀而止皇帝臨臣之喪一品服錫縗三品已上緦縗四品已上疑縗皇太子臨弔三師三少則錫縗宫臣四品已上緦縗五品已下疑縗凡京官職事三品已上散官二品已上遭祖父母父母喪京官四品及都督刺史并內外職事若散官以理去官五品已上在京薨卒及五品之官死王事者將葬皆祭以少牢司儀率齊郎執俎豆以往三品已上又贈以束帛一品加乘馬既引又遣使贈于郭門之外皆以束帛一品加璧凡百官以理去職而薨卒者聽斂以本官之服無官者介幘單衣婦人有官品者亦以其服斂應佩者皆用蠟代玉凡設鬲及銘旌轜車之屬有差一品懸鬲六五品以上四六品已下二凡銘旌三品已上長九尺五品已上八尺六品已下七尺皆書云某官封姓名之柩其轜車三品已上油幰朱絲絡網施襈兩廂畫龍幰竿諸末垂六旒蘇七品已上油幰施襈兩廂畫雲氣四旒蘇八品已下無旒蘇男子幰襈旒蘇皆用素婦人皆用蘇庶人鱉甲車無幰襈畫飾凡引披鐸翣挽歌方相魌頭纛帳之屬亦如之三品已上四引四披六鐸六翣挽歌六行三十六人有挽歌者鐸休歌人數已下準此五品已上二引二披四鐸四翣挽歌四行十有六人九品已上二鐸二翣其執引披者皆布幘布深衣挽歌者白練幘白褠衣皆執鐸帗其方相四目五品已上用之魌頭兩目七品以上用之並𤣥衣朱裳執戈楯載于車其纛五品以上竿長九尺六品已下五尺其下帳五品已上用素繒六品已下用練婦人用綵凡五品已上薨卒及葬合弔祭者應須布深衣幘素三梁六柱輿皆官借之其內外命婦應得鹵簿者亦如之凡葬禁以石為棺槨者其棺槨禁雕鏤綵畫施户牖欄檻者棺內禁金寶珠玉而斂者凡職事官五品已上葬者皆給營墓夫一品百人每品以二十人為差五品二十人皆役功十日凡以理去官及散官三品已上與見任職事同其五品以上减見任職事之半致仕者同見任其百官薨卒喪事及葬應以官供者皆所司及本屬上于尚書省尚書省乃下寺寺下司儀司儀凖品而料上于寺凡五品已上薨卒及三品已上有周已上親喪者皆示其禮制焉唐六典卷十八
