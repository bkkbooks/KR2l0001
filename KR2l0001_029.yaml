body:
  text: 唐六典卷二十九唐張九齡等撰諸王府公主邑司親王府傅一人諮議參軍事一人友一人文學二人東閣祭酒一人西閣祭酒一人長史一人司長一人掾一人屬一人主簿一人史二人記室參軍事二人史二人録事參軍事一人府一人史二人功曹參軍事一人府一人史二人倉曹參軍事一人府一人史二人户曹參軍事一人府一人史二人兵曹參軍事一人府一人史二人騎曹參軍事一人府一人史二人法曹參軍事一人府一人史二人士曹參軍事一人府一人史二人參軍事二人行參軍事四人典籖二人録事一人親事府典軍二人副典軍二人府一人史二人執仗親事十六人執乗親事十六人親事三百三十三人校尉旅帥隊正隊副準人部領帳内府典軍二人副典軍二人府一人史二人帳内六百六十七人校尉旅帥隊正隊副準人部領親王國國令一人大農二人尉二人丞一人録事一人府五人史十人典衛八人舎人四人學官長食官長丞各一人廐牧長丞典府長丞各二人公主邑司令一人丞一人録事一人史八人主簿二人謁者二人舎人二人家史二人親王府傅一人從三品漢髙祖初置諸侯王有太傅輔導王後漢書傅秩二千石魏晋因之宋齊梁陳皆為師後魏始蕃王二蕃王三蕃王各有師傅北齊唯置師隋皇叔昆弟皇子為親王者置師皇朝因之開元初改為傅諮議參軍事一人正五品上晋氏公府置諮議參軍事盖取諮詢謀議軍事也宋齊因之梁陳諸王公府及位從公開府者及皇弟皇子皇庶子府各有諮議參軍貟隋三公府及諸王府各有諮議參軍正五品上皇朝因之友一人從五品下漢東平憲王為驃騎將軍辟杜撫以為西曹掾尋以為師友魏晋諸王置友一人宋齊因之品第六進賢一梁冠絳朝服梁皇弟皇子府友各一人班第八正六品陳因之後魏諸王友從四品下北齊皇子置友一人第五品上隋為從五品下皇朝因之文學二人從六品上漢氏公府州郡並有文學魏氏諸王始有文學員晉宋齊梁陳皆因之班第五從七品後魏太和末六品上北齊因之隋親王府有文學二人從六品上皇朝因之東閣祭酒西閣祭酒各一人從七品上晉初位從公以上並置東閣西閣祭酒宋齊梁陳後魏北齊皆相因親王府及嗣王上柱國府各有東西閣祭酒從七品上皇朝因之王傅掌傅相訓導而匡其過失諮議掌訐謀左右參議庶事友掌陪侍逰居䂓諷道義文學掌讐校典籍侍從文章祭酒掌接對賢良導引賔客長史一人從四品上漢相國丞相有兩長史秩千石後漢三公府各有長史員魏太祖吳長沙相王府因之宋齊諸王領藩鎮者有長史品第六秩千石銅印墨綬進賢兩梁冠絳朝服梁陳公府並有長史後魏北齊亦同隋親王嗣王郡王各有長史皇朝因之嗣王郡王則不置司馬一人從四品下司馬古主兵之官也宋齊諸王領鎮者各有司馬梁陳後魏北齊隋並與長史同置皇朝因之掾一人正六品上漢氏三公大將軍御史大夫並有掾屬員西漢辟召皆上言之故東西曹掾比四百石餘曹比三百石其屬並四百石後漢皆自辟除不復上言故通降為百石品秩雖下優禮甚𢎞三公乃天子之股肱掾屬則三公之喉舌故三府掾乃言行之本禍福之主及其遷除或周月而長州郡或數年而至公卿魏晋相因置多者或至數十人江左以來諸公置掾二人其加崇者置四人掾屬常敦明教義肅清風俗非禮不言非法不行以訓羣吏宋齊梁陳後魏北齊公府皆有掾屬隋氏三師三公不開府國王嗣王郡王府有掾屬一人皇朝因之屬一人正六品上漢魏以來與掾同置過江之後則為曹名諸公置户曹屬一人其加崇者置倉曹屬一人梁陳諸公皇子皇弟府並有屬後魏北齊三師三公府各有屬隋親王府有屬一人皇朝因之主簿一人從六品上漢三公府有黄閤主簿省録衆事魏晋已下皆有梁陳諸公皇弟皇子府各有主簿後魏皇子主簿從六品北齊諸王皆有主簿隋親王府二人皇朝置一人史二人皇朝因隋置餘史並同記室參軍事二人從六品上漢三公及大將軍皆有記室令史主上章表奏執書記魏太祖輔漢以陳琳阮瑀管記室軍國書檄多二人所作晋氏諸公及位從公以上並有記室員宋諸公府有記室參軍事梁陳公府及王府皆有記室參軍北齊因之隋親王府及嗣王府有記室參軍皇朝因之録事參軍事一人從六品上晋元帝初為鎮東大將軍有録事參軍一人梁陳王府有中録事參軍及録事各一人後魏亦同北齊因之隋親王嗣王府有録事參軍一人皇朝因之録事一人從九品下功曹叅軍事一人正七品上漢魏晋宋齊梁陳後周州郡縣並有功曹員後魏太和末諸王府並有功曹員隋氏親王嗣王府有功曹參軍煬帝改為功曹書佐皇朝復為功曹參軍倉曹參軍事一人正七品上後魏諸王府有倉曹參軍隋親王嗣王府有倉曹參軍煬帝改為倉曹書佐皇朝復為倉曹參軍户曹參軍事二人正七品上後魏隋氏並與倉曹同置兵曹參軍事一人正七品上梁陳王府有中兵曹參軍中直兵曹參軍各一人後魏有皇子府中兵參軍始蕃王二蕃王有兵曹參軍北齊皇子府有中兵外兵參軍隋親王嗣王府有兵曹參軍煬帝改為兵曹書佐皇朝復為兵曹參軍騎曹參軍事一人正七品上隋親王嗣王府有騎曹參軍一人煬帝改為騎曹書佐皇朝復故法曹參軍事一人正七品上梁陳後魏諸王府隋親王嗣王府並有法曹行參軍煬帝改曰法曹行書佐皇朝復舊士曹參軍事一人正七品上後魏諸王府隋親王府皆有士曹行參軍煬帝改為士曹行書佐皇朝復舊參軍事二人正八品下漢末三公府有參軍事如孫堅參騎軍事荀彧參丞相軍事是也魏武帝征荆州請邯鄲淳參軍事自晉宋已來代有其任梁選部皇弟皇子府有正參事後魏有皇子參軍北齊因之隋親王嗣王府有參軍六人長兼行參軍八人煬帝改為行書佐皇朝復為參軍四人今减二人六曹已下官吏三府並同其雜使又有執刀一十五人典獄十八人問事十二人白直二十四人行參軍四人從八品上晋氏加置行參軍以自辟召故曰行也宋齊梁陳皆有之梁選部嗣王府行參軍降正王府一階隋親王嗣王府並有長兼行參軍煬帝改為長兼行書佐皇朝改為行參軍典籖二人從八品下齊職儀云諸公領兵局有典籖二人隋親王府嗣王府上柱國柱國府上大將軍將軍府各有二人皇朝因之長史司馬掌統理府寮紀綱職務掾掌通判功曹户曹倉曹事屬掌通判兵曹騎曹主簿掌覆省王敎記室掌表啟書疏録事參軍掌付事勾稽省署抄目録事掌受事發辰兼勾稽失功曹掌文官簿書考課陳設儀式等事倉曹掌廩禄請給財物市易等事尸曹掌封户田宅僮㒒弋獵等事兵曹掌武官簿書考課儀衛假使等事騎曹掌廐牧騎乗文物噐械等事法曹掌推按欺隱決罰刑獄等事士曹掌公廨舎宇繕造工徒等事參軍事掌出使及雜檢校事典籖掌宣傳教令事親王親事府典軍二人正五品上齊職儀諸公領兵職局有庫典軍七職二人倉典軍七職二人又有船官典軍茭箬典軍樵炭典軍等員皇朝因其名而置多以文官及流外為之副典軍二人從五品上執仗親事十六人正八品上執乗親事十六人正八品上已上並皇朝置親王帳内府典軍二人正五品上齊職儀諸公領兵職局有車廐典軍五品二人馬典軍五品二人又有庫倉典軍炭屯典軍樵屯典軍皇朝因其名而置副典軍二人從五品上府一人史一人帳内六百六十七人並皇朝置親事府典軍副典軍掌領校尉已下守衛陪從事執仗掌執弓仗執乗掌供騎乗親事掌儀衛事校尉旅帥隊正隊副掌領親事陪從帳内府典軍副典軍掌領校尉已下儀衛陪從事帳内掌儀衛校尉旅帥隊正隊副掌領帳内陪從事親王國國令一人從七品下隋置皇朝因之大農二人從八品下漢諸候王國置大司農晋諸王國置大農與郎中令中尉為三卿宋齊梁陳北齊三國並有大農隋置一人皇朝因之尉二人正九品下漢諸王國有王尉魏晋宋齊梁陳北齊並有中尉隋因為尉皇朝因之丞一人從九品下録事一人府五人史十人已上並皇朝置典衛八人漢諸王國有衛士長生衛士侍衛晋諸王國有典衛令宋齊梁陳北齊並有隋王國有典衛八人皇朝因之舎人四人陳北齊王國皆有舎人隋王國有舎人四人皇朝因之學官長一人晋宋齊梁陳王國並有學官令隋有學官長皇朝因之食官長一人丞一人宋齊梁陳北齊王國並有食官長隋親王國有食官長丞各一人皇朝因之廐牧長二人丞一人漢諸侯王國有太㒒武帝改曰㒒晋宋王國置牧長南齊北齊為廐牧長隋置長丞各一人皇朝因之典府長二人丞二人晋氏王國有典府丞梁陳北齊亦因之隋置長丞各一人皇朝因之國令大農掌通判國司事國尉掌分判國司事國丞掌付事勾稽省署抄目監印給紙筆事典衛掌守衛居宅事舎人掌供引納驅䇿事學官掌教授内人事食官掌營造膳食事廐牧掌知畜牧牛馬事典府掌知府内雜事公主邑司令一人從七品下漢書百官表宗正屬官有公主家令公主所食曰邑晋大康中為長山長公主置家令一人宋齊已後時有其職隋氏復置皇朝因之神龍初公主府並同王府置宫屬景雲初罷之丞一人從八品下晋起居注云太康十一年詔曰南郡公主家令丞缺何以不補隋有其職皇朝因之録事一人從九品下皇朝因隋置公主邑司官各掌主家財貨出入田園徴封之事其制度皆隷宗正焉唐六典卷二十九
