body:
  text: 唐六典卷十二唐張九齡等撰內官宫官內侍省內官惠妃一人麗妃一人華妃一人淑儀一人德儀一人賢儀一人順儀一人婉儀一人芳儀一人美人四人才人七人宫官尚宫二人司記二人典記二人掌記二人女史六人司言二人典言二人掌言二人女史四人司簿二人典簿二人掌簿二人女史六人司闈六人典闈六人掌闈六人女史四人尚儀二人司籍二人典籍二人掌籍二人女史十人司樂四人典樂四人掌樂四人女史二人司賔二人典賔二人掌賔二人女史二人司贊二人典贊二人掌贊二人女史二人彤史二人尚服二人司寶二人典寶二人掌寶二人女史四人司衣二人典衣二人掌衣二人女史四人司飾二人典飾二人掌飾二人女史二人司仗二人典仗二人掌仗二人女史二人尚食二人司膳四人典膳四人掌膳四人女史四人司醖二人典醖二人掌醖二人女史二人司藥二人典藥二人掌藥二人女史四人司饎二人典饎二人掌饎二人女史四人尚寢二人司設二人典設二人掌設二人女史四人司輿二人典輿二人掌輿二人女史二人司苑二人典苑二人掌苑二人女史二人司燈二人典燈二人掌燈二人女史二人尚功二人司製二人典製二人掌製二人女史四人司珍二人典珍二人掌珍二人女史六人司綵二人典綵二人掌綵二人女史六人司計二人典計二人掌計二人女史四人宫正一人司正二人典正四人女史四人內侍省內侍四人內常侍六人內給事八人主事二人令史八人書令史十六人內謁者監六人內謁者十二人內典引十八人內寺伯二人寺人六人亭長六人掌固八人掖庭局令二人丞三人書令史四人書史八人計史二人宫教博士二人監作四人典事十人掌固四人宫闈局令二人丞二人書令史三人書史六人內閽人二十人內掌扇十六人內給使無常員掌固四人奚官局令二人丞二人書令史三人書史六人典事四人掌固四人內僕局令二人丞二人書令史二人書史四人駕士一百四十人典事八人掌固八人內府局令二人丞二人書令史二人書史四人典事六人掌固四人內官春秋左氏傳曰不腆先君之嫡以備內官又曰內官不及同姓杜預曰謂嬪御也周官有夫人嬪世婦女御之位聽天下之內治漢晉以來雖有位號多不盡備隋氏法周官而悉置焉則列夫人嬪媫妤美人才人寶林御女采女等充百二十位宫中復有六尚以備衆職謂之宫官皇朝因之今上天德溥施猶防女寵故省內官將以垂範而六尚仍舊焉妃三人正一品周官三夫人之位也古者帝嚳立四妃蓋象后妃四星其一明者后也至舜不立正妃蓋但三妃而已謂之三夫人自夏殷已降復有立者視三公位雖云古制數頗繁焉其餘沿革事不經見隋氏依周官立三夫人皇朝上法古制而立四妃其位貴妃也淑妃也德妃也賢妃也今上以為后妃四星其一后也既有后位復立四妃則失其所法象之意焉因省嬪婦女御之數改定三妃六儀美人才人四等共二十人以備內官其位惠妃也麗妃也華妃也婦德婦容婦言婦功可以坐而論禮者則進無則闕焉夫人佐后坐而論婦禮者也其於內則無所不統故不以一務名焉六儀六人正二品周官九嬪之位也夏后氏三夫人增以三三而九列九嬪之位漢初無聞至武帝始制媫妤娙娥容華充衣數不至九其位在嬪後魏孝文改定內官隋氏因周官盡立其名秩皇朝初因之今上改制六儀之位以備其職焉六儀掌教九御四德率其屬以贊導后之禮儀一淑儀二德儀三賢儀四順儀五婉儀六芳儀美人四人正三品周官二十七世婦之位也殷人因九嬪增以三九二十七列二十七世婦之位其制增損纍代不恆前漢十四等後漢貴人才人雖列位號不依世婦之職隋氏因周官制媫妤等二十七人皇朝初因之今上改置美人之位以備其職焉美人掌率女官修祭祀賔客之事才人七人正四品周官八十一女御之位也周人因二十七世婦增以三二十七列八十一女御之位舊制沿革略同於上注隋氏依周官制寶林御女采女等皇朝初因之今上改置才人之位以備其職焉才人掌序燕寢理絲枲以獻歲功焉宫官周禮宗伯世婦每宫卿二人下大夫四人中士八人女府二人女史二人鄭𤣥云世婦后宫官也王后六宫女府女史女奴之有才智者魏略魏明帝游宴在內選女子知書可付信者為女尚書省奏事晋令有崇德殿太監尚衣尚食太監並銀章艾綬二千石崇華殿太監元華食監都監上監銅印墨綬千石女史賢人蔡人中使大使碧綸綬宋明帝留心後房擬外百官備置其職兩齊梁陳不見後魏後周亦擬外官置內職隋文帝置六尚六司六典以掌宫官之職六尚視從九品六司視勳品六典視流外二品煬帝改置六尚局職掌略同皆加其品秩一尚言局管司言掌宣傳啓奏司簿主名録計度司正主格式推罰司闈主門閣管鑰二尚儀局管司籍主經史教學司樂掌音律司賔主賔客司贊主贊相導引三尚服局管司璽主琮璽符節司衣掌衣服司飾主湯沐巾櫛玩弄等物司仗主仗衛戎器四尚食局管司膳主膳羞司醖主酒醴醯醢司藥主醫巫藥劑司饎主廩餼柴炭五尚寢局管司設主牀席帷帳鋪設灑掃司輿主輿輦扇傘執持羽儀司苑主園囿種植蔬菜瓜果司燈主燈火六尚工局管司製主營造裁縫司寶主金玉錢貨司綵掌繪帛司織掌織染六尚十二人從五品司二十八人從六品典二十八人從七品掌二十八人從九品女史流外量事而置多者十人皇朝內職多依隋制尚宮局尚宮二人正五品司記二人正六品典記二人正七品掌記二人正八品司言二人正六品典言二人正七品掌言二人正八品司簿二人正六品典簿二人正七品掌簿二人正八品司闈二人正六品典闈二人正七品掌闈二人正八品尚宫掌導引中宫總司記