人皇朝因之寺人六人隋置皇朝因之流外掌中宫駕出入則執御刀內謁者監掌內宣傳凡諸親命婦朝㑹所司籍其人數送內侍省命婦下車則引入朝堂然後奏聞內謁者掌諸親命婦朝集班位內典引掌命婦朝參出入監引之事內寺伯掌糾察諸不法之事嵗大儺則監其出入掖庭局令二人從七品下詩之巷伯也至秦為永巷漢武帝更名掖庭有令丞後漢掖庭令一人六百石左右丞從丞各一人掌後宫貴人衆采女事魏晋並有掖庭令黃門令而非宦者後魏有掖庭監北齊長秋寺統掖庭署令丞隋內侍省統掖庭令丞各二人皇朝因之丞三人從八品下漢掖庭有左右丞北齊有掖庭丞隋有掖庭丞三人皇朝因之計史二人掌料功程事宮教博士二人從九品下北齊掖庭中山晋陽署各有宫教博士二人隋掖庭有宫教博士十三人皇朝置二人監作四人從九品下皇朝置監宫中雜作之事典事十人皇朝置流外掖庭局令掌宫禁女工之事凡宮人名籍司其除附功桑養蠶㑹其課業丞掌判局事計史掌料功程博士掌教習宫人書算衆藝監作掌監當雜作典事典諸工役宮闈局令二人從七品下周禮有閽人王宫每門四人掌王宫中門之禁凡內外命婦出入則為之辟隋置皇朝因之丞二人從八品下隋置皇朝因之內閽人二十人周禮有閽人之職皇朝因而置之內掌扇十六人皇朝置之內給使無常員齊職有散給使五十人皇朝因之宫闈令掌侍奉宫闈出入管鑰凡大享太廟帥其屬詣于室出皇后神主置於輿而登座焉既事納之凡宦人無官品者稱內給使親王府名散使若有官及經解免應叙選者得令長上其小給使學生五十人其博士取八品已上散官有藝業者充皆總其名籍以給其糧廩丞掌判局事內閽人掌承傳諸門管籥內掌扇掌中宫繖扇內給使掌諸門進物出物之歷奚官局令二人正八品下周禮酒人漿人籩人醢人醯人鹽人幂人女祝內司服縫人守祧並奄官所職也皆有女奴奚𨽻焉鄭𤣥云古者男女沒入縣官皆曰奴少有才知以為奚今之侍史官婢或曰奚女官也漢暴室丞主中婦人疾病者就此室其皇后貴人有罪亦如之梁陳大長秋寺統奚官署北齊大長秋寺統奚官署令丞隋內侍省統奚官局令丞皇朝因之丞二人正九品下隋置皇朝因之典事四人皇朝因之奚官局令掌奚𨽻二役宫官品命丞為之二凡宫人有疾病則供其醫藥死亡則給其衣服各視其品命仍於隨近寺觀為之修福雖無品亦如之凡內命婦五品已上亡無親戚於墓側三年內取同姓中男一人以時主祭無同姓則所司春秋以一少牢祭焉內僕局令二人正八品下後漢大長秋屬官有中宮僕一人千石主馭北齊長秋寺統中宫僕署令丞隋內侍省統內僕局令丞煬帝大業三年廢內僕局皇朝復置丞二人正九品下隋置三人皇朝置二人駕士一百四十人皇朝置之典事八人皇朝置之內僕令掌中宫車乘出入導引丞為之二凡中宫有出入則令居左丞居右而夾引之凡皇后之車有六一曰重翟受册從祀享廟則供之青質金飾諸末朱輪金根朱牙其箱飾以重翟羽青油通幰青油燻朱裏朱絲絡網繡紫絡帶繡紫帷八鸞在衡鏤錫鞶纓十有二就金鑁方釳插翟尾朱總駕蒼龍皆隋所制皇朝因之二曰厭翟公桑則供之赤質金飾諸末輪畫朱牙其箱飾以次翟羽鞶油通幰紫油燻朱裏朱絲絡網紅錦絡帶紅錦帷餘如重翟駕赤騮內命婦一品以下以次乘之三曰翟車歸寧則供之黃質金飾諸末輪畫朱牙其車幰以翟羽黃油通幰黃油燻黃裏白紅錦絡帶白闕纓之帷朱絲絡網餘如重翟駕黃騮闕鞶色皆從車質也四曰安車臨幸則供之赤質金飾紫油通幰紫油燻未裏錦帷錦絡帶朱絲絡網駕四馬五曰四望車拜陵臨弔則供之朱質青油通幰青油燻朱裏織成帷錦絡帶朱絲絡網駕赤騮六曰金根車常行則供之朱質青油通幰紫油燻朱裏織成帷錦絡帶朱絲絡網周禮王后五輅一重翟二厭翟三安車四翟車五輦車司馬彪續漢志皇后法駕御重翟金根車交絡帷裳非法駕乘紫罽軺車雲虡畫輈黃金塗駕三馬貴人油畫軿車魏因之晋輿服志皇后法駕乘重翟羽蓋金根車駕青駱青帷裳雲虞畫輈常乘畫輪車先蠶乘油蓋畫雲母車駕六驪馬油畫兩轅安車為副金簿石山駢車紫絳罽駢車為副晋令三貴人曲蓋九嬪直蓋皆信幡宋齊梁陳略同後魏皇后從祭御金根車親桑御雲母車駕四馬歸寧御紫罽車游行御安車弔問御紺罽駢車駕三馬內命婦一品乘油色朱絡網車朱飾用金塗及純銀二品三品乘卷通幰車四品乘備幰車北齊因之後周皇后車十二等重翟以從祀享厭翟以祭隂社翟輅以採桑翠輅以從見賔客雕輅以歸寧篆輅以臨道法門皆錫面朱總金鉤蒼輅青輅朱輅黃輅白𤣥等輅五時出入則供之制同皇帝三妃之輅九篆輅朱輅黃𤣥白等輅皆勒面繢總夏篆夏縵墨車棧車輅車皆雕面鷖總三妃自朱輅而下六嬪自黃輅而下上媛自𤣥輅而下下媛自夏篆而下也典事掌檢校車乘駕士掌調習馬兼知內御車輿雜畜內府局令二人正八品下漢少府屬官有內者令丞後漢長秋屬官有中宫私府令主中藏幣帛諸總裁衣被補浣皆主之後魏有內者令北齊中侍中省有內者丞一人隋內侍省統內者局丞各二人皇朝改置內府令丞丞二人正九品內府令掌中宫藏寶貨給納名數丞為之二凡朝㑹五品已上賜絹及雜綵金銀器於殿庭者並供之諸將有功并蕃酋辭還賜亦如之唐六典卷十二
