執㦸各五人正九品下奉車都尉各五人從五品下長史掌判諸曹親勳翊五府及武安武成等五十府之事以閲兵仗羽儀車馬凡文簿典職廩料請給卒伍軍團之名數器械糧儲之主守大事則從其長小事則專達季秋則以庶官之狀贊大將軍考課而升降焉録事參軍掌印及受諸曹五府及外府百司所由之事以發付勾檢稽失倉曹掌五府外府之文官職員凡勳階考課假使祿俸及公廨財物田園食料之事皆掌制之兵曹掌五府外府武官之職員凡番第上下簿書名數皆受而過大將軍以配焉騎曹掌外府馬及雜畜之簿帳凡府馬之外直者以近及逺分為七番月一替凡左右廂之使以奉勑出宫城外追事者皆給馬遣之胄曹掌其戎仗器械及公廨興造决罰之事凡大朝㑹行從應諸黃質甲鎧弓箭之屬則受之於衛尉事畢本而歸之若有不應歸者留貯於衛庫親府勳一府勳二府翊一府翊二府等五府中郎將各一人正四品下秦漢有五官中郎將左右中郎將並皆二千石掌領三署郎侍衛也又有虎賁中郎將漢平帝置比二千石後漢因之建安十六年魏公子丕為五官中郎將置官屬以副相國位在諸侯王上晋代不置宋齊梁陳並有左右中郎將後魏北齊亦有之各五人隋氏左右親衛左右勳衛左右翊衛各置開府一人以統之有長史司馬倉兵法等參軍員皇朝因之武德七年改開府各置中郎將一人左右郎將各一人謂之左右親勳翊衛中郎將府左右郎將各一人正五品上自漢以來並止曰中郎將至隋備身府置左右郎將以統之又置左右雄武府雄武郎將武勇郎將以統之皇朝左右親勳翊衛因其名置左右郎將之職也兵曹參軍事各一人正九品上中郎將掌領其府校尉旅帥親衛勳衛翊衛之屬以宿衛而總其府事左右郎將二焉若大朝㑹及巡幸則如鹵簿之法以領其儀仗凡五府之親勳翊衛應番上者則以其名簿上大將軍配于所職左右驍衛大將軍各一人正三品漢武帝以李廣為驍騎將軍後省之光武改屯騎為驍騎晋文帝置內臺以為宿衛之官歷宋齊梁陳後魏北齊並有驍騎將軍之職後周有左右驍騎率上士一人至隋煬帝改左右備身為左右驍騎尋以左右驍衛所領名豹騎而又别置備身皇朝置左右騎衛府龍朔二年除府字光宅元年改為左右武威衛神龍元年復為左右馳騎將軍各二人從三品隋煬帝置皇朝因之左右驍衛大將軍之職掌如左右衛其異者大朝㑹建黃麾鳯旗飛黃旗吉利旗兕旗太平旗親府之翊衛外府之豹騎番上者則分配之在正殿之前則以胡祿隊坐於東西廊下若御坐正殿則以隊仗次立于左右衛下在正門之外則以挾門隊列於東西廂凡分兵以守諸門則知左廂諸門之內事右廂諸門之外事若在皇城四面宫城之內外則與左右衛分知助鋪之職長史各一人從六品上録事參軍事各一人正八品上倉曹參軍事各二人正八品下兵曹參軍事各二人正八品下騎曹參軍事各一人正八品下胄曹參軍事各一人正八品下隋煬帝改置驍衛府有長史從五品有録事參軍倉曹兵曹騎兵鎧曹行參軍員皇朝降長史為從六品改騎兵為騎曹鎧曹為胄曹而衛除府字司階各二人正六品上中候各三人正七品下司戈各五人正八品下執㦸各五人正九品下長史掌判諸曹翊府及永固等四十九府之事以閲兵仗車馬餘如左右衛録事參軍倉曹兵曹騎曹胄曹所掌亦如之翊府中郎將各一人正四品下本隋翊衛開府皇朝武德十年改置中郎將左右郎將各一人正五品上本隋備身府左右郎將皇朝因之兵曹參軍事各一人正九品下中郎將掌領其府校尉旅帥翊衛之屬以宿衛而揔其府事餘如左右衛左右武衛大將軍各一人正三品魏武為丞相有武衛營晋宋齊梁陳又有建武奮武等將軍又有武烈武毅等將軍至隋採諸武之名置左右武衛府有大將軍一人將軍二人皇朝因舊光宅元年改為左右鷹揚衛神龍元年復故將軍各二人從三品左右武衛大將軍將軍之職掌如左右衛其異者大朝㑹率其屬被白質鍪甲鎧執白弓箭白楯白䂎建鶖麾四色麾五牛旗飛麟旗駃騠旗鸞旗犀牛旗鵔鸃旗騼䮷旗蹕稱長唱警持鈸隊應蹕為左右廂儀仗凡翊府翊衛外府熊渠番上則分配之正殿前則以諸隊次立於驍衛下在嘉德門內外以挾門隊坐於東西廊長史各一人從八品上録事參軍事各一人正八品上倉曹參軍事各二人正八品上兵曹參軍事各二人正八品上騎曹參軍事各一人正八品下胄曹參軍事各一人正八品下隋左右武衛有長史一人煬帝升為從五品又有録事參軍倉曹參軍煬帝改為司倉兵曹參軍煬帝改為司兵皇朝改司倉為倉曹司兵為兵曹騎曹為胄曹司階各二人正六品上中候各三人正七品下司戈各五人正八品下執㦸各五人正九品下長史掌判諸曹翊府及鳯亭等四十九府之二餘皆如左右衛翊府中郎將各一人正四品下左右郎將各一人正五品上左右郎將故事已詳於上兵曹參軍事各一人正九品上中郎將掌領其府校尉旅帥翊衛之屬以宿衛而總其府事餘如左右衛左右威衛大將軍各一人正三品隋初置左右領軍府煬帝改為左右屯衛皇朝因之至龍朔二年改為左右威衛别置左右屯衛亦有大將軍等官光宅元年改為左右豹韜衛神龍元年復為左右威衛將軍各二人從二品隋煬帝改領軍為屯衛府置將軍皇朝因之龍朔光宅神龍隨衛改復左右威衛大將軍將軍之職掌如左右衛其異者大朝㑹則率其屬被黑質鍪鎧執黑弓箭黑刀黑䂎建青麾黑麾黃龍負圖旗黃鹿旗騶牙旗蒼烏旗為左右廂之儀仗次立武衛之下翊府翊衛外府羽林番上者則分配之在正殿前則以諸隊立於階下在長樂永安門內則以挾門隊列於兩廊凡分兵主守則知皇城東西面之助鋪長史各一人從六品上録