body:
  text: 唐六典卷二十三唐張九齡等撰將作都水監將作監大匠一人少匠二人丞四人主簿二人錄事二人府十四人史二十八人計史三人亭長四人掌固六人左校署令二人丞四人府六人史十二人監作十人右校署令二人丞三人府五人史十人監作十人典事二十四人中校署令一人丞三人府三人史六人監事四人典事八人掌固一人甄官署令一人丞二人府五人史十人監作四人典事十八人百工監監一人副監一人丞一人錄事一人府一人史三人監作四人典事二十人就谷監監一人副監一人丞一人錄事一人府一人史三人監作四人典事二十人庫谷監監一人副監一人丞一人錄事一人府一人史三人監作四人典事二十人太隂監監一人副監一人丞一人録事一人府一人史三人監作四人典事十人伊陽監監一人副監一人丞一人錄事一人府一人史三人監作四人典事十人都水監使者二人丞二人主簿一人錄事一人府五人史十人亭長一人掌固四人舟檝署令一人丞二人府三人史四人監漕四人漕史二人典事三人掌固三人河渠署令一人丞一人府三人史六人河隄謁者六人典事三人掌固四人長上魚師十人短番魚師一百二十人眀資魚師一百二十人諸津每津令一人丞一人錄事一人府一人史二人典事三人津吏五人將作監大匠一人從三品左傳云少吴氏丑雉為五工正周官冬宮掌百工之職漢書百官表云將作少府秦官掌治宮室有兩丞左右中候景帝改曰將作大匠秩二千石屬官有右庫東園主章左右前後中校七令丞又主章長丞武帝改東園主章曰木工成帝省中候及左右前後中校五丞後漢光武中元年省常以謁者兼之至章帝建初元年又置魏因之晉將作大匠置功曹主簿五官等員掌土木之役過江後及宋齊並不常置梁天監七年置十二卿改將作大匠為大匠卿是為秋卿班第十品正第五陳因之後魏太和初將作大匠従第二品下二十二年降為從三品北齊因之後周有匠師中大夫一人掌城郭宮室之制及諸器物度量又有司木中大夫一人掌木工之政令隋將作寺置大匠一人従三品開皇二十年改為將作監以大匠為大監煬帝大業五年正四品十三年又改大監為令皇朝改置大匠少匠丞主簿等員龍朔元年改為繕工監咸亨元年復舊光宅元年改為營繕監神龍元年復舊少匠二人從四品下後周官有少匠師下大夫一人隋初將作無少匠開皇二十年改寺為監大匠為大監始置副監一人煬帝改副監為少監大業三年改少監為少匠五年又改少匠為少監正五品十三年又改為少令皇朝改置少匠二人龍朔咸亨光宅神龍隨監改復將作大匠之職掌供邦國修建土木工匠之政令緫四署三監百工之官屬以供其職事少匠貳焉凡西京之大内大眀興慶宫東都之大内上陽宫其内外廓䑓殿樓閣并仗舍等苑内宫亭中書門下左右羽林軍左右萬騎仗十二閑廐屋宇等謂之内作凡山陵及京都之太廟郊社諸壇廟京都諸城門尚書殿中秘書内侍省御史䑓九寺三監十六衛諸街使弩坊温湯東宫諸司王府官舍屋宇諸街橋道等並謂之外作凡有建造營葺分功度用皆以委焉凡修理宮廟太常先擇日以聞然後興作丞四人従六品下漢將作有丞二人秩六百石後漢置一人魏晉因之東晉宋齊有事則置無事則罷梁天監七年置大匠丞一人班第三陳因之後魏從五品中太和二十二年第七品下北齊丞四人従第七品上後周匠師上士一人隋將作丞二人従六品大業十三年加至從五品皇朝加丞至四人從六品下主簿二人從七品下晉將作置主簿員江左有事則置無事則省梁天監七年復置將作主簿一員七品班第三北齊將作寺有功曹主簿員若有營作又别立長史司馬主簿各一員隋將作主簿二人皇朝因之録事二人従九品上丞掌判監事凡内外繕造百司供給大事則聽制勑小事則俟省符以諮大匠而下於署監以供其職凡諸州匠人長上者則州率其資納之隨以酬顧凡功有長短役有輕重凡計功程者四月五月六月七月為長功二月三月八月九月為中功十月十一月十二月正月為短功凡啓塞之時火土之禁必辨其經制而舉其條目凡四時之禁每嵗十月以後盡于二月不得起治作冬至以後盡九月不得興土工春夏不伐木若臨事要行理不可廢者以著别式凡營造修理土木瓦石不出於所司者總料其數上於尚書省凡營軍器皆鐫題年月及工人姓名辨其名物而閲其虚實主簿掌印勾檢稽失凡官吏之申請粮料俸食務在候使必由之以發其事若諸司之應供四署三監之財物器用違闕隨而舉焉録事掌受事發辰左校署令二人従八品下周官有攻木之工七謂輪輿弓廬匠車梓也秦漢有左右前後中校五令丞後漢唯置左右校令丞各一人令六百石又有材官校尉魏并左校於材官署過江省將作大匠而左右校𨽻少府又改材官校尉為將軍罷左校令宋齊梁陳又有左校令丞别置材官將軍司馬北齊太府寺有左校署令丞後周有掌材上士隨將作領左校署令二人皇朝因之丞四人正九品下漢成帝省左右前後中五校丞後漢置左右校丞各一人秩三百石魏因之東晉𨽻少府宋齊梁北齊皆有丞後周有掌材中士二人隋左校丞四人皇朝因之監作十人從九品下左校令掌供營構梓匠之事致其雜材差其曲直制其器用程其功巧丞為之貳凡宫室之制自天子至於士庶各有等差天子之宫殿皆施埀拱藻井王公諸臣三品已上九架五品已上七架並㕔厦兩頭六品已下五架其門舍三品已上五架三間五品已上三間兩厦六品已下及庶人一間兩厦五品已上得制烏頭門若官修者左掖為之私家自修者制度准此凡樂縣簨虡兵仗器械及喪葬儀制諸司什物皆供焉簨虡謂鐏鍾編鍾編磬之屬器械謂仗床㦸架杻械之屬喪儀謂棺槨眀器之屬什物謂机案櫃檻勅函行槽剉唯之屬右校署令二人従八品下後漢安帝建元三年置左校令右校丞其後又置右校令魏因之晋少府屬官有左校無右校其職蓋并於左校矣宋齊梁陳皆無北齊太府寺管左校亦無右校隋置右校署令丞掌營構工作之事皇朝因之丞三人正九品下漢左校丞一人三百石魏因之宋齊梁陳並置北齊省隋右校置丞三人皇朝因之監作十人従九品下右校令掌供版築塗泥丹雘之事丞為之貳凡料物支供皆有由屬審其制度而經度之凡修補之料每嵗京北河南及諸州支送麦麩三萬圍麦麫一百車麻𢷬二萬斤其石灰亦土之屬須則市供不恒其數中校署令一人従八品下漢將作左右前後中五校皆有令丞自後不置皇朝置之丞三人正九品下漢成帝省皇朝復置監事四人従九品下中校令掌供舟車兵仗廐牧雜作器用之事凡行幸陳說供三梁竿柱閑廐繫飼則供剉碓行槽鞍架禱祀祭祀則供棘葛竹整内外營造應供給者皆主守之丞為之貳舊將作寺百工署掌營棘葛槍子土塼石作之事開元十五年改百工署為監其職掌各分入諸署槍子入左校石作入甄官棘葛土塼等入於此署凡監署役使車牛皆有年支草豆㨿其名簿閲其虚實受而蔵之以給於車坊甄官署令一人従八品下周禮摶埴之工二謂陶與甄也後漢將作大匠屬官有前後中甄官令丞晋少府領甄官署掌塼瓦之任宋齊有東西陶官瓦署督令各一人北齊太府寺統甄官署甄官又别領石窟丞後周有陶工中士一人掌為罇彛簠簋等器隋太府寺統甄官署令丞二人皇朝改屬將作丞二人正九品下後漢前後中三甄官各丞一人晉有旊官丞後周有陶工下士一人隋甄官丞二人皇朝因之監作四人従九品下甄官令掌供琢石陶土之事丞為之貳凡石作之類有石磬石人石獸石柱碑碣碾磑出有方土用有物宜凡磚瓦之作瓶缶之器大小髙下各有程凖凡喪葬則供其眀器之屬别敕葬者俱餘並私備三品以上九十事五品以上六十事九品以上四十事當壙當野祖眀地軸誕馬偶人其髙各一尺其餘音聲隊與僮僕之屬威儀服玩各視生之品秩所有以瓦木為之其長率七寸百工就谷庫谷斜谷太隂伊陽監監各一人正七品副監一人従七品下丞一人正八品上周禮山虞林衡並掌斬伐林木之事歴代皆有其官皇朝取其義而並置之庫谷監在鄠縣就谷監在盩厔縣百工監在陳倉太隂監在陸渾縣伊陽監在伊陽縣錄事各一人監作各四人従九品下太隂監伊陽監各典事十人百工等監掌採伐材木之事辨其名物而為之主守凡修造所須材幹之具皆取之有時用之有節都水監使者二人正五品上本周官虞衡之職漢太常大司農少府内史主爵中尉其屬官各有都水長丞武帝置水衡都尉掌上林苑有五丞其屬官有上林均輸御羞禁圃輯濯鐘官辯鐘令丞人衡官水司空都水農倉又甘泉上林都水七官長丞皆屬焉至成帝以都水官多置左右使者各一人則劉向䕶左都水使者是也至哀帝罷之王莾改水衡都尉曰子虞後漢省都水以属郡國而置河隄謁者五人魏因之又兼有水衡都尉主天下水軍卿舩器械晋置都水臺都水使者一人掌舟檝之事官品第四又有左右前後中五水衡晋起㞐注及元康百官名陳傎載熊俱以都水使者領水衡都尉宋孝武帝省都水䑓置水衡令齊氏復置都水䑓使者一人梁武帝天監七年改為太舟卿為東卿班第九吏員依晉又加當關四人陳因之後魏亦二官並置建都水使者正第四品中水衡都尉従五品中太和二十二年都水使者従五品而省水衡北齊都水䑓使者二人後周有司水中大夫一人隋都水臺使者二人從第五品有丞參軍河隄謁者錄事船局都津尉丞典作津長等開皇三年省都水入司農十三年復置仁夀元年改為都水監煬帝復為使者正五品統舟檝河渠二署大業五年又改使者為監加至四品又置少監為五品復改監為令従三品少監為少令從四品皇朝改為都水署𨽻將作令從七品下貞觀中復改為都水使者從五品上龍朔二年改為司津監咸亨元年復為都水使者光宅元年改為水衡都尉神龍九年復舊都水使者掌川澤津梁之政令緫舟檝河渠二署之官屬舟檝置開元二十三年省辨其逺近而歸其利害凡漁浦之禁衡虞之守皆由其屬而緫制之凡獻享賔客則供川澤之奠凡京畿之内渠堰陂池之壊决則下於所由而後修之每渠及斗門置長各一人以庶人年五十已上并勲官及停家職資有幹用者為之至溉田時乃令節其水之多少均其灌溉焉每嵗府縣差官一人以督察之嵗終録其功以為考課丞二人従七品上漢書都水水衡皆有丞後漢省晉初省都水使者有參事二人蓋丞之職也宋因之孝武帝省都水䑓置水衡令亦無丞梁天監七年置大舟卿始置丞一人班第一陳因之後魏都水有參事六人北齊有參事十人並丞之任也隋初置都水䑓有丞二人正第八品上大業三年加従七品皇朝改為都水署丞従八品下貞觀中改為使者以署為監加丞秩至従七品上主簿一人従八品下晉令水衡都尉置主簿一人又左右前後中五水衡皆有主簿梁天監七年大舟主簿七班之中第三與宗正主簿品秩同後魏北齊並不置大業中置主簿一員皇朝因之丞掌判監事凡京畿諸水禁人因灌溉而有費者及引水不利而穿鑿者其應入内諸水有餘則任諸王公公主百官家節而用之主簿掌印勾檢稽失凡運漕及漁捕之有程者會其日月而為之糺舉舟檝署令一人正八品下漢中尉属官有都舩令丞水衡都尉有楫䊮令晋水衡令各有舷曹吏齊職儀有舩宫典軍一人後周有舟工中士一人隋都水使者領掌舡局都尉二人煬帝改為舟職署令一人皇朝因之丞二人正九品下漢有都舩丞楫櫂丞隋煬帝置舟檝署丞二人皇朝因之舟檝令掌公私舟舩及運漕之事丞為之貳諸州轉運至京都者則經其徃来理其隠失使監漕監之河渠署令一人正八品下秦及兩漢都水水衡屬官有河隄謁者則河渠之任也隋煬帝取史記河渠書之義以名署置令一人皇朝因之領河隄謁者漁師者丞一人正九品下隋煬帝置河渠署丞一人皇朝因之河渠令掌供川澤魚醢之事丞為之貳凡溝渠之開塞漁捕之時禁皆量其利害而節其多少每日供尚食魚及中書門下官應給者若大祭祀則供其乾魚魚醢以充籩豆之實凡諸司應給魚及冬蔵者毎嵗支錢二十萬送都水命河渠以時價市供之諸津令一人正九品上列女傳有趙津吏女自後無聞晉令諸津渡二十四所各置監津吏一人北齊三局尉皆分司諸津橋之事後周有掌津中士一人掌津渡川瀆之制而為之橋梁隋都水領諸津上津毎尉一人丞一人中津尉丞各一人下津尉一人每津典作一人津長四人皇朝改置令丞丞一人従九品下皇朝因隋置諸津在京兆河南界者𨽻都水監在外者𨽻當州界諸津令各掌其津濟渡舟梁之事丞為之貳唐六典卷二十三
