body:
  text: 唐六典卷二十三唐張九齡等撰將作都水監將作監大匠一人少匠二人丞四人主簿二人録事二人府十四人史二十八人計史三人亭長四人掌固六人左校署令二人丞四人府六人史十二人監作十人右校署令二人丞三人府五人史十人監作十人典事二十四人中校署令一人丞三人府三人史六人監事四人典事八人掌固一人甄官署令一人丞二人府五人史十人監作四人典事十八人百工監監一人副監一人丞一人録事一人府一人史三人監作四人典事二十人就谷監監一人副監一人丞一人録事一人府一人史三人監作四人典事二十人庫谷監監一人副監一人丞一人録事一人府一人史三人監作四人典事二十人太隂監監一人副監一人丞一人録事一人府一人史三人監作四人典事十人伊陽監監一人副監一人丞一人録事一人府一人史三人監作四人典事十人都水監使者二人丞二人主簿一人録事一人府五人史十人亭長一人掌固四人舟楫署令一人丞二人府三人史四人監漕四人漕史二人典事三人掌固三人河渠署令一人丞一人府三人史六人河隄謁者六人典事三人掌固四人長上魚師十人短番魚師一百二十人眀資魚師一百二十人諸津每津令一人丞一人録事一人府一人史二人典事三人津吏五人將作監大匠一人從三品左傳云少吳氏丑雉為五工正周官冬宮掌百工之職漢書百官表云將作少府秦官掌治宮室有兩丞左右中候景帝改曰將作大匠秩二千石屬官有右庫東園主章左右前後中校七令丞又主章長丞武帝改東園主章曰木工成帝省中候及左右前後中校五丞後漢光武中元年省常以謁者兼之至章帝建初元年又置魏因之晉將作大匠置功曹主簿五官等員掌土木之役過江後及宋齊並不常置梁天監七年置十二卿改將作大匠為大匠卿是為秋卿班第十品正第五陳因之後魏太和初將作大匠從第二品下二十二年降為從三品北齊因之後周有匠師中大夫一人掌城郭宮室之制及諸器物度量又有司木中大夫一人掌木工之政令隋將作寺置大匠一人從三品開皇二十年改為將作監以大匠為大監煬帝大業五年正四品十三年又改大監為令皇朝改置大匠少匠丞主簿等員龍朔元年改為繕工監咸亨元年復舊光宅元年改為營繕監神龍元年復舊少匠二人從四品下後周官有少匠師下大夫一人隋初將作無少匠開皇二十年改寺為監大匠為大監始置副監一人煬帝改副監為少監大業三年改少監為少匠五年又改少匠為少監正五品十三年又改為少令皇朝改置少匠二人龍朔咸亨光宅神龍隨監改復將作大匠之職掌供邦國修建土木工匠之政令總四署三監百工之官屬以供其職事少匠二焉凡西京之大內大眀興慶宫東都之大內上陽宫其內外廓臺殿樓閣并仗舍等苑內宫亭中書門下左右羽林軍左右萬騎仗十二間廄屋宇等謂之內作凡山陵及京都之太廟郊社諸壇廟京都諸城門尚書殿中祕書內侍省御史臺九寺三監十六衛諸街使弩坊溫湯東宫諸司王府官舍屋宇諸街橋道等並謂之外作凡有建造營葺分功度用皆以委焉凡修理宮廟太常先擇日以聞然後興作丞四人從六品下漢將作有丞二人秩六百石後漢置一人魏晉因之東晉宋齊有事則置無事則罷梁天監七年置大匠丞一人班第三陳因之後魏從五品中太和二十二年第七品下北齊丞四人從第七品上後周匠師上士一人隋將作丞二人從六品大業十三年加至從五品皇朝加丞至四人從六品下主簿二人從七品下晉將作置主簿員江左有事則置無事則省梁天監七年復置將作主簿一員七品班第三北齊將作寺有功曹主簿員若有營作又别立長史司馬主簿各一員隋將作主簿二人皇朝因之録事二人從九品上丞掌判監事凡內外繕造百司供給大事則聽制勑小事則俟省符以咨大匠而下於署監以供其職凡諸州匠人長上者則州率其資納之隨以酬顧凡功有長短役有輕重凡計功程者四月五月六月七月為長功二月三月八月九月為中功十月十一月十二月正月為短功凡啓塞之時火土之禁必辨其經制而舉其條目凡四時之禁每嵗十月以後盡于二月不得起治作冬至以後盡九月不得興土工春夏不伐木若臨事要行理不可廢者以著别式凡營造修理土木瓦石不出於所司者總料其數上於尚書省凡營軍器皆鐫題年月及工人姓名辨其名物而閲其虛實主簿掌印勾檢稽失凡官吏之申請糧料俸食務在候使必由之以發其事若諸司之應供四署三監之財物器用違闕隨而舉焉録事掌受事發辰左校署令二人從八品下周官有攻木之工七謂輪輿弓廬匠車梓也秦漢有左右前後中校五令丞後漢唯置左右校令丞各一人令六百石又有材官校尉魏并左校於材官署過江省將作大匠而左右校𨽻少府又改材官校尉為將軍罷左校令宋齊梁陳又有左校令丞别置材官將軍司馬北齊太府寺有左校署令丞後周有掌材上士隨將作領左校署令二人皇朝因之丞四人正九品下漢成帝省左右前後中五校丞後漢置左右校丞各一人秩三百石魏因之東晉𨽻少府宋齊梁北齊皆有丞後周有掌材中士二人隋左校丞四人皇朝因之監作十人從九品下左校令掌供營構梓匠之事致其雜材差其曲直制其器用程其功巧丞為之二凡宫室之制自天子至於士庶各有等差天子之宫殿皆施埀拱藻井王公諸臣三品已上九架五品已上七架並廳厦兩頭六品已下五架其門舍三品已上五架三間五品已上三間兩厦六品已下及庶人一間兩厦五品已上得制烏頭門若官修者左掖為之私家自修者制度準此凡樂縣簨虡兵仗器械及喪葬儀制諸司什物皆供焉簨虡謂鐏鍾編鍾編磬之屬器械謂仗床戟架杻械之屬喪儀謂棺槨眀器之屬什物謂機案匱檻敕函行槽銼唯之屬右校署令二人從八品下後漢安帝建元三年置左校令右校丞其後又置右校令魏因之晉少府屬官有左校無右校其職蓋并於左校矣宋齊梁陳皆無北齊太府寺管左校亦無右校隋置右校署令丞掌營構工作之事皇朝因之丞三人正九品下漢左校丞一人三百石魏因之宋齊梁陳並置北齊省隋右校置丞三人皇朝因之監作十人從九品下右校令掌供版築塗泥丹雘之事丞為之二凡料物支供皆有由屬審其制度而經度之凡修補之料每嵗京北河南及諸州支送麥麩三萬圍麥麵一百車麻搗二萬斤其石灰亦土之屬須則市供不恆其數中校署令一人從八品下漢將作左右前後中五校皆有令丞自後不置皇朝置之丞三人正九品下漢成帝省皇朝復置監事四人從九品下中校令掌供舟車兵仗廄牧雜作器用之事凡行幸陳説供三梁竿柱間廄繫飼則供銼碓行槽鞍架禱祀祭祀則供棘葛竹整內外營造應供給者皆主守之丞為之二舊將作寺百工署掌營棘葛槍子土磚石作之事開元十五年改百工署為監其職掌各分入諸署槍子入左校石作入甄官棘葛土磚等入於此署凡監署役使車牛皆有年支草豆據其名簿閲其虛實受而藏之以給於車坊甄官署令一人從八品下周禮摶埴之工二謂陶與甄也後漢將作大匠屬官有前後中甄官令丞晉少府領甄官署掌磚瓦之任宋齊有東西陶官瓦署督令各一人北齊太府寺統甄官署甄官又别領石窟丞後周有陶工中士一人掌為樽彛簠簋等器隋太府寺統甄官署令丞二人皇朝改屬將作丞二人正九品下後漢前後中三甄官各丞一人晉有旊官丞後周有陶工下士一人隋甄官丞二人皇朝因之監作四人從九品下甄官令掌供琢石陶土之事丞為之二凡石作之類有石磬石人石獸石柱碑碣碾磑出有方土用有物宜凡磚瓦之作瓶缶之器大小髙下各有程凖凡喪葬則供其眀器之屬别敕葬者俱餘並私備三品以上九十事五品以上六十事九品以上四十事當壙當野祖眀地軸誕馬偶人其髙各一尺其餘音聲隊與僮僕之屬威儀服玩各視生之品秩所有以瓦木為之其長率七寸百工就谷庫谷斜谷太隂伊陽監監各一人正七品副監一人從七品下丞一人正八品上周禮山虞林衡並掌斬伐林木之事歷代皆有其官皇朝取其義而並置之庫谷監在鄠縣就谷監在盩厔縣百工監在陳倉太隂監在陸渾縣伊陽監在伊陽縣録事各一人監作各四人從九品下太隂監伊陽監各典事十人百工等監掌採伐材木之事辨其名物而為之主守凡修造所須材幹之具皆取之有時用之有節都水監使者二人正五品上本周官虞衡之職漢太常大司農少府內史主爵中尉其屬官各有都水長丞武帝置水衡都尉掌上林苑有五丞其屬官有上林均輸御羞禁圃輯濯鐘官辨鐘令丞人衡官水司空都水農倉又甘泉上林都水七官長丞皆屬焉至成帝以都水官多置左右使者各一人則劉向護左都水使者是也至哀帝罷之王莾改水衡都尉曰子虞後漢省都水以屬郡國而置河隄謁者五人魏因之又兼有水衡都尉主天下水軍卿船器械晉置都水臺都水使者一人掌舟楫之事官品第四又有左右前後中五水衡晉起居注及元康百官名陳傎載熊俱以都水使者領水衡都尉宋孝武帝省都水臺置水衡令齊氏復置都水臺使者一人梁武帝天監七年改為太舟卿為東卿班第九吏員依晉又加當關四人陳因之後魏亦二官並置建都水使者正第四品中水衡都尉從五品中太和二十二年都水使者從五品而省水衡北齊都水臺使者二人後周有司水中大夫一人隋都水臺使者二人從第五品有丞參軍河隄謁者録事船局都津尉丞典作津長等開皇三年省都水入司農十三年復置仁夀元年改為都水監煬帝復為使者正五品統舟楫河渠二署大業五年又改使者為監加至四品又置少監為五品復改監為令從三品少監為少令從四品皇朝改為都水署𨽻將作令從七品下貞觀中復改為都水使者從五品上龍朔二年改為司津監咸亨元年復為都水使者光宅元年改為水衡都尉神龍九年復舊都水使者掌川澤津梁之政令總舟楫河渠二署之官屬舟楫置開元二十三年省辨其逺近而歸其利害凡漁浦之禁衡虞之守皆由其屬而總制之凡獻享賔客則供川澤之奠凡京畿之內渠堰陂池之壞決則下於所由而後修之每渠及斗門置長各一人以庶人年五十已上并勳官及停家職資有幹用者為之至溉田時乃令節其水之多少均其灌溉焉每嵗府縣差官一人以督察之嵗終録其功以為考課丞二人從七品上漢書都水水衡皆有丞後漢省晉初省都水使者有參事二人蓋丞之職也宋因之孝武帝省都水臺置水衡令亦無丞梁天監七年置大舟卿始置丞一人班第一陳因之後魏都水有參事六人北齊有參事十人並丞之任也隋初置都水臺有丞二人正第八品上大業三年加從七品皇朝改為都水署丞從八品下貞觀中改為使者以署為監加丞秩至從七品上主簿一人從八品下晉令水衡都尉置主簿一人又左右前後中五水衡皆有主簿梁天監七年大舟主簿七班之中第三與宗正主簿品秩同後魏北齊並不置大業中置主簿一員皇朝因之丞掌判監事凡京畿諸水禁人因灌溉而有費者及引水不利而穿鑿者其應入內諸水有餘則任諸王公公主百官家節而用之主簿掌印勾檢稽失凡運漕及漁捕之有程者會其日月而為之糾舉舟楫署令一人正八品下漢中尉屬官有都船令丞水衡都尉有楫䊮令晉水衡令各有舷曹吏齊職儀有船宫典軍一人後周有舟工中士一人隋都水使者領掌船局都尉二人煬帝改為舟職署令一人皇朝因之丞二人正九品下漢有都船丞楫棹丞隋煬帝置舟楫署丞二人皇朝因之舟楫令掌公私舟船及運漕之事丞為之二諸州轉運至京都者則經其往來理其隱失使監漕監之河渠署令一人正八品下秦及兩漢都水水衡屬官有河隄謁者則河渠之任也隋煬帝取史記河渠書之義以名署置令一人皇朝因之領河隄謁者漁師者丞一人正九品下隋煬帝置河渠署丞一人皇朝因之河渠令掌供川澤魚醢之事丞為之二凡溝渠之開塞漁捕之時禁皆量其利害而節其多少每日供尚食魚及中書門下官應給者若大祭祀則供其乾魚魚醢以充籩豆之實凡諸司應給魚及冬藏者每嵗支錢二十萬送都水命河渠以時價市供之諸津令一人正九品上列女傳有趙津吏女自後無聞晉令諸津渡二十四所各置監津吏一人北齊三局尉皆分司諸津橋之事後周有掌津中士一人掌津渡川瀆之制而為之橋梁隋都水領諸津上津每尉一人丞一人中津尉丞各一人下津尉一人每津典作一人津長四人皇朝改置令丞丞一人從九品下皇朝因隋置諸津在京兆河南界者𨽻都水監在外者𨽻當州界諸津令各掌其津濟渡舟梁之事丞為之二唐六典卷二十三
