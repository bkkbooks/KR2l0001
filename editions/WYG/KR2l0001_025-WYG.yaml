body:
  text: 唐六典卷二十五唐張九齡等撰諸衛府左右金吾衛大將軍各一人將軍二人長史一人録事參軍事一人録事一人史二人倉曹參軍事二人府二人史四人兵曹參軍事二人府二人史五人騎曹參軍事二人府二人史四人胄曹參軍事一人府三人史三人亭長二人掌固四人司階二人中候三人司戈五人執㦸五人左右翊中郎將府中郎將各一人左郎將一人右郎將一人録事一人兵曹參軍事一人府一人史二人校尉五人旅帥十人隊正二十人副隊正二十人左右街使各一人判官二人典二人左右監門衛大將軍各一人將軍二人中郎將四人長史一人録事參軍事一人録事一人史二人兵曹參軍事一人府三人史五人冑曹參軍事一人府三人史四人亭長二人掌固二人監門校尉二百二十人直長六百八十人長人長上二十人直長長上二十人左右千牛衛大將軍各一人將軍一人中郎將一人長史二人録事參軍事一人録事一人史二人兵曹參軍事一人府一人史二人胄曹參軍事一人府一人史一人亭長二人掌固四人千牛備身十二人備身左右十二人備身一百人主杖一百五十人左右羽林軍大將軍各一人將軍二人長史一人録事參軍事一人録事一人史二人倉曹參軍事一人府二人史四人兵曹參軍事一人府二人史四人胄曹參軍事一人府二人史四人亭長二人掌固四人司階二人中候三人司戈五人執㦸五人左右翊中郎將府中郎將各一人左郎將一人右郎將一人録事一人兵曹參軍事一人府一人史二人校尉五人旅帥十人隊正二十人副隊正二十人諸衛折衝都尉府毎府折衝都尉一人左果毅都尉一人右果毅都尉一人别將一人長史一人録事一人史二人兵曹參軍事一人府二人史三人校尉五人旅帥十人隊正二十人副隊正二十人左右金吾衛大將軍各一人正三品漢書百官表中尉秦官掌徼廵京師武帝太初元年更名執金吾秩中二千石有兩丞候司馬千人属官有中壘寺互武庫都船四令丞又武道左右候及京輔都尉皆属焉又後漢掌宫外及京師盜賊水火考按疑事衛尉廵行宫中執金吾徼廵宫外相為表裏所以戒不虞也漢末魏武執政復為中尉晋宋齊梁陳並不置後魏雖有中尉之職改御史中丞名之至後周置武環率武候率各下大夫二人至隋置左右武候府各大将軍一人将軍三人掌車駕出入先驅後殿畫夜廵察執捕姦非烽候道路水草所宜廵狩師田掌其營禁大業三年改為左右武候衛四年各増置察非掾二人專糺彈之事皇朝因之龍朔二年改為左右金吾衛將軍各二人從三品皇朝因隋置三人貞觀中減置二人左右金吾衛大將軍將軍之職掌宫中及京城晝夜廵警之法以執禦非違凡翊府及同軌等五十府皆屬焉凡車駕出入則率其屬以清逰隊建白澤旗朱雀旗以先驅又以𤣥武隊建𤣥武旗以後殿餘依鹵簿之法以從若廵狩師田則執其左右營衛之禁凡衛翊府同軌寳圖等五十府彍騎衛士應番上者各配所職焉又置引駕三衛六十人並於左右衛取明閑隊仗法用兼能糾彈事者充分為五番上下仍於諸衛翊衛隊正内取五人為主帥番别配一人檢校又置别駕佽飛六十六人於當衛簡取越騎射者充分為六番上下番别置主帥一人長史各一人從六品上録事參軍事各一人正八品上倉曹參軍事各二人正八品下兵曹參軍事各二人正八品下騎曹參軍事各一人正八品下胄曹參軍事各一人正八品下隋左右武候府有長史録事倉兵騎鎧等曹皇朝因之諸曹已具上説司階各二人正六品上中候各三人正七品下司戈各五人正八品下執㦸各五人正九品下長史掌判諸曹翊府及同軌寳圖等五十府之事閲其儀仗兵馬凡文簿典職廩料請給番第上下皆審其事而總制之録事參軍掌所受翊府外府及諸衛百司之事以發付勾檢倉曹掌翊府外府文官職員兵曹掌翊府外府武官職員騎曹掌外府馬與雜畜簿帳及牧養之事凡諸衛馬承直配於金吾巡檢逰奕者毎月四十有五匹皆季請其料随以給之胄曹掌諸曹翊府及外府軍戍器械及其公廨興造决罰之事凡大朝㑹行從給青龍旗大纛䂍矟之類於衛尉事畢本而歸之餘同左右衛翊府中郎將各一人正四品下左右郎將各一人正五品上中郎將掌領府屬以督京城内左右六街晝夜廵警之事左右郎將貳焉餘如左右衛左右監門衛大將軍各一人正三品將軍各三人從三品中郎將各四人正四品下左右監門衛大將軍將軍之職掌諸門禁衛門籍之法凡京司應以籍入宫殿門者皆本司具其官爵姓名以移牒其官若流外官丞脚色具其年紀顔狀門司送于監門勘同然後聼入凡財物器用應入宮者所由以籍傍取左監門將軍判門司檢以入之應出宫者所由亦以籍傍取右監門將軍判門司檢以出之其籍月一換若大駕行幸則依鹵簿之法率其屬於牙門之下以為監守中郎將掌諸監門及廵警之法凡宫殿門及城門皆左入右出其監門官司檢校者聼從便門出入長史各一人從六品上録事參軍事各一人正八品上兵曹參軍事各一人正八品下胄曹參軍事各一人正八品下隋左右開府有長史録事兵曹等員皇朝因之胄曹已具上注長史掌判諸曹及諸禁門之事以省其出入廵檢而司其籍傍餘如左右衛録事參軍掌印發勾檢稽失諸司籍傍押於監門者印署而遣之兵曹掌本衛文武官之職簿凡授上觧免勲階考課假使禄賜之事皆判而申牒之胄曹掌軍戎器械及承直馬公廨興造決罰餘同左右衛左右千牛衛大將軍各一人正三品謝綽宋拾遺録有千牛刀即人主防身刀也後魏有千牛衛備身本掌乗輿御刀盖取莊子庖丁為文惠君觧牛十九年所割者數千牛而刀刃若新發於硎故言此刀可以備身因以名官後魏書奚康生有勇力以其子難為千牛備身又楊保𢎞農人為千牛備身北齊領左右府有左右領将軍亦統千牛備身第六品下左右領左右府有大将軍一人将軍二人掌侍衛左右供御兵仗使千牛備身十二人掌執千牛刀備身左右十二人掌供御刀箭備身十六人掌宿衛侍従煬帝改為左右備身郎将一人直齋二人統之有千牛左右司射左右各一十六人並正六品有長史録事參軍等員皇朝改為左右千牛府龍朔二年改為左右奉寵衛神龍元年復改為千牛衛將軍各一人從三品北齊領左右府有領左右将軍一人隋左右領左右府有将軍二人皇朝減一人中郎將各二人正四品下北齊有左右備身正副都督並四品上隋煬帝置備身郎将一人皇朝置中郎将各二人也左右千牛衛大將軍將軍之職掌宫殿侍衛及供御之儀仗而總其曹務凡千牛備身備身左右執弓箭以宿衛主仗守戎服器物凡受朝之日則領備身左右昇殿而侍列於御座之左右若親射于射宫則大將軍將軍率其屬以從凡千牛備身左右考課賜㑹及禄秩之升降同京職事官之制中郎將掌供奉侍衛以貳將軍及諸曹之務凡千牛備身備身左右以御刀仗昇殿供奉者皆大將軍将軍率而領之而中郎將佐其職凡侍奉禁横過座前者禁對語及傾身與階下人語者禁揺頭舉手以相招召者若有口敕通事舍人承受傳聲於階下不聞者則中郎將軍告之長史各一人從六品上錄事參軍事各一人正八品上兵曹參軍事各一人正八品下胄曹參軍事各一人正八品下隋左右領左右府有長史以下等員煬帝以兵曹為司兵胄曹為司鎧皇朝改之千牛備身各十二人備身左右各十二人備身一百人主仗一百五十人唐改千牛左右曰千牛備身初置備身主仗長史掌判諸曹官吏之衆務事録事參軍掌印發勾檢稽失餘如左右衛兵曹掌文武官及千牛備身備身左右之簿書及其勲階考課假使禄俸事胄曹掌甲仗之事凡御仗之物二百一十有九羽儀之物三百自千牛以下各分而典掌之其當上日執御刀御弓矢之外仍量備弓箭以入宿毎月主仗當上則配其所職若在行從則兼騎曹之任餘同左右衛左右羽林軍衛大將軍各一人正三品漢置南北軍掌衛京師南軍若今諸衛也北軍若今左右羽林也吕后崩周勃以北軍兵誅諸吕至武帝置羽林掌送従以次期門名曰建章營騎属光禄勲置令丞以領之後更名羽林騎兼象天有羽林星主車騎也又云為國羽翼如林之盛以隴西漢陽安定北地河西上郡良家子便弓馬者為之取将軍死事之子孫羽林官教以五兵􅃅為羽林孤児宣帝令中郎将騎都尉監羽林秩比二千石光武以征伐之任勞苦者及五郡良家子以充之父死子代之又簡五營髙手别為左右監秩比六百石魏羽林監品第五晋光禄勲属官有羽林郎将羽林左右監品第五銅印墨綬武冠綘朝服其侍陞殿著鶡尾冠紗縠單衣哀帝時桓温執政省羽林中郎将唯置一監宋髙祖復置初江左領營兵及􅂈江無復營兵齊梁陳並有羽林監後魏羽林監第六品下北齊羽林監十五人品同後魏周有左右羽林率各上士二人中士二人掌羽林之士隋煬帝改左右領軍為左右屯衛所領兵為羽林皇朝名武衛所領兵為羽林又别置左右屯營各有大将軍将軍等員龍朔二年為左右羽林軍其名則歴代之羽林也將軍各二人從三品左右羽林軍大將軍將軍之職掌統領北衙禁兵之法令而督攝左右廂飛騎之儀仗以統諸曹之職若大朝㑹則率其儀仗以周衛階陛若大駕行幸則夾馳道而為内仗羽林禁兵旗職名數秘莫得知畧之凡飛騎毎月番上者皆據其名歴而配于所職其飛騎仗或有勑上南衙者則大將軍將軍承墨勑白移於金吾引駕仗引駕仗官與監門奏覆又降墨勑後得入長史各一人從六品上録事參軍事各一人正八品上倉曹參軍事各一人正八品下兵曹參軍事各一人正八品下胄曹參軍事各一人正八品下隋有左右屯衛有長史已下等員皇朝因之為屯營官名改更上司階各二人正六品上中候各三人正七品下司戈各五人正八品下執㦸各五人正九品下長史判諸曹事録事參軍已下職如左右衛凡飛騎宿衛將軍已下不得使其出外若番上湏兵士則簡同華越騎充不足取步騎步騎不足兼取諸州越騎翊府中郎將各一人正四品下左右郎將各一人正五品上中郎將之職掌領翊衛之屬以總北軍宿衛之事左右郎將貳焉餘務同左右衛諸府折衝都尉各一人上府正四品上中府從四品上下府正五品下按井田之法而備軍政至秦廢井田置郡縣尉為太守之貳而主兵至漢改四都尉九武職多以尉為補後漢省都尉至隋左右衛左右武衛左右武侯各領軍坊鄉團以統戎卒開皇初又置驃騎将軍府每府有驃騎将軍車騎将軍大業三年改置鷹揚府毎府改驃騎為鷹揚郎将車騎為鷹揚副郎将五年又以鷹揚副郎将為鷹擊郎将皇朝武徳初因隋鷹揚府依開皇舊名置材老弱少壯各為之簿以進退為此條有缺文長史掌判兵事倉儲車馬介胄之事及其簿書㑹要之法兵曹掌兵吏粮倉公廨財物田圍課税之事與其出入勾檢之法毎月簿番上衛士之教以上衛毎嵗簿録事及府史捉缺品于補上年月姓名以上于州申考功兵部唐六典卷二十五
