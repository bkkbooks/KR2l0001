body:
  text: 唐六典卷十三唐張九齡等撰御史臺御史臺大夫一人中丞二人侍御史四人主簿一人録事二人令史十五人書令史二十五人亭長六人掌固十二人殿中侍御史六人令史八人書令史十人監察御史十人令史三十四人御史大夫一人從三品漢書云御史大夫秦官位上卿銀印青綬掌副丞相成帝綏和元年更名大司空哀帝建平二年復為御史大夫元夀二年復為大司空歴後漢遂為三公之官獻帝建安十三年又置御史大夫魏黄初二年又省歴晋宋齊梁陳後魏北齊後周並不置大夫而以中丞為臺主隋諱忠依秦漢置御史大夫從三品大業八年降為正四品皇朝又為從三品龍朔二年改為大司憲咸亨元年復故御史臺漢名御史府後漢曰憲臺時以尚書為中臺謁者為外臺謂之三臺魏晋宋齊曰蘭臺梁陳後魏北齊隋皆曰御史臺皇朝因之龍朔二年更名憲臺咸亨元年復故光宅元年改曰左肅政臺專知在京百司更置右肅政臺專知按察諸州加右臺大夫一人神龍元年改為左右御史臺猶置二大夫延和元年廢右臺先天二年二月復置十月又廢而大夫隨臺廢置中丞二人正五品漢百官表御史大夫有兩丞秩二千石一曰中丞謂之中者以其列在殿中掌蘭臺秘書外督部刺史内領侍御史受公卿奏事舉劾按章及置司𨽻校尉以御史中丞督司𨽻司直司𨽻司直督刺史刺史督二千石下至墨綬成帝綏和元年改為大司空哀帝建平二年改大司空復為御史大夫元夀二年復為大司空而中丞出外為臺主更名御史長史後漢復曰中丞時宣秉拜御史中丞光武詔與司𨽻校尉尚書令三官各專席而坐京師號為三獨坐魏黄初改中丞為宫正魏鮑勛以宫正忤㫖左遷持書執法後為中丞及歴晋宋齊梁陳並以中丞為䑓主品第四梁制十八班中丞班第十一後魏改中丞曰中尉正三品太和二十三年為從三品北齊復曰中丞從三品後周秋官置司憲中大夫二人掌丞司㓂之法以左右刑罰盖比御史中丞之職也隋省中丞官置御史大夫為臺主以持書侍御史二人代中丞之任持書侍御史者本漢宣帝元鳳中因路温舒上書宜尚徳緩刑帝深采覧之季秋請讞時帝幸宣室齋居而決事令侍御史二人持書故曰持書侍御史歴代品秩並同御史惟北齊為從五品隋室因之大業六年加正五品八年又改為從五品皇朝因之貞觀中避髙宗諱省持書侍御史依前代置御史中丞龍朔二年改曰司憲大夫咸亨元年復故自漢以來御史中丞皆一人隋持書侍御史二人皇朝因之御史大夫之職掌邦國刑憲典章之政令以肅正朝列中丞為之貳其百寮有姦非隱伏得專推劾若中書門下五品已上尚書省四品已上諸司三品已上則書而進之并送中書門下凡天下之人有稱寃而無吿者與三司詰之三司御史大夫中書門下大事奏裁小事專達凡中外百僚之事應彈劾者御史言於大夫大事則方幅奏彈小事則署名而已舊彈奏皇帝視事日御史奏之自景龍三年以來皆先進狀聽進止許則奏之不許則止若有制使覆囚徒則刑部尚書參擇之凡國有大禮則乘輅車以為之導駕幸京都大夫從行則令中丞一人留在臺并殿中侍御史一人若别敕留守不在此限侍御史四人從六品下周官宗伯属官御史掌邦國都鄙及萬民之治令以賛冡宰凡治之者受法令焉以其在殿柱之間亦謂之柱下史秦改為侍御史史記張蒼自秦時為御史主柱下方書即其任也冠法冠一名柱後惠文冠以鐵為柱言其審固不撓也法冠者秦事云始皇滅楚以其君冠賜御史亦名獬豸冠以獬豸獸主觸不直故執憲者以為冠漢因秦置侍御史秩六百石員十五人惠帝三年相國奏遣御史監三輔不法事有辭訟者盜賊者鑄偽錢者獄不直者繇賦不平者吏不廉者吏苛刻者踰侈及弩力十石以上者作非所當服者凡九條監者每二嵗一更常十一月奏事三月還監焉侍御史有綉衣直指出討姦猾治大獄武帝制不常置後漢皆公府掾属髙第者為之所掌有五曹曰令曹掌律令印曹掌刻印供曹掌齋祠之事尉馬曹掌廐馬之事乗曹掌䕶駕魏置八人品第六所掌凡八部有持書曹課第曹其餘則史闕云晋置九人所掌有十三曹曰吏曹課第曹直事曹印曹中都督曹外都督曹媒曹符節曹水曹中壘曹營軍曹法曹筭曹東晋初省課第曹置庫曹後又分庫曹為外右庫曹内左庫曹焉宋置十人元嘉中省二庫曹直云左庫大明中復置二庫景和初復省之昇明初省營軍曹併人水曹省筭曹併入法曹而吏曹罷御史掌之齊置十人梁陳皆九人後魏八人初從五品太和末為正八品下北齊置八人從七品下後魏北齊尤重御史選御史必答策髙第始補之並分掌諸曹内外督令史以下後周秋官有司憲中士隋置八人從七品下煬帝三年改為正七品皇朝置四人加品從六品下又置内供奉員不過本數其遷改與正官資望亦齊舊制庶僕五分減一及崔隐甫為大夫奏供奉裏行並同正給案令隔品致敬比者因循侍御史已下皆與大夫抗禮開元十八年敕重申明猶未之改李適之為大夫皆受拜時議是之侍御史掌糾舉百僚推鞫獄訟其職有六一曰奏彈二曰三司三曰西推四曰東推五曰贓贖六曰理匭侍御史年深者一人判臺事知公廨雜事等次知西推贓贖三司受事監奏次知東推理匭之事臺中有黄卷不糾舉所職則罰之其新除者未曉制度罰有日逾萬錢者舊例新人罰止於四萬及崔隱甫為大夫以其數太廣減之以萬二千為限三院各有院長議罰則詢於雜端也凡有制敕付臺推者則按其實狀以奏若尋常之獄推訖斷于大理舊臺中無獄未嘗禁人有須留問寄禁大理李乾祐為大夫奏請於臺置獄雖則按問為便而增鞫獄之弊至開元十四年御史大夫崔隐甫奏罷之須留問者依前寄禁大理凡事非大夫中丞所劾而合彈奏者則具其事為狀大夫中丞押奏大事則冠法冠衣朱衣纁裳白紗中單以彈之小事常服而已法冠一名豸冠一角為獬豸之形取觸邪之義也凡三司理事則與給事中中書舍人更直於朝堂受表三司更直毎日一司正受兩司副押更遞如此其鞫聼亦同若三司所按而非其長官則與刑部郎中員外郎大理司直評事往訊之除三司受事及推按外每日侍御史一人承制諸奏事者並監而進退之若所論繁細不宜奏陳則隨事奏而罷之主簿一人從七品下漢書張忠為御史大夫署孫寳為主簿魏晋已下無聞隋煬帝大業三年始置御史臺主簿二員皇朝省一員録事二人從九品下主簿掌印及受事發辰句檢稽失兼知府廚及黄卷殿中侍御史六人從七品上魏氏御史二人居殿中察非法故曰殿中侍御史晋置四人東晋省二人梁陳史不載其品秩後魏初從五品太和末為從八品上北齊置十二人正八品隋開皇初改為殿中侍御史置十二人正八品下煬帝三年省武徳五年置四人正八品上貞觀二十三年加員品監察御史十人正八品上監察御史盖取秦監郡御史以名官晋書云孝武太元中創置檢校御史而呉混之為之沈約宋書云古司𨽻校尉知行馬外事晋江左罷司𨽻置檢校御史專掌行馬外事是也歴宋齊梁陳無聞其職後魏太和末復置檢校御史正九品上北齊置檢校御史十二人從八品上後周秋官府有司憲旅下士八人隋初改為監察御史置十二人從八品上煬帝大業三年加正八品増置十六人大業八年加從七品後又置御史一百員從九品尋省之盖更卑於監察矣武徳初監察御史置八人貞觀二十二年加監察二人其外又置監察御史裏行其始自馬周以布衣太宗令於監察御史裏行自此便置裏行之名殿中侍御史掌殿廷供奉之儀式每朝與侍御史随仗入位在中丞下給事中中書舍人後凡冬至元正大朝㑹則具服升殿若皇帝郊祀巡省謂大駕與鹵簿則具服從旌門往來檢察視其文物之有虧闕則糾之非大備則常服凡兩京城内則分知左右巡各察其所巡之内有不法之事謂左降流移停匿不去及妖訛宿宵蒲博盜竊獄訟寃濫諸州網典貿易隐盜賦歛不如法式諸此之類咸舉按而奏之若不能糾察及故縱蔽匿則量其輕重而坐所由御史監察御史掌分察百僚巡按郡縣糾視刑獄肅整朝儀朝廷有不肅敬御史則糾而劾之每二人五日分和東西朝堂舊例監察正門無籍非因奏事不得入至殿廷開元七年三月敕並令隨仗而入不得供奉位在尚書員外郎後十道巡按則選判官二人以為之佐如本道務繁得量差官人歴官清幹者號為支使凡將帥戰伐大克殺獲數其俘馘審其功賞辨其真偽若諸道屯田及鑄錢其審功糾過亦如之凡嶺南及黔府選補亦令一人監其得失凡決囚徒則與中書舍人金吾將軍監之若京都忌齋則與殿中侍御史分察寺觀七品已上清官皆預行香不到則牒送法司若在京都則分察尚書六司糾其過失及知太府司農出納凡冬至祀圜丘夏至祭方丘孟春祈穀季春祀明堂孟冬祭神州五郊迎氣及享太廟則二人共監之若朝日夕月及祭社稷孔宣父齊太公蜡百神則一人率其官屬閱其牲牢省其器服辨其輕重有不修不敬則劾之凡尚書省有㑹議亦監其過謬尚書省諸司七品已上官㑹議皆先牒報臺亦一人徃監若據狀有違及不委議意而署名者糾彈之凡有敕令一御史往監即監察受命而行自監察御史已上毎日一人於本司當門直以檢察臺中出入及令史領詞訟過大夫之事若縁詞訟事須推勘者大夫便委門直御史以推之凡百官燕㑹習射亦如之唐六典卷十三
