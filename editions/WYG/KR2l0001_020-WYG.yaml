body:
  text: 唐六典卷二十唐張九齡等撰太府寺太府寺卿一人少卿二人丞四人主簿二人錄事二人府二十五人史五十人計史四人亭長七人掌固七人兩京諸市署令各一人丞二人錄事一人府三人史七人典事二人掌固一人平凖署令一人丞四人錄事一人府六人史十三人監事六人典事二人價人十人掌固二人左蔵署令三人丞五人府九人史十八人監事八人典事十二人掌固八人右藏署令二人丞三人府五人史十三人監事四人典事七人掌固十人常平署令一人丞二人府四人史八人監事五人典事五人掌固六人太府寺卿一人従三品周禮天官有太府下大夫上士下士掌九貢九賦九功之式以受其貨賄之入頒其貨于受藏之府頒其賄於受用之府凡官府都鄙之吏及執事者受財用焉則今太府之任也秦漢已下不置其官其職并於司農少府梁天監七年始置太府班第十三掌金帛府帑統右藏令上庫丞大市南市北市令闗津亦皆屬焉陳因之品第三後魏太和中始改少府為太府卿品第三北齊因之後周有太府中大夫又有計部中大夫隋太府寺卿一人正三品上其左藏左内右内三尚方司染右藏掌冶甄官等署各置令丞至煬帝分太府寺置少府監管三尚方及司染掌冶等署而太府寺管左右藏及兩市平凖等署大業四年降為徔三品皇朝因之至龍朔二年改為外府正卿咸亨元年復故光宅元年改為司府寺神龍初復舊少卿二人從四品上後魏孝文帝改少府為太府置少卿一人第四品上北齊因之隋煬帝加至二人降為從四品皇朝減一人貞觀中復置二人龍朔咸亨光宅神龍並隨寺改復太府卿之職掌邦國財貨之政令總京都四市平準左右蔵常平八署之官屬舉其綱目修其軄務少卿為之貳以二法平物一曰度量度謂分寸尺丈量謂合升斗斛二曰權衡權重也衡平也金銀之屬謂之寳錢帛之屬謂之貨絹曰匹布曰端綿曰屯絲曰絇麻曰綟金銀曰鋌錢曰貫凡四方之貢賦百官之俸秩謹其出納而為之節制焉諸州庸調及折租等物應送京者並貯左蔵其雜送物並貯右蔵庸調初至京日錄狀奏聞毎旬一奏納數凡絹布出有方土類有精粗絹分為八等布分為九等所以遷有無和利用也宋亳之絹復州之紵宣潤沔之火麻黄州之貲並第一等鄭汴曹懐之絹常州之紵舒蘄黄嶽荆之火麻廬和晋泗之貲並第二等滑衛陳魏相冀徳海泗濮徐兖貝博之絹楊湖沔之紵徐楚廬夀之火麻絳楚滁之貲並第三等滄瀛齊許豫仙棣鄆深莫洺邢恒定趙之絹蘇越杭蘄廬之紵澧朗潭之火麻澤潞沁之貲並第四等潁淄青沂密夀幽易申光安唐隨黄之絹衢饒洪􅄔之紵京兆太原汾之貲並第五等益彭蜀梓漢劍遂簡綿襄褒鄧之絹郢江之紵褒洋同岐之貲並第六等資眉卭雅嘉陵闐普壁集龍果洋渠之絹台括撫睦歙䖍吉温之紵唐慈坊寧之貲並第七等通巴蓬金均開合興利泉建閩之絹泉建閩表之紵登萊鄧之貲並第八等金均合之貲並第九等凡供祀昊天上帝幣以蒼配帝亦如之皇地祇幣以黄配帝亦如之祀大眀幣以青夜眀幣以白神州幣以黄太社太稷之幣皆以𤣥后稷亦如之先農幣以青先蠶幣以𤣥蜡祭神農幣以赤伊祁氏幣以𤣥祀五方帝五帝五官内官中官外官五星二十八宿及衆星嶽鎮海林川澤丘陵墳衍等之幣皆以其方色祈告宗廟之幣及孔宣父齊太公皆以白凡幣皆長一丈八尺丞四人從六品下梁選部太府丞一人品従第七陳因之後魏亦一人品第七下後周太府上士一人亦丞之任也隋太府丞六人正七品下太業三年増為従五品皇朝置四人従六品上垂拱中省一人開元又加焉主簿二人從七品上梁置太府主簿一人七班之中為第三陳因之後魏主簿一人隋四人従七品皇朝置二人至太極中省一人太府寺管木契七十隻十隻與左蔵東庫合十隻與左藏西庫合十隻與右蔵内庫合十隻與右藏外庫合又十隻與東都左藏庫合十隻與東都右蔵庫合各九雄一雌九雄太府主簿掌一雌庫官掌又五隻與左蔵朝堂庫合五隻與東都左蔵朝堂庫合各四雄一雌其契以次行用錄事二人從九品上丞掌判寺事凡左右蔵庫帳禁人之有見者若請受輸納人名物數皆著於簿書毎月以大摹印紙四張為之簿而丞衆官同署月終留一本於署毎季錄奏兼申所司凡元正冬至所貢方物應陳於殿庭者受而進之凡㑹賜及别敕錫賚六品已下即扵朝堂給之主簿掌印省署抄目勾檢稽失凡置木契九十五隻二十五隻與少府將作苑總監合七十隻與庫官合十五隻刻少府監字十四隻雖付少府監五隻刻將作監字四隻雄付將作監五隻刻苑緫監字四隻雄付苑緫監皆應索物雌留太府寺凡官私斗秤丈尺毎年八月詣寺校印署無或差繆然後聽用之禮記月令云仲春仲秋日夜分則同度量平權衡正鈞石角斗甬錄事堂受事發辰兩京諸市署各令一人従六品上昔神農祝融氏始作市易曰日中為市致天下之民聚天下之貨交易而退各得其所盖取諸噬嗑石氏星經天市垣二十二星周禮地官有司市下大夫上士中士下士其屬有貭人廛人胥師賈師司暴司稽肆長盖諸市官也漢改秦内史為京兆尹其屬官有長安市長丞後漢河南尹屬官有雒陽市長丞魏晋因之東晋𨽻丹陽尹宋齊因之梁始隸太府梁選部大市令屬四品市職之任不容過卑天監三年革其選陳因之後魏京邑市令従五品中北齊司州牧領東西市署令丞後周司市下大夫一人隋司農寺統京市令丞煬帝三年改京市隸太府寺京師東市曰都㑹西市曰利人東都東市曰豊都南市曰大同北市曰通逺皇朝因之京置東西南三市按東都西則隨南市也南市則隨東市也都南市舊兩坊之地武徳中減為坊半焉垂拱中省京南市開元十年又省都西市丞各二人正八品上後漢雒陽市丞一人三百石魏晋宋齊因之梁有太南北三市丞位在七班之下陳因之後魏闕文北齊有東西市丞後周有小司市上士下士一人隋有京市丞皇朝因之京都諸市令掌百族交易之事丞為之貳凢建標立候陳肆辨物按周禮肆長各掌其肆之政令陳其貨賄名相近者相逺也實相近者相邇也而平正之以二物平市謂秤以格斗以概以三賈均市精為上賈次為中賈簏為下賈凡與官交易及懸平贓物並用中賈其造弓矢長刀官為立様仍題工人姓名然後聽鬻之諸器物亦如之以偽濫之物交易者沒官短狭不中量者還主周禮司市偽飾之禁在人者十有二在商者十有二在賈者十有二在工者十有二王制亦云用器兵車不中度布帛精麤不中數幅廣狭不中量姦色亂正色五穀不時果實未熟木不中伐禽獸魚鱉不中殺皆不鬻於市凡賣買奴婢牛馬用本司本部公驗以立劵凡賣買不和而㩁固㩁謂専畧其利固謂鄣固其市及更出開閉共限一價謂賣物以賤為貴買物以貴為賤若參市而規自入者並禁之謂在傍高下其價以相惑亂也凡市以日午擊皷三百聲而衆以㑹日入前七刻擊鉦三百聲而衆以散周禮大市日昃而市百族為主朝市朝時而市商賈為主夕市夕時而市販婦販夫為主丞兼掌監印句稽錄事掌受事發辰平凖署令二人從七品下周禮有貨人中士下士主平定物價也漢大司農屬官有平凖令丞韋昭辨釋名云平凖主平物價使相依凖史記云桑𢎞羊領大農令以諸官各自市相事以故物多騰躍乃請置大農部丞數十人分部主郡國置平凖扵京師受天下委輸盡籠天下之貨物貴則賣之賤則買之如此則富商及大賈無所牟大利矣所以置平凖焉故趙廣漢㢘潔下士州舉茂才為平凖令後漢大司農屬官有平凖令丞各一人令六百石丞三百石掌知物價及主練染作采色至和帝改平凖為中凖以宦者為令丞列于内署自是諸署令悉用宦人魏氏闕文晋少府屬官有平凖令丞梁陳有平水令丞後魏闕文北齊司農寺統平凖令丞後周有平凖中士下士隋司農屬官有平凖署令丞煬帝三年改平凖署隸太府寺皇朝因之丞四人從八品下監事六人從九品下平凖令掌供官市易之事丞為之貳凢百司不在用之物則以時出貨其沒官物者亦如之左蔵署令三人從七品下周禮有外府中士主泉蔵之在外者掌邦布之出入以供百物而待邦用也又有職幣上士中士主貨幣之入也並今左蔵之軄也至秦漢則分在司農少府後漢少府屬官有中蔵府令丞各一人掌中蔵幣帛金銀貨物魏氏因之晋少府屬官有左右蔵令東晉御史九人各掌一曹有庫曹御史後復分庫曹置外左庫内左庫宋文帝省外左庫而内左庫直云左庫武帝復置前廢帝又省齊陳梁有右蔵庫無左蔵後魏闕文北齊太府寺統左右蔵令丞後周有外府上士中士二人掌絹帛絲麻錢物皮角筯骨之蔵隋有左蔵署令丞皇朝因之左蔵有東庫西庫朝堂庫又有東都庫東都朝堂庫各掌木雌契一與太府主簿合之丞五人徔八品下隋有四人皇朝加一人監事八人従九品下左蔵令掌邦國庫蔵之事丞為之貳凡天下賦調先於輸場簡其合尺度斤兩者卿及御史監閲然後納于庫蔵皆題以州縣年月所以别麤良辨新舊也凡出給先勘木契然後錄其名數及請人姓名署印送監門乃聽出若外給者以墨印印之凡官庫應入私已出庫而未給付若私物當供官之物或雖不供官而皆掌在其官並同官物之例也凡蔵院之内禁人然火及無故而入者院内常四面持仗為之防守夜則擊柝分更以廵警焉右蔵署令二人正六品上周禮有内府中士主良貨賄蔵在内也又有蔵内上士中士主泉貨所入並今右蔵之軄至秦漢已来則分在司農少府其軄掌廢置並與左蔵同隋太府寺統右蔵令丞各三人皇朝因之右蔵有内庫外庫東都庫各木雌契一隻與太府寺主簿合之丞三人正九品上隋有二人皇朝置三人監事四人徔九品下右蔵署令掌邦國寳貨之事丞為之貳雜物州土安西干闐之玉饒道宣永安南邕等州之銀楊廣等州之蘇木象牙永州之零陵香廣府之沉香霍香薫陸雞舌等香京兆之艾納香紫草宣簡潤郴鄂衡等州之空青石碌辰溪州之硃砂相州之白粉岩州之雌雄黄絳易等州之墨金州之栀子黄檗西州之髙昌礬石益府之大小黄白麻紙弓弩弦麻杭婺衢越等州之上細黄白状紙均州之大模紙宣衢等州之案紙次紙蒲州之百日油細薄白紙河南府許衛懐汝澤潞等州之兎皮鄜寕同華虢晋蒲絳汾等州之狸皮越州之竹管涇寕邠隴蓬等州之蠟蒲絳鄭貝等州之氈河南府同鄧許等州之膠蒲同虢等州之席涇丹鄜坊等州之麻京兆岐燕等州之火燭凢四方所獻金玉珠貝玩好之物皆蔵之出納禁令如左蔵之職常平署令一人従七品下漢書食貨志管仲相桓公通輕重之權曰嵗有凶穰故榖有貴賤令有緩急故物有輕重人君不理則畜賈逰於市乗人之不給百倍其本矣故萬乗之國必有萬金之價千乗之國必有千金之價者利有所并也計本量委則足矣然人有飢餓者谷有所蔵也人有餘則輕之故人君斂之以輕人不足則重之故人君散之以重凡輕重斂散以時即凖平李悝曰糴甚貴傷民甚賤傷農民傷則離散農傷則國貧故甚貴甚賤其傷一也是故善平糴者必也謹觀嵗有上中下熟故大熟則上糴三而舍一中熟則糴二下熟則糴一小飢則發小熟之所斂中飢則發中熟之所斂大飢則發大熟之所斂而糶之故雖遇飢饉水旱糴不貴而人不散孟子日狗彘食人食而不知檢塗有餓莩而不知發盖並常平之義漢宣帝即位嵗數豊穰榖至石五錢農人少利大司農中丞耿夀昌遂曰令邊郡皆築倉以榖賤時増其價而糴榖貴時减其價以糶名常平倉人便之後漢明帝永平五年嵗比登稔榖常滿倉立粟市扵城東粟斛直錢三十晉武帝泰始四年乃立常平倉豐則糴儉則糶以利民東晉宋齊無聞梁有常平倉而不糴陳亦如之後魏太和十二年有司上言請京都度攴嵗用之餘各立官司年豐糴貯於倉時儉加私之二糶之於人北齊諸州郡皆别置富人倉初立之日凖所領中下之户計口數得支一年糧遂次當州榖價賤時斟量割當年義租􅂶入谷貴下價糶之賤則還用所糴物依時價糴貯隋開皇三年於河西勒百姓立堡營田積京師置常平監又以倉庫尚虚衛州置黎陽倉洛州置河陽倉陕州置常平倉華州置廣通倉轉相委輸漕闗東之粟以給京師又募人能扵洛陽運米四十石經砥柱達于常平倉者免其征戍以此通轉運亦非糶糴皇朝垂拱初兩京置常平署天下諸州亦置之丞二人従八品下監事五人從九品下常平令掌平糴倉儲之事丞為之貳凡嵗豐穰榖賤人有餘則糴之嵗饑饉榖貴人不足則糶之與正義倉帳具其本利同申凡出納禁令如左蔵之軄焉唐六典卷二十
