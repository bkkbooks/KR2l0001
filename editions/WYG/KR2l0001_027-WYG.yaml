body:
  text: 唐六典卷二十七唐張九齡等撰家令率更僕寺太子家令寺家令一人丞二人主簿一人録事一人府十人史二十人亭長四人掌固六人食官署令一人丞二人府二人史四人掌膳十二人供膳四百人奉觶三十人掌固四人典倉署令一人丞二人府三人史五人掌固四人園丞二人史二人典事六人司藏署令一人丞一人府三人史五人典事四人掌固四人太子率更寺令一人丞一人主簿一人録事一人府三人史四人伶官師二人漏刻博士二人掌漏六人漏童六十人典皷二十四人亭長四人掌固四人太子僕寺僕一人丞一人主簿一人録事一人府三人史五人亭長四人掌固四人廐牧署令一人丞二人府三人史五人典乗四人典事六人牧長四人翼馭十五人駕士三十人獸醫二十人掌固四人太子家令寺家令一人從四品上秦漢詹事屬官有太子家令丞張晏云太子稱家故曰家令又前漢中書太子家令秩八百石後漢太子少傅屬官有太子家令秩一千石主倉榖飲食又領食官令丞魏因之晋家令品第五銅印墨綬進賢兩梁冠絳朝服比司農少府晋太康八年詔曰太子家令率更令僕東宫之達官也宜進品第三與中庶子二率同宋太子家令主内茵蓐牀几諸供中之物又知官奴婢月用錢内庫米鹽車牛刑獄齊因之自宋齊已來清流者不為之梁天監六年武帝以三卿陵替乃詔革去家令視通直宫視率更僕視黄門陳因之後魏太子三卿秩三品上太和二十二年降為從四品上北齊詹事領家令有丞功曹主簿領食官典倉司藏等三署令丞又領内坊令丞隋家令寺掌别法食膳倉庫等事領食官典倉司藏三署令丞煬帝改為司府令皇朝復為家令龍朔二年改為宫府寺大夫咸亨元年復舊丞二人從七品上漢家令有丞後漢魏無聞宋書云家令丞一人晋代置宋齊因之梁陳家令丞一人位不登十八班者别為七班家令丞七班後魏太和二十二年太子三卿丞從六品下北齊家令丞一人隋家令丞二人皇朝因之龍朔二年改為宫府丞咸亨元年復舊主簿一人正九品下晋家令置主簿宋齊因之齊職儀家令主簿一人四品勲位掌揔署諸曹事梁陳後魏無聞北齊家令有主簿貟隋家令主簿一人皇朝因之家令之軄掌皇太子之飲膳倉儲庫藏之政令緫食官典倉司藏三署之官屬凡皇太子備禮出入則乗軺車具威儀先諸臣以導引若祭祀賔客則供酒食以為獻主若進獻賜與則奉金玉貨幣而以法式賛之凡宫坊府署廨宇及牀几茵蓐席噐物不供於將作少府者皆供之丞掌判寺事凡食官典倉司藏之出納籍其名數以時刺于詹事凡莊宅田園必審其頃畝分其疆界寘于籍書若租税隨其良瘠而為收斂之數以時入之禁其逋違者若宫朝坊府有土木營繕則下於司藏命典事以受之主簿掌印及句檢稽失凡寺署之出入財物役使工徒則刺詹事上于尚書有所隱漏言於司直事若重者舉咨家令以啟聞食官署令一人從八品下詹事屬官有食官令長丞後太子少傅屬官有太子食官令一人秩六百石主飲食晋置有食官令職如大官令宋中庶子屬官有食官令齊詹事官亦有太子食官令齊職儀食官令一人三品勲位掌厨膳之事梁庶子有食官局陳因之後魏太子食官令五品上北齊食官令丞又别領噐局酒局二丞隋家令事統食官令丞皇朝因之丞二人從九品下兩漢食官皆有丞魏晋宋無聞齊建元中置食官丞四人梁選部有東宫食官丞為三品勲爵位魏北齊太子食官丞一人隋食官丞二人皇朝因之食官令掌飲膳之事丞為之貳凡為酒醴必辨其麴蘖黍秫秔稻之宜陶噐水火之用以成乎沉浮清濁之良凡為膳羞必辨其牲牢禽獸之名物割烹煎和之制度以協乎五味五香之正然後可以供其享獻焉凡四時之令節供進及設食得專營造不用啟聞其六品已有官於家令厨食者元正冬至寒食亦供焉左右廂牙前坐日職事官三品以上供十盤官臣六參日二十五盤其食有餘賜左右春坊供奉官詹事司直若非坐日供三盤丞判署事典倉署令一人從八品下後漢太子少傅屬官有太子倉令一人秩六百石主倉榖魏晋已下無聞後魏有太子倉令第五品中北齊家令寺領典倉署令丞典倉署又别領園丞隋家令寺統典倉令皇朝因之丞二人從九品下隋典倉丞二人皇朝因之典倉署令掌九榖入藏之數及醯醢庶羞噐血燈燭之事舉其名數而司其出納丞為之貳凡諸園圃樹藝者皆受令焉毎月籍其出納之數以上于寺嵗終則申詹事府凡户奴婢及番户雜户皆給其資糧及春冬衣服等數如司農給付之法若本司用不足者則官給丞判署事司藏署令一人從八品下晋家令有主物吏四人梁庶子屬官有錫賜庫局丞又有東宫衛庫丞為三品勲位北齊家令寺領司藏署令丞司藏又别領仗軍與作二局丞隋家令寺統司藏署令丞皇朝因之丞二人從九品下隋有司藏丞二人皇朝因之司藏令掌庫藏財貨出納營繕之法式凡諸司應納財物者皆受而藏之應出給者則監而付之其財物之出於庫藏無衆寡皆具其給賜之名數每月上寺嵗終則以貨幣出入之數㑹之丞判署事太子率更寺令一人從四品上漢詹事府屬官有太子率更令丞後漢太子少傅屬官有太子率更令秩千石與庶子舎人更直職似光禄勲魏因之晋詹事屬官有太子率更令一人銅印墨綬進賢兩梁冠絳朝服掌宫殿門户之禁郎將屯衛之士局擬光禄勲衛尉太康八年進品第五宋齊因之梁率更令視黄門陳因之後魏太和二十二年為從四品上北齊詹事率更令有丞功曹主簿領中盾署令丞各一人掌周衛禁防漏刻鐘皷隋率更寺令一人皇朝因之龍朔二年改為司更大夫咸亨元年復舊丞一人從七品上後漢率更丞一人秩四百石魏晋宋齊梁陳皆一人後魏太子三卿丞從六品下北齊隋皆一人皇朝因之王簿一人正九品下晋率更令置主簿一人宋代無聞齊職儀太子率更令主簿四品勲位梁陳後魏無聞北齊隋太子率更寺主簿一人皇朝因之率更令之職掌宗族次序禮樂刑罰及漏刻之政令凡皇太子釋奠於先聖先師講學齒胄皆緫其儀注而為之導引若皇太子備禮出入則乗軺車位亞家令焉凡張樂軒縣之制皷鎛鐘之虡三編鐘之虡三編磬之虡三凡九虡毎位各建皷凡三人柷二人鐘磬虡各一人毎編鐘下笙竽笛箎塤各一人每編磬下歌二人琴瑟筝筑各一人文武二舞各六佾其簨虡皆金三博山以崇牙流蘇樹羽其樂器應漆者皆朱漆之鐃節皷朱漆畫加五綵重葢大􅈜小及餘􅈜吹並朱漆羽葆􅈜以羽保長鳴中鳴大小横吹五綵幡緋掌畫豹五綵脚大角幡亦如之其大􅈜長鳴大横吹節􅈜及横吹後笛簫篳篥笳等工人皆服緋地苣文袍袴及帽金鉦掆􅈜皆加六角紫繖小􅈜中鳴等小横吹及鐃及横吹後笛簫篳篥笳等工人皆服青地苣文袍袴及帽鐃及簫笳工人服並武弁朱褠衣革帶大角工人平巾幘緋衫白布大口袴凡鐘􅈜新成並以羊豕各一釁之若皇太子親戎則以猳豚以釁􅈜教樂滛聲凶聲慢聲皆禁之凡漏刻令博士以教之掌漏以典之漏童司刻分時以唱之晝夜之刻百冬至則晝四十夜六十夏至則晝六十夜四十春秋分則晝夜五十凡諸坊寺府之有犯者令其主司定罪庶人杖已下决之官吏杖已下皆送於大理若皇太子未立及雖立未即東宫其官坊寺府之犯罪者皆斷於大理丞掌判禮樂刑獄之事凡宫臣有犯理于率更者皆親問之乃斷其罪而上於詹事主簿掌印及勾檢稽失凡宗族不序禮儀不節音律不諧漏刻不審刑名不法皆舉而正之若所司決囚與其丞同監之太子㒒寺㒒一人從四品漢詹亊屬官有太子㒒長丞後漢太子少傅屬官有太子㒒一人秩千石主車馬職如太㒒太子五日一朝非入朝日遣㒒及中允朝朝入請問起居魏因之晋詹事屬官有太子㒒銅印墨綬進賢兩梁冠絳朝服主輿馬親族局擬太㒒宗正太康八年進品第五宋齊品秩冠服同家令寺從駕乗安車次家令梁太子㒒視黄門陳因之後魏品同家令北齊詹亊領太子㒒㒒寺置丞功曹主簿領廐牧署丞又别有車輿局丞隋㒒寺㒒一人掌宗族親踈車輿騎乗領廐牧署令丞皇朝因之龍朔二年改為馭㒒大夫咸亨元年復舊丞一人從七品上梁太子㒒有丞陳因之後魏太子㒒三卿丞從六品下北齊隋太子㒒丞一人皇朝因之主簿一人正九品下晋太子㒒置主簿宋無聞齊職儀太子㒒主簿四品勲位梁陳後魏無聞北齊隋有太子㒒主簿一人皇朝因之太子㒒之軄掌車輿騎乗儀仗之政令及䘮葬之禮物辨其次叙與其出入而供給之皇太子之車輅三一曰金輅二曰軺車三曰四望車金輅赤質金飾諸末重較箱畫苣文鳥獸黄屋伏鹿龍輈金鳯一在軾前設障塵朱葢黄裏畫輪朱牙左建旂九旒右載闟㦸旂首金龍頭銜結綬及紷綏駕赤駵四八鑾在衡二鈴在軾金鍐方釳翟尾五焦鏤錫鞶纓九旒從祀享正冬大朝納妃則供之軺車金諸末紫油通􅚫紫油纁朱裏駕一馬五日常朝及朝饗宫臣出入行道則供之四望車金諸末紫油通􅚫紫油纁朱裏朱絲絡網駕一馬弔臨則供之凡皇太子備禮而出則率廐牧令進輅㒒親馭焉丞掌判寺事凡車輿儀仗有虧闕則移於主司以修補之凡馬及雜畜之料應供於外司者每嵗季夏上于詹事芻粟貯掌於廐所者以時出入之而節其數主簿掌印及勾檢稽失凡廐牧之畜養車騎之駕馭儀仗之付受䘮葬之供給各有其程違則糺正之廐牧署令一人從八品下漢詹事屬官有太子廐長丞後漢太子少傅屬官有太子廐長一人秩四百石主車馬魏晋因之齊軄儀云東宫屬官有内廐局外廐局梁陳因之後魏有太子廐長從九品下隋太子㒒寺統廐牧署令丞皇朝因之丞二人從九品下漢有太子廐丞自後闗文齊置太子内廐外廐丞各一人梁陳因之北齊有太子廐牧署丞車輿局丞隋太子㒒寺統廐牧丞二人皇朝因之廐牧署令丞掌車馬閑廐牧畜之事凡皇太子將備禮而出則率典乗先期調習輅馬率駕士駕馭車乗及出則進輅或軺車於南閣外西向以候皇太子之升禮畢皇太子降輅則自西閤之外以輅及軺歸於署其隴右羣牧隷於東宫者皆受其政令焉唐六典卷二十七
