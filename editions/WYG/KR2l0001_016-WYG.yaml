body:
  text: 唐六典卷十六唐張九齡等撰衛尉宗正寺衛尉寺卿一人少卿二人丞二人主簿二人録事二人府六人史十一人亭長四人掌固六人兩京武庫令各一人丞一人府一人史六人監事一人典事二人掌固四人武器署令一人丞二人府二人史六人監事一人典事二人掌固四人守宫署令一人丞二人府二人史四人監事二人掌設六人幕士一千六百人掌固四人宗正寺卿一人少卿二人丞一人主簿二人録事一人府五人史九人亭長四人掌固四人崇𤣥署令一人丞一人府二人史三人典事六人掌固二人衛尉寺卿一人從三品漢書百官表云衛尉秦官也掌宫門衛屯兵漢因之景帝中六年更名中大夫令後元年復為衛尉属官有公車司馬衛士旅賁三令丞又諸屯衛候司馬二十二官皆属焉又有長樂建章甘泉衛尉各掌其宫之職不常置後漢衛尉又有南宫北宫衛士令丞餘同前漢茍綽百官表衛尉品第三銀章青綬五時朝服武冠佩水蒼玉過江省宋孝建元年復置齊因之梁天監七年置十二卿衛尉與廷尉大匠為秋卿班第十二位視侍中兼統武庫令陳因之後魏衛尉卿從第一品下太和二十二年降為第三品北齊因之隋衛尉掌軍器儀仗帳幕以監門衛掌宫門屯兵煬帝降卿為從三品皇朝因之龍朔二年改為司衛寺正卿咸亨中復舊光宅元年又改為司衛寺卿龍朔元年復故少卿二人從四品上後魏太和十五年初置少卿官第三品上二十二年降為正四品上北齊因之隋煬帝降為從四品皇朝因之貞觀中置二人龍朔咸亨光宅神龍並隨寺改復衛尉卿之職掌邦國器械文物之政令緫武庫武器守宫三署之官屬少卿為之貳凡天下兵器入京師者皆籍其名數而藏之凡大祭祀大朝㑹則供其羽儀節鉞金鼓帷帟茵席之屬其應供宿衛者每嵗二時閲之其有損弊者則移于少府監及金吾修之丞二人從六品上秦漢衛尉丞一人比千石魏晉並同宋孝建元年増置一人梁陳各一人梁選簿列卿丞班第三後魏列卿丞從五品中太和二十二年第七品上北齊衛尉丞一人從六品下隋衛尉丞二人品同北齊大業五年復為從五品皇朝改為從六品上主簿二人從七品上漢官儀鹵簿篇衛尉駕四馬主簿前車八乘有鈴下侍閤辟車騎吏等員晉令衛尉主簿二人宋齊衛尉並有主簿員梁天監七年十二卿各置主簿位三班陳因之北齊衛尉寺有主簿隋主簿二人皇朝武徳中置二人正八品貞觀中減置一人從七品上後又置二人録事一人從九品上丞掌判寺事凡器械出納之數大事則承制勑小事則由省司主簿掌印句檢稽失録事掌受事發辰武庫令兩京各一人從六品下周禮有司甲下大夫司弓矢下大夫司兵中士司戈盾下士並武庫之任也漢属執金吾後漢太僕属官有考工令丞主作兵器弓弩刀鎧之属成則付執金吾入武庫又云武庫令六百石魏晉因之宋尚書庫部属官有武庫令掌軍器齊因之梁衛尉寺統武庫署令丞掌甲兵及吉凶儀仗後周依周官隋衛尉寺統武庫署令二人皇朝因之後減置一人丞一人從八品下漢魏晉時並有武庫丞北齊亦同隋有武庫丞二人皇朝因之後減一人監事一人正九品上武庫令掌藏天下之兵仗器械辨其名數以備國用丞為之貳凡軍皷之制有三一曰銅鼓二曰戰皷三曰鐃皷世本曰巫咸作皷周官云鼓人掌教六鼓四金之音聲以節聲樂以和軍旅以正田役以鼖鼓鼓軍事然鼓名實繁享祀所用並具太樂鼓吹署令銅鼓盖南中所置軍旅之間即有戰鼓復有鐃鼓焉金之制有四一曰錞二曰鐲三曰鐃四曰鐸周禮云以金錞和鼓以金鐲節鼓以金鐃止鼓以金鐸通鼓鄭𤣥云鐲鉦也軍行鳴之以節鼓鐃如鈴無舌鳴之以止鼓鐸大鈴振以通鼓司馬職曰卒長執鐃兩司馬執鐸公司馬執鐲司馬振鐸行軍鳴鐲鼓退鳴鐃且却兵戰擊鼓以進之擊金以止之弓之制有四一曰長弓二曰角弓三曰稍弓四曰格弓釋名曰弓穹也張之穹然其末曰彇言肅邪也以骨為之曰弭中央曰弣所撫持也今長弓以桑柘歩兵用之角弓以筋角騎兵用之稍弓短弓也利扵近射格弓綵飾之弓羽儀所執弩之制有七一曰擘張弩二曰角弓弩三曰木單弩四曰大木單弩五曰竹竿弩六曰大竹竿弩七曰伏逺弩釋名曰弩怒也有怒勢也其柄曰臂似人臂也鈎弦者曰牙似牙齒也牙外曰郭為牙之規郭也合名之曰機言如機之巧也亦言如門户樞機開闔有節也蔡邕曰冀州强弩幽州突騎天下之精也漢書有逺望連弩射法十五篇華嶠後漢書云陳敬王寵善弩射其秘法以天覆地載參連為竒入有三微三小三微為經三小為緯萬勝之方然要在機牙其射至十發十中皆仝孔魏氏春秋曰諸葛亮損益連弩謂之元戎以鐡為矢矢長八寸一弩十矢俱發周禮司弓掌六弓四弩今擘張弩小弩歩兵所用角弓弩騎兵所用木單竹竿伏逺等弩其力益大所及漸遠箭之制有四一曰竹箭二曰木箭三曰兵箭四曰弩箭周禮司弓矢掌八矢之法枉矢絜矢利火射用諸守城車戰殺矢鍭矢用諸近射田獵矰矢茀矢用諸弋射恒矢庫矢用諸散射方言曰自關而東謂之矢江淮之間謂之鏃關西謂之箭其本曰鏑體曰幹其旁曰羽其矢末曰括其括旁曰义又通俗文曰骨鏃曰骲鐡鏃曰鏑鳴箭曰骹靃葉曰鈚皆古之制也竹箭以竹為笴諸箭亦通用木箭以木為笴唯利射獵兵箭剛鏃而長用之射甲弩箭皮羽而短用之䧟堅也刀之制有四一曰儀刀二曰鄣刀三曰横刀四曰陌刀釋名曰刀末曰鋒其本曰環今儀刀盖古班劔之類宋晉已来謂之御刀後魏曰長刀皆施龍鳳環至隋謂之儀刀裝以金銀羽儀所執鄣刀盖用鄣身以御敵横刀佩刀也兵士所佩名亦起於隋陌刀長刀也歩兵所持盖古之斷馬劔槍之制有四一曰漆槍二曰木槍三曰白幹槍四曰撲頭槍釋名曰矛冐也刃下冐矜也丈八尺曰矟馬上所執盖今之漆槍短騎兵用之木槍長歩兵用之白幹槍羽林所執撲頭槍金吾所執也甲之制十有三一曰眀光甲二曰光要甲三曰細鱗甲四曰山文甲五曰烏鎚甲六曰白布甲七曰皁絹甲八曰布背甲九曰歩兵甲十曰皮甲十有一曰木甲十有二曰鎻子甲十有三曰馬甲甲似物之孚甲以自衛也史記曰椘人鮫革以為甲漢書曰魏氏武卒衣三属之甲謂上身一髀禈一兠鍪一凡三属也今眀光光要細鱗山文鳥鎚鎻子皆鐡甲也皮甲以犀兕為之其餘皆因所用物名焉彭排之制有六一曰膝排二曰團排三曰漆排四曰木排五曰聯木排六曰皮排釋名曰彭旁也在旁排敵禦冦也纂文曰鹵大楯也今謂之彭排故諸葛亮曰帳下持彭排百枚其膝團漆木皮皆古制也盖亦因其所用物為名焉旗之制三十有二一曰青龍旗二曰白獸旗三曰朱雀旗四曰𤣥武旗五曰黄龍負圖旗六曰應龍旗七曰龍馬旗八曰玉馬旗九曰鳳凰旗十曰鸞旗十一曰鵕䴊旗十二曰太平旗十三曰麒麟旗十四曰飛麟旗十五曰飛黄旗十六曰駃騠旗十七曰白澤旗十八曰五牛旗十九曰犀牛旗二十曰金牛旗二十一曰兕旗二十二曰三角獸旗二十三曰角端旗二十四曰吉利旗二十五曰騼䮷旗二十六曰騶牙旗二十七曰黄鹿旗二十八曰白狼旗二十九曰赤熊旗三十曰辟邪旗三十一曰苣文旗三十二曰刃旗周禮司常掌九旗之名物日月為常交龍為旂通帛為旃雜帛為物熊虎為旗鳥隼為旟龜蛇為旐全羽為旞析羽為旌列子曰黄帝與炎帝戰于阪泉之野以雕鶡鷹鳶為旗今白澤旗朱雀辟邪𤣥武等旗金吾隊所執青龍白獸麒麟角端赤熊等旗左右衛隊所執鳳凰飛黄吉利兕旗太平等旗驍衛隊所執五牛飛麟駃騠鸞旗犀牛鵕䴊騼䮷等旗武衛隊所執應龍三角玉馬白狼龍馬金牛等旗領軍隊所執黄龍負圖黄鹿騶牙蒼鳥等旗威衛隊所執苣文旗脚為苣文刄旗火爛燔也袍之制有五一曰青袍二曰緋袍三曰黄袍四曰白袍五曰皁袍説文曰袍襺也以絮曰襺以緼曰袍今之袍皆繡畫以武豹鷹鸇之類以助兵威也器用之制有八一曰大角樂録曰角者説云蚩尤氏率䰣魎與黄帝戰于涿鹿帝乃始命吹角為龍鳴以禦之至魏武北征烏丸度沙漠而軍士思歸扵是減為中鳴而尤更悲矣胡角者本以應胡笳之聲後漸用之故有長鳴中鳴故角凡三部今唯有大角金吾主之也二曰纛後漢有纛頭每天子行幸及大軍征伐則建于旗上隋煬帝親征遼左毎百人置一纛皇朝因而用之三曰鉞斧石氏星經曰天鉞一星在井旁輿服志曰鉞黄帝所造塗以黄金行則載以車可以斬戮傳云湯伐昆吾躬把大鉞武王入商國周公把大鉞畢公把小鉞以夹王以鉄為之六韜云武王軍中有大柯斧刄廣八寸重八斤名為天鉞即今之大鉞也魏晉已来上公親征猶假其器四曰鐵蒺䔧漢書晁錯上疏云磊石渠答注云渠答鐵蒺䔧也至隋煬帝征遼布鐵菱扵地亦其類也五曰棒太公六韜曰方扇及鐵棓重十二斤柄長五尺千二百枚一名天棓星占云天棓五星天之枚也六曰鉤越絶書云船軍之備必備長斧長鉤長鈎者所以鉤引敵船也七曰鐵盂古謂之盂盖今之鉄鍋也為軍中食器也八曰水斗漢書云斗所以量多少今軍中用斗以汲水凡諸道行軍皆給鼓角三萬人已上給大角十四具大鼓二十面二萬人已上大角八具大鼓十四面萬人已上大角六具大鼓十面萬人已下臨事量給其鎮軍則給三分之二凡大駕親征及大田廵狩以羝羊猳猪雄鷄釁鼓若皇太子親征及大將軍出師則用猳肫凡有赦則先建金鷄兼置鼓扵宫城門之右視大理及府縣囚徒至則撾其鼓関東風俗傳云宋孝王嘗問先逹司馬膺之曰後魏北齊赦日建金鷄事膺之曰按海中星占天鷄星動必當有赦盖王者以鷄為赦候按其所設其制始扵後魏不知起自何帝也隋書刑法志曰北齊赦曰皆武庫令設金鷄及鼓扵闕門右撾鼓千聲宣赦釋囚徒隋因之牛𢎞大興記曰赦日建金鷄自後魏以来常然或云起扵吕后未之詳也武器署令一人正八品下隋行䑓尚書省有武器監令録事皇朝永徽中始置其署以主器仗丞二人從九品下隋置皇朝因之監事一人從九品下武器署令掌在外戎器辨其名物㑹其出入丞為之貳凡大祭祀大朝㑹大駕廵幸則納扵武庫供其鹵簿若王公百官拜命及㛰葬之禮應給鹵簿及三品已上官合列棨㦸者並給焉守宫署令一人正八品下漢少府属官有守宫令丞主御紙筆墨及財物諸用并封泥之事晉光禄勲属官有守宫令梁陳大匠卿属官有守宫令貟北齊光祿寺統守宫令丞掌凡張設之事隋衛尉守統守宫署令二人皇朝減一人丞二人正九品下隋守宫丞四人皇朝減置二人監事二人從九品下守宫署令掌邦國供帳之屬辨其名物㑹其出入丞為之貳凡大祭祀大朝㑹大駕廵幸則設王公百官位扵正殿南門外若吏部禮部兵部考功試人則供帳幕之屬若王公婚禮亦供其張具宗正寺卿一人從三品石氏星經云宗正二星在帝座東南周禮小宗伯掌三族之别以辨親踈漢百官表云宗正秦官掌親属平帝元始四年更名宗伯王莾并其官扵秩宗光武復置續漢書百官志宗正掌序録王國嫡庻之次宗室親属逺近漢宗正之官不以他族椘元王子郢客劉辟強劉徳等逓為之魏亦以宗室居之晉桓温奏省属太常宋齊並不置梁天監七年乃置焉宗正春卿位視列曹尚書皆以宗室為之班第十三陳因之後魏亦曰宗正卿第二品上北齊第三品隋開皇初宗正卿三品煬帝為從三品皇朝因之光宅元年改為司属神龍初復為宗正少卿二人從四品上後魏太和中初置少卿第三品二十三年為第四品隋初正四品煬帝降為從四品皇朝因之丞一人從六品上漢宗正有丞秩干石厯魏晉亦如之東晉省宋齊因之梁宗正丞為四班陣六百石第八品後魏第七品北齊因之隋初丞二人並七品下煬帝大業五年増為從五品皇朝置一人從六品上主簿二人從七品上梁天監十年置為七班陳因之北齊同隋置二人皇朝置一人開元二十五年加一人自卿以下並扵宗室中擇才行者補授也録事一人從九品上宗正卿之職掌皇九族六親之屬籍以别昭穆之序紀親䟽之列并領崇𤣥署少卿為之貳九廟之子孫其族五十有九光皇帝一族定州刺史乞豆景皇帝之族六譙蔡畢雍郇鄭譙王蔡王二族無後元皇帝之族三梁蜀漢梁王漢王二族無後髙祖之族二十有一隠太子衛巢椘荆漢鄷周徐韓彭鄭霍號道鄧舒魯江宻滕隠太子衛王巢王椘王荆王漢王鄷王周王八族無後太宗之族十有三恒山椘呉濮齊蜀蔣越紀代江趙曹椘王齊王蜀王越王江王代王趙王七族無後恒山王貞觀中降為庻人開元二十四年孫適之為御史大夫朝政肅清多所綱紀上嘉其才能因追雪而復舊焉髙宗之族六梁許澤郇孝敬章懐梁王許王孝敬三族無後郇王追封許王中宗之族四懿徳庻人節閔殤帝懿徳太子庻人重福殤帝並無後睿宗之族五寧王惠莊惠文惠宣隋王隋王無後凡太皇太后皇太后皇后之親分五等皆先定扵司封宗正受而統焉凡皇周親皇后父母為第一等準三品皇大功親皇小功尊屬太皇太后皇太后皇后周親為第二等準四品皇小功親皇緦麻尊屬太皇太后皇太后皇后周大功親為第三等準五品皇緦麻親為第四等皇袒免親太皇太后小功卑屬皇太后皇后緦麻親及舅母姨夫為第五等並準六品其籍如州縣之法凡大祭祀及册命朝㑹之禮皇親諸親應陪位豫㑹者則為之簿書以申司封若皇親為王公子孫應襲封者亦如之丞掌判寺事主簿掌印及勾檢稽失崇𤣥署令一人正八品下北齊有昭𤣥寺掌釋道二教置大統一人都維那三人亦有主簿功曹員以管諸州縣沙門又鴻臚寺統典寺署有丞一人後周有司寂上士中士掌法門之政又有司𤣥中士下士掌道門之政隋置崇𤣥署令丞煬帝改佛寺為道塲改道觀為𤣥壇各置監丞皇朝又為崇𤣥署令又置諸寺觀監𨽻鴻臚寺毎寺觀各監一人貞觀中省開元二十五年敕以為道本𤣥元皇帝之教不宜属鴻臚自今已後道士女道士並宜属宗正以光我本根故署亦隨而𨽻焉其僧尼别𨽻尚書祠部也丞一人正九品下北齊昭𤣥寺有僧祇部丞隋崇𤣥署丞一人皇朝因之崇𤣥令掌京都諸觀之名數道士之帳籍與其齋醮之事丞為之貳唐六典卷十六
