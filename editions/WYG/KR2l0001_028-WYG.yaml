body:
  text: 唐六典卷二十八唐張九齡等撰太子左右衛及諸率府太子左右衛率府率各一人副率二人長史一人錄事參軍事一人錄事一人史二人倉曹參軍事一人府一人史二人兵曹參軍事一人府二人史三人胄曹參軍事一人府二人史二人亭長二人掌固二人司階一人中候二人司戈二人執㦸二人左右率府親府勲府翊府中郎將各一人左郎將一人右郎將一人錄事一人兵曹參軍事一人府一人史二人校尉五人旅帥十人隊正二十人副隊正二十人太子左右司禦率府率各一人副率二人長史一人錄事參軍事一人錄事一人史二人倉曹參軍事一人府一人史二人兵曹參軍事一人府二人史三人胄曹參軍事一人府二人史三人亭長二人掌固二人司階一人中候二人司戈二人執㦸三人太子左右清道率府率各一人副率二人長史一人錄事參軍事一人錄事一人史二人倉曹參軍事一人府一人史二人兵曹參軍事一人府二人史三人胄曹參軍事一人府二人史二人亭長二人掌固二人司階一人中候二人司戈二人執㦸三人太子左右監門率府率各一人副率二人長史一人錄事參軍事一人錄事一人史二人兵曹參軍事一人府二人史二人胄曹參軍一人府二人史二人亭長二人掌固二人監門直長七十八人太子左右内率府率各一人副率一人長史一人錄事參軍事一人錄事一人史二人兵曹參軍事一人府一人史二人胄曹參軍事一人府一人史一人亭長二人掌固二人千牛十六人備身二十八人主仗六十人太子左右衛率府率各一人正四品上秦漢詹事屬官有太子衛率後漢為少傅屬官秩四百召主門衛士魏因之晋初為衛率太始五年分為左右二率惠帝為太子加置前衛率愍懷在東宫又加後衛率故元康之中凡四衛率成都王為太弟又置中衛率是為三率凡太子出前衛率導在前黄麾外左右二率從挾導輿車後衛率從在烏皮外並載㦸執刀四率各丞一人服視左右衛將軍品第五位同中庶子過江省前後率梁孝武帝復置宋又省齊左右衛率武冠絳朝復品第五秩千石梁位視御史中丞左衛率領果毅統逺立忠建寜陵銘夷寇祚徳等七營右衛率領崇榮永吉崇和細射等四營陳因之後魏太和二十二年太子左右衛率從第三品北齊有太子左右衛坊率後周東宫官貟有司成司武司衛之類至隋文帝始分置左右衛率左右宗衛率左右虞候開府左右内率左右監門率凡十府以備儲闈武衛之軄煬帝改左右衛率為左右侍率皇朝復為左右衛龍朔二年改左右衛府為左右典戎衛咸亨如故掌統東宫二寺十率府之事舉其紀綱而修其職務焉副率各二人從四品上隋文帝置煬帝改為左右侍副率皇朝復為左右衛副率龍朔咸亨隨衛改復左右衛率掌東宫兵仗羽衛之政令以緫諸曹之事凡親勲翊府及廣濟等五府屬焉副率為之貳凡元正冬至皇太子朝宫苑諸方使則率衛府之屬以儀仗為左右廂之周衛若皇太子備禮出入則如鹵簿之法以從毎月親勲翊三府之衛及廣濟等五府之超乗應番上者配于所軄長史各一人正七品上隋置皇朝因之錄事參軍事各一人從八品上隋置皇朝因之倉曹參軍事各一人從八品下隋置皇朝因之兵曹參軍事各一人從八品上隋置皇朝因之胄曹參軍事各一人從八品下隋置為鎧曹皇朝因之長安中改為胄曹參軍神龍初復為鎧曹太極中又為胄曹司階各一人從六品上中候各二人從七品下司戈各二人從八品下執㦸各三人從九品下長史掌判諸曹及三府五府之事凡府事大事則從其長小事則專達季秋以其屬官之狀上於率而為之考課錄事參軍事掌監印發付勾稽倉曹掌親勲翊三府廣濟等五府文官之簿書凡勲階考課假使禄賜及公廨財物田園食料皆典之兵曹掌親勲翊三府廣濟等五府武官親勲翊衛士之名簿及其番上差遣之法式凡上番者皆受其名簿而咨配于率兼知公私馬及雜畜之簿帳胄曹掌親勲翊三府廣濟等五府器械諸公廨繕造之物事凡大朝㑹行從應請戎仗者則具其名數受之於主司既事而歸之左右率府親府勲府翊府中郎將各一人從四品上中郎將之説已具上左右衛梁左衛率領七營右衛率領四營二率各領殿中將軍十人貟外將軍十人又有正貟司馬員外司馬彍騎歩兵翊衛三校尉謂之二校旅賁中郎將并從㒒射謂之二將又有左右積弩將軍各一人北齊太子左右衛坊率各領騎官備身貟又有内直備身正副都督備身二職等貟又有直閤直前直後員又有旅騎屯衛典軍等校尉各二人騎都尉三十人隋左右衛率下有直閤四人直寢八人直前直後各十人皇朝左右衛率各置親勲翊親府毎府中郎將二人郎將二人掌其府校至帥及親勲翊衛之屬以宿衛左右郎將各一人正五品下皇朝置中郎將郎將掌其府校尉旅帥及親勲翊衛之屬以宿衛而緫其府事兵曹掌判勾若大朝㑹及皇太子備禮出入則從鹵簿之法而監其羽儀太子左右司禦率府率各一人正四品上隋文帝置左右宗衛率各一人副率二人掌領宗人侍衛職擬左右領軍将軍加置行參軍二人煬帝改為左右武侍率皇朝復為左右宗衛龍朔二年改為左右司禦衛率府神龍初又為宗衛開元初復為左右司禦率衛副率各二人從四品上隋文帝置皇朝因之其後改復皆隨於府左右司禦率府率長同左右衛率副率為之貳郊城等三府之旅賁應番上者各配于所職長史各一人正七品上錄事參軍事各一人從八品下倉曹參軍事各一人從八品下兵曹參軍事各一人從八品下胄曹參軍事各一人從八品下隋置左右虞候開府初無録事有長史及四曹參軍至煬帝改為率府始置録事皇朝因之餘其上說司階各一人從六品上中候各二人從七品下司戈各二人從八品下執㦸各三人從九品下長史掌判諸曹及郊城等三府之事餘皆如左右率府太子左右清道率府率各一人正四品上隋文帝置左右虞候各開府一人掌斥候非違職擬左右金吾將軍煬帝改為左右虞候率又各置二人皇朝因之龍朔二年改為左右清道衛神龍初又為虞候率府開元初復為清道率府副率各二人從四品下隋煬帝置皇朝因之龍朔開元隨府改復左右清道率府率掌東宫内外晝夜廵警之法以戒不虞凡絳邑等三府皆屬焉副率為之貳凡皇太子出入則領其屬以清㳺隊為之先以後拒隊為之殿其餘依鹵簿之法以從凡仗衛之出入置細引以導之兼為之糺正凡五十人用左右率之親勲翊衛為之分為五畨每番有主帥及中郎或左右郎将一人領焉毎月絳邑等府之直盪應番上者配于所職長史各一人正七品上録事參軍事各一人從八品上倉曹參軍事各一人從八品下兵曹參軍事各一人從八品下胄曹參軍事各一人從八品下司階各一人從六品上中候各二人從七品下司戈各二人從八品下執㦸各三人從九品下長史掌判諸曹及絳邑等三府之事餘如左右率府太子左右監門率府率各一人正四品上隋文帝置左右監門率各一人副率各二人掌諸門禁擬左右監門将軍各有直長十人煬帝改為左右監門將軍降為正五品皇朝復改為監門率龍朔二年改為左右從掖衛咸亨復舊垂拱中改為鶴禁衛神龍初復舊副率各二人從四品上隋文帝置正五品皇朝因之龍朔開元隨府改復左右監門率府率掌東宫諸門禁衛之法副率為之貳凡東宫諸司應以籍入于宫殿者皆本司具其官爵姓名以牒門司門司送于監門監門之主與判曹印署復送于門司門司㑹之同則聽入凡東宫内外門之守者並司其出入凡財物器用之出入于宫禁者皆以籍傍為據左右監門以出入之若皇太子出入則依鹵簿之法率其屬於牙門之左右以為捍守長史各一人從七品上録事參軍事各一人正九品上兵曹參軍事各一人正九品下胄曹參軍事各一人正九品下隋置左右監門率有長史已下等貟無倉曹以兵曹兼掌其事皇朝因之長史掌判諸門禁衛之事録事參軍事掌印兼勾稽失兵曹兼倉曹之職餘皆如左右率府其諸司籍傍判於監門者檢其官爵姓名年貌監其噐物檢其名數月終諸門之籍傍歸於府者則㑹其出入之數胄曹掌噐械及公私馬驢雜畜土木繕造之事凡諸府直馬配於左右監門之廵探者則請其料歸於馬主禁其隱歿棄遺者太子左右内率府率各一人正四品上隋文帝置左右率副率領東宫千牛備身侍奉之事職擬千牛將其備身有千牛備身八人掌執千牛刀備身左右十六人掌供奉弓箭備身二十人掌宿衛侍從煬帝降内率為正五品皇朝因加至四品上龍朔二年改為左右奉御率神龍初復舊副率各一人從四品上隋置皇朝因之龍朔神龍隨府以復左右内率府之職掌東宫千牛備身侍奉之事而主其兵仗緫其府事而副率為之貳以千牛執細刀弓箭以備身宿衛侍從以主仗守戎服噐物凡皇太子坐朝則領千牛備身之屬升殿若射于射宫則率領其屬以從位定千牛備身奉細弓及矢立於東階上西面率奉弓副率奉矢及决拾北面張弓左執弣右執簫以進副率以巾拂矢而進進訖各退立於位及射左右内率啟其矢中及不中既事受亦如之長史各一人從七品上録事參軍事各一人正九品上兵曹參軍事各一人正九品下胄曹參軍事各一人正九品下隋置左右内率有長史已下等貟無兵曹皇朝置之長史掌判諸曹官吏及千牛備身之事餘如左右率府録事參軍事掌印兼勾簿書及其勲階考課稽失兵曹掌文武官及千牛備身之簿書及其勲階考課假使禄奉之事胄曹掌細引仗及羽儀之物自千牛已下各分而典之唐六典卷二十八
