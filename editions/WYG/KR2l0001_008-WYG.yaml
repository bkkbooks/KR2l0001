body:
  text: 唐六典卷八唐張九齡等撰門下省門下省侍中二人黄門侍郎二人給事中四人録事主事各四人令史十二人書令史二十二人田庫令史七人傳制八人亭長六人修補制敕匠五人掌固十人左散騎常侍二人諌議大夫四人左補闕二人左拾遺二人起居郎二人令史三人典儀二人賛者十二人城門郎四人令史一人書令史二人門僕八百人符寳郎四人令史二人書令史三人主寳六人主符三十人主節十八人𢎞文殿學士無常員校書郎二人學生三十人令史二人楷書手二十五人典書二人搨書手三人筆匠三人熟紙装潢匠八人亭長二人掌固四人侍中二人正三品漢書百官表云侍中皆加官所加或列侯将軍卿大夫無員多至四十人得入禁中諸曹受尚書事皆秦制漢官云秩比二十石董巴輿服志侍中冠武弁大冠亦曰惠文冠加金璫附蟬為文貂尾為飾侍中服之則左貂常侍則右貂金取堅剛百錬不耗蟬取居高飲清貂取内勁悍外温潤本趙武靈王胡服之制秦滅趙得其冠賜侍中焉漢制分掌乗輿服物功高者一人為正僕射後漢初亦加官出宣帝命入僃顧問法駕出多識者一人叅乗兼負傳國璽操斬白蛇劍餘皆騎在乗輿車後從駕入廟祠天子上堂盥以巾奉酒魏武改僕射為祭酒蔡質漢官典職曰侍中在尚書僕射下尚書上舊與中官皆止禁中宿直廬在石渠門外武帝時侍中僕射馬何羅挟刃謀逆由是侍中出禁外王莽秉政復止禁中惠帝元和中侍中郭舉與後宫通伏誅由是復出外靈帝時侍中舍有八區論者因言員有八人未詳也獻帝起居注云初置侍中六人出入禁中近侍帷幄省尚書事魏氏侍中置四人省祭酒祭而加官不在數服秩依漢氏掌儐賛威儀大駕出則次直侍中護駕正直侍中負璽陪乗不帶劍餘皆騎從御登殿與散騎常侍對秩侍中居左常侍居右僃切問近對拾遺補闕晉令侍中品第三武官絳朝服佩水蒼玉東晉桓温奏省二人後又復舊宋氏掌奏事直侍左右殿内門下衆事皆掌之餘同晉氏齊氏又以高功者一人為祭酒掌詔令機宻朝㑹多以美姿容者兼其官餘同宋氏梁氏秩二千石品第三後班第十二與給事黄門侍郎一人對掌禁令陳氏依梁後魏侍中六人加官在數初從第一品中太和末革令正第三品北齊因之掌獻納諫正及進御之職後周天官府置御伯中大夫二人天子出入則侍中左右大祭祀盥洗則受巾武帝改御伯為納言盖侍中之職也宣帝末又别置侍中為加官隋氏諱忠改為納言置二人正三品掌陪從煬帝十二年改納言為侍中皇朝初為納言武徳四年改為侍中初秦漢置侍中曹無臺省之名自晉始有門下省歴宋齊梁陳後魏北齊隋國初皆曰門下省龍朔二年改為東臺左相咸亨元年復舊光宅元年改為鸞臺納言神龍元年復舊開元元年改為黄門監五年復舊曰門下省侍中侍中之職掌出納帝命緝熙皇極縂典吏職賛相禮儀以和萬邦以弼庶務所謂佐天子而統大政者也凡軍國之務與中書令參而縂焉坐而論之舉而行之此其大較也凡下之通于上其制有六一曰奏抄謂祭祀支度國用授六品以下官斷流已下罪及除免官當者並為奏抄二曰奏彈謂御史糺劾百司不法之事三曰露布謂諸軍破賊申尚書兵部而聞奏焉四曰議謂朝之疑事下公卿議理有異同奏而裁之五曰表六曰状蔡邕獨斷凡羣臣上書通於天子者四品一曰章二曰奏三曰表四曰駮議章者稱稽首上以聞謝恩陳事詣闕通者也奏者上言稽首言下言稽首以聞其中有所謂若罪法劾案公府送御史臺卿校送謁者臺通者也表者上言臣某言下言臣某誠惶誠恐頓首頓首死罪死罪左方下附曰某官某申上以詣尚書通者也公卿校尉諸将不言姓大夫以下皆言姓報章曰聞報奏曰可其表文尚書報所上云已奏如書凡表章以啓封其言宻事得皂嚢其有疑事公卿百官㑹議而執異意者曰駮議曰某主甲議可為如是下言愚戅議異其合於上意者文報曰某官某甲議可漢承秦法羣臣上書皆言昧死言王莽慕古改昧死曰稽首光武因而不改章奏制度自漢已後多相因循隋令有奏抄奏彈露布等皇朝因之其駮議表状等至今常行其奏抄露布侍中審自餘不審皆審署申覆而施行焉復奏畫可訖留門下省為案更寫一通侍中注制可印縫署送尚書省施行凡法駕行幸則負寳以從秦漢初置侍中主諸御物品秩亦卑晉魏以來其任漸重至隋乃為宰相之職任負寳之儀因而不改甚非尊崇宰輔之意大朝㑹大祭祀則版奏中嚴外辦以為出入之節輿駕還宫則請觧嚴所以告禮成也凡大祭祀皇帝制齋既朝則請就齋室將奠則奉玉及幣以進盥手則酌罍水以奉及贊酌汎齊進福酒以成其禮焉若饗宗廟則進瓚而贊酌鬱酒以裸既祼則贊酌醴齊其餘如饗神祗之禮籍田則奉耒以贊事唐禮廩犧令供耒司農卿受之以授侍中凡諸侯王及四夷之君長朝見則承詔而勞問之臨軒命使冊后及太子則承詔以命之唐禮侍中前承詔降宣詔曰冊某氏女為后命公等持節展禮冊太子亦如之凡制勅慰問外方之臣及徴召者則監其封題若發驛遣使則給其傳符以通天下之信凡官爵廢置刑政損益皆授之于記事之官既書於䇿則監其記注焉凡文武職事六品以下所司進擬則量其階資校其材用以審定之若擬職不當随其便屈退而量焉黄門侍郎二人正四品上晉軄官志云黄門侍郎秦官也無常員掌侍從左右漢因之秩六百石劉向戒子歆書曰今若年少得黄門侍郎要處也應劭曰黄門侍郎毎日暮向青瑣門拜謂之夕郎初秦又有給事黄門之職漢因之至後漢并二官曰給事黄門侍郎掌侍從左右關通中外諸王朝見則引王就坐至獻帝時與侍中各置六員出入禁中近侍帷幄省尚書事後又改為侍中侍郎尋復舊為給事黄門侍郎魏氏置四人東晉桓温奏省二人後又復舊所掌與侍中俱置四人管門下衆事與散騎常侍並清華而代謂之黄散焉晉令品第五秩六百石武冠絳朝服宋氏因晉而郊廟則一人執盖臨軒朝㑹則一人執麾齊因晉宋又與侍中叅典詔命侍中呼為門下給事黄門侍郎呼為小門下梁氏増秩二千石品第五後班第十與侍中同掌侍從左右儐相威儀盡規獻納糺正違闕監合嘗御藥針璽書高功者一人與侍中祭酒對掌禁令陳氏因梁後魏給事黄門侍郎史闕其員初正第三品太和未正第四品上北齊置六人品依魏氏所掌與侍中同後周天官府置御伯下大夫二人武帝為納言下大夫掌貳納言上大夫之軄隋置四人正第四品上煬帝減二人去給事之名直曰黄門侍郎隋氏用人益重皇朝因之龍朔二年改為東臺侍郎咸亨元年復舊光宅元年改為鸞臺侍郎神龍元年復舊黄門侍郎掌貳侍中之軄凡政之㢮張事之與奪皆叅議焉若大祭祀則從升壇以陪禮皇帝盥手則奉巾以進既帨則奠巾于篚奉匏爵以賛獻凡元正冬至天子視朝則以天下祥瑞奏聞給事中四人正五品上漢書百官表云給事中亦加官所加或大夫博士議郎皆秦制漢議註諸給事中曰上朝謁平尚書奏事分為左右以有事殿中故曰給事中多名儒國親為之掌左右顧問位次中常侍後漢省其官魏氏復置或為加官或為正員晉氏無加官亦無常員𨽻散騎省位次散騎常侍晉令云品第五武冠絳朝服宋齊𨽻集書省位次諸散騎下奉朝請上梁陳秩六百石品第七與諸散騎常侍侍從左右獻納得失省諸奏聞後魏史闕其員初從第三品上太和未從第六品上北齊集書省置六十員從第六品上後周天官府置給事中士六十人掌理六經及諸文誌給事於帝左右其後六官之外又别置給事中四人隋初於門下省置給事中二十人掌陪從朝直煬帝名給事郎減置四人位次黄門侍郎下從第五品掌省讀奏皇朝又曰給事中龍朔二年改為東臺舍人咸亨元年復舊給事中掌侍奉左右分判省事凡百司奏抄侍中審定則先讀而署之以駮正違失凡制勑宣行大事則稱揚徳澤褒美功業覆奏而請施行小事則署而頒之凡國之大獄三司詳决若刑名不當輕重或失則援法例退而裁之凡發驛遣使則審其事宜與黄門侍郎給之其緩者給傳即不應給罷之凡文武六品已下授軄所司奏擬則校其仕歴深淺功状殿最訪其徳行量其材藝若官非其人理失其事則白侍中而退量焉若文武進級至于三品五品則覆其入仕之階考㑹所由之状而奏裁之凡制敕文簿授官甲厯皆貯之於庫監其檢覆以出入焉其𢎞文舘圗書繕寫讎校亦課而察之凡天下寃滯未申及官吏刻害者必聼其訟與御史及中書舍人同計其事宜而申理之毎日令御史一人共給事中中書舍人受詞訟若告言官人事害政者及抑屈者奏聞自外依常法錄事四人從七品上後魏門下省錄事從第八品北齊門下錄事置四人從第八品上隋氏置六人煬帝三年加門下錄事為正第八品皇朝置三人龍朔二年改為東臺主書咸亨元年復舊開元初減置一人主事四人從八品下晉置門下主事歴宋齊品第八梁陳名為門下主事令史北齊門下主事令史八人從第八品上隋初諸臺省並置主事令史煬帝三年直曰主事舊令從九品上開元二十四年勑加入從八品上田庫令史七人晉置門下令史品第九宋及梁陳並同晉氏後魏北齊門下並有令史及書令史自漢以來令史皆有品秩至隋開皇初始降為流外行署傳制八人晉書劉裕舉義兵襲徐州刺史栢循令何無忌偽著傳詔服稱敕宋城中無敢動者又齊受禪時侍中謝朏在直傳詔呼云須侍中解印朏曰齊當自有侍中乃朝服歩出梁陳二代並有傳詔之職而用人猶重天后改為傳制掌送制敕流外之中最小吏也分畨上下亦呼為畨官左散騎常侍二人從三品秦置散騎又置中常侍其散騎傍乗輿專獻可替否中常侍得出入禁中常侍左右漢因之並用士人無常員皆加官所加或列侯将軍卿大夫等冠武冠皆銀璫附蟬為文貂尾為飾謂之貂蟬後漢省散騎而中常侍改用宦者魏黄初復置散騎與中常侍合為一直曰散騎常侍復用士人晉置四人典章表詔命優文策文等雖𨽻門下别為一省潘岳云寓直散騎之省是也又領六散騎則有員外散騎常侍無常員魏末散騎常侍有在員外者因名焉又有通直散騎常侍四人晉太始十年使二人與散騎常侍通員直因名焉又有散騎侍郎四人魏與散騎常侍同置自魏至晉散騎常侍侍郎與中黄門侍郎共平章尚書奏事江左乃罷之又有員外散侍郎無常員晉武所置又有通直散騎侍郎四人東晉并中書入散騎省故庾亮讓中書牋曰方今并省不宜多官往以中書事并附散騎此事宜也方今喉舌之要則任在門下表章詔命則取之散騎殊無事復立中書也晉代此官選任愈重時與黄門侍郎謂之黄散晉令云散騎常侍品第三冠右貂金蟬絳朝服佩水蒼玉宋置散騎常侍四人亦以加官九次者為祭酒領六散騎焉又置集書省領之齊因省祭酒之號梁因之而加秩中一千石後班第十二高功一人為祭酒與散騎侍郎一人對掌禁令自宋以來用人雜故其官漸替梁大同雖革選比侍中而人終不見重天監六年詔曰帶騎常侍員外散騎常侍通直散騎常侍為清望宜革選恭舊例自是散騎視侍中通直視中丞員外視黄門侍郎陳氏因之後魏集書省置散騎常侍第二品太和未從三品亦領六散騎北齊置六人餘同魏氏後周散騎常侍為加官隋文帝門下省置散騎常侍四人從第三品掌陪從朝直亦置六散騎常侍開皇六年省員外散騎常侍煬帝三年又省散騎常侍散騎侍郎武徳初散騎常侍加官貞觀初置散騎常侍二員𨽻門下省顯慶三年又置員外𨽻中書省始有左右之號並金蟬珥貂左散騎與侍中左貂右散騎與中書令右貂謂之八貂龍朔二年改為左常侍咸亨元年復舊左散騎常侍掌侍奉規諷僃顧問應對諫議大夫四人正五品上漢書百官表云秦諫大夫属中令無常員多至數十人掌議至武帝元狩六年始因秦置之秩比六百石光武中興諫議大夫置十三員魏氏因之史闕員品晉宋齊梁陳並置至後魏始置之正第四品北齊集書省置諫議大夫七人從第四品下後周地官府置保氏下大夫一人掌規諫皆其任也隋氏門下省置諫議大夫七人從四品下皇朝置四人龍朔二年改為正議大夫神龍元年復舊諫議大夫掌侍從賛相規諫諷諭凡諫有五一曰諷諫風之以言謂之諷諫孔子曰諫有五吾從風白虎通曰人懐五常之性故有五諫也二曰順諫謂其所不可不敢逆而諫之則順其君之所欲以㣲通之若優旃之比三曰規諫謂陳其規而正其事四曰致諫謂致物以明其意五曰直諫謂直言君之過失必不得巳然後為之者左補闕二人從七品上皇朝所置言國家有過闕而補正之故以名官焉詩云衮職有闕仲山甫補之盖取此義後漢伏湛出入禁闈拾遺補闕魏志文帝勑侍臣曰公卿等宜拾朕之遺補朕之缺晉武帝詔曰公卿等宜補闕拾遺獻可替否晉職官志御登殿侍中居左散騎常侍居右僃切問近對拾遺補闕後魏孝文帝令侍中李冲補闕左右垂拱中因其義而創立四員左右各二焉天授初左右各加三員通前為十員神龍初依舊各置二人其才可則登不拘階敘又置内供奉無員數才職相當不待闕而授其資望亦與正官同禄俸等並全給右補闕亦同左拾遺二人從八品上皇朝所置言國家有遺事拾而論之故以名官焉史記汲黯曰臣願為中郎署長出入禁闥補闕拾遺漢書元帝初立給事中劉向侍中金敞拾遺於左右後漢張衡為侍中恒居帷幄從容諫議拾遺左右後魏初置内侍長主拾遺應對若今之侍中散騎又孝文帝命侍中邱惟拾遺左右垂拱中因其義而創立四員左右各二焉天授初左右各加三員通前共為十員神龍初依舊各置二員才可則登不拘階敘亦置内供奉無同員數資望俸祿並如正官右拾遺亦左補闕拾遺掌供奉諷諫扈從乗輿凡發令舉事有不便於時不合於道大則廷議小則上封若賢良之遺滯於下忠孝之不聞於上則條其事状而薦言之起居郎二人從六品上起居郎因起居注以為名起居注者紀録人君動止之事春秋傳曰君舉必書禮云動則左史書之言則右史書之又曰左史記事右史記言言爲尚書事為春秋皆其事也宋𠂻世本云沮誦蒼頡為黄帝左右史周書穆王時有左史戎夫書前代存亡之誡諸侯之國亦立之晉武帝時得汲冢書有穆天子傳體制與當時起居注正同盖周左右史之所録也漢武有禁中起居注後漢明徳皇后撰明帝起居注然則漢時起居注似在宫中為女史之軄魏晉已来皆中書著作兼修國史元康二年著作𨽻入秘書别名著作省歴宋齊梁陳皆掌國史後魏及北齊集書省領起居注令史之職從第七品上後周春官府置外史掌書言及動作以為國誌即其任也又有著作二人掌綴國録盖起居著作自此分也隋省内史舍人四員而始置起居舍人二員皇朝因之貞觀二年省起居舍人移其軄於門下置起居郎二員顯慶中又置起居舍人始與起居郎分在左右龍朔二年改為左史咸亨元年復故天授元年又改為左史神龍元年復故令史三人先置楷書手今改為令史起居郎掌録天子之動作法度以修記事之史凡記事之制以事繫日以日繫月以月繫時以時繫年必時書其朔日甲乙以紀厯數典禮文物以考制度遷拜旌賞以勸善誅伐黜免以懲惡季終則授之于國史焉漢獻帝及西晉以後諸帝皆有起居注皆史官所録自隋置爲職員列為侍臣專掌其事毎李爲卷送付史官典儀二人從九品下周禮秋官有司儀上士八人中士十有六人盖皆典儀之任也齊職儀云東官殿中将軍屬官有導客局置典儀録事一人掌朝㑹之事史闕其品秩梁有典儀之職未詳何曹之官掌唱警唱奏之事朱服武冠陳亦有之後魏置典儀監從第五品史闕其員及所掌皇朝置典儀二人𨽻門下省初用人皆輕至貞觀初李義府爲之是後常用士人領賛者以知賛唱之節賛者十二人隋太常寺有賛者十六人鴻臚寺有賛者十二人皇朝因置之𨽻門下省掌賛唱為行事之節分番上下亦為之番官典儀掌殿上賛唱之節及設殿庭版位之次若元正冬至大朝㑹王公外殿既坐酒至而起皆傳賛唱而為之節也凡國有大禮侍中行事及進中嚴外辦之版皆賛相焉城門郎四人從六品上周禮地官有司門下大夫二人上士四人盖城門郎之任也初漢置城門校尉員一人秩二千石掌城門屯兵有司馬及丞各二人十二城門候各二人出從緹騎百二十人盖兼監門将軍之職魏因之晉氏品第四秩二千石銀章青綬絳朝服武冠佩水蒼玉元帝省之宋齊俱以衞尉掌宫城屯兵及管鑰之事梁陳二代依秦漢以光禄卿掌宫殿門户亦無城門之職後魏置城門校尉第三品下太和末第四品上北齊衞尉寺統城門寺置城門校尉二人第四品上掌宫殿門并諸倉庫管鑰之事而後周地官府置官門中士一人下士一人掌皇城五門之禁令又置城門中士一人下士一人掌皇城十二門之禁令盖並其任也隋氏門下省統城門局校尉二人從第四品下煬帝三年又𨽻内省十二年又減一人降爲正第五品後又改校尉為城門郎置四人從第六品又𨽻門下省皇朝因之門僕八百人按晉光祿勲左中郎将有崇禮等門僕各二人隋有太廟郊杜門僕皇朝城門郎置門僕分番上下掌送管鑰城門郎掌京城皇城宫殿諸門開闔之節奉其管鑰而出納之明徳等門為京城門朱雀等門為皇城門承天等門為宫城門嘉徳等門為宫門太極等門為殿門通内等門並同上閣門東都諸門准此開則先外而後内闔則先内而後外所以重中禁尊皇居也候其晨昏擊鼓之節而啓閉之承天門擊曉鼔聼擊鍾後一刻鼓聲絶皇城門開第一鼕鼕聲絶宫城門及左右延明乾化門開第二鼕鼕聲絶宫殿門開夜第一鼕鼕聲絶宫殿門閉第二鼕鼕聲絶宫城門閉及左右延明門皇城門閉其京城門開閉與皇城門同刻承天門擊鼔皆聼漏刻契至乃擊待漏刻所牌到鼓聲乃絶凡皇城宫城闔門之鑰先酉而出後戍而入開門之鑰後丑而出夜盡而入宫城皇城鑰匙毎日入前五刻出閉門一更二㸃進入五更一㸃出開門夜漏盡第二鼕鼕後二刻而進入京城闔門之鑰後申而出先子而入開門之鑰後子而出先卯而入京城門鑰匙於東廊下貯納毎去日入前十四刻出閉門二更一㸃入四更一㸃出開門夜漏盡第二鼕鼕後十刻入若非其時而有命啓閉則詣閤覆奏奉㫖合符而開闔之殿門及城閉若有敕夜開受敕人具錄須開之門宣送中書門下其牙内諸門城門郎與監直監門将軍郎将各一人俱詣閣覆奏御注聴即請合符門鑰對勘符然後開之凡車駕廵幸所詣之所訃其應啓閉者先發而請其管鑰及至即開闔如京城之制符寳郎四人從六品上周禮地官有掌節春官又有典瑞並其任也自漢以来唯旌節稱節餘皆號符焉寳即璽也秦為符璽令史記云始皇出遊㑹稽丞相李斯中車府令趙高從高兼行符璽令事是也漢因秦置符節令丞属少府漢官云秩四百石漢書云昭帝幼冲霍光秉政殿中夜驚光召符璽郎取璽郎不與光奪之郎按劍曰臣頭可得璽不可得光壮之増秩二等後漢則别為一臺亦属少府置符節令一人為臺率主符節事凡遣使掌授節令尚符璽郎中四人兩漢皆傳秦六璽及傳國璽魏符節令位次御史中丞晉武帝太始元年省并蘭臺置符節御史宋因之齊置主璽令史於蘭臺以侍書御史領之梁陳御史臺並置符節令史後魏御史臺置符節令領符璽郎中初從第四品中太和未從第六品上北齊御史臺領符節署令一人領符璽郎中四人後周天官府置主璽下士四人分掌神璽傳國璽與六璽之蔵隋初門下省統六局符璽局置監二人正第六品上直長四人從第七品上煬帝二年改為郎從第六品皇朝因隋置符璽郎四人天后更名符寳郎授命及神璽等八璽文並瑑為寳字神龍初復為符璽郎開元初又為符寳郎從璽文也主寳六人寳即璽也周書曰湯放桀大㑹諸侯取天子之璽置天子之座古者印璽二名尊卑共之諸侯大夫印亦稱璽春秋左傳曰李武子使季冶問璽書追而與之是也主寳掌之分番上下亦謂之番官主符三十人漢文帝時與郡守為竹使符第一至第五以代周之鎮圭納兵為銅獸符第一至第五以代周之牙璋各分半右留京師左以與之皆符合為信六國時魏公子無忌竊兵符矯命殺晉鄙則六國亦有之後漢太守都尉初除與璽書及發兵亦與璽書或與詔書姦僞刻造無由檢知至順帝以此制煩擾但召符節令發銅獸竹使符耳歴魏晉宋梁陳皆用之後魏有傳符歴北齊隋皆用之武徳初為銀菟符後改為魚符又有傳符主符掌之分番上下亦謂之番官主節十八人主節掌守幡節並分番上下亦謂之番官符寳郎掌天子之八寳及國之符節辨其所用有事則請於内既事則奉而蔵之八寳一曰神寳所以承百王鎮萬國二曰授命寳所以修封禪禮神祗徐令言玉璽記曰玉璽者傳國璽也秦始皇取藍田玉刻而為之其書李斯所製回文曰受命于天既夀永昌璽上隐起為盤龍文文曰受天之命皇帝夀昌方四寸紐五龍盤秦滅傳漢歴王莽為元后投之于地遂一角缺莽滅校尉公賔就收璽綬詣更始於宛更始敗以璽上劉盆子盆子降面縳上璽綬光武光武祠於高廟受傳國璽至靈帝崩少帝失位掌璽者投于井中為孫堅所得袁術拘其妻而奪之術死荆州刺史徐繆得璽還許上之漢滅傳魏至晉懐帝璽没于劉聪聪死劉曜得之又傳於石勒石季龍冉閔石季龍摩其隐起之文又刻其傍為文曰天命石氏後冉閔敗其将蒋韓求救於晉遂以璽送建業永和八年也歴東晉宋齊梁侯景竊位為景所得景敗為将侯子監盗璽走江東懼追兵至投諸佛寺為棲霞寺僧永得之陳永定三年僧永死弟子普智奉獻陳亡璽傳於隋又晉陽秋云晉孝武十九年雍州刺史郄恢於慕容永處得璽乃送建業其璽方六寸厚一寸七分高四寸六分蟠龍隐起文字巧妙一與傳國璽同但形制高入玉色不逮耳自晉至梁相傳謂之鎮璽及侯景敗侍中趙思齊挟以度江兗州刺史郭元建得之以送于齊文宣帝齊亡入周周傳于隋隋文帝初亦謂之為傳國璽開皇二年改為授命璽至開皇九年平江南得真傳國璽乃改前所得大者名神璽至大業初著之于令隋末又没于宇文化及竇建徳武徳四年克平東夏建徳右僕射裴矩奉傳國璽及神璽六璽以獻三曰皇帝行寳答䟽於王公則用之四曰皇帝之寳勞來勲賢則用之五曰皇帝信寳徴召臣下則用之六曰天子行寳答四夷書則用之七曰天子之寳慰撫蠻夷則用之八曰天子信寳發蕃國兵則用之衞宏漢舊儀曰天子有六璽皆白玉螭獸紐文曰皇帝行璽皇帝之璽皇帝信璽天子行璽天子之璽天子信璽虞喜志林曰所封事異故文字不同漢儀又云以皇帝行璽為凡雜以皇帝之璽賜諸侯王書以皇帝信璽發兵其徴大臣以天子行璽外國事以天子之璽鬼神事以天子信璽皆以武都紫泥封青布囊白素裏兩端縫尺一版中約署有事及發外國兵用天子信璽封拜外國及徴召用天子行璽賜匃奴單于外國王書用天子之璽下竹使符徴召大事行州郡國者用皇帝信璽諸下銅獸符發郡國兵用皇帝之璽封拜王公以下遣使就授皆用皇帝行璽若車駕行幸次直侍中佩信璽行璽以從天子之信古曰璽今曰寳其用以玉其封以泥皇后及太子之信曰寳其用以金也凡大朝㑹則捧寳以進于御座車駕行幸則奉寳以從于黄鉞之内今元正朝㑹則進神寳及受命寳若行幸則合八寳為五轝函籙封盛以從凡國有大事則出納符節辨其左右之異蔵其左而班其右以合中外之契焉一曰銅魚符所以起軍旅易守長兩京留守若諸州諸軍折衝府諸處捉兵鎮守之所及宫總監皆給銅魚符二曰傳符所以給郵驛通制命兩京留守及諸州若行軍所並給傳符諸應給魚符及傳符者皆長官執之其長官若被告謀反大逆其魚符付以次官無次官付受告之司三曰隨身魚符所以明貴賤應徴召親王及二品已上散官京官文武職事五品巳上都督刺史大都督府長史司馬諸都護副都護並給隨身魚符四曰木契所以重鎮守慎出納車駕廵幸皇太子監國有兵馬受處分者為木契若王公以下兩京留守及諸州有兵馬受處分并行軍所及領兵五百人以上馬五百疋以上征討亦各給木契其在外及行用法式並准魚符五曰旌節周禮掌儀職曰凡邦國之使節山國用獸節土國用人節澤國用龍節皆金也又云道路用旌節注云今漢使所擁是也漢書曰戻太子遭巫蠱事不自明取漢使節發兵與丞相劉屈氂戰初漢節純赤以太子持赤節故更為黄旄加以相别蘇武在匃奴執漢節毛落並其事也所以委良能假賞罰魚符之制王畿之内左三右一王畿之外左五右一左者在内右者在外行用之日從第一為首後事須用以次發之周而復始大事兼勑書替代留守軍将及軍發後更添兵馬新授都督刺史及改替追喚别使若禁推請假勅許及别敕觧任者皆須得勅書小事但降符凾封追遣使合而行之應用魚符行下者尚書省録敕牒門下省奏請仍預遣官典就門下對封封内連寫勑符與左魚同凾封上用門下省印共追右符凾盛封印亦准此傳符之制太子監國曰雙龍之符左右各十京都留守曰麟符左二十其右一十有九東方曰青龍之符西方曰騶虞之符南方曰朱雀之符北方曰𤣥武之符左四右三左者進内右者付外應執符人其兩京留守並進内若車駕廵幸留右符付留守人隨身魚符之制左二右一太子以玉親王以金庶官以銅隨身魚符皆題云某位姓名其官只有一員者不須著姓名即官名其曹司同者雖一員亦著姓名随身者仍著姓名並以袋盛其袋三品已上飾以金五品以上飾以銀六品以下守五品已上者不佩魚若在家非時及出使别敕負檢校并領兵在外不别給符契若須廻改處分者勘符同然後承用佩以為飾刻姓名者去官而納焉不刻者傳而佩之若傳佩魚皆須逓相付十日之内申報禮部木契之制太子監國則王畿之内左右各三王畿之外左右各五庶官鎮守則左右各十旌節之制命大将帥及遣使於四方則請而假之旌以專賞節以專殺𢎞文舘學士無員數後漢有東觀魏有崇文舘宋元嘉有𤣥史兩舘宋太始至齊永明有縂明舘梁有士林舘北齊有文林舘後周有崇文舘或典校理或司撰著或兼訓生徒若𢎞𢎞文舘之任也武徳初置修文舘武徳未改為𢎞文舘神龍元年避孝敬皇帝諱改為昭文神龍二年又改為修文景雲二年改為昭文開元七年又改為𢎞文𨽻門下省自武徳貞觀以來皆妙簡賢良為學士故事五品已上稱為學士六品已下為直學士又有文學直舘并所置學士並無員數皆以他官兼之儀鳯中以舘中多圗籍置詳正學士校理自垂拱以來多大臣兼領舘中有四部書貞觀初褚無量檢校舘務學士號為舘主因為故事其後有張太素劉偉之范履氷並特敕相次為舘主焉常令給事中一人判舘事學生三十人補𢎞文崇文學生例皇宗緦麻已上親皇太后皇后大功已上親散官一品中書門下三品同中書門下平章事六尚書功臣身食實封者京官職事正三品供奉官三品子孫京官職事從三品中書黄門侍郎子並聼預簡選性識聪敏者充貞觀元年勅見任京官文武職事五品已上有性愛學書而及有書性者聼於舘内學書其法書内出其年有二十四人入舘敕虞世南歐陽詢教示楷法黄門侍郎王珪奏學生學書之暇請置博士兼肄業焉敕太學助教侯孝遵授其經典著作郎許敬宗授以史後二年珪入奏請為學生置講經博士考試經業准試貢舉兼學法書校書郎二人從九品本置名讐校掌校典籍開元七年罷讎校置校書四人二十三年減二人典書二人舘中有經史子集四部之書使典之也其職同流外入考入流榻書手三人貞觀二十三年置龍朔三年舘内法書九百四十九卷並装進其榻書停神龍元年又置筆匠三人貞觀二十三年置熟紙装潢匠九人貞觀二十三年置𢎞文舘學士掌詳正圗籍教授生徒凡朝廷有制度㳂革禮儀輕重得叅議焉校書郎掌校理典籍刋正錯謬其學生教授考試如國子之制禮部試崇文𢎞文生舉例習經一大經一小經史習史記漢書後漢書三國志各自為業及試時務䇿五條經史皆讀文精熟言音典正䇿試十道取粗觧注義經通六史通三其時務䇿須文體不失問目意試五得三皆兼帖孝經論語共十條者為第唐六典卷八
