body:
  text: 唐六典卷二唐張九齡等撰尚書吏部吏部尚書一人侍郎二人郎中二人員外郎二人主事四人令史三十人書令史六十人亭長八人掌固十三人司封郎中一人員外郎一人主事二人令史四人書令史九人掌固四人司勲郎中一人員外郎二人主事四人令史三十三人書令史六十七人掌固四人考功郎中一人員外郎一人主事三人令史十五人書令史三十人掌固四人吏部尚書一人正三品周之天官卿也漢舊儀云尚書四人為四曹一曰常侍曹二曰二千石曹三曰民曹四曰客曹成帝増置三公曹為五曹其常侍曹王丞相御史公卿事後漢光武又分為六曹常侍曹為吏事曹主選舉齊祀事漢末又改吏部為選部専掌選舉靈帝以梁鵠為選部尚書魏改選部為吏部歴晉至宋孝武大明二年置二吏部尚書廢五兵尚書尋復舊名齊梁陳後魏北齊皆曰吏部尚書後周依周官置大冢宰卿一人七命隋復曰吏部尚書然此官歴代班序常尊不與諸曹同也漢官儀尚書秩五百石次補二千石晋令吏部尚書五時朝服納言幘進賢两梁冠佩水蒼玉乗軺車皂輪袁子正書曰尚書佩契刀囊執版加簮筆焉自魏至梁並第三品梁秩加至中二千石後定十八班班多為貴吏部尚書班第十四諸曹尚書班第十三陳梁隋吏部尚書並正第三品皇朝因之掌文官選舉龍朔二年改為司列大常伯咸亨元年復為吏部尚書光宅元年改為天官尚書神龍元年復故侍郎二人正四品上周之天官小宰中大夫也漢已來尚書侍郎今郎中之任也後周依周官隋煬帝三年尚書六曹吏部禮部兵部刑部民部工部各置侍郎一人以貳尚書之職並正第四品皇朝諸曹侍郎降為正四品下惟吏部侍郎為正四品上龍朔二年改為司列少常伯咸亨元年復為吏部侍郎總章元年與兵部各増一員光宅神龍並隨曹改復吏部尚書侍郎之職掌天下官吏選授勲封考課之政令凡職官銓綜之典封爵䇿勲之制權衡殿最之法悉以咨之其屬有四一曰吏部二曰司封三曰司勲四曰考功尚書侍郎總其職務而奉行其制命凡中外百司之事由於所屬皆質正焉凡選授之制每嵗孟冬以三旬㑹其人去王城五百里之内集於上旬千里之内集於中旬千里之外集於下旬以三銓分其選一曰尚書銓二曰中銓三曰東銓以四事擇其良一曰身二曰言三曰書四曰判毎試判之日皆平明集於試塲試官親送侍郎出問目試判兩道或有名學士考為等第或有試雜文以収其俊乂以三類觀其異一曰徳行二曰才用三曰勞効徳鈞以才才鈞以勞其優者擢而升之否則量以退焉所以正權衡與奪抑貪冐進賢能也然後據其状以覈之量其資以擬之五品已上以名聞送中書門下聽制授焉六品已下常參之官量資注㝎其才識頗髙可擢為拾遺補闕監察御史者亦以名送中書門下聼勅授焉其餘則各量資注擬若都畿清望歴職三任經十考已上者得隔路授之不然則否謂監察御史左右拾遺大理評事畿縣丞簿尉三任十考已上有隔品授者凡出身非清流者不注清資之官謂從流外及視品出身者其中書主書門下録事尚書都事厯任考詞使状有清幹及徳行言語兼書判吏用經十六考已上者聽擬寺監丞左右衛及金吾長史凡注官皆對面唱示若官資未相當及以為非便者聼至三注三注不伏注至冬檢舊判注擬凡伎術之官皆本司銓注訖吏部承以附甲焉謂秘書殿中太僕寺等伎術之官唯得本司遷轉不得外叙若本司無闕者聼授散官有闕先授若再經考滿者亦聼外叙凡同司聮事及句檢之官皆不得注大功已上親凡皇親及諸軍功兼注員外官其内外員外各官及檢試官本司長官量閒劇取素歴凊正舊人分判曹事自外則不判若長官及别駕長史司馬等官則不在此例凡任官階卑而擬髙則曰守階髙而擬卑則曰行凡三銓注擬訖皆當銓團甲以過左右丞相若中銓東銓則亦先過尚書訖乃上門下省給事中讀黄門侍郎省侍中審然後進甲以聞若尚書丞相門下批官不當者則改注亦有重執而上者凡大選終季春之月若有選人身在軍旅則軍中試書判封送吏部而注擬亦或春中不解而後集謂之春選若優勞人有勅却與處分及即與官者並聼非時選一百日内注擬畢所以定九流之品格補萬方之闕政官人之道備焉郎中二人從五品上周官太宰屬官有下大夫盖郎中之任也秦有郎中以其為郎侍衛居中故曰郎中漢選尚書郎初從三署郎次補之初入尚書䑓稱郎中滿歳稱侍郎故郎中之名猶因三署舊號也按吏部郎中後漢置之職在選舉魏晉用人妙於時選若其諸曹郎功髙者選為吏部郎其吏部郎歴代品秩皆髙於諸曹郎魏晋來晋吏部郎品第五諸曹郎第六梁吏部郎品第四班第六上諸曹郎班第十陳因梁後魏北齊吏部郎品正第四上諸曹班品正第六上後周依周官隋初二十四司並為侍郎品從第五煬帝三年置六司侍郎諸曹侍郎並改為郎又改吏部為選部郎異於六侍郎之名皇朝為吏部郎中龍朔二年改為司業大夫咸亨光宅神龍並随曹改復員外郎二人從六品上周官太宰属官有上士盖今員外郎之任也宋百官階次有員外郎美遷為尚書郎後周依周官隋文帝開皇六年尚書二十四司各置員外郎一人品從第六謂曹郎本員之外復置郎也煬帝三年又廢二十四司員外郎每司減一郎置承務郎一人同開皇員外郎之職曰選部承務郎一人皇朝尚書諸曹各置員外郎吏部置二人龍朔咸亨光宅神龍並隨曹改復主事四人從八品下隋煬帝初置為從九品下開元二十四年升為八品郎中一人掌考天下文吏之班秩品命凡叙階二十九從一品曰開府儀同三司後漢殤帝延平元年鄧隲為車騎将軍儀同三司儀同之名自此始也又吕布有正董卓之勲開府如三司魏黄初三年黄權為車騎将軍開府儀同三司開府之名自此始也其品第一梁班第十七陳氏秩萬石北齊從一品後周置上開府儀同三司開府儀同三司上儀同三司儀同三司等十一號以酬勤勞隋氏因之皇朝初惟置開府儀同三司為散官品正二品曰特進两漢及魏晋以為加官從本官服無吏卒品第二位次諸公下在開府驃騎上進賢兩梁冠黑介幘五時朝服無章綬又漢朝雜事云諸侯功徳優盛朝廷所敬異有賜位特進在三公下平冕𤣥衣侍祠郊廟宋百官階次江左皆兼官晋𫝊咸奏特進品第二執皮帛坐侍臣之下梁班第十七北齊特進第二品隋特進為正二品散官皇朝因之從二品曰光禄大夫秦郎中令属官有中大夫漢氏因之武帝太初元年更名光禄大夫秩比二千石掌論議無員後漢因之自魏以來諸公卿告老多加其位晋太始初分為左右光禄大夫皆無員若致仕又給六尺牀帳簟褥宋氏因之齊光禄勲府有左右光禄大夫皆銀章青綬若加金章紫綬者為金紫光禄大夫王晏乞一片金乃啓轉金紫梁陳並因之光禄大夫十三班後魏左右光禄大夫從第一品太和二十六年第二品北齊因之後周左右光禄大夫正二品隋為正一品散官煬帝改光禄大夫為從一品左光禄大夫正二品右光禄大夫從二品皇朝初猶有左右之名貞觀之後唯有光禄大夫正三品曰金紫光禄大夫本两漢光禄大夫也至魏晋有加金章紫綬者則謂為金紫光禄大夫晋則金紫銀青左右四職並置假金章紫綬及加金章紫綬並秩第二禄賜班位冠幘車服佩玉及諸所賜給皆與特進同自晋已後皆為兼官少有正授梁金紫光禄大夫為第十四班陳為中二千石北齊從二品隋氏因為散官煬帝為正三品皇朝因之從三品曰銀青光禄大夫本末與金紫同晋有銀青光禄大夫王翹之宋齊之後或置或省梁陳無職北齊三品隋正三品散官煬帝改為從三品皇朝因之然而加金章紫綬及銀章青綬則尊崇之合居光禄之上隋氏定令誤遂因仍不改正四品上曰正議大夫隋煬帝置為正四品散官盖取秦大夫官論議故置正議通議之名正四品下曰通議大夫隋煬帝置正四品從四品上曰太中大夫秦太中大夫秩比千石掌論議漢氏因之梁班第十一秩千石北齊從第三品皇朝為散官從四品下曰中大夫秦置中大夫漢武帝太初元年改為光禄大夫北齊中大夫第四品皇朝為散官正五品上曰中散大夫後漢有中散大夫六百石無員魏晋因之齊職儀品第七絳朝服進賢一梁冠梁班第十陳秩千石皇朝為散官正五品下曰朝議大夫漢班儀大夫以上得奉朝議則其義也隋文帝置朝議大夫為從三品散官從五品上曰朝請大夫漢諸将軍公卿年髙徳重者得以列侯就第特進奉朝請則其義也隋煬帝置朝請大夫為正五品散官從五品下曰朝散大夫隋文帝置朝散大夫為正四品散官煬帝改為從五品下正六品上曰朝議郎宋齊梁陳後魏北齊諸九品散官皆以将軍為品秩謂之加戎號隋開皇六年始置六品已下散官並以郎為正階尉為從階正六品上為朝議郎下為武騎尉従六品上為通議郎下為屯騎尉正七品上為朝請郎下為驍騎尉從七品上為朝散郎下為㳺騎尉正八品上為給事郎下為飛騎尉從八品上為承奉郎下為旅騎尉正九品上為儒林郎下為雲騎尉從九品上為文林郎下為羽騎尉煬帝又置八郎八尉六品置建節尉奮武尉七品置宣惠尉綏徳尉八品置懐仁尉守義尉九品置奉誠尉立信尉並為正從又六品置承議郎通直郎七品置宣徳郎朝散郎八品置登仕郎将仕郎九品置常從郎奉信郎亦為正從皇朝以郎為文職尉為武職遂採開皇大業之制以為六品已下散官正六品下曰承議郎隋煬帝置為正六品從六品上曰奉議郎隋文帝置通議郎皇朝改焉從六品下曰通直郎晋宋以來諸官皆有通直盖謂官有髙下而得通為宿直者隋煬帝置通直郎三十人從六品正七品上曰朝請郎晋宋齊梁陳並有奉朝請員正七品下曰宣徳郎隋煬帝置宣徳郎三十人正七品從七品上曰朝散郎隋文帝置從七品下曰宣議郎梁有宣議将軍隋文帝置㳺騎尉皇朝改焉正八品上曰給事郎隋文帝置正八品下曰徴事郎隋煬帝置從八品上曰承奉郎隋文帝置從八品下曰承務郎隋煬帝尚書二十四司各置承務郎一人類今尚書員外郎也皇朝因其名而置正九品上曰儒林郎前史各有儒林傳取其義也正九品下曰登仕郎從九品上曰文林郎北齊置文林舘徴文學之士以充之取其義也從九品下曰将仕郎凡散官四品已下九品已上並於吏部當番上下其應當番四十五日若都省湏使人送符及諸司湏使人者並取兵部吏部散官上經兩番已上聼簡入選不第者依番多不過六也凡叙階之法有以封爵謂嗣王郡王初出身從四品下叙親王諸子封郡王者從五品上國公正六品上縣公從六品上侯及伯子男並通降一等若两應叙者從髙叙也有以親戚謂皇親緦麻以上及皇太后周親正六品上叙皇太后大功親皇后周親從六品上皇袒免親皇太后小功緦麻皇后大功親正七品上皇后小功緦麻親皇太子妃周親從七品上其外戚各依本服降二等叙娶郡主正六品上娶縣主正七品上郡主子出身從七品上縣主子從八品上叙有以勲庸謂上柱國正六品上叙柱國已下每降一等至騎都尉從七品下驍騎尉飛騎尉正九品上雲騎尉武騎尉從九品上有以資䕃謂一品子正七品上叙從三品子逓降一等四品五品有正從之差亦逓降一等從五品子從八品下叙國公子亦從八品下三品已上䕃曽孫五品已上䕃孫孫降子一等曽孫降孫一等贈官降正官一等㪚官同職事若三品帶勲官者即依勲官品同職事䕃四品降一等五品降二等郡縣公子准從五品孫縣男已上子降一等勲官二品子又降