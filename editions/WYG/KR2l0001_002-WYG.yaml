元中太子宫置三内職良娣比開國侯保林比五等侯才人比駙馬都尉隋初定制也皇朝因之外命婦之制皇姑封大長公主皇姊妹封長公主皇女封公主皆視正一品皇太子之女封郡主視從一品王之女封縣主視正二品公羊傳曰天子将嫁女於諸侯必使同姓諸侯主之故曰公主詩曰何彼穠矣美王姬也雖則王姬而下嫁於諸侯車服不繫於其夫下王后一等漢家公主所食日邑諸王女曰翁主亦曰王主後漢皇女皆封縣公主儀服同列侯尊崇者加號為長公主乗赤罽車馬與諸侯同两漢皆列侯尚主自魏晋已来尚主皆拜駙馬都尉晋宋以來皇女皆封郡公主王女皆封縣主王母妻為妃一品及國公母妻為國夫人三品已上母妻為郡夫人四品若勲官二品有封母妻爲郡君五品若勲官三品有封母妻爲縣君散官並同職事勲官四品有封母妻爲鄉君其母邑號皆加太字各視其夫及子之品若兩有官爵者皆從髙若内命婦一品之母爲正四品郡君二品母爲從四品郡君三品四品母並爲正五品郡君凡婦人不因夫及子而别加邑號夫人云某品夫人郡君爲某品郡君縣君鄉君亦然古者諸侯之妻邦人稱之曰夫人亦曰小君春秋傳曰惠公元妃孟子則妃及夫人郡君縣君鄉君之號皆起於此漢髙祖封蕭何夫人為鄼君景帝封王皇后母曰平原君後漢安帝封乳母王聖為野王君獻帝封董卓母爲池陽君晋封盧潭母孫氏武昌侯太夫人加金章紫綬太康元年封羊祜夫人為郷君孝武時哀帝外祖母髙安鄉君進封宣城郡廣徳君宋髙祖母蕭氏初封豫章國太夫人妻臧氏爲國夫人晋令式云郡公侯太夫人中人銀印青綬佩水蒼玉宋齊之後多用其制至隋氏始定品格皇朝因之凡庶子有五品已上官封皆封嫡母無嫡母即封所生母凡二王後夫人職事五品已上散官三品已上王及國公母妻朝叅各視其夫及子之禮凡親王孺人二人視正五品媵十人視正六品嗣王郡王及一品媵十人視從六品二品媵八人視正七品三品及國公媵六人視從七品四品媵四人視正八品五品媵三人視從八品降此已徃皆為妾古者諸侯一娶九女其嫡者為夫人餘為姪娣孺人及媵盖因此凡皇家五等親及諸親三等存亡升降皆立簿籍每三年一造除附之制並載於宗正寺焉司勲郎中一人從五品上周官有司勲上士二人凡有功者司勲詔之後周夏官有司勲上士一人掌六勲之賞隋文帝立司勲侍郎二人煬帝改為司勲郎武徳初為司勲郎中龍朔元年改為司勲大夫咸亨二年復故員外郎二人從六品上隋文帝置煬帝改為司勲承務郎皇朝復為司勲員外郎龍朔咸亨光宅神龍並隨曹改復主事四人從九品上司勲郎中員外郎掌邦國官人之勲級凡勲十有二等十二轉爲上柱國比正二品柱國楚官也項梁為楚上柱國又陳嬰為上柱國又蔡賜為上柱國至西魏之末始置柱國用旌戎秩時隴西郡公李諱廣陵王元欣趙郡公李弼河内郡公獨孤信南陽公趙貴常山公于謹彭城公侯莫陳崇與周太祖為八柱國至後周建徳四年初置上大将軍上開府儀同三司開府儀同三司上儀同三司儀同三司上柱國柱國之秩以賞勤勞始以齊王憲蜀公尉遲迥爲上柱國是也隋髙祖受命又採後周之制置上柱國為從一品柱國為正二品上大将軍從二品太将軍正三品上開府儀同三司從三品開府儀同三司正四品上儀同三司從四品儀同三司正五品大都督正六品帥都督從六品都督正七品總十一等以酬勤勞皇朝改以勲轉多少爲差以酬勲秩十一轉爲柱國比從二品戰國時楚有柱國昭陽楚漢之際共敖為柱國也十轉爲上䕶軍比正三品九轉爲䕶軍比從三品秦有䕶軍都尉漢髙祖以陳平為䕶軍中尉盡䕶諸将文帝時韓安國為䕶軍将軍平帝元始元年更名䕶軍都尉爲䕶軍魏武帝以牽招為中䕶軍将軍晋中䕶軍将軍䕶軍将軍等並銀章青綬武冠絳朝服品第四宋齊梁陳並有䕶軍将軍中䕶軍之職梁武廬江置鎮蠻䕶軍武陵置安逺䕶軍皇朝採之為勲官品職八轉爲上輕車都尉比正四品七轉爲輕車都尉比從四品漢武帝以公孫賀為輕車将軍漢又有輕車校尉梁陳後魏北齊隋皆有輕車将軍六轉爲上騎都尉比正五品五轉爲騎都尉比從五品漢武帝置騎都尉漢書云拜李陵為騎都尉更始時謡曰爛羊胃騎都尉晋宋齊梁陳隋並有其名四轉爲驍騎尉比正六品三轉爲飛騎尉比從六品二轉爲雲騎尉比正七品一轉爲武騎尉比從七品隋文帝置驍騎飛騎雲騎武騎尉爲文散階皇朝採爲勲品凡有功效之人合授勲官者皆委之覆定然後奏擬凡征鎮勲未授身亡者其勲依例加授其餘汎勲未授身亡者不在叙限考功郎中一人從五品上漢官儀曹郎二人掌天下歳盡集課有尚書郎曹有考功郎中一人宋齊並置功論郎中梁有秩論侍郎並考功郎中之任也北齊有考功郎中隋文帝置考功侍郎煬帝改為考功郎皇朝改為考功郎中龍朔二年改為司績大夫咸亨元年復故主事三人從九品上考功郎中之職掌内外文武官吏之考課凡應考之官皆具錄當年功過行能本司及本州長官對衆讀議其優劣定為九等考第各於其所由司凖額校定然後送省内外文武官量遠近以程限之有差京師百僚九月三十日已前校定十月一日送省外官去京一千五百里内八月三十日三千里内七月三十日五千里内五月三十日七千里内三月三十日萬里内正月三十日已前校定其外官附朝集使送簿至省流内流外官考前釐務不滿二百日者不考每年别勅定京官位望髙者二人其一人校京官考一人校外官考文定給事中中書舍人各一人其一人監京官考一人監外官考郎中判京官考員外判外官考其檢覆同者皆以功􅂈上使京官則集應考之人對讀注定外官則對朝集使注定訖各以奏聞其親王及中書門下與京官三品已上外官五大都督並以功過狀奏聽裁凡考課之法有四善一曰德義有聞二曰清慎明著三曰公平可稱四曰恪勤匪懈善狀之外有二十七最一曰獻可替否拾遺補闕為近侍之最二曰銓衡人物擢盡才良爲選司之最三曰楊清激濁褒貶必當爲考校之最四曰禮制儀式動合經典爲禮官之最五曰音律克諧不失節奏爲樂官之最六曰决斷不滯與奪合理爲判事之最七曰部統有方警守無失爲宿衛之最八曰兵士調集戎装充備爲督領之最九曰推鞫得情處斷平允爲法官之最十曰讎校精審明於刋定爲校正之最十一曰承㫖敷奏吐納明敏爲宣納之最十二曰訓𨗳有方生徒充業爲學官之最十三曰賞罸嚴明攻戰必勝爲将帥之最十四曰禮義興行肅清所部爲政教之最十五曰詳録典正詞理兼舉爲文史之最十六曰訪察精審弹舉必當爲糾正之最十七曰明於勘覆稽失無隱爲句檢之最十八曰職事修理供承強濟爲監掌之最十九曰功課皆充丁匠無怨爲役使之最二十曰耕耨以時收穫剰課爲屯官之最二十一曰謹於盖藏明於出納爲倉庫之最二十二曰推歩盈虛䆒理精宻爲厯官之最二十三曰占候醫卜效騐居多爲方術之最二十四曰譏察有方行旅無壅爲關津之最二十五曰市􅆵不擾姦濫不行爲市司之最二十六曰牧養肥碩蕃息孳多爲牧官之最二十七曰邉境肅清城隍修理爲鎮防之最一最已上有四善爲上上一最已上有三善或無最而有四善爲上中一最已上有二善或無最而有三善爲上下一最已上有一善或無最而有二善爲中上一最已上或無最而有一善爲中中職事粗理善最弗聞爲中下愛憎任情處斷乖理爲下上背公向私職務廢闕爲下中居官諂詐貪濁有状爲下下若於善最之外别可嘉尚及罪雖成殿情状可矜雖不成殿而情状可責者省校之日皆聽考官臨時量定諸官人犯罪負殿者計贖銅一斤爲一負公罪倍之十負為一殿當上上考者雖有殿不降此謂非私罪自上中已下率一殿降一等即公坐殿失應降若當年勞劇有異於常者聼減一殿内外官從見在任改爲别官者其年考從後任申校其别敕賜考限當年附校如不及當年及當年無考於以次有考年限百司量其閒劇諸州㨿其上下進考之人皆有定限茍無其功不要充數功過於限亦聽量進諸食禄之官考在中上已上每進一等加禄一季中下已下毎退一等奪禄一季若私罪下中已下公罪下下並觧見任奪當年禄追告身周年聼依本品叙其流外官本司量其行能功過立四等考第而勉進之清謹勤公勘當明審為上居官不怠執事無私為中不勤其職數有愆犯為下背公向私貪濁有状為下下毎年對定具簿上省其考下下者解所任凡親勲翊衛皆有考第考第之中畧有三等專勤謹慎宿衛如法便習弓馬者為上畨期不違職掌無失雖觧弓馬非是灼然者為中違畨不上數有犯失好請私假不習弓馬者為下諸衛主帥如三衛之考凡統領有方部伍整肅清平謹恪武藝可稱者為上居官無犯統領得濟雖有武藝不是優長者為中在公不勤數有愆失至於用武復無可紀者為下其監門校尉直長如帥之考正色當官明於按察監當之處能肅察姦非者為上居官不怠檢校無失至於監察未是灼然者為中不勤其職數有愆違檢校之所事多踈漏者為下其諡議之法古之通典皆審其事以爲不刋諸職事官三品已上散官二品已上身亡者其佐吏録行状申考功考功責歴任勘校下太常寺擬諡訖覆申考功於都堂集省内官議定然後奏聞贈官同職事無爵者稱子若藴德丘園聲實明著雖無官爵亦奏賜謚曰先生員外郎掌天下貢舉之職開元二十四年敕以為權輕專令禮部侍郎一人知貢舉然以舊職故復叙於此云凡諸州每嵗貢人其類有六一曰秀才二曰明經三曰進士四曰明法五曰書六曰算其𢎞文崇文生各依所習業随明經進士例其秀才試方畧䇿五條文理俱髙者爲上上文髙理平理髙文平者爲上中文理俱平爲上下文理粗通爲中上文劣理滯爲不第此條取人稍峻自貞觀後遂絶其明經各試所習業文注精熟辨明義理然後爲通正經有九禮記左傳爲大經毛詩周禮儀禮爲中經周易尚書公羊榖梁爲小經通二經者一大一小若兩中經通三經者大小中各一通五經者大經並通其孝經論語並須兼習諸明經試两經進士一經毎經十帖孝經二帖論語八帖毎帖三言通六已上然後試䇿周禮左氏禮記各四條餘經各三條孝經論語共三條皆録經文及注意為問其答者須辨明義理然後為通通十為上上通八為上中通七為上下通六為中上其通三經者全通為上上通十為上中通九為上下通八為中上通七及二經通五為不第其進士帖一小經及老子皆經注䈴帖試雜文兩首䇿時務五條文須洞識文律䇿須義理惬當者爲通若事義有滯詞句不倫者為下其經䇿全通為甲䇿通四帖通六已上為乙巳下為不第其明法試律令各一部識逹義理問無疑滯者爲通粗知綱例未䆒指歸者為不通所試律令毎部試十帖䇿試十條律七條令二條全通者為甲通八以上為乙巳下為不第其明書則説文六帖字林四帖諸試書學生帖試通訖先口試不限條數疑則問之並通然後試䇿其明算則九章三帖海島孫子五曹張丘建夏侯陽周髀五經等七部各一帖其綴術六帖緝古四帖録大義本條為問答者明數造術辨明術理然後為通記遺三等數讀令精熟試十得九為第其試綴術緝古者綴術七條緝古三條諸及第人並録奏仍関送吏部書算於從九品下叙排𢎞崇生雖同明經進士以其資䕃全髙試亦不拘常例𢎞崇生習一大經小經者两中經者習史記者漢書者東觀漢記者三國志者皆須讀文精熟言音典正䇿試十道取粗觧注義經通六史通三其試時務䇿者須識文體不失問目義試五得三皆兼帖孝經論語共十條應簡齋郎凖貢舉例帖試太常觧申禮部勘責十月内送考功帖論語及一大經及第者奏聞國子監大成二十員取貢舉及第人聦明灼然者試日誦千言并口試仍䇿所習業十條通七然後補充各授官依色令於學内習業以通四經爲通其禄俸賜㑹凖非伎術直例給業成者於吏部簡試孝經論語共試八條餘經各試八條間日一試灼然明練精熟為通口試十通九策試十通七為第所加經者禮記左𫝊毛詩周禮各加兩階餘經各加一階及第者放選優與處分如不及第依舊任每三年一簡九年業不成者觧退依常選例業未成年未滿者不得别選及充餘使若經事故應叙曰還令覆上其先及此第人欲加經及官人請試經者亦准唐六典卷二
