body:
  text: 唐六典卷六唐張九齡等撰尚書刑部刑部尚書一人侍郎一人郎中二人員外郎二人主事四人令史十九人書令史三十八人亭長六人掌固十人都官郎中一人員外郎一人主事二人令史九人書令史十二人掌固四人比部郎中一人員外郎一人主事四人令史十四人書令史二十七人計史一人掌固四人司門郎中一人員外郎一人主事二人令史六人書令史十三人掌固四人刑部尚書一人正三品周之秋官卿也漢成帝始置三公曹主斷獄事後漢以三公曹掌天下歲盡集課事又以二千石曹主中都官水火盜賊辭訟罪法事晋初依漢置三公尚書掌刑獄太康中省三公尚書以吏部尚書兼領刑獄宋始置都官尚書掌京師非違得失事兼掌刑獄齊梁陳後魏北齊皆置都官尚書後周依周官置大司冦卿一人隋初曰都官尚書開皇三年改為刑部皇朝因之龍朔二年改為司刑太常伯咸亨元年復為刑部光宅元年改為秋官尚書神龍元年復故侍郎一人正四品下周之秋官小司冦中大夫也漢以來尚書侍郎今郎中之任後周依周官隋煬帝置刑部侍郎皇朝因之龍朔二年改為司刑少常伯咸亨光宅神龍並隨曹改復刑部尚書侍郎之職掌天下刑法及徒𨽻句覆關禁之政令其屬有四一曰刑部二曰都官三曰比部四曰司門尚書侍郎總其職務而行其制命凡中外百司之事由於所屬咸質正焉郎中二人從五品上周禮大司冦屬官有士師下大夫蓋郎中之任也後漢有二千石曹尚書掌刑法因立一千石郎曹魏晋宋齊並以三公郎曹掌刑獄置郎中各一人梁陳因為侍郎後魏北齊三公郎中各置二人後周秋官府有小刑部小大夫一人隋初省三公曹置刑部郎曹掌刑法置侍郎一人煬帝除侍字又改為憲部郎皇朝因之武德三年改曰刑部郎中龍朔二年改為司刑大夫咸亨光宅神龍並隨曹改復員外郎二人從六品上周禮大司冦屬官有上士後周依焉蓋員外之任也隋開皇六年置刑部員外郎煬帝改為憲部承務郎皇朝因之武德三年改曰刑部員外郎龍朔咸亨光宅神龍並隨曹改復主事四人從九品上郎中員外郎掌二尚書侍郎舉其典憲而辨其輕重凡文法之名有四一曰律二曰令三曰格四曰式凡律一十有二章一曰名例二曰衛禁三曰職制四曰户㛰五曰廄庫六曰擅興七曰賊盜八曰鬬訟九曰詐僞十曰雜律十一曰捕亡十二曰斷獄而大凡五百條焉律法也魏文侯師李悝集諸國刑書造法經六篇一盜法二賊法三因法四捕法五集法六具法商鞅傳之改法為律以相秦增相坐之法造參夷之誅大辟加鑿顛抽脅鑊烹車裂之制至漢蕭何加悝所造戶興廄三篇謂之九章九律漢興雖約法三章然大辟尚有夷三族之令當族者皆先黥面斬左右趾笞殺之梟其首爼骨肉於其市誹謗詈詛又先斷其舌謂之具五刑至文帝感緹縈之言除肉刑命丞相御史定律曰諸當髠者為城旦舂當黥者加鉗為城旦舂當劓者笞三百籍笞當斬左趾者笞五百籍笞當斬右趾及殺人先自告及吏坐受贓枉法守縣官財物而即盜之已論而復有笞罪者皆棄市罪人獄已決髠為城旦舂滿三歲為鬼薪白粲鬼薪白粲一歲為𨽻臣妾𨽻臣妾一歲免為庶人鬼薪白粲滿三歲為𨽻臣妾𨽻臣妾滿二歲為司冦司冦一歲及作如司冦二歲皆免為庶人其亡逃及有罪耐已上不用此令是後外有輕刑之名內實殺人而笞五百笞三百率多至死至景帝定律笞五百曰三百笞三百曰二百猶尚不全又減笞三百曰二百笞二百曰一百遂定箠令以竹為之箠長五尺其本大一寸末薄半寸皆平其節當笞者笞臀無得更人畢一罪乃更人自是得全至武帝時張湯趙禹增律令科條大辟四百九條宣帝時于定國入刪定律令科條成帝時律令煩多百有餘萬言大辟之罪千有餘條至後漢馬融鄭𤣥諸儒十有餘家律令章句數十萬言定斷罪所用者合二萬六千餘條魏武為相造甲子科條犯斬左右趾易以木械魏氏受命參議復肉刑屬軍國多故竟寢之乃命陳羣等採漢律為魏律十八篇增漢蕭何律劫掠詐僞毁亡告劾繫訊斷獄請賕驚事償贓等九篇也依古義制為五刑其大辟有三髠刑有四完刑作刑各三贖刑十一罰金六雜抵罪七凡三十七名晋氏受命議復肉刑復寢之命賈充等十四人增損漢魏律為二十篇一刑名二法例三盜律四賊律五詐僞六請賕七告劾八捕律九繫訊十斷獄十一雜律十二户律十三擅興律十四毁亡十五衛宫十六水火十七廄律十八關市十九違制二十諸侯凡一千五百三十條其刑名之制大辟之刑有三一曰梟二曰斬三曰棄市髠刑有四一曰髠鉗五歲刑笞二百二曰四歲刑三曰三歲刑四曰二歲刑贖死金二斤贖五歲刑金一斤十二兩四歲三歲二歲各以四兩為差又有雜抵罪罰金十二兩八兩四兩二兩一兩之差棄市以上為死罪二歲死以上為耐罪罰金一兩以上為贖罪宋及南齊律之篇目及刑名之制略同晋氏唯贖罪絹兼用之梁氏受命命蔡法度沈約等十人增損晋律為二十篇一刑名二法例三盜劫四賊叛五詐僞六受賕七告劾八討捕九繫訊十斷獄十一雜律十二户律十三擅興十四毁亡十五衛宫十六水火十七倉庫十八廄律十九關市二十違制大凡定罪二千五百二十九條其刑名之制加晋律一歲刑半歲刑百日刑鞭杖二百鞭杖一百鞭杖五十三十一十之差又加杖八等之差其鞭有制鞭法鞭常鞭三等之差制鞭生革廉成法鞭生革去廉常鞭熟靼不去廉杖有大杖法杖小杖皆用生荆其犯劫皆斬㑹赦降死者黵面為劫字髠鉗補治鎖士終身陳令范泉徐陵等參定律令律三十卷令三十卷科三十卷採酌前代條流冗雜綱目雖多博而非要其制唯重請議禁錮之科其罪人贓驗昭然而不欵則上測立立測者以土為垜髙一尺上員劣容囚兩足立鞭二十笞三十訖著兩械及至上垜一上測七刻日再上三七日上測七日一行鞭凡經鞭杖一百五十得實不承者得减罪論凡囚鞭杖著械徒著鎖死著三械加壺手依梁氏後魏初置四部大人坐庭決辭訟以言語約束刻契記事無刑名之制至太武帝始命崔浩定刑名於漢魏以來律除髠鉗五歲四歲刑增二歲刑大辟有轘腰斬殊死棄市四等凡三百九十條門房誅四條大辟一百四十條五刑二百三十一條始置枷拘罪人文成時又增律條章至孝文時定律凡八百三十三章門房之誅十有六大辟之罪二百三十五刑三百七十七北齊初命造新律未成文宣猶採魏制性忍暴恣行酷虐訊囚用車輻壓踝或使臂貫燒車釭或使立燒犁耳上常命憲司先定死罪囚置仗衛內帝欲殺人執以應命謂之供御囚至武成時趙郡王睿等造律成奏上凡十二篇一名例二禁衛三戶㛰四擅興五違制六詐僞七鬪訟八盜賊九捕斷十毁損十一廄牧十二雜律凡定罪九百四十九條大抵採魏晋故事其制刑名五一曰死重者轘之其次梟首其次斬其次絞二曰流刑鞭笞各一百髠之投邉裔未有道里之差以六年為限三曰刑罪即耐罪也有五歲四歲三歲二歲一歲之差凡五等各加鞭一百其五歲者又加笞八十四歲六十三歲三十二歲二十一歲無笞並鎖輸左校四曰鞭有一百八十六十五十四十之差凡五等五曰杖有三十二十一十之差凡三等贖罪舊以金晋代以中絹罪刑年者鎖無鎖以枷流罪已上加杻械死罪桁之又制立重罪十條為十惡後周命趙肅等造律保定中奏之凡二十五篇一刑名二法例三祠享四朝㑹五㛰姻六户禁七水火八興繕九衛宫十市㕓十一鬪競十二劫盜十三賊叛十四毁亡十五違制十六關市十七諸侯十八廄牧十九雜犯二十詐僞二十一請求二十二告劾二十三逃亡二十四繫訊二十五斷獄大凡定罪一千五百三十七條比於齊律煩而不當其刑名之制一曰杖刑五自十至五十二曰鞭刑五自六十至于百三曰徒刑五徒一年者鞭六十笞十二年三年四年五年皆遞加一十至鞭一百笞五十四曰流刑五流二千五百里者鞭一百笞六十以五百里為差鞭笞皆加十至流曰千五百里者鞭笞各一百以六年為限死刑五一曰罄二曰絞三曰斬四曰梟五曰裂五刑之屬各有五合二十五等其贖罪金絹兼用凡囚死罪枷而拲流罪枷而梏徒罪枷鞭罪桎杖罪散至武帝又造刑書要制與律兼行至宣帝殘酷廣刑經要制為刑經聖制謂之法經有上書字誤鞭二百四十名曰天杖又作礔礰車以威婦人隋開皇元年命髙熲等七人定律至三年又敇蘇威牛𢎞刪定凡十二篇並蠲除前代梟首轘裂及鞭刑又依北齊置十惡應贖者皆以銅代絹煬帝以開皇律令猶重除十惡之條更制大業律凡十八篇一名例二衛宫三違制四請求五户六㛰七擅興八告劾九賊十盜十一鬪十二捕亡十三倉庫十四廄牧十五關市十六雜十七詐僞十八斷獄其五刑之內降從輕興者二百餘條末年嚴刻生殺任情不復依例及楊𤣥感反誅九族復行轘裂梟首磔而射之皇朝武德中命裴寂殷開山等定律令其篇目一准隋開皇之律刑名之制又亦略同唯三流皆加一千里居作三年二年半二年皆為一年以此為異又除苛細五十三條貞觀初有蜀王法曹參軍裴𢎞獻奏駮律令不便於時三十餘條於時又命長孫無忌房𤣥齡等釐正凡為五百條减開皇律大辟入流者九十三條比古死刑殆除其半永徽中復撰律疏三十卷至今並行凡令二十有七分為三十卷一曰官品分為上下二曰三師三公臺省職員三曰寺監職員四曰衛府職員五曰東宫王府職員六曰州縣鎮戍嶽瀆關津職員七曰內外命婦職員八曰祠九曰户十曰選舉十一曰考課十二曰宮衛十三曰軍防十四曰衣服十五曰儀制十六曰鹵簿分為上下十七曰公式分為上下十八曰田十九曰賦役二十曰倉庫二十一曰廄牧二十二曰關市二十三曰醫疾二十四曰獄官二十五曰營繕二十六曰喪葬二十七曰雜令而大凡一千五百四十有六條焉令教也命也漢書杜周曰後主所是著為令前主所是疏為律亦謂法也漢時決事集為令甲以下三百餘篇漢初蕭何定律令其後張湯趙禹于定國黃霸皆繼定律令魏命陳羣等撰州郡令四十五篇尚書官令軍中令合百八十餘篇晋命賈充等撰令四十篇一户二學三貢士四官品五吏員六俸廩七服制八祠九户調十佃十一復除十二關市十三捕亡十四獄官十五鞭杖十六醫藥疾病十七喪葬十八雜上十九雜中二十雜下二十一門下散騎中書二十二尚書二十三三臺祕書二十四王公侯二十五軍吏員二十六選吏二十七選將二十八選雜士二十九宫衛三十贖三十一軍戰三十二軍水戰三十三至三十八皆軍法三十九四十皆雜法宋齊略同晋氏梁初命蔡法度等撰梁令三十篇一户二學三貢士贈官四官品五吏員六服制七祠八户調九公田公用儀迎十醫藥疾病十一復除十二關市十三劫賊水火十四捕亡十五獄官十六鞭杖十七喪葬十八雜上十九雜中二十雜下二十一宫衛二十二門下散騎中書二十三尚書二十四三臺祕書二十五王公侯二十六選吏二十七選將二十八選雜士二十九軍吏三十軍賞後魏初命崔浩定令後命遊雅等成之史失篇目北齊令趙郡王睿等撰令五十卷取尚書二十八曹為其篇名又撰權令二卷兩令並行後周命趙肅拓拔迪定令史夫篇目隋開皇命髙熲等撰三十卷一官品上二官品下三諸省臺職員四諸寺職員五諸衛職員六東宫職員七行臺諸監職員八諸州郡縣鎮戍職員九命婦品員十祠十一户十二學十三選舉十四封爵俸廩十五考課十六宫衛軍防十七衣服十八鹵簿上十九鹵簿下二十儀制二十一公式上二十二公式下二十三田二十四賦役二十五倉庫廄牧二十六關市二十七假寧二十八獄官二十九喪葬三十雜皇朝之令武德中裴寂等與律同時撰至貞觀初又令房𤣥齡等刋定麟德中源直心儀鳯中劉仁軌垂拱初裴居道神龍初蘇瓌太極初岑義開元初姚元崇四年宋璟並刋定凡格二十有四篇以尚書省諸曹為之目其為七卷其曹之常務但留本司者别為留司格一卷蓋編録當時制敕永為法則以為故事漢建武有律令故事上中下三篇皆刑法制度也晋賈充等撰律令兼刪定當時制詔之條為故事三十卷與律令並行梁易故事為梁科三十卷蔡法度所刪定陳依梁後魏以格代朴於麟趾殿刪定名為麟趾格北齊因魏立格撰權格與律令並行皇朝貞觀格十八卷房𤣥齡等刪定永徽留司格十八卷散頒格七卷長孫無忌等刪定永徽中又令源直心等刪定唯改易官號曹局之名不易篇第永徽留司格後本劉仁軌等刪定垂拱留司格六卷散頒格二卷裴居道等刪定太極格十卷岑義等刪定開元前格十卷姚元崇等刪定開元後格十卷宋璟等刪定皆以尚書省二十四司為篇名凡式三十有三篇亦以尚書省刑曹及祕書太常司農光祿太僕太府少府及監門宿衛計帳為其篇目凡三十三篇為二十卷後周文帝初輔魏政大統元年令有司斟酌今古通變可以益時者為二十四條之制七年又下有十二條之制十年命尚書蘇綽緦三十六條更損益為五卷謂之大統式皇朝永徽式十四卷垂拱神龍開元式並二十卷其刪定與定格令人同也凡律以正刑定罪令以設範立制格以禁違正邪式以軌物程事乃立刑名之制五焉一曰笞二曰杖三曰徒四曰流五曰死笞刑五笞十至五十也杖刑五杖六十至于百其工樂户及習天文及官户奴婢等犯流罪者及家無兼丁犯徒者各決二百放又犯罪已發更重犯纍決者計數雖多亦不過二百徒刑五自徒一年以半年為差至於三年也流刑三自流二千里二千五百里三千里三流皆役一年然後編所在為户而常流之外更冇加役流者本死刑武德中改為斷趾貞觀六年改為加役流謂常流唯役一年此流役三年故以加役名焉死刑二絞斬乃立十惡以懲叛逆禁淫亂沮不孝威不道其一曰謀反謂謀危社稷二曰謀大逆謂謀毁宗廟山陵及宫闕三曰謀叛謂背國從僞四曰惡逆謂驅及謀殺祖父母父母殺伯叔父母姑兄姊外祖父母夫之祖父母父母五曰不道謂殺一家非死罪三人支解人造畜蠱毒魘魅六曰大不敬謂盜神御之物乘輿服御物及御造御寶合和御藥誤不如本方及封題誤若造御膳誤犯食禁御幸舟船誤不牢固指斥乘輿情理切害及對捍詔使而無人臣之禮七曰不孝謂告言詈詛祖父母父母及别籍異財若供養有闕居父母喪身自嫁娶若作樂釋服從吉聞祖父母父母喪匿不舉哀詐稱祖父母父母死八曰不睦謂謀殺及賣緦麻已上親毆告夫及大功已上尊長九曰不義謂謀殺本屬府主刺史縣令現受業師十曰內亂謂姦小功已上親祖父妾此十者常赦之所不原初北齊立重罪十條為十惡一反逆二大逆三叛四降五惡逆六不道七不敬八不孝九不義十內亂犯此者不在八議論贖之限隋氏頗有益損皇朝因之乃立八議以廣親親以明賢賢以篤賔舊以勸功勤其一曰議親謂皇帝袒免以上親及太皇太后皇太后緦麻以上親皇后小功以上親二曰議故謂故舊三曰議賢謂有大德行四曰議能謂有大才藝五曰議功謂有大功勳六曰議貴謂職事官三品已上散官二品已上及爵一品七曰議勤謂有大功勞八曰議賔謂承先代後為國賔八者犯死罪所司先奏請議得以减贖論周禮以八辟麗邦法附刑罰即八議也自魏晋宋齊梁陳後魏北齊後周及隋皆載于律凡贖罪以銅自笞五十銅一斤至杖一百即十斤徒一年二十斤至徒三年則六十斤流二千里銅八十斤至流三千里則百斤絞與斬銅止一百二十斤其私坐也一斤為一負其公坐也則二之十負為殿凡贖者謂在八議之條及七品已上官父母妻子五品已上上至曽髙祖下至曽𤣥孫五品已上妾犯非罪十惡八品已下身犯流已下罪者及年七十已上十五已下及廢疾等犯罪加役流及逆緣坐流㑹赦猶流已下罪者及年八十已上十歲已下及篤疾犯盜與傷人者及過誤殺人及大辟疑罪者並以贖論凡計贓者以絹平之凖律以當處中絹估平之開元十六年敕其以贓定罪者並以五百五十為定估其徴收平贓並如律也其贓有六焉一曰强盜贓自絹一匹至于十匹二曰枉法贓其刑絞自絹一尺至於十有五匹其刑與強盜同三曰不枉法贓自絹一尺至於三十匹加役流也四曰竊盜贓自絹一尺至於五十匹加役流五曰受所監臨贓其刑流自絹三尺至於五十匹流二千里其法與不枉法竊盜皆同六曰坐贓其刑徒自絹一尺至於五十匹徒三年凡六贓定罪有正條餘皆約而斷焉枉法贓謂受人財為曲法處分事者一尺杖一百已上每一匹加一等止十五匹絞不枉法贓謂雖受財依法處分者一尺杖九十二匹加一等止三十匹加役流若無祿人犯此二贓並減有䘵人一等若枉法二十匹即絞不枉法四十匹加役流强盜贓謂以威力取人財并與藥酒及食使狂亂取財不得徒二年得財一匹徒三年二匹加一等十匹已上絞竊盜贓者謂私竊人財不得笞五十得財一匹杖六十二匹加一等五匹徒一年又每五匹加一等五十匹止加役流受所監臨贓者謂不因公事受部人財物者一匹笞四十每一匹加一等至八匹徒一年又每八匹加一等五十匹罪止流三千里坐贓者謂非監臨主司而因事受財者一匹笞二十每一匹加一等至十匹徒一年每十匹加一等五十匹罪止徒三年自外諸條皆約此六贓為罪凡應減者下就輕次焉二死三流俱從一減凡應加者上就重次焉五刑皆纍加雖數盈不得至於死凡律法之外有殊旨别敕則有死流徒杖除免之差謂有殊旨别敕宜殺卻宜處盡宜處死宜配逺流宜流卻配流若干里及某處宜配流卻遣宜徒宜配徒若干年至到與一頓與重杖一頓與一頓痛杖决杖若干宜處流依法配流依法配流若干里宜處徒依法配徒與徒罪依法處徒若干年與杖罪與除名罪與免官罪與免所居官罪皆刑部奉而行之凡決死刑皆於中書門下詳覆舊制皆於刑部詳覆然後奏決開元二十五年敕以為庶獄既簡且無死刑自今已後有犯死刑除十惡死罪造僞頭首劫殺故殺謀殺外宜令中書門下與法官等詳所犯輕重具狀聞奏其在降官除逆人親并犯賄贓名教如有刻已自新以功補過使司應合聞薦不須限以貶黜凡京都大理寺京兆河南府長安萬年河南洛陽縣咸置獄其餘臺省寺監衛府皆不置獄凡死罪枷而杻婦人及徒流枷而不杻官品及勳散之階第七已上鎖而不枷勳官武騎尉及散官宣義郎並七品階諸應議請減者犯流已上若除免官當者並鎖禁杖笞與公坐徒及年八十十歲廢疾懷孕侏儒之類皆訟繫以待弊凡有犯罪者皆從所發州縣推而斷之在京諸司則徒以上送大理杖以下當司斷之若金吾糾獲亦送大理犯罪者徒已上縣斷定送州覆審訖徒罪及流應决杖若應贖者即决配徴贖其大理及京兆河南斷徒及官人罪並後有雪減並申省司審詳無失乃覆下之如有不當者亦隨事駮正若大理及諸州斷流已上若除免官當者皆連寫案狀申省案覆理盡申奏若案覆事有不盡在外者遣使就覆在京者追就刑部覆以定之凡決大辟罪皆於市古者決大辟罪皆於市自今上臨御以來無其刑但存其文耳五品已上犯非惡逆已上聽自盡於家七品已上及皇族若婦人犯非斬者皆絞於隱處決大辟罪官爵五品已上在京者大理正監決在外者上佐監決餘並判官監決在京決者亦皆有御史金吾監決若囚有寃濫灼然者聽停決奏聞凡決大辟罪在京者行決之司五覆奏在外者刑部三覆奏在京者決前一日二覆奏決日三覆奏在外者初一日再覆奏縱臨時有敕不許覆奏亦凖此覆奏若犯惡逆已上及部曲奴婢殺主者唯一覆奏决大辟罪皆防援至刑所囚一人防援二十人每一人加五人五品已上非惡逆者聽乘車並官給酒食聽親故辭訣宣告犯狀仍日未後乃行刑囚在外奏報之日不得馳驛行下凡京城決囚之日上食蔬食內教坊及太常皆徹樂每歲立春後至秋分不得決死刑若犯惡逆及奴婢部曲殺主不依此法其大祭祀及致齊朔望上下弦二十四氣雨未晴夜未明斷屠日月及休假亦如之其死囚無親戚者皆給棺於官地內權殯於京城七里外量置地一頃擬埋諸司死囚埋訖仍下本屬告家人今取凡犯流罪已下應除免官當未奏身死者免其追奪謂不奪告身若奏時不知身死奏後云先死者依奏定其常赦所不原者不在免限流移之人皆不得棄放妻妾及私遁還鄉若妻子在逺預為追喚待死同發配西州伊州者送凉府江北人配嶺南者送桂廣府非劒南人配姚嶲州者送付益府取領即還其凉府等各差専使領送所領送人皆有程限不得稽留遲緩至六載然後聽仕其犯反逆緣坐流及免死役流不在此例即本犯不應流而特配流者三載以後聽仕有資者各依本犯收叙法其解見任及非除名移鄉者年限叙法皆凖考解之例其應徒則皆配居作在京送將作監婦人送少府監縫作外州者供當處官役及修理城隍倉庫及公廨雜使犯流應住居作者亦凖此婦人亦留當州縫作及配舂諸流徒罪居作者皆著鉗若無鉗者著盤枷病及有保者聽脫不得著巾帶每旬給假一日臘寒食各給二日不得出所役之院患假者倍日役之凡禁囚皆五日一慮焉慮謂檢閲之也斷決訖各依本犯具發處日月别總作一帳附朝集使申刑部凡告言人罪非謀叛以上皆三審之應受辭牒官司並具曉示虛得反坐之狀每審皆别日受辭若有事切害者不在此例告密有不於所由掩捕則從近也謂告密人皆經當處長官告長官有事經佐官告長官佐官俱有事者經比界論告若須有掩捕應與餘州相知者所在凖法收捕事當謀叛已上馳驛奏聞且稱告謀叛已上不肯言事意者給驛部送京其犯死罪囚及緣邉諸州鎮防人等若犯流人告密並不在送限凡察獄之官先備五聽一曰辭聽二曰色聽三曰氣聽四曰耳聽五曰目聽又稽諸證信有可徴焉而不首實者然後拷掠二十日一訊之訊未畢更移他司仍須拷鞫通計前訊以充三度即罪非重害及疑似處少不必備三若囚因訊致死者皆輿長官及糾彈官對驗其拷四及行決罰不得中易人凡斷獄之官皆舉律令格式正條以結之若正條不見者其可出者則舉重以明輕其可入者則舉輕以明重凡獄囚應入議請者皆申刑部集諸司七品已上於都座議之若有别議所司科簡具狀以聞若衆議異常堪為典則者録送史館凡枷杖杻鎖之制各有差等枷杖五尺已上六尺已下頰長二尺五寸已上六寸已下共閣一尺四寸已上六寸已下徑頭三寸已上四寸已下杻長一尺六寸已上二尺已下廣三寸厚一寸鉗重八兩已上一斤已下長一尺已上一尺五寸已下鎖長八尺已上一丈二尺已下杖皆削去節目長三尺五寸訊囚杖大頭徑三分二釐小頭二分二釐常行杖大頭二分七釐中頭一分七釐笞杖大頭二分小頭一分半其決笞腿臀分受杖者背腿臀分受須數等拷訊笞亦同願背腿均受者聽殿庭決杖者皆背受凡鞫獄官與被鞫人有親屬仇嫌者皆聽更之親謂五服內親及大功已上婚姻之家并授業經師為本部都督刺史縣令及府佐於府主皆同換推凡有罪未發及已發未斷而逢格改者若格重則依舊條輕從輕法凡天下諸州斷罪應申覆者每年正月與吏部擇使取歷任清勤明職法理者仍過中書門下定訖以聞乃令分道巡覆若應句㑹官物者加判官及典刑部録囚徒所犯以授使嶺南使以九月上旬先發遣使牒與州案同然後復送刑部若州司枉斷使推無罪州司欵伏灼然無罪者任使判放其降入流徒者亦從流徒法若使人與州執見有别者各以狀申若理狀已儘可斷決而使人妄生節目不退者州司録申辨及贓狀露驗者即决不得待使覆其餘罪皆待覆定使人至日先檢行獄囚枷鎖補席及疾病糧餉之事有不如法者皆以狀聞若巡察使按察使廉察使採訪使皆待制命而行非有恆也凡在京諸司見禁囚每月二十五日已前本司録其所犯及禁時日月以報刑部來月一日以聞凡有寃滯不申欲訴理者先由本司本貫或路逺而躓礙者隨近官司斷決之即不伏當請給不理狀至尚書省左右丞為申詳之又不伏復給不理狀經三司陳訴又不伏者上表受表者又不達聽撾登聞鼓若惸獨老幼不能自申者乃立胏石之下若身在禁繫者親識代立焉立於石者左監門衛奏聞撾於鼓者右監門衛奏聞凡國有赦宥之事先集囚徒於闕下命衛尉樹金雞待宣制訖乃釋之都官郎中一人從五品上都官者本因漢置司𨽻校尉其屬官有都官從事一人掌中都官不法事因以名官都官者義取掌中都官中都官者京師官也至魏明帝青龍二年尚書陳矯奏置都官郎中郎中晋宋齊都官郎中二人復魏北齊一人梁陳為侍郎並掌京師非違得失事非今都官之任後周置秋官府有司厲之職掌諸奴男子男女入於罪𨽻女子入於舂饎之事蓋比今都官郎中之任也隋初置都官侍郎二人猶掌非違得失事開皇三年改都官尚書曹曰刑部其都官郎曹遂改掌簿録配沒官私奴婢并良賤訴競俘囚之事煬帝時都官郎置二人皇朝因置一人武德三年加中字龍朔二年改曰司僕大夫咸亨元年復故員外郎一人從六品上周禮秋官有司厲下士二人掌男女奴蓋比今都官員外郎之任也後周依焉隋文帝置員外郎侍郎煬帝改曰承務郎武德三年改為都官員外郎龍朔咸亨並隨曹改復主事二人從九品上都官郎中員外郎掌配沒隸簿録俘囚以給衣糧藥療以理訴競雪免凡公私良賤必周知之凡反逆相坐沒其家為官奴婢反逆家男女及奴婢沒官皆謂之官奴婢男年十四以下者配司農十五已上者以其年長命逺京邑配嶺南為城奴一免為畨户再免為雜户三免為良人皆因赦宥所及則免之凡免皆因恩言之得降一等二等或直入良人諸律令格式有言官户者是番户之總號非謂别有一色年六十及廢疾雖赦令不該並免為畨户七十則免為良人任所居樂處而編附之凡初配沒有伎藝者從其能而配諸司婦人工巧者入于掖庭其餘無能咸隸司農凡諸行宫與監牧及諸王公主應給者則割司農之户以配諸官奴婢賜給人者夫妻男女不得分張三歲已下聽隨母不充數若應簡進內者取無夫無男女也其餘雜伎則擇諸司之户教充官户皆在本司分畨每年十月都官按比男年十三已上在外州者十五已上容貌端正送大樂十六已上送鼓吹及少府教習有工能官奴婢亦凖此業成凖官户倒分番其父兄先有伎藝堪傳習者不在簡例凡配官曹長輸其作畨户雜户則分為畨畨户一年三番雜戶二年五畨畨皆一月十六已上當畨請納資者亦聽之其官奴婢長役無番也男子入于蔬圃女子入厨膳乃甄為三等之差以給其衣糧也四歲已上為小十一已上為中二十已上為丁春衣每歲一給冬衣二歲一給其糧則季一給丁奴春頭巾一布衫袴各一件皮鞾一量并氊官婢春給裙衫各一絹禪一鞋二量冬給𥜗復袴各一牛皮鞾一量并氊十歲已下男春給布衫一鞋一量女給布衫一布裙一鞋一量冬男女各給布襦一鞋靺一量官户長上者准此其糧丁口日給二升中口一升五合小口六合諸户留長上者丁口日給三升五合中男給三升凡居作各有課程丁奴三當二役中奴若丁婢二當一役中婢三當一役凡元冬寒食喪婚乳免咸與其假焉官户奴婢元日冬至寒食放三日假産後及父母喪婚放一月聞親喪放七日有疾太常給其醫藥其分畨及供公廨户不在給限男女既成各從其類而配偶之並不得養良人之子及以子繼人每歲孟春本司以類相從而疏其籍以申每歲仲冬之月條其生息閲其老幼而正簿焉每歲十月所司自黃口已上並印臂送都官閲貌比部郎中一人從五品上魏氏置歷晋宋齊後魏北齊皆有郎中後周天官府有計部中大夫蓋其任也梁陳隋並為侍郎煬帝曰比部郎自晋宋齊梁陳皆吏部尚書領比部後魏北齊及隋則都官尚書領之皇朝因焉武德三年加中字龍朔二年改為司計大夫咸亨元年後故員外郎一人從六品上隋置員外侍郎煬帝曰承務郎武德三年改為員外郎龍朔咸亨隨曹改復主事四人從九品上比部郎中員外郎掌司諸司百寮俸料公廨贓贖戍上中下為差上鎮將有仗身四人中下鎮將上鎮副各三人中下鎮副各二人倉曹兵曹戌主副各一人其仗身十五日一替收資六百四十文凡京司有别借食本中書門下集賢殿書院各借本一千貫尚書省都司吏部户部禮部兵部刑部工部御史臺左右春坊鴻臚寺祕書省國子監四方館𢎞文館各百貫皆五分收利以為食本諸司亦有之其收則少每季一申省諸州歲終而申省比部總句覆之凡倉庫出內營造傭市丁匹功程贓贖賦斂勳賞賜與軍資器仗和糴屯收亦句覆之其在京給用則月一申之在外二千里內季一申之二千里外兩季一申之五千里外終歲一申之凡質舉之利收子不得踰五分出息債過其倍若回利克本官不理司門郎中一人從五品周禮大司徒屬官有司門下大夫掌授管鍵以啓閉國門後周依周官隋開皇初置司門侍郎煬帝曰司門郎皇朝因之武德三年加中字龍朔二年改曰司門大夫咸亨元年復改員外郎一人從六品上周禮有司門上士後周有小司門上士隋置司門員外郎煬帝改曰承務郎武德三年改曰員外郎主事二人從九品上司門郎中員外郎掌天下諸門及關出入往來之籍賦而審其政凡關二十有六而為上中下之差京城四面關有驛道者為上關上關六京兆府藍田關華州潼關同州蒲津關岐州散關隴州大震關原州隴山關餘關有驛道及四面關無驛道者為中關中關一十三京兆府子午路谷庫谷同州龍門㑹州㑹寧原州木峽石州孟門嵐州合河雅州卭萊彭州蠶崖安西鐵門興州興城渭津也他皆為下關焉下關七凉州甘亭百牢河州鳯林利州石門延州永和綿州松嶺龍州涪水所以限中外隔華夷設險作固間邪止暴者也凡關呵而不征司貨賄之出入其犯禁者舉其貨罰其人古書帛為繻刻木為契二物通為之傳傳如今過所凡度關者先經本部本司請過所在京則省給之在外州給之雖非所部有來文者所在給之若私度關及越度至越所而不度不應度關而給過所若冒名請過所與人及不應受而受者若家人相冒及所司無故稽留若領人度關及别人妄隨之若賫禁物私度及越度緣邉關其罪各有差唐六典卷六
