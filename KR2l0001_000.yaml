  text: 欽定四庫全書史部十二
  hash: sha256:683b84fba18cbfaf1b4f7fb7adb0cf04b078729870de9e8d06bf823f11967f61
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2l0001_WYG_000-1a, image: WYG0595/WYG0595-0001a.png}
body:
  text: 唐六典職官類一官制之屬提要臣等謹案唐六典三十巻舊本題開元御撰李林甫奉勑注其書以三師三公三省九寺五監十二衛列其職司官佐敘其品秩以擬周禮書録解題引韋述集賢記注曰開元十年起居舍人陸堅被㫖修是書帝手寫白麻紙六條曰理教禮政刑事令以類相從撰録以進張説以其事委徐堅思之經嵗莫能定又委毋焸余欽韋述始以令式入六司其沿革並入注中後張九齡又委苑咸二十六年奏草上迄今在書院亦不行用范祖禹唐鑑亦曰既有太尉司徒司空又有尚書省是政出於二也既有尚書省又有九寺是政出於三也葢自唐虞至周有六官而無寺監自秦迄陳有寺監而無六官獨此書兼之故官多重複今考是書如林甫注中以諸州祥瑞預立條格以待奏報之類誠為可嗤然一代典章釐然具備觀王溥㑹要所載請事者往往援據韋述謂不施行未必實録祖禹之論則疑以元豐官制全用是書有激而言亦非定論也又㑹要載開元二十三年九齡等撰是書而唐書載九齡以開元二十四年罷知政事則書成時九齡猶在位後至二十七年林甫乃注成獨上之宋陳騤館閣録載書局有經修經進經修不經進經進不經修三格説與九齡葢所謂經修不經進者卷首獨著林甫未為至公今仍改題九齡名以從其實舊本如是今亦姑仍之耳乾隆四十三年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:38429f802cea6fef5ab8ec749d3b4749570a332901be3e08ed45918e6a3257db
