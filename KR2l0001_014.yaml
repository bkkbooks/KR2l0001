body:
  text: 唐六典卷十四唐張九齡等撰太常寺太常寺卿一人少卿二人丞二人主簿二人録事二人府十二人史二十三人博士四人謁者十人贊引二十人太祝三人祝史六人奉禮郎二人贊者十六人協律郎二人亭長八人掌固十二人太廟齊郎京都各一百三十人太廟門僕京都各三十二人兩京郊社署令各一人丞一人府二人史四人典事三人掌固五人門僕八人齊郎一百一十人諸陵署令各一人丞一人録事一人府二人史四人主衣四人主筆四人主藥四人典事三人掌固二人陵户永康興寧二陵署令各一人丞一人録事一人府一人史二人典事二人掌固二人陵户各二千一百人諸太子陵署令各一人丞一人録事一人府一人史二人典事二人掌固一人陵戶各三十人諸太子廟署令各一人丞一人録事一人府一人史二人典事二人掌固一人太樂署令一人丞一人府三人史六人樂正八人典事八人掌固六人文武二舞郎一百四十人鼓吹署令一人丞一人府三人史六人樂正四人典事四人掌固四人太醫署令二人丞二人府二人史四人主藥八人藥童二十四人醫監四人醫正八人藥園師二人藥園生八人掌固四人醫博士一人醫助教一人醫師二十人醫工一百人醫生四十人典學二人針博士一人針助教一人針師十人針工二十人針生二十人按摩博士一人按摩師四人按摩工十六人按摩生十六人呪禁博士一人呪禁師二人呪禁工八人咒禁生十人太卜署令一人丞二人府一人史二人卜正二人卜師二十人巫師十五人卜博士二人助教二人卜筮生四十五人掌固二人廩犧署令一人丞一人府一人史二人典事二人掌固二人汾祠署令一人丞一人府二人史四人兩京齊太公廟署令各一人丞一人録事一人府二人史四人廟幹二人掌固四人門僕八人太常寺卿一人正三品唐虞之時伯夷作秩宗典三禮皋䕫典樂以教胄子周官大宗伯卿一人掌建邦天神人鬼地祇之禮秦曰奉常典宗廟禮儀至漢髙祖名曰太常惠帝復曰奉常景帝又曰太常漢制以列侯忠孝敬慎者居之秩中二千石王莽改曰秩宗後漢太常掌禮儀祭祀及行事掌贊天子大射養老大喪皆奏其禮儀每月前晦察行陵廟并選試博士奏其能否魏因之晋太常置功曹主簿五官等員品第三銀章青綬進賢兩梁冠五時朝服佩水蒼玉宋太常用尚書亦轉為尚書加遷選曹尚書領護等齊因之梁天監七年象四時置十二卿太常宗正司農為春卿太常位視金紫光祿大夫班第十四陳因梁後魏太常與光祿勳衛尉為三上卿位從一品下北齊太常卿掌陵廟羣祀儀制天文術數衣冠之屬太常卿第三品後周為宗伯隋太常寺卿一人正三品皇朝因之龍朔二年改為奉常咸亨元年復舊光宅元年改為司禮神龍元年復故少卿二人正四品上周禮有小宗伯中大夫二人秦漢無聞後魏太和十五年初置少卿官太常少卿一人第三品上至二十二年降為正四品上北齊因之後周為小宗伯隋太常寺置少卿一人正四品上煬帝即位加置二人降為從四品皇朝武德中置一人貞觀中加置二人龍朔咸亨光宅神龍並隨寺改復太常卿之職掌邦國禮樂郊廟社稷之事以八署分而理焉一曰郊社二曰太廟開元二十四年敕廢太廟署令少卿一人知太廟事三曰諸陵四曰太樂五曰鼓吹六曰太醫七曰太卜八曰廩犧總其官屬行其政令少卿為之二凡國有大禮則贊相禮儀有司攝事則為之亞獻率太樂之官屬設樂縣以供其事燕㑹亦如之若三公行園陵則為之副公服乘輅備鹵簿而奉其禮若大祭祀則先省其牲器凡太卜占國之大事及祭祀卜日皆往蒞之於太廟南門之外中祀已上則太常卿蒞卜若小祀及非大祀則太卜令蒞卜也凡大駕巡幸出師克獲皆擇日告于太廟太廟有修造亦如之凡仲春薦冰及四時品物甘滋新成者皆薦焉凡有事於宗廟少卿率太祝齊郎入薦香燭整拂神幄出入神主將享則與良醖令實尊罍凡備大享之器服有四院各以其物而分貯焉一曰天府院藏瑞應及伐國所獲之寶禘祫則陳之於廟庭二曰御衣院藏乘輿之祭服三曰樂縣院主藏六樂之器物四曰神㕑院主藏御廩及諸器物丞二人從五品上秦有奉常丞漢因之比千石魏晋宋置一人宋百官春秋太常丞視尚書郎銅印黃綬一梁冠品第七掌舉陵廟非法齊因之梁班第五梁選部太常丞舊用員外郎遷尚書郎天監七年改視尚書郎陳因之後魏太常丞五品下太和二十二年降為七品上北齊從六品下隋太常丞二人從六品下大業三年增為五品皇朝因之主簿二人從七品上漢官儀鹵簿篇太常駕四馬主簿前車八乘有鈴下侍閣辟車騎吏五伯等員梁天監七年十二卿各置主簿一人遷為五官功曹又位不登十八班者别為七班太常主簿班第四梁選太常主簿視二衛主簿陳因之後魏不見北齊太常寺有功曹五官主簿等隋太業中主簿二人武德中正八品上貞觀中從七品上録事二人從九品上晋令太常置主簿録事北齊亦置之隋增置二人皇朝因之丞掌判寺事凡大享太廟則修七祀於太廟西門之內若祫享則兼修配享功臣之禮主簿掌印勾檢稽失省署鈔目録事掌受事發辰太常博士四人從七品上漢書百官表云博士秦官掌通古今秩比六百石員多至數十人髙祖時叔孫通始為博士定禮制後漢置十四人魏因之晋中興書博士之職端委佩玉朝之大典必詢度焉當道正詞克厭人望然後為可齊宋太常府有博士亦謂之太學博士梁陳亦兼統國學博士後魏太常博士從七品下北齊置四人品同魏隋因之置謁者三十人贊引六十人皇朝武德中置博士二員正八品上貞觀中加其員品減謁者置十人贊引二十二人謁者十人秦漢有謁者即今通事舍人隋太常寺有謁者三十人皇朝減置十人贊引二十人隋太常寺有贊引六十人貞觀中省置二十人太常博士掌辨五禮之儀式奉先王之法制適變隨時而損益焉凡大祭祀及有大禮則與太常卿以導贊其儀凡王公已上擬諡皆跡其功德而為之褒貶議諡職事官三品已上散官二品已上佐史録行狀申考功勘校下太常擬諡訖申省議定奏聞無爵稱子沈約諡法云晋大興三年始詔無爵諡皆稱子也養德丘園聲實明著則諡曰先生大行則大名小行則小名之舊有周官諡法大戴禮諡法又漢劉熙注諡法一卷晋張靖撰諡法兩卷又有廣諡一卷至梁沈約總集諡法凡有一百六十五卷若大祭祀卿省其牲器謁者為之導若小祀及公卿大夫有嘉禮亦命謁者以贊相焉太祝三人正九品上禮記曰天子建天官先六太則有太祝之置此夏殷之制也周禮太祝下大夫二人上士四人掌六祝之詞順祝年祝令祝化祝瑞祝策祝以事鬼神祈福祥也秦漢奉常屬官有太祝令丞後漢太祝令一人六百石丞二人晋宋皆有太祝令丞齊職儀太祝令品第七四百石銅印墨綬進賢一梁冠絳朝服用三品勳位梁選部太祝令與二廟令品秩同陳氏因之後魏太祝令從五品中太和二十二年改為正九品上北齊太常寺置太祝令丞後周太祝下大夫一人隋太祝署令一人丞一人太祝八人祝史十六人煬帝廢太祝署以太祝屬寺後又增為十人皇朝減置七人後又增置九人開元二十三年減六人祝史減七人祝史六人晋太祝令史三十人後魏祝史從七品中隋置十六人皇朝武德中置十二人今減六人奉禮郎二人從九品上漢大鴻臚有治禮郎三十七人晋太常諸博士有治禮史二十四人大行令有治禮郎四人後魏治禮郎從六品下太和二十二年改為從九品下北齊司儀置奉禮郎三十人後周治禮中士一人下士一人隋太常寺有治禮郎十六人其後改為奉禮郎又置贊者十二人煬帝減奉禮郎置六人皇朝武德中為治禮郎置四人永徽之後改為奉禮郎開元二十三年減二人掌師贊者以供其事太祝掌出納神主于太廟之九室而奉享薦禘祫之儀凡國有大祭祀盥則奉匜既盥則奉巾􅍤凡郊廟之祝板先進取署乃送祠所將事則跪讀祝文以信于神禮成而焚之凡大祭祀卿省牲則循牲而告充禮告訖牽牲以授太官既享則以牲之毛血置之於豆而尊焉饌入而徹之既享則酌上樽之福酒且減胙肉加之於爼以贊祭酒歸胙之禮又奉玉帛之篚及牲首之俎俟禮成行焚瘞之儀也凡祭天及日月星辰之玉帛則焚之祭地及社稷山嶽則瘞之海瀆則沈之奉禮郎掌設君臣之版位以奉朝㑹祭祀之禮版位黑質赤文天子方尺有二寸厚三寸太子方九寸厚二寸公卿已下方七寸厚一寸有半天子版位題曰皇帝位太子曰皇太子位百官題曰某品位凡祭祀朝廷以贊導焉凡祭祀朝㑹設庶官之位文左武右東西相向北方為上東方南方之使次於文官之下西方北方之使次於武官之下二王之後列於武官之下褒聖侯叙於文官之列凡有事於神祇則設御位於壇之東南從祀公卿獻官及掌事者位於壝之內外若有事於宗廟則設位於廟庭之中宗廟之子孫列焉昭穆異位去爵從齒也凡尊彞之制十有四祭祀則陳之一曰太尊二曰著尊三曰犧尊四曰象尊五曰壷尊六曰山罍七曰概尊八曰散尊九曰山尊十曰蜃尊十一曰雞彞十二曰鳥彞十三曰斚彝十四曰黃彝又陳勺羃篚坫之位以奉其事有事於神祇則用太尊至於山罍有事於宗廟則春夏用雞鳥之彝秋冬用黃斚之彝星之外官用概尊嶽鎮海瀆用山尊山林川澤用蜃尊衆星及丘陵已下用散尊也凡祭器之位簠簋為前登鉶次之籩豆為後簋鉶籩豆之位在廟堂上俱陳側階之北每坐四簋次之以六鉶次之以六登籩豆為後每坐異之皆以南為上屈陳而下也凡大祭祀及朝㑹在位者拜跪之節皆贊導之贊者承傳焉又設牲版之位以成省牲之儀凡春秋二仲公卿巡行諸陵則主其威儀鼓吹之節而相其禮焉協律郎二人正八品漢書武帝時李延年善新聲以為協律都尉後漢亦有之至魏武帝平荆州得杜䕫能識舊樂章以為協律都尉晋改為協律校尉宋齊亦有其官梁太常屬官有協律校尉後魏有協律郎太和初協律中郎從四品下協律郎從五品上至二十年協律正八品下北齊太常屬官有協律郎二人隋太常寺協律郎二人皇朝因之協律郎掌和六律六呂以辨四時之氣八風五音之節陽為六律所以統氣類物仲冬為黃鍾孟春為太簇季春為姑洗仲夏為㽔賓孟秋為夷則季秋為無射隂為六吕所以旅陽宣氣季冬為大吕仲春為夾鍾孟夏為仲呂季夏為林鍾仲秋為南吕孟冬為應鍾凡律管之數起於九以九相乘八十一以為宫三分去一五十四以為徵三分益一七十二以為商三分去一四十八以為羽三分益一六十四以為角黃鍾為宫太簇為商姑洗為角林鍾為徵南吕為羽還相為宫以生其聲焉凡太樂鼓吹教樂則監試為之課限太樂署教教雅樂大曲三十日成小曲二十日清樂大曲六十日大文曲三十日小曲十日燕樂西凉龜兹疏勒安國天竺髙昌大曲各三十日次曲各二十日小曲各十日髙麗康國一曲鼓次署棡鼓一曲十二日三十日大鼓一曲十日長鳴三聲十日鐃鼓一曲五十日歌簫笳一曲各三十日大橫吹一曲六十日節鼓一曲二十日笛簫觱篥笳桃皮觱篥一曲各二十日小鼓一曲十日中鳴三聲十日羽葆鼓一曲三十日錞于一曲五日歌簫笳一曲各三十日小橫吹一曲六十日簫笛觱篥桃皮觱篥一曲各三十日成凡教樂淫聲過聲凶聲慢聲皆禁之淫聲若鄭衛者過聲失哀樂之節凶聲亡國之聲音若桑間濮上者慢聲不恭者也使陽而不敢散隂而不敢集剛氣不怒柔氣不懾暢於中發於外以應天地之和若大祭祀饗燕奏樂于庭則升堂執麾以為之節制舉麾鼓祝而後樂作偃麾戞敔而後止兩京郊社署令各一人從七品下周人建國左宗廟右社稷祭天於南郊之圜丘就陽位也祭地於北郊之方壇就隂位也故有典祀中士二人下士四人以時而祭則徵役于司𨽻帥其屬而修除之秦漢奉常屬官有太祝令丞景帝改為祠祀武帝更曰廟祀後漢祠祀屬少府魏晋有太祝令丞宋有明堂令丞掌宗祀五帝之事齊有太祝及明堂令梁太常卿統明堂太社等令丞北齊太廟令丞兼領郊祠崇虛二屬丞郊祀掌五郊羣神崇虛掌五嶽四瀆神祠後周有司郎上士一人中士一人又有司社中士一人下士一人隋太常統郊社署令又署門僕齊郎皇朝因之丞一人從八品上隋置皇朝因之門僕八人隋有二人齊郎一百一十人後魏祀官齊郎九品中隋郊社署有齊郎一百人郊社令掌五郊社稷明堂之位祠祀祈禱之禮丞為之二凡大祭祀則設神坐於壇上而别其位上帝之神席以藳秸衆神席以莞升中于太山則藉以三脊之茅與奉禮設尊罍篚羃之具太官令實之凡有事於百神則立燎壇而先積柴焉大祀燎壇方一丈髙丈有二尺中祀方八尺其髙一丈下祀方五尺髙如其方凡有合朔之變則置五兵於太社矛居東㦸居南鉞在西矟在北巡察四門立􅗋於壇四隅朱絲縈之以候變過時而罷之獻陵昭陵乾陵定陵橋陵恭陵署令各一人從五品周禮有冢人下大夫二人中士四人掌公墓之地辨其兆域先王之葬居中以昭穆為左右至漢奉常管諸陵縣諸陵亦各有丞令至元帝元光元年分穆陵邑屬三輔後漢先帝陵令每令各一人秩六百石每陵所皆置萬户晋太常統陵令丞主簿録事户曹史禁備史各一人侍一人凡吏四人卒一人宋太常統陵令齊職儀每陵令一人品第七秩四百石銅印墨綬進賢一梁冠絳朝服舊用三品勳位孝建三年改為二品梁太常統陵監其後改為令班第二品正第九陳承梁制秩六百石北齊太常寺亦統諸陵令丞後周守陵每陵上士一人隋令諸署每陵令一人皇朝因之開元二十五年諸陵廟隸宗正寺丞一人從七品下漢魏晋諸陵並有丞宋齊梁陳並有陵令無丞北齊有丞隋諸陵丞各一人有主衣主輦主藥等員皇朝因之録事一人皇朝置陵户乾陵橋陵昭陵各四百人獻陵定陵恭陵各三百人陵令掌先帝山陵率尸守衛之事丞為之二凡朔望元正冬至寒食皆修享於諸陵若橋陵則曰獻羞焉凡功臣密戚諸陪陵葬者聽之以文武分為左右而列墳髙四丈已下三丈巳上若父祖陪陵子孫從葬者亦如之若宫人陪葬則陵戶為之成墳凡諸陵皆置留守領甲士與陵令相左右兆域內禁人無得葬埋古墳則不毁永康興寧二陵署令各一人從七品下丞一人從八品下陵令掌山陵營兆之事率其户而守陵焉兵仗並皆給之丞為之二隱章懷懿德節愍惠莊文惠宣七太子陵署各令一人從八品下按漢武帝戾太子園有官吏自後不見並皇朝置之丞一人從九品下太子陵令丞皆掌陵園守衛諸太子廟令各一人從八品上丞一人正九品下有後則官為置廟子孫自主其祭無後者以近族人為主緣祭樂饌並官供之太子廟令丞皆掌灑掃開闔之節四時享祭之禮太樂署令一人從七品下周禮太司樂中大夫二人樂師下大夫四人掌成均之法以樂舞教國子雲門大卷大咸大韶大夏大濩大武之舞樂師掌國學之政教國子帗舞羽舞皇舞旄舞干舞人舞之節又有太師下大夫二人掌六律六吕以合隂陽之聲至秦漢奉常屬官有太樂令丞又少府屬官有樂府令丞後漢太常樂令一人六百石魏復為太樂令丞黃初中以杜䕫為之使正雅樂時散騎侍郎鄧靜善詠雅樂歌師丑胡能習宗祀之曲舞師馮肅曉知前代諸儛䕫與創定遷協律都尉至晋元帝并太樂於鼓吹宋太常有太樂令丞齊因之品第七四百石銅印墨綬進賢一梁冠絳朝服梁太常屬官有太樂令班第一品從九又别領清商丞太樂有庫丞與清商丞並三品勳位陳因之後魏太和十五年置太樂官有太樂博士六品下北齊太常寺有太樂令丞後周有司樂上士中士隋太常寺統太樂令丞二人皇朝因之開元二十三年各減一人丞一人從八品下歷代皆有一人隋置二人皇朝因之開元二十三年減一人樂正八人從九品下後周依周官置樂師上士一人中士一人隋太樂署有樂師八人清商有樂師二人至煬帝改曰正加置十人蓋採古樂正子春而名官皇朝因之典事八人流外番官文武二舞郎一百四十人周禮韎師主舞者十有六人旄人主舞者衆寡無數漢太常樂令有八佾舞三百八十一隋太常樂署有舞郎三百太樂令掌教樂人調合鍾律以供邦國之祭祀饗燕丞為之二凡天子宫縣太子軒縣宫縣之樂鎛鍾十二編鍾十二編磬十二凡三十有六簴宗廟與殿庭同郊丘社則二十簴面别去編鐘磬各二簴也東方西方磬簴起北鐘簴次之南方北方磬簴起西鐘簴次之鎛鐘在編縣之間各依辰位四隅建鼓左柷右敔又設笙竽笛簫箎塤繫于編鐘之下隅歌琴瑟箏筑繫于編磬之下其在殿庭前則加鼓吹十二按於建鼓之外羽葆之鼓大鼓金錞歌簫笳置於其上焉又設登歌鐘磬節鼓琴瑟筝筑於堂上笙簫和簫箎塤於堂下宫縣登歌工人皆介幘朱連裳革帶烏皮履鼓人及階下工人皆武辨朱褠衣革帶烏皮履若在殿庭加白練􅜵襠白布襪鼓吹按工人亦如之也軒縣之樂去其南面鎛鐘編鍾編磬各三凡九簴設於辰丑申之位三建鼓亦如之餘如宫縣之制凡宫縣軒縣之作則奏二舞以為衆樂之容一曰文舞二曰武舞宫縣之舞八佾軒縣之舞六佾文舞之制左執籥右執翟二人執纛以引之文舞六十四人供郊廟服委貌冠𤣥絲布大袖白練領褾白紗中單絳領𤣥絲布大口袴革帶烏皮履白布襪其執纛人衣冠各同也武舞之制左執干右執戚二人執旌居前二人執