次而振晨嚴之曲第一曰元驎合遝第二曰元驎他固夜第三曰元驎跋至慮凡大駕鹵簿一千八百三十八人分為二十四隊列為二百一十四行小駕鹵簿一千五百人分為二十四隊列為一百二十行東宫鹵簿六百二十四人分為九隊列為三十一行凡合朔之變則帥工人設五鼓於太社執麾旒於四門之孰置龍牀焉有變則舉麾擊鼓齊發變復而止馬射則設掆鼓金鉦施龍牀而偶作焉二人聲作著苣文袍袴褶大儺則帥鼓角以助侲子之唱唐禮鼓角十人為一隊太醫署令二人從七品下周禮有醫師上士下士秦少府屬官有太醫令丞無員多至數十人後漢又有藥丞一人魏因之晋氏宗正屬官有太醫令丞銅印墨綬進賢一梁冠絳朝服品第七過江省宗正而太醫以給門下省宋齊太醫令丞𨽻侍中梁門下省有太醫令丞令班第十一丞為三品勳位陳因之魏有太醫博士助教北齊太常寺統太醫令丞後周有太醫下大夫小醫上士隋太常寺統太醫署丞令有主藥醫師藥園師按摩呪禁博士煬帝又置醫監五人醫正十人皇朝因之丞二人從八品下秦漢以來皆有丞一人至隋又置二人皇朝因而不改醫監四人從八品下醫正八人從九品下後周有醫正上士中士下士隋煬帝置醫監五員醫正十員皇朝減之隋又有藥園師藥生等皇朝因之醫師二十人醫工一百人周禮有醫師上士下士漢有醫工長第五倫補為淮陽王醫工長是也隋太醫有師二百人皇朝置二十人醫工一百人醫生四十人典學二人後周醫正有醫生三百人隋太醫有生一百二十人皇朝置四十人貞觀後置典學二人太醫令掌諸醫療之法丞為之二其屬有四曰醫師針師按摩師咒禁師皆有博士以教之其考試登用如國子監之法諸醫針生讀本草者即令識藥形而知藥性讀明堂者即令驗圖識其孔穴讀脉訣者即令遞相診候使知四時浮沈澀滑之狀讀素問黃帝針經甲乙脉經皆使精熟博士月一試太醫令丞李一試太常丞年終總試若業術過於見任官者即聼補替其在學九年無成者退從本色凡醫師醫正醫工療人疾病以其痊多少而書之以為考課每嵗常合傷寒時氣瘧痢傷中金瘡之藥以備人之疾病者藥園師以時種蒔收採諸藥京師置藥園一所擇良田三頃取庶人十六已上二十已下充藥園生業成補藥師凡藥有隂陽配合子母兄弟根葉花實草石骨肉之異及有毒無毒隂乾曝乾採造時月皆分别焉凡藥八百五十種三百六十神農本經一百八十二名醫别録一百一十四新修本草新附一百九十四有名無用皆辨其所出州土每嵗貯納擇其良者而進焉醫博士一人正八品上助教一人從九品上晋代以上手醫子弟代習者令助教部教之宋元嘉二十年太醫令秦承祖奏置醫學以廣教授至三十年省後魏有太醫博士助教隋太醫有博士二人掌醫皇朝武德中博士一人助教二人貞觀中減置一人又置醫師醫工佐之掌教醫生醫博士掌以醫術教授諸生習本草甲乙脉經分而為業一曰體療二曰瘡腫三曰少小四曰耳目口齒五曰角法諸醫生既讀諸經乃分業教習率二十人以十一人學體療三人學瘡腫三人學少小二人學耳目口齒一人學角法體療者七年成少小及瘡腫五年耳目口齒之疾并角法二年成針博士一人從八品上針助教一人九品下皇朝置又置針師針工佐之以教針生也針博士掌教針生以經脉孔穴使識浮沉澀滑之候又以九針為補瀉之法一曰鑱針取法於布針長一寸六分大其頭鋭其末令不得深入主熱在皮膚者二曰圓針取法於絮針長一寸六分主療分間氣三曰匙針取法於黍粟之鋭長二寸半主邪氣出入四曰鋒針取法於絮針長一寸六分刃三隅主決癰出血五曰劍針取法於劍令其未如劍鋒廣二分半長四寸主決大癰腫六曰圓利針取法於氂直圓鋭長一寸六分主取四支癰暴痺七曰亳針取法於毫毛長一寸六分主寒熱痺在胳者八曰長針取法於綦針長七寸主取深邪逺痺九曰火針取法於鋒長四寸主取火氣不出關節凡此九針以法九州九野之分九針之形及所主疾病畢矣凡針疾先察五臟有餘不足而補瀉之人心藏神肺藏氣肝藏血脾藏肉腎藏志內連骨髓外通津液以成四支九竅十六節三百六十五部必先知其病之所在凡針生習業者教之如醫生之法針生習素問黃帝針經明堂脉訣兼習流注偃側等圖赤鳥神針等經業成者試素問四條黃帝針經明堂脉訣各二條按摩博士一人從九品下崔實政論云熊經鳥伸延年之術故華陀有六禽之戲魏文有五槌之煆仙經云户樞不朽流水不腐謂欲使骨節調利血脉宣通即其事也隋太醫有按摩博士二十人皇朝因之貞觀中減置一人又置按摩師按摩工佐之教按摩生也按摩師四人按摩工十六人隋太醫有按摩師一百二十人無按摩工皇朝置之按摩生十五人隋太醫有按摩生一百人皇朝武德中置三十人貞觀中減置十五人也按摩博士掌教按摩生以消息導引之法以除人八疾一曰風二曰寒三曰暑四曰濕五曰飢六曰飽七曰勞八曰逸凡人支節府藏積而疾生導而宣之使內疾不留外邪不入若損傷折跌者以法正之咒禁博士一人從九品下隋太醫有呪禁博士一人皇朝因之又置呪禁師呪禁工以佐之教呪禁生也呪禁博士掌教呪禁生以呪禁拔除邪魅之為厲者有道禁出於山居方術之士有禁呪出於釋氏以五法神之一曰存思二曰禹步三曰營目四曰掌決五曰手印皆先禁食葷血齊戒於壇場以受焉太卜署令一人從八品下周禮有太卜下大夫卜師上士掌方兆功兆義兆弓兆之法有龜人中士掌六龜之屬主天子卜筮之事秦漢奉常屬官有太卜令丞武帝置太卜博士後漢并于太史乂靈臺待詔員有龜卜三人易筮二人魏晋宋齊梁陳無其職後魏有太卜博士從七品下北齊太常有太卜丞後周有太卜下大夫小卜上士及又有龜占中士隋太常寺有太卜令丞皇朝因之丞二人正九品下隋有一人皇朝加置一人卜正二人從九品下隋煬帝省太卜博士置太卜十人卜正二十人皇朝減置二人卜師二十人隋置皇朝因之巫師十五人周禮有男巫女巫無數其師中士巫能制神之處位次主者隋太卜署有男巫十六人女巫八人卜博士二人從九品下助教二人隋有太卜博士助教皇朝因之卜筮生四十五人隋有卜生四十人筮生三十人太卜令掌卜筮之法以占邦家動用之事丞為之二一曰龜二曰兆三曰易四曰式凡龜占辨龜之九類五色依四時而用之一曰石龜二曰泉龜三曰蔡龜四曰江龜五曰洛龜六曰海龜七曰河龜八曰淮龜九曰旱龜春用青靈夏用赤靈秋用白靈冬用黑靈四季之月用黃靈龜上員象天下方法地甲有十三文以象十二月一文象閏邉下甲有二十八匡法二十八宿骨有六間法六府匡有八間法八卦文有十二柱法十二時故象天地辨萬物者矣欲知龜神骨白如銀欲知龜聖千里徑正欲知龜志看龜十字分四時所灼之體而用之春灼後左足夏灼前左足秋灼前右足冬灼後右足凡兆以千里徑為母兩翼為外正立為木正橫為土內髙為金外髙為火細長芒動為水兆有仰伏倚著落起發摧折斷動之狀而知其吉凶又視五行十二氣一曰受氣二曰胎三曰養四曰生五曰沐浴六曰冠帶七曰臨官八曰王九曰老十曰病十一曰死十二曰葬以占之凡五兆之策三十有六用三十六算六變而成卦一變為兆再變成卦二為甲乙三為丙丁四為戊巳五為庚辛六為壬癸其用五行相生相尅相扶相抑大抵與氣同占凡易之策四十有九用四十九算分而揲之其變有四一曰單爻二曰拆爻三曰交爻四曰重爻凡十八變而成卦又視卦之八氣王相囚死胎沒休廢及飛伏世應而使焉凡八純之卦十六變而復初為一變次曰二變三曰三變四曰四變五曰五變六為游魂七為外戒八為內戒九為歸魂十為絶命十一為血脉十二為肌肉十三為體骨十四為棺槨十五為冡墓凡內卦為貞朝占用之外卦為悔暮占用之凡式占辨三式之同異一曰雷公式二曰太乙式並禁私家畜三曰六壬式士庶通用之凡用式之法周禮太史抱天時與太師同車鄭司農云抱式以知天時也今其局以楓木為天棗心為地刻十二辰下布十二辰以加占為常以月將加卜時視日辰隂陽以立四課一曰日之陽二曰日之隂三曰辰之陽四曰辰之隂四課之中察其五行取相尅者三傳為用又辨十二將十二月神十二將以天一為首前一曰螣蛇二朱雀三六合四勾陳五青龍後一曰天后二太隂三𤣥武四太常五白獸六天空前盡於五後盡於六天一立中為十二將又有十二月之神正月登明二月天魁三月從魁四月傳送五月小吉六月勝先七月太卜八月天閏九月太衝十月功曹十一月大吉十二月神后凡隂陽雜占吉凶悔吝其類有九決萬民之猶豫一曰嫁娶二曰生産三曰厯注四曰屋宅五曰祿命六曰拜官七曰祠祭八曰發病九曰殯葬凡厯注之用六一曰大㑹二曰小㑹三曰雜㑹四曰歲㑹五曰除建六曰人神凡祿命之義六一曰祿二曰命三曰驛馬四曰納音五曰湴河六曰月之宿也皆辨其象數通其消息所以定吉凶焉凡國有祭祀則率卜正占者卜日於太廟南門之外命龜既灼而占之命龜曰假爾泰龜有常乃授卜正作龜與衆占之乃告太常卿曰某日從乃徹龜也先卜上旬不吉次卜中旬下旬若卜國之大事亦如卜日之儀凡歲季冬之晦帥侲子入于宫中堂贈大儺天子六隊太子二隊周禮男巫冬堂贈無方無算鄭𤣥云贈送也歲終以禮送不祥其行必由堂始巫與神通言東則東西則西可近則近可逺則逺無常數大儺禮選人年十二已上十六已下為侲子著假面衣赤布袴褶二十四人一隊六人作一行也方相氏右執戈左執楯而導之一人為方相氏著假面黃金四目䝉熊皮𤣥衣朱裳唱十二神以逐惡鬼甲作食􅓇胇胃食虎椎伯食魅騰簡食不祥攬諸食咎伯奇食夢彊梁祖明共食磔死寄生委隨食觀錯斷食巨窮奇騰根共食蠱儺者既出乃磔雄於宫門及城之四門以祭焉廩犧署令一人從八品下周禮牧人下士掌牧六牲以供祭祀秦漢內史左馮翊屬官有廩犧令丞尉後屬大司農後漢河南尹屬官有廩犧令丞魏晋因之宋齊亦有令丞齊職儀令品第七秩四百石銅印墨綬進賢一梁冠絳朝服今用三品勳位梁太常卿統廩犧令丞為三品勳位陳因之後魏令從五品下北齊太常寺屬官有廩犧令丞隋及皇朝因之丞一人正九品上隋置二人皇朝因之開元二十三年減一人廩犧令掌薦犧牲及粢盛之事丞為之二凡三祀之牲牢各有名數昊天上帝之牲以蒼犢皇地祇之牲以黃犢神州之牲以黝犢五帝之牲各以方色犢大明青牲夜明白牲宗廟社稷嶽鎮海瀆先農先蠶前代帝王孔宣父齊太公廟等皆以太牢風師雨師靈星司中司命司人司祿及五龍祠司永諸太子廟皆以少牢其餘則以特牲凡冬至圜丘加羊豕各九夏至方丘羊豕各五五郊迎氣羊豕各二蠟祭神農伊耆已下方别各用少牢凡大祀養牲在滌九旬中祀三旬小祀一旬其牲方色難備者以純色代之凡告祈之牲不養凡祭祀之犧牲不得捶撲傷損死則埋之病則易之凡藉田所收九穀納于神倉以供粢盛及五齊三酒之用若有餘及穰藳供飼犧牲焉凡供別祀用太牢者則三牲加酒脯及醢犢羊猪各一酒二斗脯四段醢四合凡大祭祀則與太祝以牲就榜位太常卿省牲則北面告腯乃牽牲以授太官而用之汾祠署令一人從七品下丞一人從八品上並開元二十一年置汾祠令丞掌神祀享祭灑掃之制兩京齊太公廟署令各一人從七品下丞各一人從八品上並開元十八年置太公廟令丞掌門闔灑掃及春秋二仲釋奠之禮唐六典卷十四
