body:
  text: 唐六典卷四唐張九齡等撰尚書禮部禮部尚書一人侍郎一人郎中一人員外郎一人主事二人令史五人書令史一十人亭長六人掌固八人祠部郎中一人員外郎一人主事二人令史六人書令史十三人掌固四人膳部郎中一人員外郎一人主事二人令史四人書令史九人掌固四人主客郎中一人員外郎一人主事二人令史四人書令史九人掌固四人禮部尚書一人正三品周之春官卿也漢成帝置尚書五人其四曰客曹主外國封貢事光武分六曹吏部曹主選舉齊祀事然則封貢齊祀皆今禮部之職東晉始置祠部尚書常與右僕射通職若右僕射闕則以祠部尚書知右事宋齊梁陳皆號祠部尚書後魏稱儀曹尚書北齊亦為祠部尚書掌祠祭醫藥死喪贈賻等事後周依周官置春官府大宗伯卿一人隋更為禮部尚書皇朝因之龍朔二年改為司禮太常伯咸亨元年復為禮部光宅元年為春官尚書神龍元年復故侍郎一人正四品下周之春官小宗伯中大夫也漢已來尚書侍郎今郎中之任後周依周官隋煬帝置禮部侍郎皇朝因之龍朔二年改為司禮少常伯咸亨光宅神龍並隨曹改復禮部尚書侍郎之職掌天下禮儀祠祭燕饗貢舉之政令其屬有四一曰禮部二曰祠部三曰膳部四曰主客尚書侍郎總其職務而奉行其制命凡中外百司之事由於所屬皆質正焉凡舉試之制每嵗仲冬率與計偕其科有六一曰秀才試方略策五條此科取人稍峻貞觀已後遂絶二曰眀經三曰進士四曰眀法五曰書六曰算凡正經有九禮記左氏春秋為大經毛詩周禮儀禮為中經周易尚書公羊春秋榖梁春秋為小經通二經者一大一小若兩中經通三經者大小中各一通五經者大經並通其孝經論語老子並須兼習凡明經先帖經然後口試并答策取粗有文性者為通舊制諸眀經試每經十帖孝經二帖論語八帖老子兼注五帖每帖三言通六已上然後試策十條通七即為高第開元二十五年敕諸眀經先帖經通五已上然後口試每經通問大義十條通六已上并答時務策三道凡進士先帖經然後試雜文及策文取華實兼舉策須義理愜當者為通舊例帖一小經并注通六已上帖老子兼注通三已上然後試雜文兩道時務策五條開元二十五年依明經帖一大經通四已上餘如舊凡眀法試律令取識逹義理問無疑滯者為通所試律令凡每部試十帖策試十條律七條令三條凡眀書試說文字林取通訓詁兼㑹雜體者為通說文六帖字林四帖兼口試不限條數凡眀算試九章海島孫子五曹張丘建夏侯陽周髀五經綴術緝古取眀數造術辨眀術理者為通九章三帖五經等七部各一帖綴術六帖緝古四帖録大義本條為問凡此六科求人之本必取精究理實而升為第其有博綜兼學須加甄奬不得限以常科開元二十五年敕眀經進士中除所試外眀經有兼眀五經已上每經帖十通五已上口問大義十條疏義精通通五已上進士有兼通一史試策及口問各十條通六已上須加甄奬所司録名奏聞其進士唱及第訖其所試雜文及第送中書門下詳覆其眀經口問仍須對同舉人考試其試宏文崇文生自依常式其宏文崇文館學生雖同眀經進士以其資廕全高試取粗通文義宏崇生習一大經一小經兩中經者習史記者漢書者東觀記者三國志者皆須讀文精熟言音典正策試十道取粗解注義經通六史通三其試時務策者皆須識文體不失問目意試五得三皆兼帖孝經論語共十條太廟齊郎亦試兩經文義粗通然後補授考滿簡試其郊社齊郎簡試亦如太廟齊郎其國子監大成十員取眀經及第人聰眀灼然者試日誦千言并口試仍策所習業十條通七然後補充各授散官依邑令於學內習業以通四經為限其祿俸賜㑹准非伎術直例給業成者於吏部簡試孝經論語共試八條餘經各試八條間日一試灼然眀練精熟為通口試十通九策試十通七為第所加經者禮記左傳毛詩周禮各兩階餘經各加一階及第者放選優與處分不第者三年一簡九年業不成者解退依常選例業未成年未滿者不得别選及充餘使若經事故應叙日還令覆上其先及第人欲加經及官人請試經者皆准此郎中一人從五品上周官大宗伯屬官有下大夫蓋郎中之任也魏晉宋齊梁陳後魏北齊有殿中郎儀曹郎而殿中掌表疏儀曹掌吉凶禮制皆禮部之職也後周依周官隋初禮部曹置侍郎一人煬帝除侍字又改為儀曹皇朝因稱郎中武德三年復為禮部龍朔二年改為司禮大夫光宅神龍隨曹改復員外郎中一人從六品上周官大宗伯屬官冇上士後周依焉蓋令員外郎之任也隋開皇六年置禮部員外郎煬帝改為儀曹承務郎武德初改為禮部員外郎龍朔二年改為司禮員外郎咸亨光宅神龍並隨曹改復主事二人從九品上禮部郎中員外郎掌二尚書侍郎舉其儀制而辨其名數凡五禮之儀一百五十有二一曰吉禮其儀五十有五一曰冬至祀圜丘二曰祈榖于圜丘三曰雩祀于圜丘四曰大享于眀堂五曰祀青帝于東郊六曰祀赤帝于南郊七曰祀黃帝于南郊八曰祀白帝于西郊九曰祀黑帝于北郊十曰蠟祭百神于南郊十一曰朝日于東郊十二曰夕月于西郊十三曰祀風伯雨師靈星司中司命司人司祿十四曰夏至祭方澤十五曰祭神州于北郊十六曰祭大社十七曰祭五嶽四鎮十八曰祭四海四瀆十九曰時享于太廟二十曰祫享于太廟二十一曰禘享于太廟二十二曰拜五陵二十三曰巡五陵二十四曰祭先農二十五曰享先蠶二十六曰享先代帝王二十七曰薦新于太廟二十八曰祭司寒二十九曰祭五龍壇三十曰視學三十一曰皇太子釋奠三十二曰國學釋奠三十三曰釋奠于齊太公三十四曰巡狩告圜丘三十五曰巡狩告社稷三十六曰巡狩告宗廟三十七曰巡狩三十八曰封禪三十九曰祈于太廟四十曰祈于太社四十一曰祈于北郊四十二曰祈于嶽瀆四十三曰諸州祭社稷四十四曰諸州釋奠四十五曰諸州祈禜四十六曰諸縣祭社稷四十七曰諸縣釋奠四十八曰諸縣祈禜四十九曰諸太子廟時享五十曰王公已下時享其廟五十一曰王公已下祫享其廟五十二曰王公已下神享其廟五十三曰四品已下時享其廟五十四曰六品已下時祭五十五曰王公已下拜掃二曰賓禮其儀有六一曰蕃國王來朝二曰戌蕃王見三曰蕃王奉見四曰受蕃使表及幣五曰燕蕃國王六曰燕蕃國使三曰軍禮其儀二十有三一曰親征類于上帝二曰宜于太社三曰造于太廟四曰禡于所征之地五曰軷于國門六日告所過山川七曰露布八曰勞軍將九曰講武十曰田狩十一曰射于射官十二曰觀射于射宫十三曰遣將出征宜于太社十四曰遣將告于太公廟十五曰遣將告于太廟十六曰祀馬祖十七曰享先政十八曰祭馬社十九曰祭馬步二十曰合朔伐鼓二十一曰合朔諸州伐鼓二十二曰大儺二十三曰諸州縣儺四曰嘉禮其儀有五十一曰皇帝加元服二曰納后三曰正至受皇太子朝賀四曰皇后正至受皇太子朝賀五曰正至受皇太子妃朝賀六曰皇后正至受太子妃朝賀七曰正至受羣臣朝賀八曰千秋節受羣臣朝賀九曰皇后正至受羣臣朝賀十曰皇后受外命婦朝賀十一曰皇帝於眀堂讀春令十二曰讀夏令十三曰讀秋令十四曰讀冬令十五曰養老于太學十六曰臨軒册皇后十七曰臨軒册皇太子十八曰內册皇太子十九曰臨軒册王公二十曰朝堂燕諸臣二十一曰册內命婦二十二曰遣使册授官爵二十三曰朔日受朝二十四曰朝集使辭見二十五曰皇太子加元服二十六曰納妃二十七曰正至受羣臣賀二十八曰受宫臣賀二十九曰與師傅保相見三十曰受朝集使參辭三十一曰諸王冠三十二曰納妃三十三曰公主降嫁三十四曰三品以上冠三十五曰四品以下冠三十六曰六品以下冠三十七曰三品以上婚三十八曰四品以下婚三十九曰六品以下婚四十曰朝集使禮見及辭四十一曰任官初上四十二曰鄉飲酒四十三曰正齒位四十四曰宣赦書四十五曰羣臣詣闕上表四十六曰羣臣起居四十七曰遣使慰勞諸蕃四十八曰遣使宣撫諸州四十九曰遣使諸州宣制五十曰遣使諸州宣赦書五曰凶禮其儀一十有八一曰凶年振撫二曰勞問疾患三曰中官勞問四曰皇太子勞問五曰五服制度六曰皇帝為小功已上舉哀七曰勑使弔祭八曰㑹喪九曰册贈十曰㑹葬十一曰致奠十二曰皇后舉哀弔祭十三曰皇太子舉哀弔祭十四曰皇太子妃舉哀弔祭十五曰三品以上喪十六曰四品以下喪十七曰六品以下喪十八曰王公以下喪禮制通議其新五禮開元二十年修凡一百五十卷凡君臣上下皆有通稱凡夷夏之通稱天子曰皇帝臣下內外兼稱曰至尊天子自稱曰朕臣下敷奏於天子曰陛下服御曰乘輿行幸曰車駕皇太子已下率土之內於皇帝皆稱臣六宮已下率土之內婦人於太皇太后皇太后皇后皆稱妾百官曰殿下自稱曰臣百官於皇太子亦曰殿下自稱名東宫官則稱臣凡散官正二品職事官從二品已上爵郡王已上於公文皆不稱姓凡六品已上官人奏事皆自稱官號臣姓名然後陳事通事舍人侍御史殿中侍御史則不稱官號凡上表疏箋啓及判策文章如平闕之式謂昊天后土天神地祗上帝天帝廟號祧皇祖妣皇考皇妣先帝先后皇帝天子陛下至尊太皇太后皇太后皇后皇太子皆平出宗廟社稷太社太稷神主山陵陵號乘輿車駕制書詔㫖眀制聖化天恩慈㫖中宫御前闕廷朝廷之類並闕宇宗廟中陵中行陵陵中樹木待制乘輿車中事舉陵廟名為官如此之類皆不闕字若泛說古典聖及天地不指說平闕之名者亦不平出若寫經史羣書及撰録舊事其文有犯國諱者皆為字不成凡元日大陳設於太極殿今大眀宫於含元殿在都則於乾元殿皇帝衮冕臨軒展宮縣之樂陳歷代寶玉輿輅備黃麾仗二王後及百官朝集使皇親諸王並朝服陪位皇太子獻夀次上公獻夀次中書令奏諸州表黃門侍郎奏祥瑞户部尚書奏諸州貢獻禮部尚書奏諸蕃貢獻太史令奏雲物侍中奏禮畢然後中書令又與供奉官獻夀時殿上皆呼萬嵗按舊儀闕供奉官獻夀禮但位次立體畢竟無拜賀開元二十五年臣林甫謹草其儀奏而行之大㑹之日陳設亦如之皇帝服通天冠皇太子稱觴獻夀次上公稱觴獻夀侍中宣賜束帛有差其日外命婦朝中宫為皇后稱觴獻夀司宫宣賜束帛有差凡冬至大陳設如元正之儀其異者皇帝服通天冠無諸州表奏祥瑞貢獻凡元正冬至大㑹之眀日百官朝集使等皆詣東宫為皇太子獻夀凡千秋節皇帝御樓設九部之樂百官袴褶陪位上公稱觴獻夀凡京司文武職事九品已上每朔望朝參五品已上及供奉官員外郎監察御史太常博士每日朝參凡蕃國王朝見皆設宫縣之樂及黃麾仗若蕃國使則減黃麾之半凡册皇后皇太子皇太子妃諸王王妃公主並臨軒册命陳設如冬正之儀訖皆拜太廟凡車駕巡幸及還京百官辭迎皆於城門外留守宫內者在殿門外行從官每日起居兩京文武職事五品已上三日一奉表起居三百里內刺史朝見東都留司文武官每月於尚書省拜表及留守官共遣使起居皆以月朔日使奉表以見中書舍人一人受表以進北都留守每季一起居凡皇太子行先一日在京文武職事五品已上並詣宫辭還宫眀日詣宫參凡元正若皇帝加元服皇太后加號皇后皇太子初立天下諸州刺史若京官五品已上在外者並奉表疏賀皆禮部整比送中書總奏之凡祥瑞應見皆辨其物名若大瑞大瑞謂景星慶雲黃星真人河精麟鳯鸞比翼鳥同心鳥永樂鳥富貴吉利神龜龍騶虞白澤神