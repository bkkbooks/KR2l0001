釋奠于孔宣父以顔回配其七十二弟子及先儒並從配謂子淵子騫伯牛仲弓子有子路宰我子貢子遊子夏曾參顓孫師淡臺滅眀宓子賤原憲公冶長南宫適公晳哀曽㸃顔路商瞿高柴漆雕開公伯寮司馬牛樊遲有若公西赤巫馬期梁鱣顔相冉孺曹恤伯䖍公孫龍冉季産秦子南漆雕哆顔子驕漆雕徒父壤駟赤商澤石作蜀任不齊公夏首公良孺后處秦冉奚容針公肩定顔辛鄡單句井疆罕父黑秦商申黨公祖子之榮子旗縣成左人郢燕伋鄭子徒秦非施之常顔噲步叔乘顔之僕陳亢籍樂欣廉潔顔何叔仲㑹狄黑邽巽孔忠公西與如公西葴等及左丘眀公羊高榖梁赤伏勝高堂生戴聖毛萇孔安國劉向鄭衆杜子春馬融盧植鄭元服䖍賈逵何休王肅王弼杜預范寧等凡九十八人仲秋之月亦如之仲春上戊釋奠于齊太公以留侯張良配焉仲秋之月亦如之孟冬祭司寒於氷室仲春祀馬祖仲夏享先牧仲秋祭馬社仲冬祭馬步並以剛日皆於大澤之中季冬臘日前寅蠟百神於南郊大眀夜明神農后稷伊耆五官五星二十八宿十二辰五嶽四鎮四海四瀆五田畯青龍朱雀麒麟騶虞元武及五方山林川澤丘陵墳衍原隰井泉水墉坊於莵鱗羽介毛裸郵表畷猫昆蟲凡一百八十七座若其方有災害則闕而不祭祭井泉於川澤之下立春之日祭東嶽泰山於兖州東鎮沂山於沂州東海於萊州東瀆淮於唐州立夏之日祭南嶽衡山於衡州南鎮㑹稽山於越州南海於廣州南瀆江於益州季夏土王日祭中嶽嵩山於河南府立秋之日祭西嶽華山於華州西鎮吳山於隴州西海及西瀆河於同州立冬之日祭北嶽恆山於定州北鎮醫無閭於營州北海及北瀆濟於河南府各於其境內本州長官行焉蜀州青城丈人山每嵗春秋二時享以蔬饌委縣令行側近以三兩人灑掃凡三年一享帝嚳氏于頓邱享唐堯於平陽而稷卨配焉享虞舜於河東咎繇配焉享夏禹於安邑伯益配焉享殷湯於偃師伊尹配焉享周文王於酆太公配焉享周武王於鎬周公召公配焉享漢高祖於長陵蕭何配焉皆以仲春之月四時仲月享隱章懷懿德節愍惠莊惠文惠宣七太子廟令其子孫主祭有司給牲牢樂縣太常博士相禮焉四仲月享隋文帝周武帝廟酅公介公主祭凡州縣皆置社稷如京都之制仲春上戊州縣官親祭仲秋上戊亦如之凡州縣皆置孔宣父廟以顔回配焉仲春上丁州縣官行釋奠之禮仲秋上丁亦如之凡官爵二品已上祠四廟五品已上祠三廟六品已下逹於庶人祭祖禰而已凡國有封禪之禮則依圜丘方澤之神位古封禪禮多闕而不載其玉檢文亦祕代莫得知開元十三年上封太山乘馬直造山頂唯一二大臣得從焉其玉檢文為蒼生祈福當時不祕人得以知之若親征禡類昭告各依本神位焉車駕巡幸路次名山大川古昔聖帝眀王名臣將相陵墓及廟應致祭者名山大川三十里內聖帝眀王二十里內名臣將相十里內並令本州祭之凡國有大祭祀之禮皇帝親祭則太尉為亞獻光祿卿為終獻若有司攝事則太尉為初獻太常卿為亞獻光祿卿為終獻孔宣父廟則國子祭酒為初獻司業為亞獻國子博士為終獻齊太公廟則太常卿為初獻少卿為亞獻丞為終獻諸小祀唯官一獻凡大祀散齊四日致齊三日中祀散齊三日致齊二日小祀散齊二日致齊一日皆祀前習禮沭浴並給明衣諸大祀齊官皆於散齊日平眀集尚書省受誓戒其致齊日三公於都省安置所司鋪設若車駕親行及齊官向祀祭之所本司預告州縣及金吾相知令平眀視所行之路道次不得見諸凶穢縗絰及聞哭泣之聲散齊日不得弔喪問疾不判署刑殺丈書不决罰罪人凡京師孟夏已後旱則先祈嶽鎮瀆海及諸山川能興雲雨者皆於北郊望祭又祈社稷又祈宗廟每七日一祈不雨還從嶽瀆如初旱甚則修雩秋分已後雖旱不雩雨足皆報祀若州縣則先祈社稷及境內山川若霖雨則京城禜諸門門别三日每日一禜不止祈山川嶽鎮海瀆三日不止祈社稷宗廟若州縣則禜城門及境內山川而已凡天下觀總一千六百八十七所一千一百三十七所道士五百五十所女道士每觀觀主一人上座一人監齊一人共綱統衆事而道士修行有三號其一曰法師其二曰威儀師其三曰律師其德高思精謂之錬師而齊有七名其一曰金録大齊調和陰陽消災伏害為帝王國王延祚降福其二曰黃録齊並為一切拔度先祖其三曰眀真齊學者自齊齊先緣其四曰三元齊正月十五日天官為上元七月十五日地官為中元十月十五日水官為下元皆法身自懺愆罪焉其五曰八節齊修生求仙之法其六曰塗炭齊通濟一切急難其七曰自然齊普為一切祈福而禳謝復三事其一曰章其二曰醮其三曰理沙大抵以虛寂自然無為為宗其法出於老子自云有物混成先天地生視之不見聼之不聞搏之不得湛然而存隨感應物厥數無常奉其道者咸蠲去邪纍澡雪心神及白日升天長生代上又稱道者有三元九府百二十官一切諸神咸所統攝至有化金消玉行符敇水竒方妙術驅鬼役神之能故好異者共尊事之又言二儀之間有三十三天一天之中三十六宫宫有一主最高者曰無極至尊次曰大至真尊次天覆地載陰陽真尊次供正真尊其事甚妙故啓叙其宗㫖也蓋老子生於殷末在周為守藏吏柱下史作為道書五千言其要在清净理國立身之要出至後漢張道陵號天師闡揚其化周於四海者以顯其德凡天下寺總五千三百五十八所三千二百四十五所僧一千一百一十三所尼每寺上座一人寺主一人都維那一人共綱統衆事而僧持行者有三品其一曰禪二曰法三曰律大抵皆以清靜慈悲為宗釋氏之源秦漢已前未傳中土至漢武元狩中遣將軍霍去病討丐奴殺休屠王獲其祭天金人帝以為神列於甘泉官金人率長丈餘不祭祀但燈香禮拜而已及至張騫使大夏聞其旁有身毒國一名天竺國有浮屠之教哀帝元夀元年受大月氐王使浮屠經後漢眀帝永平三年夜夢金人頂有白光飛行殿庭乃訪羣臣侍中傅毅始以佛對於是帝遣郎中蔡愔使於天竺國寫浮屠遣範愔乃與沙門迦華摩騰竺法闌東還洛陽中國有沙門及拜禮之法自此始也愔得佛經四十二章及釋迦立像眀帝令畫工圖佛像置清凉臺及顯節陵上愔之還也以白馬負經漢因立白馬寺於洛城雍門西浮屠正號曰佛陀譯之則為靜覺所謂佛者本號釋迦文即天竺釋迦衛國王之子於四月八日夜從母右脅而生有三十二相當周莊王十年魯莊公七年夏四月恆星不見夜眀是也以布施持戒忍辱精進禪定智慧為宗所謂六波羅密者也自齊梁之後其道彌尊凡道士女道士僧尼之簿籍亦三年一造其籍一本送祠部一本送鴻臚一本留於州縣凡道士女道士衣服皆以木蘭青碧皂荆黃緇瓌之色若服俗衣及羅綾乘大馬酒醉與人鬬打招引賓客占相吉凶以三寶物餉饋官寮勾合朋黨者皆還俗若巡門教化和合婚姻飲酒食肉設食五辛作音樂博戲毁罵三綱凌突長宿者皆苦役也凡道觀三元日千秋節日凡修金録眀真等齊及僧寺别勑設齊應行道官給料髙祖神堯皇帝五月六日文穆皇后五月一日太宗文武聖皇帝五月二十六日文德聖皇后六月二十一日髙宗天皇大帝十二月四日大聖天后十一月二十六日中宗孝和皇帝六月二日和思皇后四月七日睿宗大聖真皇帝六月十日昭成皇后正月二日皆廢務凡廢務之忌若中宗已上京城七日行道外州三日行道睿宗及昭成皇后之忌京城二七日行道外州七日行道八代祖獻祖宣皇帝十二月二十三日宣莊皇后六月三日七代祖懿祖光皇帝九月八日光懿皇后八月九日皆不廢務六代祖太祖景皇帝九月十八日景烈皇后五月六日五代祖代祖元皇帝四月二十四日元真皇后三月六日孝敬皇帝四月二十五日哀皇后十二月二十日皆不廢務京城一日設齊凡國忌日兩京定大觀寺各二散齊諸道士女道士及僧尼皆集于齊所京文武五品以上與清官七品已上皆集行香以退若外州亦各定一觀一寺以散齊州縣官行香應設齊者蓋八十有一州焉謂四輔五府六雄十望曹濮兖齊豫徐陳青亳仙凉秦瀛貝邢恆冀定趙滄德深博易相梁襄澤安綿梓遂眉卭果彭蜀漢潤越常蘇杭婺衢湖宣洪潭廣桂隴邠涇等州是也其道士女道士僧尼行道散齊皆給香油炭料若官設齊道佛各施物三十五假供修理道佛寫一切經道士女道士僧尼各施錢十二文五品已上女及孫女出家者官齊行道皆聽不預若私家設齊道士女道士僧尼兼請不得過四十九人凡逺忌日雖不廢務然非軍務急切亦不舉事餘如常式膳部郎中一人從五品上後魏職品令太和中改定百官都官尚書管左士郎北齊河清令改左士郎為膳部隋亦號膳部郎皇朝為郎中龍朔二年為司膳大夫咸亨元年復故員外郎一人從六品上隋文帝置煬帝改為承務郎皇朝復為膳部員外郎龍朔咸亨隨曹改復主事二人從九品上膳部郎中員外郎掌邦之牲豆酒膳辦其品數凡郊祀天地日月星辰嶽瀆享祭宗廟百神在京都者用牛羊豕滌養之數省閲之儀皆載於廩犧之職焉若諸州祭嶽鎮海瀆先代帝王以太牢州縣釋奠於孔宣父及祭社稷以少牢其祈禜則以特牛凡郊祀天地日月星辰嶽瀆及享宗廟百神在京都者所用籩豆簠簋鈃㽅俎之數魚脯醯醢之味石鹽菜果之羞並載於太官之職焉若諸州祭嶽鎮海瀆及先代帝王籩豆各十簠簋各二俎三州縣祭社稷釋奠每坐籩豆各八簠簋俎如上其所實之物如京都之制凡祀闕所實之制並載於良醖之職焉凡天下之珍闕之物多少之制封檢之宜並載於尚食之職焉凡非因大禮不得獻食若因大慶獻食及所司供進並不得用犢若牸羊至厨生羔者放長生若大齊日皆進素食其應用之羊亦放為長生凡諸陵所有進獻之饌並載於陵令之職焉凡親王已下常食料各有差每日細白米二升粳米粱米各一斗五升粉一升油五升鹽一升半醋二升蜜三合粟一斗梨七顆蘇一合乾棗一升木橦十根炭十斤䓤韭䜴蒜薑椒之類各有差每月給羊二十口猪肉六十斤魚三十頭各一尺酒九斗三品已上常食料九盤每日細米二升二合粳米八合麵二升四合酒一斤半羊肉四分醬四合醋四合瓜三顆鹽豉葱薑葵韭之類各有差木橦春二分冬三分五釐炭春三斤冬五斤四品五品常食料七盤每日細米二升麵二升三合酒一升半羊肉三分瓜兩顆餘並同三品若斷屠及决囚日停肉給油一合小豆三合三品已上亦同此六品已下九品已上常食料五盤每日白米二升麵一升一合油三勺小豆一合醬三合醋三合䜴鹽葵韭之類各有差木橦春二分冬三分凡諸王已下皆有小食料午時粥料各有差復有設食料設會料每事皆加常食料又有節日食料謂寒日麥粥正月七日三月三日煎餅正月十五日晦日膏麋五月五日粽䊦七月七日斫餅九月九日麻葛糕十月一日黍臛皆有等差各有配食料蕃客在館食料五等蕃客設食料蕃客設㑹料各有等差焉主客郎中一人從五品上漢舊儀云尚書郎四人其一主胸奴單于營部蓋主客之任也闕客闕宋置主客晉氏主客分為左右南北東晉省因後魏職品令太和中吏部管南主客北主客闕主闕左主客為主爵南各右主客北齊河清令改諸蕃雜客事隋開皇為主客郎大業五年改為司蕃郎皇朝為主客郎中龍朔二年改為司藩大夫咸亨元年復故員外郎一人從六品上隋文帝置煬帝為承務郎皇朝為主客員外郎龍朔咸亨隨曹改復主事二人從九品上主客郎中員外郎掌二王後及諸蕃朝聘之事二王之後酅公隋室楊氏介公周室宇文氏凡四蕃之國經朝貢已後自相誅絶及有罪見滅者蓋三百餘國今所在者有七十餘蕃謂三姓葛邏祿處蜜處同三姓咽蔑堅昆拔番蜜窟內有姓殺下突厥奚契丹逺蕃靺鞨渤海靺鞨室韋和解烏羅護烏素固逹末婁逹垢日本新羅大食吐蕃波斯拔汗那康國安國石國俱戰提㪍律國罽賔國東天竺西天竺南天竺北天竺中天竺吐火羅米國火尋國骨咄國訶毗施國曹國拂菻國謝䫻㪍時山屋䭾國師子國真臘國尸科佛誓國婆利國䓗領國俱位國林邑國護密國怛沒國悒怛國烏萇國迦葉彌羅國無蜜心國蘇都瑟匿國史國俱蜜國于建國可薩國遏矅國習阿薩般國龜兹國疏勒國于闐國焉耆國突騎等七十國各有土境分為四蕃焉其朝貢之儀享燕之數髙下之等往來之命皆載於鴻臚之職焉唐六典卷四
