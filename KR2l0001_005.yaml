body:
  text: 唐六典卷五唐張九齡等撰尚書兵部兵部尚書一人侍郎二人郎中二人員外郎三人主事四人令史三十七人書令史六十人制書令史十三人甲庫令史十二人亭長八人掌固十二人職方郎中一人員外郎一人主事二人令史四人書令史九人掌固四人駕部郎中一人員外郎一人主事三人令史十人書令史二十四人掌固四人庫部郎中一人員外郎一人主事二人令史七人書令史十五人掌固四人兵部尚書一人正三品周官夏官卿也漢置五曹未有主兵之任也魏始置五兵尚書謂中兵外兵騎兵别兵都兵也晉太始中省五兵尚書太康中又置七兵尚書以舊五兵尚書中兵外兵分為左右東晉及宋又為五兵孝武大眀二年又省之順帝升眀元年又置歷齊梁陳後魏北齊皆置五兵尚書後周依周官置大司馬卿一人隋改為兵部尚書皇朝因之龍朔二年改為司戎太常伯咸亨元年復為兵部尚書光宅元年改為夏官尚書神龍元年復故侍郎二人正四品下周官夏官小司馬中大夫也漢以來尚書侍郎今郎中之任也後周依周官隋煬帝置兵部侍郎皇朝因之龍朔二年改為司戎少常伯咸亨元年復為兵部侍郎總章元年增置一員光宅神龍並隨曹改復兵部尚書侍郎之職掌天下軍衛武官選授之政令凡軍師卒戍之籍山川要害之圖廄牧甲仗之數悉以咨之其屬有四一曰兵部二曰職方三曰駕部四曰庫部尚書侍郎總其職務而奉行其制命凡中外百司之事由於所屬咸質正焉凡選授之制每嵗孟冬以三旬會其人去王城五百里集於上旬千里之內集於中旬千里之外集於下旬以三銓領其事一曰尚書銓二曰東銓三曰西銓尚書為中銓兩侍郎分為東西銓以五等閲其人一曰長朵二曰馬射三曰馬槍四曰步射五曰應對以三竒拔其選一曰驍勇二曰材藝三曰可為統領之用其尤異者登而任之否則量以退焉然後據其狀以核之考其能以進之所以録深功拔竒藝備軍國綜勳賢也五品已上皆奏聞而制授焉六品已下則量資注擬其在軍鎮要籍不得赴選委節度使銓試具等第以申焉其三竒五等之選有殊尤者得令宿衛其宿衛皆帶本官以充其選人有自文資入者取少壯六尺以上材藝超絶考試不堪還送吏部凡官階注擬團甲進甲皆如吏部之制凡大選終於季春之月所以審名實之銓綜備戎仗之物數以戒軍令而振國容焉郎中二人從五品上周官大司馬屬官有軍司馬下大夫蓋郎中之任也魏有五兵郎曹皆置郎中晉有七兵皆置郎中宋有中兵外兵騎兵元嘉已後省騎兵齊因之梁陳有左中兵右中兵左外兵右外兵騎兵郎曹皆置侍郎亦郎中任也後魏北齊有左中兵右中兵左外兵右外兵都兵郎曹並置郎中後周依周官隋初始置兵部郎曹置侍郎一人煬帝除侍字又改為兵曹郎武德初依隋三年改為兵部郎中龍朔二年改為司戎大夫咸亨光宅神龍並隨曹改復員外郎二人從六品上周官大司馬屬官輿司馬上士後周依焉蓋員外之任也隋開皇六年置兵部員外郎煬帝改為兵曹承務郎皇朝改為兵部員外郎龍朔二年改為司戎員外郎咸亨光宅神龍並隨曹改復主事四人從八品下隋煬帝初置為從九品下開元二十四年勑改為八品郎中一人掌考武官之勳祿品命以二十有九階承而敘焉從一品曰驃騎大將軍漢有驃騎將軍霍去病後漢有東平王蒼魏有王昶晉有紀瞻王駿並為之齊職儀云驃騎品秩第二金章紫綬武冠絳朝服佩水蒼玉梁官品令雜號將軍一百二十五分為二十四班班多者為貴驃騎班第二十四陳品第一秩中二千石後魏職品令第二後周驃騎大將軍九命隋官品令驃騎正四品皇朝定令為武散官從一品正二品曰輔國大將軍魏甲辰令晉官品令梁官品令輔國將軍並第三品後魏從第三品後周七命隋從六品下皇朝改焉從二品曰鎮軍大將軍魏志曰文帝以陳羣為鎮軍大將軍秩二千石晉公卿秩云楊駿胡奮並領鎮軍將軍齊職儀云品第三後周八命隋並六品下皇朝改焉正三品曰冠軍大將軍史記曰楚義帝以宋義為卿子冠軍漢武帝以霍去病功冠三軍封冠軍侯其名起於此也魏以文欽為冠軍將軍齊職儀云品秩第三晉令云金章紫綬給五時服武冠佩水蒼玉梁令第三品陳品第四秩中二千石隋令正六品下皇朝改焉懷化大將軍皇朝所置以授蕃官從三品曰雲麾將軍梁班第十八陳品第四秩中二千石歸德將軍皇朝所置以授蕃官正四品上曰忠武將軍梁班第十九陳品第四秩中二千石正四品下曰壯武將軍梁大通三年又置二百四十二號將軍為四十四班壯武班第十六陳品第六秩二千石從四品上曰宣威將軍皇朝所置從四品下曰眀威將軍梁班第十二後魏職品令正六品上正五品上曰定逺將軍梁班第十二也諸將軍亦為二十四班止施於外國定逺班第十二正五品下曰寧逺將軍梁官品令寧逺將軍正五品從五品上曰遊騎將軍魏甲辰令遊騎將軍第四品陳秩二千石從五品下曰遊擊將軍漢書曰武帝以蘇建韓説為遊擊將軍後漢記云光武以鄧晨為遊擊將軍晉官品令遊擊將軍四品陳秩二千石正六品上曰昭武校尉下曰昭武副尉從六品上曰振威校尉下曰振威副尉正七品上曰致果校尉下曰致果副尉從七品上曰翊麾校尉下曰翊麾副尉正八品上曰宣節校尉下曰宣節副尉從八品上曰禦武校尉下曰禦武副尉正九品上曰仁勇校尉下曰仁勇副尉從九品上曰陪戎校尉下曰陪戎副尉漢書百官表校尉皆二千石武帝置隋朝改為散官皇朝因之凡懷化歸德將軍量配於諸衛上下其餘並兵部定其番第五百里內七番一千里內八番二千里內十番二千里外十二番並一月上四品已下九品已上於兵部上下五百里內四番一千里內五番二千里內六畨二千五百里七畨三千里內八畨各一季上三千里外免畨隨須追集也番滿者六品已下並聽預簡選量其才能或留本司或送吏部五品已上者則奏聞凡敘階之法一如文散官之制凡天下之府五百九十有四有上中下並載於諸衛之職凡應宿衛官各從番第諸衛將軍中郎將郎將及諸衛率副率千牛備身備身左右太子千牛并長上折衝果毅應宿衛者並一日上兩日下諸色長上若司階中候司戈執戟並五日上十日下諸應外職掌押當及分司者則年支焉若左右羽林將軍每夜各一人更直中郎將郎將亦如之長人長上每日上隨仗下長人取六尺六寸已上厚濶者四十人分左右監門衛滿四考依出身例授武散官依舊長上蕃人任武官者並免入宿任三衛者配元武門上一日上兩日下配南衙者長番每年一月上凡千牛備身備身左右及太子千牛皆取三品已上職事官子孫四品清官子儀容端正武藝可稱者充五考本司隨文武簡試聽選如階應入武品折其一考四品謂諸司侍郎左右庶子凡殿中省進馬取左右衛三衛髙蔭簡儀容可觀者補充分為三番上下考第簡試同千牛例僕寺進馬亦如之凡勳官十有二等並載於司勳之職皆量其逺邇以定其番第五百里內五番一千里內七番一千五百里內八番二千里內十番二千里外十二番各一月上每上或分配諸司上州及都督府番别各聽留六十人中州四十五人下州三十五人分配監當城門倉庫亦量於數內通融配給當州人少者任取五十已上五十九已下及輕疾丁充並五番上皆一月五品已上四年七品已上五年多至八年年滿簡送吏部不第者如初無文聽以武選凡左右衛親衛勳衛翊衛及左右率府親勳翊衛及諸衛之翊衛通謂之三衛擇其資蔭髙者為親衛取三品已上子二品已上孫為之其次者為勳衛及率府之親衛四品子三品孫二品已上之曽孫為之又次者為翊衛及率府之勳衛四品孫職事五品子孫三品曽孫若勳官三品有封者及國公之子為之又次者為諸衛及率府之翊衛五品已上并柱國若有封爵兼帶職事官為之又次者為王府執仗執乘散官五品已上子孫為之凡三衛皆限年二十嵗已上每嵗十一月已後本州申兵部團甲進甲盡正月畢其入衛雜配並注甲長定不得移改量逺邇以定其番第五百里內五番一千里內七番一千里外八番各一月上三千里外九番各倍其月應補之人周親已上有犯刑戮者配令兵部上下凡諸衛及率府三衛貫京兆河南蒲同華岐陜懷汝鄭等州皆令番上餘州止納資而已應納資者每年九月一日於本貫及寄住處輸納本貫挾名録申兵部凡左右衛之三衛分為五仗一曰親仗二曰供奉仗三曰勳仗四曰翊仗五曰散手仗每月各配三十六人而上下焉其五仗上下及引駕細引考以五左右衛之他職掌及左右率府之勳衛考以六左右率府之三衛帖五仗上下者亦五考諸衛及率府之翊衛考以八考滿兵部校試有文堪時務則送吏部無文則加其年階以本色遷授若有才用考內得補主帥及監門校尉直及凡左右衛左右率府三衛經三考已上者得補引駕細引考滿簡試如三衛三衛違蕃者徴資一千五百文仍勒陪畨有故者免徴資三畨不到注里毁奪告身有故者亦陪畨凡王公已下皆有親事帳內六品七品子為親事八品九品子為帳內限年十八已上舉諸州率萬人已上充之親王嗣王郡王開府儀同三司及三品已上官帶勳者差以給之並本貫納其資課皆從金部給付皆限十周年則聽其簡試文理髙者送吏部其餘留本司全下者退還本邑凡兵士𨽻衛各有其名左右衛曰驍騎左右驍衛曰豹騎左右武衛曰熊渠左右威衛曰羽林左右領軍衛曰豹騎左右金吾衛曰依飛東官左右衛率府曰射乘左右司禦率府曰旅賁左右清道率府曰直蕩總名為衛士皆取六品已下子孫及白丁無職役者點充凡三年一簡點成丁而入六十而免量其逺邇以定番第百里內五番五百里外七番一千里外八番各一月上二千里外九番倍其月上若征行之鎮守者免番而遣之凡衛士各立名簿具三年已來征防若差遣仍定優劣為三等每年正月十日送本府印訖仍録一通送本衛若有差行上番折衝府據簿而發之若征行及使經兩番已上者免兩番兩番已上者並二番其不免番還日即當番者免上番凡差衛上征戍鎮防亦有團伍其善弓馬者為越騎團餘為步兵團主帥已下統領之火十人有六馱馬若無馬鄉任備驢騾及牛若父兄子弟不併遣之若祖父母父母老疾無兼丁免征行及番上其居常則皆習射唱大角歌番集之日府官率而課試凡左右金吾衛有角手諸衛有弩手左右羽林軍有飛騎及左右萬騎彍騎天下諸軍有健兒舊健兒在軍皆有年限更來往頗為勞弊開元二十五年勑以為天下無虞宜與人休息自今已後諸軍鎮量間劇利害置兵防健兒於諸色征行人內及客户中召募取丁壯情願充健兒長住邉軍者每年加常例給賜兼給永年優復其家口情願同去者聽至軍州各給田地屋宅人賴其利中外獲安是後州郡之間永無徴發之役矣皆定其籍之多少與其番之上下其所取人並具於本衛每季上中書門下凡關內團結兵京兆府六千三百二十七人同州六千七百三十六人華州五千二百二十三人蒲州二千七百三十五人選丁户殷贍身材強壯者充之免其征賦仍許在家常習弓矢每年差使依時就試秦成岷渭河蘭六州有髙麗羌兵皆令當州上佐一人專知統押每年兩度教練使知部伍如有警急即令赴援諸州城傍子弟亦常令教習每年秋集本軍春則放散黎雅松翼茂五州有鎮防團結兵並領刺史自押領若須防遏即以上佐及武官充凡天下諸州差兵募取户殷丁多人材驍勇選前資官勳官部分強眀堪統攝者節級權補主帥以領之其義征者别為行伍不入募人之營凡軍行器物皆於當州分給之如不足則自備貧富必以均焉凡諸州諸府應行兵馬之名簿器物之多少皆申兵部軍散之日亦録其存亡多少以申而勘會之凡諸道回兵糧糒之物衣資之費皆所在州縣分而給之郎中一人掌判簿以總軍戎差遣之名數凡天下之節度使有八其一曰關內朔方節度使其統有單于安北東受降城中受降城西受降城豐安軍定逺城皆屬焉其二曰河東節度使其統有大同橫野岢嵐三軍雲州守捉使屬焉其三曰河北幽州節度使其統有經略平盧靜塞威武清夷橫海髙陽唐興恆陽北平十軍安東鎮守渝關守捉北平守捉三使屬焉其四曰河西節度使其統有赤水大斗建康玉門墨離豆盧六軍新泉守捉甘州守捉肅州鎮守三使屬焉其五曰隴右節度使其統有臨洮河源白水安人積石莫門振武七軍平夷五門富耳藍州平戎綏和五守捉使皆屬焉其六曰劒南節度使其統有昆眀軍松州當州防禦卭崍守捉姚嶲州經略四使屬焉其七曰磧西節度使其統有安西疏勒于闐焉耆為四鎮經略使又有伊吾瀚海二軍西州鎮守使屬焉其八曰嶺南節度使其統有廣桂雍容安南等五府經略使若諸州在節度內者皆受節度焉其福州經略使登州平海軍則不在節度之內凡親王總戎則曰元帥文武官總統者則曰總管以奉使言之則曰節度使有大使焉有副大使焉有副使焉有判官焉若大使加旌節以統軍置木契以行動凡將帥出征兵滿一萬人已上置長史司馬倉曹胄曹兵曹參軍各一人五千人已上減司馬諸軍各置使一人五千人已上置副使一人萬人已上置營田副使一人每軍皆有倉曹兵曹胄曹參軍各一人赤水臨洮河源等軍加胄曹參軍一人朔方五城各加胄曹參軍一人其橫海髙陽唐興恆陽北平等五軍皆本州刺史為使其兵各一萬人十月已後募分為三番教習五千人置總管一人以折衝充一千人置子將一人以果毅充五百人置押官一人别將及鎮戎官充凡鎮皆有使一人副使一人萬人已上置司馬倉曹兵曹參軍各一人五千人已下減司馬凡諸軍鎮每五百人置押官一人一千人置子總管一人五千人置總管一人凡諸軍鎮使副使已上皆四年一替總管已上六年一替押官隨兵交替副使總管取折衝已上官充子將已上取果毅已上充凡諸軍鎮大使副使已上皆有傔人别奏以為之使大使三品已上傔二十五人别奏十人四品五品傔遞減五人别奏遞減二人副使三品已上傔二十人别奏八人四品五品傔遞減四人别奏遞減二人總管三品已上傔十八人别奏六人四品五品傔遞減三人别奏遞減二人子總管四品已上傔十一人别奏三人五品六品傔遞減二人别奏遞減一人若討擊防禦逰奕使副使傔準品各減三人别奏各減二人總管及子總管傔準品各減二人别奏各減一人若鎮守已下無副使或𨽻屬大軍鎮者使已下傔奏並四分減一所補傔奏皆令自召以充若府鎮戌正員官及飛騎三衛衛士邉州白丁皆不在取限凡車駕在京即東都南北衙皆置左右屯營别立使以充之若車駕在都則京城亦如之北都準此凡大將出征皆告廟授斧鉞辭齊太公廟辭訖不反宿於家臨軍對冦士卒不用命並得專行其罰既捷及軍未散皆會衆而書勞與其費用執俘折馘之數皆露布以聞乃告太廟元帥凱旋之日天子遣使郊勞有司先獻捷於太廟又告齊太公廟諸軍將若須入朝奏事則先狀奏聞員外郎一人掌貢舉及諸雜請之事凡應舉之人有謀略謂嫻兵法才藝謂有勇技平射謂善能今矢發平直十發五中五居其次為上第三中七居其次為下第筒射謂善及逺而中十發四中六居其次為上第三中七居其次為下第不及此者為不第皆待命以舉非有常也若州府嵗貢皆孟冬隨朝集使以至省勘責文狀而引試焉亦與計科偕有二科一曰平射試射長垜三十發不出第三院為第二曰武舉其試用有七一曰射長垜入中院為上入次院為次上入外院為次二曰騎射發而並中為上或中或不中為次上總不中為次三曰馬槍三柭四柭為上二柭為次上一柭及不中為次四曰步射射草人中者為次上雖中而不法雖法而不中者為次五曰材質以身長六尺已上者為次上已下為次六曰言語有神彩堪充領者為次上無者為次七曰舉重謂翹關率以五次為上第皆試其髙第者以奏聞其科第之優劣謂平射筒射之上第者前資見任見選聽減一次上與官勳散衛官五品已上官子孫帖仗二年而選次第者其應選則據資優直處分應帖仗則三年而選庶人之上等亦帖仗其年比次第庶人次第又加二年武貢之第者勳官五品已上并三衛執仗乘若品子年考已滿者並放選勳官六品已上并應宿衛人及品子五考已上者並授散官謂軍士戰官令並帖仗然後授散官勳獲之等級謂軍士戰功之等級若牢城若戰第一等酬勳三轉第二第三等差減一轉凡破城陳以少擊多為上陳數略相當為中陳以多擊少為下陳轉倍以上為多少常據賊數以十分率之殺獲四分已上為上獲二分已上為中獲一分已上為下獲凡上陳上獲第一等酬勳五轉上陳中獲中陳上獲第一等酬勳四轉上陳下獲中陳中獲下陳上獲第一等酬勳三轉其第二第三等各遞降一轉中限下獲下陳中獲第一等酬勳兩轉第二等三等并下陳下獲各酬勳一轉其雖破城陳殺獲不成分者三等陳各酬勳一轉其跳蕩功不在降限凡臨陳對冦矢石未交先鋒挺入賊徒因而破者為跳蕩其次先鋒為降者為降功凡酬功者見任前資常選為上資文武散官衛官勳官五品已上為次資五品子孫上柱國柱國子勳官六品已下諸色有番考人為下資白丁衛士雜色人為無資凡跳蕩人上資加兩階即優與處分應入三品五品不限官考次資即優與處分下資優與處分無資稍優與處分其殊功第一等上資加一階優與處分應入三品五品減四考次資優與處分下資稍優與處分無資放選殊功第二等上資優與處分次資稍優與處分下資放選無資常勳外加三轉殊功第三等上資稍優與處分次資放選下資應簡日放選無資常勳外加兩轉若破國王勝事愈常格或斬將搴旗功效尤異雖不合格並委軍將臨時録奏皆審其實而授敘焉員外郎一人掌選院謂之南曹每嵗選入有解狀簿書資歷考課必由之以核其實乃上三銓進甲則署焉職方郎中一人從五品上周禮下官有職方氏中大夫之職掌天下之地圖主四方之職貢職方郎中之任也後周依周官隋開皇初始置職方侍郎一人煬帝曰職方郎武德三年加中字至龍朔二年改為司城大夫咸亨元年復故員外郎一人從六品上周禮夏官有職方上士後周依周官隋開皇六年置員外郎一人煬帝改曰承務郎皇朝為職方員外郎龍朔咸亨並隨曹改復主事二人從九品上職方郎中員外郎掌天下之地圖及城隍鎮戍𤇺候之數辨其邦國都鄙之逺邇及四夷之歸化者凡地圖委州府三年一造與板籍偕上省其外夷每有番客到京委鴻臚訊其人本國山川風土為圖以奏焉副上於省其五方之區域都鄙之廢置疆場之爭訟者舉而正之凡天下之上鎮二十中鎮九十下鎮一百三十有五上戍十有一中戍八十有六下戍二百三十有五凡烽候所置大率相去三十里若有山岡隔絶須逐便安置得相望見不必要限三十里其逼邉境者築城以置之每烽置帥一人副一人其放烽有一炬二炬三炬四炬者隨賊多少而為荖焉舊關內京畿河東河北皆置𤇺開元二十五年勑以邉隅無事寰宇乂安內地置𤇺誠為非要量停近甸𤇺二百六十所計𤇺帥等一千三百八十八人凡州縣城門及倉庫門須守當者取中男及殘疾人均為番第以充而免其徭賦焉若修理廨宇及園厨亦聽量使駕部郎中一人從五品上周禮夏官屬有輿司馬之職蓋駕部之任也魏氏始置駕部郎曹歷晉宋齊後魏北齊並為駕部郎中梁陳為駕部侍郎後周夏官府有駕部中大夫一人隋文帝改為駕部侍郎煬帝曰駕部郎宋齊左民尚書領駕部梁陳左民部尚書領駕部後魏北齊殿中尚書領駕部隋則兵部領焉皇朝因之武德三年加中字龍朔二年改曰司輿大夫咸亨元年復故員外郎一人從六品上周禮夏官卿有輿司馬上士後周夏官府小駕部上士一人蓋駕部員外郎之任也隋開皇六年置煬帝改曰承務郎皇朝為駕部員外郎龍朔咸亨並隨曹改復主事三人從九品上駕部郎中員外郎掌邦國之輿輦車乘及天下之傳驛廄牧官私馬牛雜畜之簿籍辨其出入闌逸之政令司其名數凡三十里一驛天下凡一千六百三十有九所二百六十所水驛一千二百九十七所陸驛八十六所水陸相兼若地勢險阻及須依水草不必三十里每驛皆置驛長一人量驛之間要以定其馬數都亭七十五匹諸道之第一等減都亭之十五第二第三皆以十五為差第四減十二第五減六第六減四其馬官給有山阪險峻之處及江南嶺南暑濕不宜大馬處兼置蜀馬凡水驛亦量事間要以置船事繁者每驛四隻間者三隻更間者二隻凡馬三匹給丁一人船一給丁三人凡驛皆給錢以資之什物並皆為市凡乘驛者在京於門下給券在外於留守及諸軍州給券若乘驛經留守及五軍都督府過者長官牌署若不應給者隨即停之而監牧六十有五焉皆分使而統之南使十五監西使十六監北使七監東使九監鹽州使八監嵐州使三監則廄牧及諸司馬牛雜畜各𨽻於籍帳以時受而藏之若畜養之宜孳生之數皆載於太僕之職凡諸衛有承直之馬諸衛每日置承直馬八十匹以備雜使諸衛官諸州府馬每月常差赴京都為承直諸府常備其數甚多開元二十五年勑以為天下無事勞費頗煩宜隨京都近便量留三千匹充扈從及街使乘直餘一切並停凡諸司有備運之車諸司皆置車牛以備遞運之事司農等車一千二十一乘將作監三百四十五乘殿中省尚乘局一百乘少府監六十三乘太常寺一十四乘國子監二十乘太僕寺一十乘光祿寺二十乘衛尉寺十乘太府寺六乘左右衛各二乘左右驍衛各一乘左右武衛各一乘左右威衛各一乘左右領軍衛各一乘左右金吾衛各一乘左右監門衛各二乘左右羽林軍各三乘家令寺一百八十乘左右僕寺二十六乘左右衛率府各一乘牛皆倍之其過倍者則充營田不足者則單駕開元二十二年勑量減六百餘頭乘皆審其制以定數焉庫部郎中一人從五品上周禮夏官有司甲下大夫為司戈盾弓矢之長各辨其物以待軍事今庫部郎中之任也魏氏始置庫部郎曹歷晉宋齊後魏北齊並有庫部郎中梁陳為侍郎後周夏官府有武藏中大夫一人隋文帝為庫部侍郎煬帝曰庫部郎宋齊梁陳並都官尚書領庫部後魏北齊度支尚書領隋則兵部尚書領焉武德三年加中字龍朔二年改為司庫大夫咸亨元年復故員外郎一人從六品上周禮夏官卿有司兵中士後周有小武藏下大夫一人蓋今庫部員外郎之任也隋開皇六年置煬帝改曰承務郎皇朝為庫部員外郎龍朔咸亨隨曹改復主事二人從九品上庫部郎中員外郎掌邦國軍州之戎器儀仗及冬至元正之陳設并祠祭喪葬之羽儀諸軍州之甲仗皆辨其出入之數量其繕造之功以分給焉唐六典卷五
