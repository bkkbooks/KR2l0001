body:
  text: 唐六典卷二十一唐張九齡等撰國子監國子監祭酒一人司業二人丞一人主簿一人録事一人府七人史十三人亭長六人掌固八人國子博士二人助教二人學生三百人典學四人廟幹二人掌固四人太學博士三人助教三人學生五百人典學四人掌固六人四門博士三人助教三人學生五百人俊士八百人典學四人掌固六人國子直講四人大成十人律學博士一人助教一人學生五十人典學二人書學博士二人學生三十人典學二人算學博士二人學生三十人典學二人國子監祭酒一人從三品周禮師氏以三德三行教國子一曰至德二曰敏德三曰孝德一曰孝行二曰友行三曰順行凡國之貴遊子弟學焉又保氏飬國子以道教之六藝謂禮樂射御書數漢官儀云漢置博士祭酒一人秩六百石後漢以博士聰眀有威重者一人為祭酒韋昭辨釋名曰祭酒者凡宴饗必尊長老以酒祭先故曰祭酒徐廣曰古人具饌則賔中長者舉酒祭地示有先也魏因之晋武帝立國子學置祭酒一人晋令曰祭酒博士當為訓範總統學中衆事傅暢諸公讃云裴頠為國子祭酒奏立國子太學起講堂築門闕刻石寫五經百官志祭酒皂朝服介幘進賢兩梁冠佩水蒼玉官品第三東晋及宋齊並同梁置國子祭酒一人班第十三比列曹尚書陳國子祭酒秩中二千石品第三後魏初第四品上太和二十二年增為從第三品北齊改為國子寺祭酒一人從三品後周闕隋初國子學祭酒𨽻太常從三品開皇十三年復置國子寺仁夀元年罷國子唯置太學大業三年改為國子監依舊置祭酒一人皇朝因之龍朔二年改為大司成咸亨中復舊光宅元年改為成均監祭酒神龍元年復舊司業二人從四品下禮記曰樂正司業父師司成秦漢已來無聞隋大業三年置司業一人從四品皇朝因之龍朔改為少司成咸亨中復舊垂拱中增置二人國子祭酒司業之職掌邦國儒學訓導之政令有六學焉一曰國子二曰太學三曰四門四曰律學五曰書學六曰算學凡春秋二分之月上丁釋奠於先聖孔宣父以先師顔回配七十二弟子及先儒二十二賢從祀焉舊令唯祀十哲及二十二賢開元八年敕列曽參於十哲之次并七十二子並許從祀其名歷已具于祠部祭以太牢樂用登歌軒縣六佾之舞若與大祭祀相遇則改用中丁祭酒為初獻司業為亞獻博士為終獻若皇太子釋奠則贊相禮儀祭酒為之亞獻皇帝視學皇太子齒胄則執經講義焉凡釋奠之日則集諸生執經論議奏請京文武七品以上清官並與觀焉凡教授之經以周易尚書周禮儀禮禮記毛詩春秋左氏傳公羊傳榖梁傳各為一經孝經論語老子學者兼習之諸教授正業周易鄭𤣥王弼注尚書孔安國鄭𤣥注三禮毛詩鄭𤣥注左傳服䖍杜預注公羊何休注榖梁范寧注論語鄭𤣥何晏注孝經老子並開元御注舊令孝經孔安國鄭𤣥注老子河上公注其禮記左傳為大經毛詩周禮儀禮為中經周易尚書公羊榖梁為小經每嵗終考其學官訓導功業之多少而為之殿最丞一人從六品下隋大業三年置國子丞三人從六品皇朝省置一人主簿一人從七品下北齊國子寺置主簿員隋置一人皇朝因之録事一人從九品下北齊國子寺有録事一員隋置一人皇朝因之丞掌判監事凡六學生每嵗有業成上于監者以其業與司業祭酒試之眀經帖經口試䇿經義進士帖一中經試雜文䇿時務徵事其眀法眀書算亦各試所習業登第者白祭酒上于尚書禮部其試法皆依考功又加以口試明經帖限通八已上明法明書皆通九已上主簿掌印勾檢監事凡六學生有不率師教者則舉而免之其頻三年下第九年在學及律生六年無成者亦如之假違程限及作樂雜戲亦同唯彈琴習射不禁録事掌受事發辰國子博士二人正五品上漢書百官表云博士秦官也掌通古今秩比六百石員多至數十人武帝置五經博士宣帝稍增員十二人漢儀云文帝博士七十餘人為待詔博士朝服𤣥端章甫冠司馬彪百官志博士十四人魏以太常統太學博士祭酒晉初置博士十九人咸寧四年立國子學置國子博士一人晋官品第六介幘兩梁冠服佩同祭酒宋齊無所改作梁置國子博士二人為九班陳品第四秩千石後魏初國子博士從五品上太和二十二年增為第五品北齊置國子寺有博士五人品第五隋初國子隸太常置博士五人大業三年置國子監博士一人正五品皇朝增置二人助教二人從六品上晋武帝初立國子學置助教十五人官品視南臺御史服同博士東晋孝武損為十人宋齊並同梁班第二陳品第八秩六百石後魏第七品北齊置十人品同後魏隋初置國子助教五人從七品下大業三年減置一人皇朝增置二人國子博士掌教文武官三品已上及國公子孫從二品已上曽孫之為生者五分其經以為之業習周禮儀禮禮記毛詩春秋左氏傳每經各六十人餘經亦兼習之習孝經論語限一年業成尚書春秋公羊榖梁各一年半周易毛詩周禮儀禮各二年禮記左氏春秋各三年其生初入置束帛一篚酒一壺修一案號為束修之禮其習經有暇者命習隸書并國語說文字林三蒼爾雅每旬前一日則試其所習業試讀者每千言內試一帖試講者每二千言內問義一條總試三條通一及全不通斟量决罰每嵗其生有䏻通兩經已上求出仕者則上于監堪秀才進士者亦如之助教掌佐博士分經以教授焉典學掌抄録課業廟幹掌灑掃學廟太學博士三人正六品上東晋元帝增置國子博士十六人謂之太學博士品服同國子博士梁置太學博士八人班第二陳品第八秩六百石後魏初第六品中太和二十二年從第七品北齊國子寺有太學博士十人從第七品後周置太學博士下大夫六人班第四隋初置太學博士五人仁夀元年罷國子唯立太學置博士五人從五品大業三年減置二人降為從六品皇朝增置三人助教三人從七品上後魏置太學助教第八品中北齊國子寺有太學助教二十人從第九品下後周置太學助教上士六人三命隋初太學助教五人正九品下大業三年減為二人皇朝增置三人太學博士掌教文武官五品已上及郡縣公子孫從三品曽孫之為生者五分其經以為之業每經各百人其束修之禮督課試舉如國子博士之法助教已下並掌同國子四門博士三人正七品上後魏書劉芳表云太和二十年立四門博士於四門置學按禮記云天子設四學鄭𤣥注周四郊之虞庠也今以其遼逺故置於四門請移與太學同處從之後魏百官志四門博士第九品北齊置二十人正九品上後周闕隋置五人從八品上皇朝减置三人加正七品上助教三人從八品上北齊國子寺有四門助教二十人隋初置四門助教五人從九品下皇朝因置三人四門博士掌教文武官七品已上及侯伯子男子之為生者若庶人子為俊士生者禮記王制曰命鄉論秀士升之司徒曰選士司徒論選士之秀者升之學曰俊士隋書志曰舊國子學處士以貴賤梁武帝欲招來後進五館生皆取寒門俊才不拘貟數是即今之俊士也分經同太學其束修之禮督課試舉同國子博士之法助教已下掌同國子直講四人皇朝初置無員數長安四年始定為四員俸祿賜㑹同直官例直講掌佐博士助教之職専以經術講授而已大成十人皇朝置取貢舉及第人考功簡聰明者試書日誦得一千言并口試䇿試所習業等十條通七然後補充仍授散官俸祿賜㑹同直官例給初置二十人開元二十年减十人大成通四經業成上于尚書吏部試登第者加一階放選其不第則習業如初每三年一試若九年無成則免大成從常調律學博士一人從八品下晋百官志廷尉官屬有律博士員晋刑法志曰衛覬奏請置律學博士轉相教授東晋宋齊並同梁天監四年廷尉官屬置胄子律博士位視員外郎第三班陳律博士秩六百石品第八後魏初律博士第六品太和二十二年為第九品上北齊大理寺官屬有律博士四人第九品上隋大理寺官屬有律博士八人正九品上皇朝省置一人移屬國學助教一人從九品上皇朝置之律學博士掌教文武官八品已下及庶人子之為生者以律令為專業格式法例亦兼習之其束修之禮督課試舉如三館博士之法助教掌佐博士之職如三館助教之法書學博士二人從九品下代本倉頡作書周禮保氏教以六藝其五曰六書鄭司農云象形㑹意轉注指事假借諧聲也古謂之小學漢書食貨志曰八嵗入小學學六甲五方書計之事晋衛恆字勢曰昔黃帝有泪誦倉頡始作書契蓋覩鳥跡以興思也秦漢古文有八體一曰大篆二曰小篆三曰刻苻四曰蟲書五曰摹印六曰署書七曰殳書八曰𨽻書王莾時甄豐校文字復有六書一曰古文二曰竒字三曰篆書四曰佐書五曰繆篆六曰鳥書自漢已來不見其職隋置書學博士一人從九品下皇朝加置二人書學博士掌教文武官八品已下及庶人子之為生者以石經說文字林為專業餘字書亦兼習之石經三體書限三年業成說文二年字林一年其束修之禮督課試舉如三館博士之法算學博士二人從九品下代本隸首造數周禮保氏教以六藝其六曰九數即九章也一曰方田二曰粟米三曰差分四曰少廣五曰商功六曰均輸七曰方程八曰贏不足九曰旁要漢書律歷志曰數者一十百千萬所以算數事物也小學是則職在太史義和掌之魏晋已來多在史官不列於國學隋置算學博士一人從九品下皇朝增置二人算學博士掌教文武官八品已下及庶人子之為生者二分其經以為之業習九章海島孫子五曹張丘建夏侯陽周髀十有五人習綴術緝古十有五人其記遺三等數亦兼習之孫子五曹共限一年業成九章海島共三年張丘建夏侯陽各一年周髀五經算共一年綴術四年緝古一年其束修之禮督課試舉如三館博士之法唐六典卷二十一
