body:
  text: 唐六典卷一唐張九齡等撰三師三公尚書都省三師太師一人太傅一人太保一人三公太尉一人司徒一人司空一人尚書省令一人左丞相一人右丞相一人左丞一人右丞一人左司郎中一人右司郎中一人左司員外郎一人右司員外郎一人都事六人主事六人令史十八人書令史三十六人亭長六人掌固十四人太師一人正一品太傅一人正一品太保一人正一品尚書云成王既黜殷命滅淮夷歸酆作周官立太師太傅太保兹為三公論道經邦燮理隂陽孔安國曰師天子所師法傅傅相天子保保安天子於德義禮記云設四輔及三公不必備惟其人言使能也漢承秦制不置三公漢末以大司馬大司徒大司空為三公師傅之官在三公上後漢因之師傅尊號曰上公置府僚魏晉江左皆然後魏太師太傅太保尊號曰三師後周又為三公隋氏又為三師皇朝因之漢書云太師太傅太保皆古官金印紫綬漢官儀云俸月三百五十斛齊職儀云品第一金章紫綬進賢三梁冠絳朝服佩山玄玉周武王以太公為太師詩云維師尚父時維鷹楊成王以周召為之書云召公為保周公為師相成王為左右漢髙后元年置太傅以右丞相王陵為之後省八年復置尋省哀帝元夀二年復置平帝元始元年置太師太保孔光以太傅遷太師王舜以車騎將軍為太保王莽以大司馬領太傅又置少傅為四輔莽篡位以太傅太保國師國將為四輔焉漢光武唯置太傅有府自辟僚屬以卓茂為之明帝以鄧禹為之章安已下初即位輒置録尚書事其人亡因罷迄漢末獻帝初平二年董卓自為之魏氏以鍾繇司馬孚為太傅鄭沖為太保太師不見其人晉以宣王名師乃依周官名置太宰以代之武帝以安平王孚為太宰鄭沖為太傅王祥為太保江左太師並因名為太宰梁制十八建班多者為貴上公班第十八秩萬石陳以為贈官後魏三師正一品非勳德崇重不居焉北齊因之後周依周官以太師太傅太保為三公不置府僚隋氏依後魏為三師因後周不置府僚初拜於尚書省上煬帝三年廢三師官皇朝復置儀制依隋氏三師訓導之官也其名即周之三公漢哀平間始尊師傅之位在三公上謂之上公眀雖天子必有所師其後或廢或置大抵無所統職至後魏特稱三師以正其名然非道德崇重則不居其位無其人則闕之故近代多以為贈官皇朝因之其或親王拜者但存其名耳太尉一人正一品月令云命太尉贊桀俊漢書百官表云太尉秦官應劭曰自上安下曰尉齊職儀云太尉品第一金章紫綬進賢三梁冠絳朝服佩山玄玉郊廟冕服七旒玄衣纁裳服七章春秋合成圖云堯坐舟中與太尉舜臨觀鳯皇授圖運斗樞云舜以太尉為天子然緯書通人皆疑其偽故班氏所不取而大國亦有其職漢初或置或省盧綰周勃灌嬰周亞夫田蚡並為之武帝元狩四年置大司馬當太尉之職至後漢建武二十七年省大司馬又置太尉以太僕趙喜為之而與司徒司空為三公靈帝末劉虞為大司馬而太尉如故二職始兩置矣漢制三公府分部九卿太尉所部太常衛尉光祿三卿三公並置官屬俸月三百五十斛獻帝建安十三年省三公官置丞相魏初又置而兼置大司馬晉以司馬望為太尉歷宋齊梁陳後魏北齊並為三公置府僚宋有大將軍則不置太尉齊以大司馬為贈官梁氏三公加秩至萬石班第十八陳正第一品而與大司馬兩置後魏有大將軍不置太尉正光已後又並置之隋置太尉司徒司空為三公正一品置府僚尋省府僚置公則於尚書省上皇朝因焉武德初秦王兼之永徽中長孫無忌為之其後親王拜三公者皆不視事祭禮則攝者行焉司徒一人正一品左傳云昔少昊氏以鳥名官祝鳩氏為司徒尚書舜命契曰百姓不親五品不遜汝作司徒敬敷五教在寬周則為卿官書云御事司徒司空司馬又云司徒掌邦教敷五典擾兆人秦置丞相省司徒漢因之至哀帝元夀二年更名大司徒與大司馬大司空為三公建武元年以前將軍鄧禹為大司徒二十七年朱祐議契作司徒禹作司空並無大字遂下二府去焉漢制司徒所部太僕鴻臚廷尉三卿漢末罷三公置丞相魏罷丞相置三公以華歆為司徒晉以何曽為司徒趙王倫篡位以梁王彤為丞相省司徒彤遷復舊永嘉元年王夷甫為司徒東海王鉞為丞相則始兩置矣成帝以王導為丞相以司徒府為丞相府導薨復舊宋有丞相又置司徒齊以丞相為贈官梁又兩置陳氏以丞相為贈官後魏正光之後復兩置北齊廢丞相乾眀中又兩置後周並廢隋廢丞相置司徒皇朝因之歷代品秩章服皆同太尉司空一人正一品左傳云少昊以鳲鳩氏為司空尚書舜命禹汝作司空平水土惟時懋哉孔安國曰司空主空土以居人按空穴也古者穴居周以司空為冬官掌邦事秦置御史大夫省司空漢因之至成帝綏和元年御史大夫何武建議依古置三公官改御史大夫為大司空時議者以縣道官獄有司空故加大字以别之哀帝建平二年朱博建議古之帝王不必相襲五年罷大司空置御史大夫元夀元年復為大司空故與御史大夫不兩置建武元年用讖言以野王令王梁為大司空二十七年以朱祐議去大字獻帝建安十二年又省司空置御史大夫漢制司空所部宗正少府司農三卿魏省御史大夫置司空景初二年以司𨽻校尉崔林為司空晉以荀顗為司空歷宋齊梁陳後魏北齊皆省御史大夫置司空後周二職並廢隋氏韓忠以御史中丞之職為大夫故又置司空品職並同太尉皇朝因之三公論道之官也蓋以佐天子理隂陽平邦國無所不統故不以一職名其官然周漢已來代存其任自隋文帝罷三公府僚皇朝因之其或親王拜者亦但存其名位耳尚書都省尚書令一人正二品秦置尚書有令丞屬少府漢因之武昭後置缺重漢書云宣帝時任用中書宦官元帝𢎞𢎞恭石顯相繼為中書令元帝被疾不親政事遂委任焉及前將軍蕭望之領尚書事知顯專權邪辟建言以為中書百官之本國家樞機宜以通明公正之士處之武帝遊燕後庭故委用宦者非古制也宜罷中尚書官中尚書謂中書及尚書也中書典尚書奏事故連言之及光武親總吏職權歸尚書三公但受成事而已漢官儀云尚書令主贊奏事總典綱紀無所不統秩千石故公為之者朝會不陛奏事增秩二千石天子所服五時衣賜尚書令僕射其三公列卿將軍大夫五營校尉行復道中遇尚書令僕射左右丞相郎皆回車豫避衛士傳呼不得忤臺官臺官過乃得去每朝會尚書令御史中丞司𨽻校尉各獨座故京師號曰三獨座晉氏尚書令假銅印墨綬冠進賢兩梁納言幘五時朝服佩水蒼王受拜則䇿命之以在端右故也及賈充為尚書令以目疾表置省事吏四人自魏至晉宋齊秩皆千石品並第三梁加秩中二千石班第十六陳加品至第一後魏北齊及隋品皆第二皇朝因之服驚冕八旒七章三梁冠後漢以尚書令僕射及六曺尚書為八座魏氏省為五曹則僕射有二若僕射省一則尚書有六率以為常今則以二丞相六尚書為八座然後漢尚書稱臺魏晉已來為省皇朝因之龍朔二年改為中臺咸亨元年復舊光宅元年改為文昌臺長安三年又為中臺神龍初復舊尚書令掌總領百官儀刑端揆其屬有六尚書法周之六卿一曰吏部二曰戶部三曰禮部四曰兵部五曰刑部六曰工部凡庶務皆會而決之初秦變周法天下之事皆決丞相府置尚書於禁中有令丞掌通章奏而已漢初因之武宣之後稍以委任及光武親總吏職天下事皆上尚書與人主參決乃下三府尚書令為端揆之官魏晉以來其任尤重皇朝武德中太宗初為秦王嘗親其職自是闕不復置其國政樞密皆委中書八座之官但受其成事而已自太師已下皆古宰相之職今不常置故備敘之尚書左丞相一人右丞相一人並從二品左右丞相本左右僕射也漢書百官表云僕射秦官自侍中尚書博士郎皆有僕射古者重武官有主射以督課因所領之職以為號若尚書則曰尚書僕射漢因秦後漢建安四年以執金吾榮邵為尚書左僕射分置左右蓋自此始漢官儀僕射秩六百石公為之加至二千石自晉以後給省事吏三人魏晉宋齊秩皆六百石品並第三梁品猶第三秩中二千石班第十五陳品加至第二後魏北齊及隋品皆從第二自魏晉以來置二則為左右僕射或不兩置但曰尚書僕射宋百官階次云尚書僕射勝右減左望在二者之間僕射職為執法置二則曰左右執法又與列曹尚書分領諸曹郎令闕則左僕射為省主自東晉以來祠部尚書多不置以右僕射主之若左右僕射並闕則置尚書僕射以掌左事置祠部尚書以掌右事然則尚書僕射祠部尚書不常置矣隋置左右僕射從二品皇朝因之自漢以來章服並與令同龍朔二年改為左右匡政咸亨元年復為僕射光宅元年更名左右相神龍元年復為僕射開元初改為左右丞相左右丞相掌總領六官紀綱百揆以二令之職令則專統焉初亦宰相之職也開元中張説兼之罷知政猶為丞相自此以後遂不知國政左丞一人正四品上右丞一人正四品下司馬彪續漢書云尚書丞一人秦所置漢因之至成帝建始四年置列曹尚書更置丞四人至光武減其二惟置左右丞各一人丞者承也言承助令僕總理臺事也然漢列曹尚書四人成帝加至五人彪言成帝置列曹尚書恐誤也漢官儀云尚書令左丞總領綱紀無所不統僕射右丞掌廩假錢穀晉傅咸云左丞得奏彈八座魏晉已來左丞主臺內禁令宗廟祠祀朝儀禮制選用置吏糾諸不法無所回避右丞掌庫藏廬舍凡諸器用之物刑獄兵器然則右減於左其來尚矣魏晉宋已來左右丞銅印黃綬絳朝服進賢一梁冠自魏至宋齊品皆第六秩四百石梁左丞班第九右丞班第八並第四品秩六百石陳因之後魏北齊左丞正四品下右丞從四品上隋初左丞從四品上右丞從四品下煬帝左右丞並正四品皇朝左丞正四品上右丞正四品下服絺冕六旒三章兩梁冠龍朔二年改為左右肅機咸亨元年復為左右丞永昌元年為從三品神龍二年復故左右丞掌管轄省事糾舉憲章以辨六官之儀制而正百僚之文法分而視焉若左闕則右兼知其事右闕則左亦如之若御史有糾劾不當兼得彈奏左司郎中一人右司郎中一人並從五品上尚書郎漢初置四人一人主胸奴單于營部一人主羌夷吏民一人主户口墾田一人主財帛委輸光武分尚書為六曹郎合三十四郎而史闕曹名魏有殿中吏部駕部金部虞曹比部南主客祠部度支庫部農部水部儀曹三公倉部民曹二千石中兵外兵别兵都兵考功定課都官騎兵凡二十五曹郎晉氏又加直事屯田起部車部左士右士運曹其民曹中兵外兵分為左右主客又分為左右南北無農部定課考功凡三十五曹置郎二十三人更相統攝東晉置殿中祠部吏部儀曹三公比部金部倉部度支都官左民駕部庫部中兵外兵十五曹宋髙祖加騎兵主客起部水部合為十九曹元嘉以後又增刪定功論二曹而省騎兵凡二十曹郎齊因之梁加騎兵虞曹屯田合二十三曹陳省梁二曹不知省何曹也後魏有三十六郎史闕曹名北齊有吏部考功主爵殿中儀曹三公駕部祠部主客虞曹屯田起部左中兵左外兵右中兵右外兵都部兵都官二千石比部水部膳部度支倉部左民右民金部庫部二十八曹郎隋開皇初有吏部主爵司勳考功禮部祠部主客膳部兵部職方駕部庫部都官刑部比部司門度支户部金部倉部工部屯田虞部水部二十四曹郎三年以刑部領都官民部領度支煬帝改六曹具於本司至龍朔二年改吏部為司列主爵為司封考功為司績禮部為司禮祠部為司禋膳部為司膳主客為司藩户部為司戶度支為司度倉部為司庾金部為司珍兵部為司戎職方為司城駕部為司輿庫部為司庫刑部為司刑都官為司僕比部為司計工部為司平屯田為司田虞部為司虞水部為司川惟司勳司門依舊咸亨元年復故漢書天文志南宫後聚十五星曰哀烏郎位漢明帝時館陶公主為子求郎不許而賜錢千萬謂羣臣曰郎官上應列宿出宰百里非其人則民受其殃漢制尚書郎主作文書起草更直於建禮門內臺給青縑白綾被或以錦被帷帳氈褥通中枕大官供食物湯官供餅餌五熟果食五二日一美食下天子一等給尚書郎侍史二人女侍史人皆選端正執香爐香囊從入臺護衣服奏事建禮門內得神仙門神仙門內得明光殿神仙殿因得省中省中皆胡粉塗壁畫古賢列女以丹漆地謂之丹墀尚書郎握蘭含雞舌香奏事與黃門侍郎對揖黃門侍郎稱巳聞乃出丞郎月賜赤管大筆一雙隃糜墨一枚御史中丞侍御史行復道中遇尚書丞郎皆避車執版住揖丞郎坐車舉手禮之車過乃去及晉宋齊梁尚書官上朝及下禁斷行人猶其制也漢官儀丞郎見令㒒射執板拜朝賀對揖丞郎見尚書執板對揖稱曰明時郎見左右丞對揖呼曰左右君漢制八座丞郎初拜並集都堂交禮遷職又解交至宋已後惟八座解交而丞郎不解交也自晉已後八座及丞郎多不奏事梁武帝天監初詔曰自禮闈陵替歷兹永久郎署備員無取職事粃粳文案貴尚虛間空有趨墀之名了無握蘭之實曹郎可依昔奏事自是始奏事矣初秦置郎中令其屬官有五官中郎將左右中郎將秩皆二千石是為三署署中有中郎侍郎郎中郎中秩比三百石侍郎秩比四百石中郎秩比六百石並無員數多至千人分𨽻三署主執戟宿衛宫殿門出充車騎漢因之故馮唐為郎中署長楊雄為侍郎並其任也漢官云尚書郎初從三署郎選詣尚書臺試每一郎缺則試五人先試箋奏初入臺稱郎中滿嵗稱侍郎視事五年遷大縣令亦參用孝亷為之其郎中侍郎之名皆因三署舊號也客曹郎主胡羌事劇遷二千石或刺史其次遷為縣令秩滿自占縣詔書賜錢三萬與三臺祖餞然漢言郎者多非尚書郎漢文時直不疑買金償同舍郎漢武時顔駟為郎三代不遷及諸言以資為郎父任為郎兄任為郎皆三署郎也至後漢三署猶難分有尚書及曹名冠首者即尚書郎也魏二晉以後無三署郎矣自漢以來尚書諸曹並通謂之尚書郎漢代兩置其職則同魏晉宋齊惟置郎中梁陳兩置後魏北齊惟置郎中隋開皇初惟置侍郎至開皇六年每司各置員外郎煬帝三年改諸曹侍郎但曰郎每曹各置二郎尋又省一郎置承務郎同開皇員外之職皇朝改郎為郎中又每曹置員外郎按左右司郎中前代不置煬帝三年尚書都司始置左右司郎各一人品同諸曹郎從五品掌都省之職皇朝因改曰郎中至龍朔二年改為左右承務咸亨元年復故其服章與諸司郎中並同玄冕五旒衣無章裳刺黻一章兩梁冠左司員外郎一人右司員外郎一人並從六品上天后永昌元年置時顧琮自侍御史除元懷貞以洛州司戶遷神龍元年省二年乂置其職務與郎中分掌其朝服與諸司員外郎並爵辨玄纓簮導青衣纁裳一梁冠都事六人從七品上都事本尚書都令史之職沈約宋書云令史蓋前漢官也史記趙禹補中都官周亷為令史是也華嶠後漢書韋彪上疏曰有楚獄事繁故置尚書令史以助郎又云郎主文案與令史不殊續漢書尚書置令史十八人後增劇曹三人滿合二十一人漢官儀云能通倉頡史籀篇補蘭臺令史嵗補尚書令史滿嵗為尚書郎出亦與郎同宰百里郎與令史分職受事令史見僕射尚書執版拜見丞郎執版揖齊職儀云自魏晉宋齊正令史書令史皆有品秩朱衣執版進賢一梁冠楊楞伽北齊鄴都故事云尚書郎判事正坐都令史側坐書令史過事洛京鄴都令史皆平揖郎由來無拜吏部郎選試髙第及二書者奏補皆加戎號案歷代令史皆有品秩漢尚書臺令史秩二百石魏氏令史皆八品晉百官公卿表云尚書都令史八人秩二百石與左右丞總知都臺事宋齊八人梁陳五人品並第八梁武天監初制曰尚書五都職參政要非但總領衆局亦乃方軌二丞頃雖求材未臻妙簡可葷用士流每盡時彥庶同持領秉此羣目於是以太學博士劉納司空法曹參軍劉顯太學博士孔虔孫司空法曹參軍蕭軌宣毅墨曹參軍王顒並以才地兼美首膺兹選矣隋開皇初改都令史為都事置八人正八品上皇朝置六人自晉宋齊後魏北齊隋都令史置八者當八座之數梁陳置五者南朝多不置祠部尚書當五曹之數皇朝置六者當六曹之數左右司郎中員外郎各掌付十有二司之事以舉正稽違省署符目都事監而受焉凡都省掌舉諸司之綱紀與其百僚之程式以正邦理以宣邦教凡上之所以逮下其制有六曰制敕册令教符天子曰制曰敕曰册皇太子曰令親王公主曰教尚書省下於州州下於縣縣下於鄉皆曰符凡下之所以逹上其制亦有六曰表狀箋啓辭牒表上於天子其近臣亦為狀箋啓於皇太子然於其長亦為之非公文所施九品已上公文皆曰牒庶人曰辭諸司自相質問其義有三曰關刺移關謂關通其事刺謂刺舉之移謂移其事於他司移則通判之官皆連署凡內外百司所受之事皆印其發日為之程限一日受二日報其事速及送囚徒隨至即付小事五日謂不須檢覆者中事十日謂須檢覆前案及有所勘問者大事二十日謂計算大簿帳及須咨詢者獄案三十日謂徒巳上辨定須斷結者其急務者不與焉小事判句經三人已下者給一日四人已上給二日中事每經一人給二日大事各加一日內外諸司咸率此若有事速及限內可了者不在此例其文書受付日及訊囚徒並不在程限凡尚書省施行制敕案成則給以鈔之通計符移關牒二百紙已下限二日過此以往每二百紙已上加二日所加多者不得過五日若軍務急速者不出其日若諸州計奏逹于京師量事之大小與多少以為之節二十條以上二日倍之三日又倍之四日又倍之五日雖多不是過焉凡制敕施行京師諸司有符移關牒下諸州者必由於都省以遣之若在京差使者令使人於都省受道次符牒然後發遣若諸方使人欲還亦令所由司先報尚書省所有符牒並令受送凡文案既成勾司行朱訖皆書其上端記年月日納諸庫凡施行公文應印者監印之官考其事目無或差繆然後印之必書於厯每月終納諸庫其印每至夜在京諸司付直官長在外者送當處長官掌凡尚書省官每日一人宿直都司執直簿一轉以為次凡諸司長官應通判者及上佐縣令皆不直也凡內外百僚日出而視事既午而退有事則直官省之其務繁不在此例凡天下制敕計奏之數省符宣告之節率以歲終為斷京師諸司皆以四月一日納于都省其天下諸州則本司推校以授勾官勾官審之連署封印附計帳使納于都省常以六月一日都事集諸司令史對覆若有隱漏不同皆附于考課焉主事六人從九品上漢官云光祿勳有南北廬主事三署主事於諸郎之中察茂才髙第者為之秩四百石次補尚書郎出宰百里謝承後漢書胡伯蕃范滂公沙穆並以俊才為孝亷除郎中光祿勳主事後魏尚書吏部儀曹三公虞曹都官二千石比部各量事置掌故主事員門下置主事令史並從八品上隋初諸臺省並置主事令史煬帝二年並去令史之名其主事隨曹間劇而置每十令史置一主事不滿十者亦置一人雜用才術之士顔慜楚文學名家為內史主事其後尋罷之皇朝並用流外入流者補之令史十八人書令史三十六人自魏晉以來令史之任用人常輕梁陳後魏北齊雖預品秩益闕二品三品四品降始自平隋開皇初著令有流外勳品五品六品七品八品九品之差皇朝因之諸臺闕闕史書令史並分抄行署文書尚書都省令十錢給三口糧國初限八考已上入流若闕史能得官者甚少年上並入流為職事初隋氏革選令令限亦賖武德初天下始定京師榖價貴遠人不願仕流外調諸州佐史及朝集典充選不獲已相資而為之遂促年限優其敘次六七年有至本司主事及上縣尉者每府史三考令史兩考署職亭長六人漢因秦制每十里一亭亭有長髙祖為泗上亭長隋文帝始採古亭長之名以為流外之號皇朝因之主守省門通傳禁約掌固十四人史記云郡國有好文學敬長上肅政教順鄉里者詣太常受業如博士弟子課能通一藝已上補文學掌固又東方朔云曾不得掌故安敢望侍郎乎掌故主故事也史漢本亦為此固字隋令稱掌事皇朝稱掌固主守掌倉庫及廳事鋪設職與古殊與亭長皆為番上下通謂之番官轉入府史從府史轉入令史選轉皆試判唐六典卷一
